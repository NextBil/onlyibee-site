<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#070707">
<title>404 — ONLY IBEE</title>
<link rel="icon" type="image/png" href="/assets/img/favicon-utopie.png">
<script>
/* GitHub Pages serves this file for any unknown path.
   Pretty room links — onlyibee.com/room/<name> — land here and get
   rewritten to the real page: /room/?u=<name>. Everything else gets
   the themed 404 below. */
(function(){
  var m=location.pathname.match(/^\/room\/([A-Za-z0-9_]{3,16})\/?$/);
  if(m){ location.replace("/room/?u="+encodeURIComponent(m[1].toLowerCase())); }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--bg:#070707;--acid:#b6ff00;--red:#ff2b2b;--cyan:#26e0ff;--dim:#7a7a7a;--border:#2a2a2a;
  --px:'Press Start 2P',monospace;--vt:'VT323',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:#e8e8e8;font-family:var(--vt);min-height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:24px;
  animation:crtin .35s ease-out}
@keyframes crtin{0%{transform:scaleY(.02);filter:brightness(3)}60%{transform:scaleY(1.02)}100%{transform:scaleY(1)}}
/* scanlines + vignette, same as the console */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.28) 0 1px,transparent 1px 3px)}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%)}
/* drifting glyphs in the static */
.gl{position:fixed;font-family:var(--px);color:var(--dim);opacity:.14;pointer-events:none;user-select:none;
  animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(105vh) rotate(0deg)}100%{transform:translateY(-12vh) rotate(18deg)}}
.site{font-family:var(--px);font-size:9px;color:var(--dim);letter-spacing:3px;position:relative;z-index:2}
/* the big broken number — chromatic glitch layers */
.n4{position:relative;z-index:2;font-family:var(--px);font-size:clamp(52px,17vw,120px);color:var(--red);
  text-shadow:0 0 26px rgba(255,43,43,.5);line-height:1}
.n4::before,.n4::after{content:"404";position:absolute;inset:0}
.n4::before{color:var(--cyan);z-index:-1;animation:gl1 2.4s steps(1) infinite}
.n4::after{color:var(--acid);z-index:-2;animation:gl2 3.1s steps(1) infinite}
@keyframes gl1{0%,88%{transform:none;opacity:0}90%{transform:translate(-5px,2px);opacity:.8}
  93%{transform:translate(4px,-2px);opacity:.8}96%{transform:translate(-2px,1px);opacity:.6}98%,100%{transform:none;opacity:0}}
@keyframes gl2{0%,73%{transform:none;opacity:0}75%{transform:translate(5px,3px);opacity:.7}
  79%{transform:translate(-4px,-3px);opacity:.7}82%,100%{transform:none;opacity:0}}
h1{position:relative;z-index:2;font-family:var(--px);font-size:clamp(13px,4.5vw,22px);color:var(--acid);
  text-shadow:0 0 18px rgba(182,255,0,.45);letter-spacing:2px;animation:flick 4s steps(1) infinite}
@keyframes flick{0%,91%{opacity:1}92%{opacity:.4}93%{opacity:1}96%{opacity:.6}97%,100%{opacity:1}}
p{position:relative;z-index:2;color:var(--dim);font-size:21px;line-height:1.4;max-width:440px}
p .c{display:inline-block;width:.55em;background:var(--acid);animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.row{position:relative;z-index:2;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{font-family:var(--px);font-size:10px;color:#000;background:var(--acid);border:1px solid var(--acid);
  padding:15px 20px;text-decoration:none;display:inline-block}
.btn:hover{filter:brightness(1.12)}
.btn:active{transform:translateY(2px)}
.idle{position:fixed;left:14px;bottom:12px;font-family:var(--px);font-size:8px;color:var(--dim);z-index:2}
.idle b{color:var(--red);font-weight:normal;animation:blink 1.4s steps(1) infinite}
</style>
</head>
<body>
<span class="gl" style="left:8%;font-size:14px;animation-duration:19s">♟</span>
<span class="gl" style="left:22%;font-size:9px;animation-duration:27s;animation-delay:-9s">✦</span>
<span class="gl" style="left:38%;font-size:16px;animation-duration:23s;animation-delay:-4s">☂</span>
<span class="gl" style="left:57%;font-size:10px;animation-duration:30s;animation-delay:-17s">♪</span>
<span class="gl" style="left:71%;font-size:13px;animation-duration:21s;animation-delay:-12s">✧</span>
<span class="gl" style="left:86%;font-size:11px;animation-duration:26s;animation-delay:-6s">♟</span>
<div class="site">ONLYIBEE.COM</div>
<div class="n4">404</div>
<h1>OOPS — DEAD CHANNEL_</h1>
<p>this page doesn't exist. the static ate it, or it was never real.
  the rest of the universe is still on air<span class="c">&nbsp;</span></p>
<div class="row">
  <a class="btn" href="/">▶ SEE THE ART</a>
</div>
<div class="idle">IDLE — <b>NO SIGNAL</b></div>
</body>
</html>
