<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ONLY IBEE — app</title>
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="apple-touch-icon" href="/assets/chess/bishop1.png">
<meta name="theme-color" content="#070707">
<meta property="og:image" content="https://onlyibee.com/assets/chess/bishop1.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<!--
  ONLYIBEE — FULL APP (Option B feel, reliable substrate)
  One persistent app: a top bar with section nav + a live now-playing mini-player,
  and a content stage that swaps pages with a fade. The radio lives at the app level
  and NEVER reloads, so the music is continuous everywhere. Switching console screens
  (universe/shop) doesn't even reload — it just changes the screen in place.
  Deep-link with spa.html?p=beebee/
-->
<style>
  :root{--bg:#070707;--ink:#e8e8e8;--dim:#7a7a7a;--acid:#b6ff00;--red:#ff2b2b;--border:#2a2a2a;
    --px:'Press Start 2P',monospace;--vt:'VT323',monospace}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--vt);color:var(--ink)}
  /* hide player.js's own floating chip/frame — the app bar is our radio UI */
  #radiochip,#radiopanel,#nf{display:none!important}

  #app{position:fixed;inset:0;display:flex;flex-direction:column}
  /* ---- top app bar ---- */
  #bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#000;
    border-bottom:2px solid var(--border);z-index:10;flex-wrap:nowrap;overflow:hidden}
  #bar .brand{font-family:var(--px);font-size:11px;color:var(--acid);cursor:pointer;white-space:nowrap;
    text-shadow:0 0 10px rgba(182,255,0,.35)}
  #bar .brand .r{color:var(--red)}
  #nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1}
  #nav::-webkit-scrollbar{display:none}
  #nav button{font-family:var(--px);font-size:8px;color:var(--dim);background:transparent;border:1px solid transparent;
    padding:8px 9px;cursor:pointer;white-space:nowrap}
  #nav button:hover{color:var(--ink)}
  #nav button.on{color:#000;background:var(--acid);border-color:var(--acid)}
  /* ---- mini radio ---- */
  #radio{display:flex;align-items:center;gap:8px;flex:none;max-width:46vw}
  #radio .np{min-width:0;text-align:right}
  #radio .np .t{font-family:var(--px);font-size:8px;color:var(--acid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:26vw}
  #radio .np .s{font-size:13px;color:var(--dim)}
  #radio button{font-family:var(--px);font-size:9px;width:34px;height:32px;background:#0e0e0e;color:var(--ink);
    border:1px solid var(--border);cursor:pointer;flex:none}
  #radio button:hover{border-color:var(--acid);color:var(--acid)}
  #radio button.main{background:var(--acid);color:#000;border-color:var(--acid)}
  .beatdot{width:8px;height:8px;border-radius:50%;background:var(--red);flex:none;
    box-shadow:0 0 8px var(--red);transform:scale(var(--b,.5));transition:transform .06s}

  /* ---- content stage ---- */
  #stage{position:relative;flex:1;overflow:hidden;background:var(--bg)}
  #frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:var(--bg);
    opacity:0;transition:opacity .28s ease}
  #frame.on{opacity:1}

  /* ---- start overlay ---- */
  #enter{position:fixed;inset:0;z-index:99999;background:#000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:24px;cursor:pointer;text-align:center;padding:24px;font-family:var(--px)}
  #enter .g{color:var(--acid);font-size:clamp(22px,7vw,44px);letter-spacing:2px;text-shadow:0 0 20px rgba(182,255,0,.5)}
  #enter .g .r{color:var(--red)}
  #enter .t{color:var(--dim);font-size:11px;line-height:1.8}
  #enter .s{color:var(--ink);font-size:12px;animation:bk 1.1s steps(1) infinite}
  @keyframes bk{50%{opacity:0}}
  @media(max-width:520px){#bar .brand{font-size:9px}#radio .np .t{max-width:20vw}}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <span class="brand" data-go="console.html#menu">ONLY<span class="r">IBEE</span></span>
    <div id="nav"></div>
    <div id="radio">
      <span class="beatdot" id="beat"></span>
      <div class="np"><div class="t" id="rt">—</div><div class="s" id="rs">radio</div></div>
      <button id="rprev">◀◀</button>
      <button id="rplay" class="main">►</button>
      <button id="rnext">▶▶</button>
    </div>
  </div>
  <div id="stage"><iframe id="frame" title="ONLY IBEE" allow="autoplay; fullscreen"></iframe></div>
</div>

<div id="enter">
  <div class="g">ONLY<span class="r">IBEE</span></div>
  <div class="t">one app · one radio · never stops_</div>
  <div class="s">▶ PRESS START</div>
</div>

<script>
(function(){
  /* If this shell ever loads INSIDE the frame (a link pointed at the site root),
     don't nest a second app — show the console in this same frame instead. */
  if(window.top !== window.self){ location.replace('console.html'+location.search+location.hash); return; }

  var frame=document.getElementById('frame'), enter=document.getElementById('enter');
  if(location.protocol==='file:'){ var _t=enter.querySelector('.t');
    if(_t) _t.innerHTML='⚠ open over http (your live site / a server),<br>not file:// — framing is blocked locally'; }

  /* ---- section nav (the console lives at console.html now) ---- */
  var NAV=[
    {n:'CONSOLE', u:'console.html#menu'},
    {n:'UNIVERSE',u:'console.html#music'},
    {n:'ARCADE',  u:'arcade/'},
    {n:'ICS',     u:'console.html#ics'},
    {n:'SHOP',    u:'console.html#shop'},
    {n:'LYRICS',  u:'lyrics/'}
  ];
  var navEl=document.getElementById('nav');
  NAV.forEach(function(it){var b=document.createElement('button');b.textContent=it.n;
    b.onclick=function(){navigate(it.u);};navEl.appendChild(b);});
  document.querySelector('.brand').onclick=function(){navigate('console.html#menu');};

  /* ---- navigate: swap screen in-place when possible, else fade to a new page ---- */
  function navigate(url){
    try{
      var cur=frame.contentWindow.location, tgt=new URL(url, location.href);
      if(cur.pathname===tgt.pathname && tgt.hash){
        frame.contentWindow.location.hash=tgt.hash;   /* same page → just switch, no reload, no music blip */
        sync(); return;
      }
    }catch(e){}
    frame.classList.remove('on');
    setTimeout(function(){ frame.src=url; }, 120);
  }

  /* first page: ?p= (deep-link/NFC) or the console */
  var p=new URLSearchParams(location.search).get('p')||'console.html#menu';
  if(/^(https?:)?\/\//i.test(p)) p='console.html#menu';
  frame.src=p;

  frame.addEventListener('load',function(){ frame.classList.add('on'); sync(); });

  function sync(){
    try{
      var l=frame.contentWindow.location, rel=(l.pathname+l.search+l.hash).replace(/^\//,'');
      history.replaceState(null,'','?p='+encodeURIComponent(rel));
      if(frame.contentDocument&&frame.contentDocument.title) document.title=frame.contentDocument.title;
      var path=l.pathname.replace(/^\//,''), hash=l.hash;
      document.querySelectorAll('#nav button').forEach(function(b,i){
        var u=new URL(NAV[i].u, location.href);
        b.classList.toggle('on', u.pathname.replace(/^\//,'')===path && (!u.hash||u.hash===hash));
      });
    }catch(e){}
  }

  /* ---- mini radio wired to the persistent IBEERADIO ---- */
  var rt=document.getElementById('rt'), rs=document.getElementById('rs'),
      rplay=document.getElementById('rplay'), beat=document.getElementById('beat');
  function R(){return window.IBEERADIO;}
  document.getElementById('rprev').onclick=function(){var r=R();if(r)r.control.prev();};
  document.getElementById('rnext').onclick=function(){var r=R();if(r)r.control.next();};
  rplay.onclick=function(){var r=R();if(!r)return; if(r.playing())r.control.pause(); else r.control.play();};
  setInterval(function(){
    var r=R();if(!r)return;
    var s=r.song&&r.song(); rt.textContent=s?s.n:'—'; rs.textContent=s?('hue '+s.hue):'radio';
    rplay.textContent=r.playing()?'❚❚':'►';
    try{beat.style.setProperty('--b',(0.5+(r.playing()?r.beat():0)).toFixed(2));}catch(e){}
  },400);

  /* first gesture at app level → start the radio, then it never stops */
  function start(){
    enter.style.display='none';
    try{ if(R()&&R().control) R().control.play(); }catch(e){}
    window.removeEventListener('keydown',keys);
  }
  function keys(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();start();} }
  enter.addEventListener('click',start);
  window.addEventListener('keydown',keys);
})();
</script>
<script src="assets/player.js?v=9"></script>
</body>
</html>
