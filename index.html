<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ONLY IBEE</title>
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="apple-touch-icon" href="/assets/chess/bishop1.png">
<meta name="theme-color" content="#070707">
<meta property="og:image" content="https://onlyibee.com/assets/chess/bishop1.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<!--
  ONLYIBEE — SEAMLESS SHELL (Option A: iframe)
  The whole site loads inside one persistent frame. The radio lives HERE, at the
  top level, so it never reloads and the music never stops as you move around —
  console, chess, Beebee runner, character pages, anywhere. One tap to start, then
  it plays forever. Deep-link with app.html?p=beebee/  (great for NFC tags).
-->
<style>
  html,body{margin:0;height:100%;background:#070707;overflow:hidden;font-family:'Press Start 2P',monospace}
  #frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;background:#070707}
  #enter{position:fixed;inset:0;z-index:99999;background:#000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:26px;cursor:pointer;text-align:center;padding:24px}
  #enter .g{color:#b6ff00;font-size:clamp(22px,7vw,44px);letter-spacing:2px;text-shadow:0 0 20px rgba(182,255,0,.5)}
  #enter .g .r{color:#ff2b2b}
  #enter .t{color:#7a7a7a;font-size:11px;line-height:1.8}
  #enter .s{color:#e8e8e8;font-size:12px;animation:bk 1.1s steps(1) infinite}
  @keyframes bk{50%{opacity:0}}
</style>
</head>
<body>
<iframe id="frame" title="ONLY IBEE" allow="autoplay; fullscreen"></iframe>

<div id="enter">
  <div class="g">ONLY<span class="r">IBEE</span></div>
  <div class="t">one console · one radio · never stops_</div>
  <div class="s">▶ PRESS START</div>
</div>

<script>
(function(){
  var frame=document.getElementById('frame'), enter=document.getElementById('enter');

  /* which page to open first: ?p= (deep-link / NFC), else the console */
  var p=new URLSearchParams(location.search).get('p')||'index.html';
  if(/^(https?:)?\/\//i.test(p)) p='index.html';     /* only same-site relative targets */
  frame.src=p;

  /* keep the address bar in sync as you navigate inside the frame (shareable / back button) */
  frame.addEventListener('load',function(){
    try{
      var l=frame.contentWindow.location, rel=(l.pathname+l.search+l.hash).replace(/^\//,'');
      history.replaceState(null,'','?p='+encodeURIComponent(rel));
      if(frame.contentDocument&&frame.contentDocument.title) document.title=frame.contentDocument.title;
    }catch(e){}
  });

  /* the FIRST tap happens at the top level → starts the radio, which then never stops */
  function start(){
    enter.style.display='none';
    try{ if(window.IBEERADIO&&window.IBEERADIO.control) window.IBEERADIO.control.play(); }catch(e){}
    window.removeEventListener('keydown',keys);
  }
  function keys(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); start(); } }
  enter.addEventListener('click',start);
  window.addEventListener('keydown',keys);
})();
</script>
<!-- the persistent radio: top-level, so it survives every in-frame navigation -->
<script src="assets/player.js?v=9"></script>
</body>
</html>
