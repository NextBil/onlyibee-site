<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ONLY IBEE</title>
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="apple-touch-icon" href="/assets/chess/bishop1.png">
<meta name="theme-color" content="#070707">
<meta property="og:image" content="https://onlyibee.com/assets/chess/bishop1.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<!--
  ONLYIBEE — persistent app shell.
  Top = section nav (fills the bar). Bottom = the radio player: song title, transport,
  seek, + spinning LYRICS / UNIVERSE shortcuts. Music never auto-starts; the whole site
  rides one radio and player.js's neon frame (#nf) glows around the screen edges.
-->
<style>
  :root{--bg:#070707;--ink:#e8e8e8;--dim:#7a7a7a;--acid:#b6ff00;--red:#ff2b2b;--pink:#ff2bd6;--cyan:#26e0ff;
    --border:#2a2a2a;--px:'Press Start 2P',monospace;--vt:'VT323',monospace}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--vt);color:var(--ink)}
  /* keep player.js's own chip + panel hidden — we draw our own bars. KEEP #nf (the glow). */
  #radiochip,#radiopanel{display:none!important}

  #app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}

  /* ---- top bar: nav fills the width ---- */
  #bar{display:flex;background:#000;border-bottom:2px solid var(--border);position:relative;z-index:20}
  #nav{display:flex;flex:1;overflow-x:auto;scrollbar-width:none;min-width:0}
  #nav::-webkit-scrollbar{display:none}
  #nav button{font-family:var(--px);font-size:9px;color:var(--dim);background:transparent;border:0;
    border-right:1px solid #161616;padding:13px 11px;cursor:pointer;white-space:nowrap;flex:1 0 auto}
  #nav button:hover{color:var(--ink)}
  #nav button.on{color:#000;background:var(--acid)}

  /* ---- content ---- */
  #stage{position:relative;flex:1;overflow:hidden}
  #frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:var(--bg);
    opacity:0;transition:opacity .28s ease}
  #frame.on{opacity:1}

  /* ---- bottom: track list (opens above) + player ---- */
  #bottom{position:relative;z-index:20}
  #tracklist{position:absolute;left:0;right:0;bottom:100%;max-height:52vh;overflow-y:auto;
    background:rgba(0,0,0,.97);border-top:2px solid var(--border);display:none}
  #tracklist.open{display:block}
  #tracklist .th{font-family:var(--px);font-size:9px;color:var(--acid);padding:12px 14px;border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between}
  #tracklist .th .x{color:var(--dim);cursor:pointer}
  #tracklist .tr{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;
    color:var(--dim);font-size:19px;border-bottom:1px solid #141414}
  #tracklist .tr:hover{background:#0d0d0d;color:var(--ink)}
  #tracklist .tr.now{color:var(--acid);background:#0d1400}
  #tracklist .tr .no{font-family:var(--px);font-size:8px;color:#555;width:24px}
  #tracklist .tr.now .no{color:var(--acid)}

  #player{background:#000;border-top:2px solid var(--border);padding:8px 12px 10px;
    display:flex;flex-direction:column;gap:7px}
  /* row 1: song title (clickable → tracks) + time */
  .pl-top{display:flex;align-items:center;gap:10px}
  #nowbtn{flex:1;min-width:0;display:flex;align-items:center;gap:8px;background:transparent;border:0;
    color:var(--acid);font-family:var(--px);font-size:9px;cursor:pointer;text-align:left;padding:0}
  #nowbtn #rt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #nowbtn .bd{width:9px;height:9px;border-radius:50%;background:var(--red);flex:none;
    box-shadow:0 0 8px var(--red);transform:scale(var(--b,.5));transition:transform .07s}
  #time{font-family:var(--px);font-size:8px;color:var(--dim);flex:none}
  /* seek */
  #seek{position:relative;height:11px;border:1px solid var(--border);padding:2px;cursor:pointer}
  #fill{height:100%;width:0%;background:var(--acid)}
  /* row 2: transport + spinning lyrics/universe shortcuts */
  .pl-row{display:flex;align-items:center;justify-content:center;gap:8px}
  .pl-row button{font-family:var(--px);font-size:11px;width:44px;height:40px;background:#0e0e0e;color:var(--ink);
    border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .pl-row button:hover{border-color:var(--acid);color:var(--acid)}
  .pl-row button.main{background:var(--acid);color:#000;border-color:var(--acid)}
  /* the cool rotating icons */
  .ricon{perspective:120px}
  .ricon svg{width:24px;height:24px}
  .ricon.lyr svg{animation:flipY 3s linear infinite;transform-style:preserve-3d}
  .ricon.uni svg{animation:spin 5.5s linear infinite}
  .ricon:hover svg{filter:drop-shadow(0 0 6px rgba(182,255,0,.6))}
  @keyframes flipY{to{transform:rotateY(360deg)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- PRESS START intro (just enters — no music autostart) ---- */
  #enter{position:fixed;inset:0;z-index:99999;background:#000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:26px;cursor:pointer;text-align:center;padding:24px;font-family:var(--px)}
  #enter .g{color:var(--acid);font-size:clamp(24px,8vw,48px);letter-spacing:2px;text-shadow:0 0 22px rgba(182,255,0,.55)}
  #enter .g .r{color:var(--red)}
  #enter .t{color:var(--dim);font-size:11px;line-height:1.8}
  #enter .s{color:var(--ink);font-size:13px;animation:bk 1.1s steps(1) infinite}
  @keyframes bk{50%{opacity:0}}
</style>
</head>
<body>
<div id="app">
  <div id="bar"><div id="nav"></div></div>

  <div id="stage"><iframe id="frame" title="ONLY IBEE" allow="autoplay; fullscreen"></iframe></div>

  <div id="bottom">
    <div id="tracklist"></div>
    <div id="player">
      <div class="pl-top">
        <button id="nowbtn" title="open the radio"><span class="bd"></span><span id="rt">RADIO</span></button>
        <span id="time">0:00 / --:--</span>
      </div>
      <div id="seek"><div id="fill"></div></div>
      <div class="pl-row">
        <button id="blyr" class="ricon lyr" title="Lyrics engine">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 5 Q7 3 12 5 Q17 3 22 5 V19 Q17 17 12 19 Q7 17 2 19 Z" fill="#0e0e0e" stroke="#b6ff00" stroke-width="1.3"/>
            <line x1="12" y1="5" x2="12" y2="19" stroke="#b6ff00" stroke-width="1.2"/>
            <line x1="4.5" y1="8.4" x2="9.6" y2="7.7" stroke="#7a7a7a" stroke-width="1"/>
            <line x1="4.5" y1="11" x2="9.6" y2="10.3" stroke="#7a7a7a" stroke-width="1"/>
            <line x1="14.4" y1="7.7" x2="19.5" y2="8.4" stroke="#7a7a7a" stroke-width="1"/>
            <line x1="14.4" y1="10.3" x2="19.5" y2="11" stroke="#7a7a7a" stroke-width="1"/>
            <rect x="16.6" y="3.4" width="1.7" height="4.4" fill="#ff2b2b"/>
          </svg>
        </button>
        <button id="rprev">◀◀</button>
        <button id="rplay" class="main">►</button>
        <button id="rnext">▶▶</button>
        <button id="buni" class="ricon uni" title="Universe — the performing planet">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="12" cy="12" rx="11" ry="4.4" fill="none" stroke="#26e0ff" stroke-width="1.4" opacity=".8"/>
            <circle cx="12" cy="12" r="5.6" fill="#0e0e0e" stroke="#b6ff00" stroke-width="1.6"/>
            <circle cx="10" cy="10.2" r="1.5" fill="#ff2bd6"/>
            <circle cx="13.6" cy="13" r="1" fill="#b6ff00"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- PRESS START intro overlay -->
<div id="enter">
  <div class="g">ONLY<span class="r">IBEE</span></div>
  <div class="t">console for art &amp; discovery_</div>
  <div class="s">▶ PRESS START</div>
</div>

<!-- do NOT auto-resume music on load: clear the "was playing" flag before the radio boots -->
<script>try{var _s=JSON.parse(localStorage.getItem('ibee_radio')||'null');if(_s){_s.p=false;localStorage.setItem('ibee_radio',JSON.stringify(_s));}}catch(e){}</script>
<!-- the persistent radio loads first so it exists before the frame opens any page -->
<script src="assets/player.js?v=9"></script>
<script>
(function(){
  /* if the shell ever loads inside the frame (a link hit the root) → show the console instead */
  if(window.top !== window.self){ location.replace('console.html'+location.search+location.hash); return; }

  var frame=document.getElementById('frame');
  function R(){return window.IBEERADIO;}

  /* ---- section nav (fills the bar) ---- */
  var NAV=[
    {n:'CONSOLE', u:'console.html#menu'},
    {n:'UNIVERSE',u:'console.html#playing'},
    {n:'ARCADE',  u:'arcade/'},
    {n:'ICS',     u:'console.html#ics'},
    {n:'SHOP',    u:'console.html#shop'},
    {n:'LYRICS',  u:'lyrics/'}
  ];
  var navEl=document.getElementById('nav');
  NAV.forEach(function(it){var b=document.createElement('button');b.textContent=it.n;
    b.onclick=function(){navigate(it.u);};navEl.appendChild(b);});

  function navigate(url){
    try{
      var cur=frame.contentWindow.location, tgt=new URL(url, location.href);
      if(cur.pathname===tgt.pathname && tgt.hash){ frame.contentWindow.location.hash=tgt.hash; sync(); return; }
    }catch(e){}
    frame.classList.remove('on');
    setTimeout(function(){ frame.src=url; }, 120);
  }

  /* first page: ?p= (deep-link/NFC) or the console */
  var p=new URLSearchParams(location.search).get('p')||'console.html#menu';
  if(/^(https?:)?\/\//i.test(p)) p='console.html#menu';
  frame.src=p;
  frame.addEventListener('load',function(){ frame.classList.add('on'); sync(); });

  function sync(){
    try{
      var l=frame.contentWindow.location, rel=(l.pathname+l.search+l.hash).replace(/^\//,'');
      history.replaceState(null,'','?p='+encodeURIComponent(rel));
      if(frame.contentDocument&&frame.contentDocument.title) document.title=frame.contentDocument.title;
      var path=l.pathname.replace(/^\//,''), hash=l.hash;
      document.querySelectorAll('#nav button').forEach(function(b,i){
        var u=new URL(NAV[i].u, location.href);
        b.classList.toggle('on', u.pathname.replace(/^\//,'')===path && (!u.hash||u.hash===hash));
      });
    }catch(e){}
  }

  /* ---- transport (no autoplay: only plays when the user acts) ---- */
  document.getElementById('rprev').onclick=function(){var r=R();if(r)r.control.prev();};
  document.getElementById('rnext').onclick=function(){var r=R();if(r)r.control.next();};
  document.getElementById('rplay').onclick=function(){var r=R();if(!r)return; if(r.playing())r.control.pause(); else r.control.play(r.current()<0?0:null);};
  /* spinning shortcuts */
  document.getElementById('blyr').onclick=function(){navigate('lyrics/');};
  document.getElementById('buni').onclick=function(){navigate('console.html#playing');};

  var seek=document.getElementById('seek');
  seek.addEventListener('click',function(e){var r=R();if(!r)return;
    try{var rc=seek.getBoundingClientRect(),fr=(e.clientX-rc.left)/rc.width;
      if(r.audio&&r.audio.duration)r.audio.currentTime=Math.max(0,Math.min(1,fr))*r.audio.duration;}catch(x){}});

  /* ---- title click → open the radio (track list) ---- */
  var tl=document.getElementById('tracklist'), built=false;
  function buildList(){
    var r=R();if(!r)return; var h='<div class="th"><span>IBEE RADIO_</span><span class="x" id="tlx">✕ close</span></div>';
    for(var i=0;i<r.count;i++){var s=r.song(i);h+='<div class="tr" data-i="'+i+'"><span class="no">'+(i<9?'0':'')+(i+1)+'</span>'+(s?s.n:'—')+'</div>';}
    tl.innerHTML=h;built=true;
    document.getElementById('tlx').onclick=function(ev){ev.stopPropagation();tl.classList.remove('open');};
    Array.prototype.forEach.call(tl.querySelectorAll('.tr'),function(row){
      row.onclick=function(){var r2=R();if(r2)r2.control.play(+row.getAttribute('data-i'));};});
  }
  document.getElementById('nowbtn').onclick=function(){ if(!built)buildList(); tl.classList.toggle('open'); };

  /* ---- keep the player reflecting the one radio's state ---- */
  var rt=document.getElementById('rt'),rplay=document.getElementById('rplay'),
      fill=document.getElementById('fill'),timeEl=document.getElementById('time'),bd=document.querySelector('#nowbtn .bd');
  function fmt(s){if(!isFinite(s))return'--:--';var m=Math.floor(s/60),ss=Math.floor(s%60);return m+':'+(ss<10?'0':'')+ss;}
  setInterval(function(){
    var r=R();if(!r)return;
    var s=r.song&&r.song(); rt.textContent=s?s.n:'RADIO';
    var pl=r.playing(); rplay.textContent=pl?'❚❚':'►';
    try{bd.style.setProperty('--b',(0.45+(pl?r.beat():0)).toFixed(2));}catch(e){}
    try{var c=r.audio.currentTime||0,d=r.audio.duration||0;
      fill.style.width=(d?c/d*100:0)+'%'; timeEl.textContent=fmt(c)+' / '+fmt(d);}catch(e){}
    if(tl.classList.contains('open')){var ci=r.current();
      Array.prototype.forEach.call(tl.querySelectorAll('.tr'),function(row){
        row.classList.toggle('now',+row.getAttribute('data-i')===ci);});}
  },350);

  /* ---- PRESS START intro: just dismiss, do NOT start music ---- */
  var enter=document.getElementById('enter');
  if(enter){
    var go=function(){enter.style.display='none';window.removeEventListener('keydown',kk);};
    var kk=function(ev){if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();go();}};
    enter.addEventListener('click',go);
    window.addEventListener('keydown',kk);
  }
})();
</script>
</body>
</html>
