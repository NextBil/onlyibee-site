<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="apple-touch-icon" href="/assets/chess/bishop1.png">
<meta name="theme-color" content="#070707">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>MEMBER ACCESS — THE FREQUENCY | ONLY IBEE</title>
<meta name="description" content="ONLY IBEE member access. Scan your garment's monster head to enter the frequency.">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070707;--panel:#0e0e0e;--ink:#e8e8e8;--dim:#7a7a7a;
  --acid:#b6ff00;--red:#ff2b2b;--cyan:#26e0ff;--pink:#ff2bd6;--gold:#ffd60a;--border:#2a2a2a;
  --hue:88;                                  /* recolored per member rank */
  --px:'Press Start 2P',monospace;--vt:'VT323',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--vt);font-size:20px;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.28) 0 1px,transparent 1px 3px)}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}
/* animated starfield tint by rank */
.bgglow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 22%,hsla(var(--hue),90%,45%,.16),transparent 60%)}
header{width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:2px solid var(--border);font-family:var(--px);font-size:10px;position:relative;z-index:50}
header a{color:var(--acid);text-decoration:none}header a .r{color:var(--red)}header span{color:var(--dim);font-size:8px}
main{flex:1;width:100%;max-width:600px;padding:24px 18px 60px;display:flex;flex-direction:column;
  align-items:center;gap:14px;text-align:center;position:relative;z-index:2}

/* ---------- boot / authenticating ---------- */
#boot{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;font-family:var(--px);padding:24px;text-align:center}
#boot.gone{opacity:0;pointer-events:none;transition:opacity .5s}
#boot .lock{font-size:44px;color:var(--dim);filter:drop-shadow(0 0 10px rgba(0,0,0,.6))}
#boot .l{font-size:10px;color:var(--acid);letter-spacing:2px;min-height:16px}
#boot .bar{width:min(260px,70vw);height:10px;border:1px solid var(--border);padding:1px}
#boot .bar i{display:block;height:100%;width:0;background:var(--acid);box-shadow:0 0 10px var(--acid)}

.crtin{animation:crtin .35s ease-out}
@keyframes crtin{0%{transform:scaleY(.02);filter:brightness(3)}60%{transform:scaleY(1.03)}100%{transform:scaleY(1)}}
.granted{font-family:var(--px);font-size:clamp(11px,3.2vw,14px);letter-spacing:2px;color:hsl(var(--hue),95%,68%);
  text-shadow:0 0 16px hsla(var(--hue),95%,55%,.6)}

/* ---------- spinning 3D member medallion ---------- */
.stage{perspective:640px;width:min(230px,60vw);height:min(230px,60vw);margin-top:4px}
.o3{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:spin 6s linear infinite}
@keyframes spin{from{transform:rotateY(0) rotateX(8deg)}to{transform:rotateY(360deg) rotateX(8deg)}}
.o3 img{position:absolute;inset:0;width:100%;height:100%}
.ped{width:150px;height:26px;border-radius:50%;margin:-6px auto 6px;
  background:radial-gradient(ellipse,hsla(var(--hue),95%,55%,.5),transparent 70%);animation:pulse 3.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scaleX(1);opacity:.85}50%{transform:scaleX(.7);opacity:.4}}

/* ---------- member card ---------- */
.mcard{width:100%;border:2px solid hsla(var(--hue),60%,45%,.6);background:rgba(10,10,12,.92);
  padding:18px;margin-top:6px;box-shadow:0 0 26px hsla(var(--hue),90%,45%,.18),inset 0 0 40px rgba(0,0,0,.6);position:relative}
.mcard .tag{font-family:var(--px);font-size:8px;color:var(--dim);letter-spacing:2px}
.mcard .rank{font-family:var(--px);font-size:clamp(16px,5.4vw,26px);color:hsl(var(--hue),95%,70%);
  text-shadow:0 0 18px hsla(var(--hue),95%,55%,.55);margin:8px 0 2px;letter-spacing:2px}
.mcard .code{font-family:var(--px);font-size:12px;color:var(--ink);letter-spacing:2px;cursor:pointer;margin-top:8px}
.mcard .code:hover{color:var(--acid)}
.stats{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.stat{flex:1;min-width:120px;border:1px solid var(--border);padding:9px}
.stat .k{font-family:var(--px);font-size:7px;color:var(--dim);letter-spacing:1px}
.stat .v{font-family:var(--px);font-size:14px;color:hsl(var(--hue),95%,70%);margin-top:6px}
.powerwrap{height:8px;border:1px solid var(--border);margin-top:8px;padding:1px}
.powerwrap i{display:block;height:100%;width:0;background:hsl(var(--hue),95%,55%);box-shadow:0 0 8px hsla(var(--hue),95%,55%,.7);transition:width 1.4s ease}

/* ---------- referral / recruit ---------- */
.box{width:100%;border:2px solid var(--border);background:rgba(14,14,14,.9);padding:16px 18px;text-align:left;margin-top:14px}
.box .h{font-family:var(--px);font-size:9px;color:var(--acid);letter-spacing:1px;margin-bottom:10px}
.box p{color:#bdbdbd;font-size:19px;line-height:1.5;margin-bottom:10px}
.reflink{display:flex;gap:8px;align-items:stretch;flex-wrap:wrap}
.reflink input{flex:1;min-width:160px;background:#050505;border:1px solid var(--border);color:var(--acid);
  font-family:var(--vt);font-size:17px;padding:10px}
.reflink button,.share{font-family:var(--px);font-size:9px;padding:0 14px;background:var(--acid);color:#000;border:1px solid var(--acid);cursor:pointer}
.share{padding:12px 14px;margin-top:8px;display:inline-block;text-decoration:none;background:transparent;color:var(--cyan);border-color:#123a44}
.refby{font-family:var(--px);font-size:8px;color:var(--gold);margin-top:10px}

/* ---------- register (Tally) ---------- */
#regbox{width:100%;margin-top:10px;min-height:60px}
.cnote{color:var(--dim);font-size:17px;line-height:1.4}
.claim{display:flex;flex-direction:column;gap:9px}
.claim input{background:#050505;border:1px solid var(--border);color:var(--acid);font-family:var(--vt);font-size:18px;padding:11px}
.claim input:focus{outline:none;border-color:var(--acid)}
.cbtn{font-family:var(--px);font-size:11px;padding:14px;background:var(--acid);color:#000;border:1px solid var(--acid);cursor:pointer;text-align:center;text-decoration:none;display:block}
.cbtn:disabled{opacity:.5;cursor:default}
.taken{border:1px solid var(--red);color:var(--red);font-family:var(--px);font-size:11px;padding:16px;text-align:center;letter-spacing:1px;line-height:1.6}
.item{border:2px solid var(--border);padding:18px;text-align:center;position:relative;overflow:hidden;background:#0a0a0c;animation:pop .5s cubic-bezier(.2,1.6,.4,1) both}
@keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.item .rz{font-family:var(--px);font-size:8px;letter-spacing:2px;padding:5px 8px;display:inline-block;border:1px solid}
.item .ilabel{font-family:var(--px);font-size:8px;color:var(--dim);letter-spacing:2px;margin-top:14px}
.item .iname{font-family:var(--px);font-size:16px;color:hsl(var(--hue),95%,72%);margin:8px 0 6px;text-shadow:0 0 14px hsla(var(--hue),95%,55%,.5)}
.item .ity{color:var(--dim);font-size:16px;margin-bottom:12px}
.r-common{color:#9a9a9a;border-color:#444}.r-rare{color:var(--cyan);border-color:#123a44}
.r-epic{color:var(--pink);border-color:#4a1240}.r-legendary{color:var(--gold);border-color:#4a3a12}
.item.g-rare{box-shadow:0 0 26px rgba(38,224,255,.22)}.item.g-epic{box-shadow:0 0 30px rgba(255,43,214,.26)}
.item.g-legendary{box-shadow:0 0 36px rgba(255,214,10,.3)}
.regph{border:1px dashed var(--border);padding:16px;color:var(--dim);font-family:var(--px);font-size:8px;line-height:1.8;text-align:center}

.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{font-family:var(--px);font-size:10px;padding:14px 18px;text-decoration:none;background:transparent;color:var(--acid);border:1px solid var(--acid)}
.btn.solid{background:var(--acid);color:#000}
.btn:active{transform:translateY(2px)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#000;border:1px solid var(--acid);
  color:var(--acid);font-family:var(--px);font-size:9px;padding:10px 16px;z-index:9500;opacity:0;transition:.2s;pointer-events:none}
.toast.on{opacity:1}
footer{padding:16px;font-family:var(--px);font-size:8px;color:var(--dim);text-align:center;position:relative;z-index:2}
</style>
</head>
<body>
<div class="bgglow"></div>
<header>
  <a href="../#menu">ONLY<span class="r">IBEE</span> OS</a>
  <span>MEMBER.SYS</span>
</header>

<!-- boot: authenticating the pass -->
<div id="boot">
  <div class="lock">🔒</div>
  <div class="l" id="bootl">READING PASS…</div>
  <div class="bar"><i id="bootbar"></i></div>
</div>

<main id="stage" style="visibility:hidden">
  <div class="granted crtin" id="grant">✓ ACCESS GRANTED — WELCOME TO THE FREQUENCY</div>

  <div class="stage"><div class="o3" id="medal"></div></div>
  <div class="ped"></div>

  <div class="mcard crtin">
    <div class="rank" id="rank">—</div>
    <div id="codename" style="font-family:var(--px);font-size:11px;color:hsl(var(--hue),95%,72%);letter-spacing:1px;margin-top:6px">—</div>
    <div class="code" id="code" title="tap to copy">————</div>
    <div class="stats">
      <div class="stat"><div class="k">RARITY</div><div class="v" id="rarity">—</div></div>
      <div class="stat"><div class="k">POWER</div><div class="v" id="power">—</div>
        <div class="powerwrap"><i id="powerbar"></i></div></div>
    </div>
  </div>

  <div class="box crtin">
    <div class="h">// OPEN YOUR PASS_</div>
    <div id="regbox"><div class="cnote">connecting…</div></div>
    <div class="cnote" id="sessline" style="margin-top:10px;font-size:15px"></div>
  </div>

  <div class="box crtin">
    <div class="h">// RECRUIT_</div>
    <div class="reflink">
      <input id="ref" readonly value="">
      <button id="copyref">COPY</button>
    </div>
    <a class="share" id="shareref" href="#">▶ SHARE — every friend who joins levels you up</a>
    <div class="refby" id="refby" style="display:none"></div>
  </div>

  <div class="actions">
    <a class="btn solid" href="../#music">▶ THE UNIVERSE</a>
    <a class="btn" href="inventory/">♟ MY COLLECTION</a>
  </div>
</main>

<footer>© ONLYIBEE — THE FREQUENCY</footer>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};

  /* ====== SET THIS ONCE: paste your Tally form id (from the setup guide) ====== */
  /* ---- Supabase: accounts + single-use claim + inventory (anon key is public by design) ---- */
  var SB_URL="https://hloxwicoeahczifshyoe.supabase.co";
  var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhsb3h3aWNvZWFoY3ppZnNoeW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MjM1MzMsImV4cCI6MjA5OTI5OTUzM30.IK7f4tU6Bb6O9oW5fwfO2Tv3dEZhh3IAj5y_91nier8";
  var sb=(window.supabase&&window.supabase.createClient)?window.supabase.createClient(SB_URL,SB_KEY):null;

  /* ---- read the card + referral from the URL ---- */
  function param(n){var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search);return m?decodeURIComponent(m[1]):"";}
  var LS="ibee_member";
  var saved={}; try{saved=JSON.parse(localStorage.getItem(LS)||"{}")||{};}catch(e){}

  var pass=(param("pass")||param("tag")||saved.pass||"").toUpperCase().trim();
  if(!pass){ pass="FREQ-"+Math.random().toString(36).slice(2,7).toUpperCase(); } // no card → guest signal, still a member
  var ref=(param("ref")||saved.ref||"").toUpperCase().trim();
  if(ref===pass) ref="";                          // can't refer yourself
  // persist first-touch referrer
  var rec={pass:pass, ref:ref||saved.ref||"", ts:saved.ts||Date.now()};
  try{localStorage.setItem(LS,JSON.stringify(rec));}catch(e){}
  ref=rec.ref;

  /* ---- deterministic game stats from the pass code ---- */
  function hash(s){var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0);}
  var h=hash(pass);
  var TIERS=[
    {n:"INITIATE", sub:"you found the door_",           hue:88,  min:60},
    {n:"OPERATIVE",sub:"the signal trusts you_",         hue:190, min:28},
    {n:"ELITE",    sub:"few carry this frequency_",      hue:40,  min:9},
    {n:"LEGEND",   sub:"the frequency bends to you_",    hue:300, min:3}
  ];
  // weighted roll → most people INITIATE, rare LEGEND
  var roll=h%100, tier = roll<60?0 : roll<88?1 : roll<97?2 : 3;
  var T=TIERS[tier];
  var power = 500 + (h % 9500);                    // 500–9999
  document.documentElement.style.setProperty("--hue", T.hue);

  /* ---- 3D ROTATING MONSTER HEAD — the card's art, extruded into fake-voxel depth ----
     Drop your transparent PNG at assets/img/monster.png. Until it exists, a stylized
     red-horned fallback shows so the page is never broken. -->                          */
  var MON="../assets/img/monster.png";
  var FB="data:image/svg+xml,"+encodeURIComponent(
    "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120'>"
    +"<g stroke='#111' stroke-width='4' stroke-linejoin='round' fill='#ff3b30'>"
    +"<path d='M32 52 Q10 40 20 14 Q31 24 35 44 Z'/><path d='M68 52 Q90 40 80 14 Q69 24 65 44 Z'/>"
    +"<path d='M50 40 Q86 44 84 78 Q84 108 50 111 Q16 108 16 78 Q14 44 50 40 Z'/></g>"
    +"<g stroke='#ffd60a' stroke-width='7' stroke-linecap='round'><path d='M20 72 L11 76 M18 86 L9 92 M24 98 L18 107 M50 109 L50 118 M80 72 L89 76 M82 86 L91 92 M76 98 L82 107'/></g>"
    +"<circle cx='40' cy='78' r='7.5' fill='#fff' stroke='#111' stroke-width='4'/><circle cx='64' cy='78' r='7.5' fill='#fff' stroke='#111' stroke-width='4'/>"
    +"<circle cx='52' cy='97' r='2.6' fill='#111'/>"
    +"<g stroke='#fff' stroke-width='3' stroke-linecap='round'><path d='M39 60 h6 M56 60 h6 M28 90 l6 -3 M72 90 l-6 -3'/></g></svg>");
  var zs=[-4,-2.4,-0.8,0.8,2.4,4],html="";
  zs.forEach(function(z,i){var front=(i===zs.length-1);
    html+="<img src='"+MON+"' alt='"+(front?'ONLY IBEE monster head':'')+"' style='transform:translateZ("+z+"px)"+(front?'':";filter:brightness(.4)")+"'>";});
  $("medal").innerHTML=html;
  Array.prototype.forEach.call($("medal").querySelectorAll("img"),function(im){
    im.onerror=function(){this.onerror=null;this.src=FB;};});

  /* ---- premade codename: a handle assigned to this pass, stable + unique per card ---- */
  var NAMES=["RED NOMAD","NEON STRAY","VOID RUNNER","STATIC GHOST","ACID SAINT","MIDNIGHT FOX",
    "CHROME WOLF","PIXEL SHAMAN","ROGUE SIGNAL","VELVET RIOT","GLASS TIGER","ECHO BANDIT",
    "SOLAR STRAY","NIGHT MARROW","CRIMSON DRIFT","LUCID FIEND","OFFGRID KING","FERAL BLOOM",
    "COBALT MONK","DUSK PROWLER","NOVA THIEF","SILK STATIC","GRIM NEON","ZERO HOUR",
    "MAD ORACLE","WIRED SAINT","GHOST FREQ","LO-FI BEAST","IRON MAGPIE","PLASMA STRAY"];
  var codename=NAMES[hash(pass+"n")%NAMES.length]+" #"+(1000+(hash(pass+"x")%9000)); // suffix → always distinct

  /* ---- fill the card ---- */
  $("rank").textContent=T.n;
  $("codename").textContent="CODENAME · "+codename;
  $("code").textContent=pass;
  $("rarity").textContent=T.n;
  $("power").textContent=power.toLocaleString();
  if(ref){ var rb=$("refby"); rb.style.display="block"; rb.textContent="↳ RECRUITED BY "+ref; }

  /* ---- referral link (their pass = their code) ---- */
  var myLink=location.origin+location.pathname+"?ref="+encodeURIComponent(pass);
  $("ref").value=myLink;
  function toast(m){var t=$("toast");t.textContent=m;t.classList.add("on");setTimeout(function(){t.classList.remove("on");},1900);}
  function copy(txt){try{navigator.clipboard.writeText(txt);toast("COPIED_");}catch(e){var i=$("ref");i.select();document.execCommand&&document.execCommand("copy");toast("COPIED_");}}
  $("copyref").onclick=function(){copy(myLink);};
  $("code").onclick=function(){copy(pass);};
  var shareText="I'm on the ONLY IBEE frequency 👾 tap in with my pass:";
  $("shareref").onclick=function(e){
    if(navigator.share){e.preventDefault();navigator.share({title:"ONLY IBEE — THE FREQUENCY",text:shareText,url:myLink}).catch(function(){});}
    else{e.preventDefault();copy(myLink);}
  };

  /* ---- accounts + single-use claim + item reveal (Supabase) ---- */
  var RCLASS={common:'r-common',rare:'r-rare',epic:'r-epic',legendary:'r-legendary'};
  var host=$("regbox");
  function e2(s){return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  function itemCard(item,label){
    var rar=item.rarity||'common', cta;
    if(item.type==='game'||item.type==='environment') cta='<a class="cbtn" href="../'+e2(item.payload)+'">▶ ENTER '+e2(item.name)+'</a>';
    else if(item.payload) cta='<a class="cbtn" href="'+e2(item.payload)+'" download>⬇ DOWNLOAD</a>';
    else cta='<div class="cnote">it\'s in your inventory now_</div>';
    return '<div class="item g-'+rar+'"><span class="rz '+(RCLASS[rar]||'r-common')+'">'+rar.toUpperCase()+' · VALUE '+(item.value||0)+'</span>'
      +'<div class="ilabel">'+e2(label)+'</div><div class="iname">'+e2(item.name)+'</div><div class="ity">'+e2(item.type)+'</div>'+cta+'</div>';
  }
  async function rpc(fn,args){ if(!sb)return{status:'error'}; var r=await sb.rpc(fn,args); return r.error?{status:'error',error:r.error.message}:r.data; }
  async function mountClaim(){
    if(!sb){ host.innerHTML='<div class="cnote">✕ backend offline — refresh in a moment_</div>'; return; }
    sb.auth.onAuthStateChange(function(){ refresh(); });
    await refresh();
  }
  async function refresh(){
    var sess=(await sb.auth.getSession()).data.session;
    var el=$("sessline");
    if(el){ if(sess&&sess.user){ el.innerHTML='signed in · '+e2(sess.user.email||'member')+' · <a href="#" id="logout" style="color:var(--acid)">log out</a>';
        $("logout").onclick=function(ev){ev.preventDefault();sb.auth.signOut();}; } else el.textContent=''; }
    render(await rpc('card_status',{card_code:pass}), sess);
  }
  function render(st, sess){
    var s=st&&st.status;
    if(s==='taken'){ host.innerHTML='<div class="taken">🔒 SEAT TAKEN — this pass was already claimed</div>'; return; }
    if(s==='owned'){ host.innerHTML=itemCard(st.item,'✓ YOURS'); return; }
    if(s==='invalid'){ host.innerHTML='<div class="cnote">this pass isn\'t loaded in the system yet — check back soon_</div>'; return; }
    if(sess){
      host.innerHTML='<button class="cbtn" id="claimbtn">✦ OPEN MY DROP</button><div class="cnote" id="cmsg" style="margin-top:8px"></div>';
      $("claimbtn").onclick=doClaim;
    } else {
      host.innerHTML='<div class="claim">'
        +'<input id="cemail" type="email" placeholder="email" autocomplete="email" inputmode="email">'
        +'<input id="cpass" type="password" placeholder="password (make one)" autocomplete="current-password">'
        +'<button class="cbtn" id="loginbtn">✦ CLAIM MY DROP</button><div class="cnote" id="cmsg"></div></div>';
      $("cpass").addEventListener("keydown",function(e){ if(e.key==="Enter") doAuth(); });
      $("loginbtn").onclick=doAuth;
    }
  }
  /* instant account: sign up (or log in if the email already exists), then claim right away */
  async function doAuth(){
    var email=($("cemail").value||'').trim(), pw=($("cpass").value||'');
    if(!/.+@.+\..+/.test(email)){ $("cmsg").textContent='enter your email_'; return; }
    if(pw.length<6){ $("cmsg").textContent='password: 6+ characters_'; return; }
    $("loginbtn").disabled=true; $("cmsg").textContent='…';
    await sb.auth.signUp({email:email,password:pw});
    var sess=(await sb.auth.getSession()).data.session;
    if(!sess){                                   // already registered, or email-confirm is on
      var si=await sb.auth.signInWithPassword({email:email,password:pw});
      if(si.error){ $("cmsg").textContent=/confirm/i.test(si.error.message)?'✉ confirm your email first_':'✕ '+si.error.message; $("loginbtn").disabled=false; return; }
      sess=(await sb.auth.getSession()).data.session;
    }
    if(sess){ doClaim(); }                        // logged in → open the drop now
    else { $("cmsg").textContent='✉ check your email to confirm, then tap CLAIM again_'; $("loginbtn").disabled=false; }
  }
  async function doClaim(){
    var b=$("claimbtn"); if(b)b.disabled=true; if($("cmsg"))$("cmsg").textContent='opening…';
    var r=await rpc('claim_card',{card_code:pass});
    if(r.status==='claimed'||r.status==='owned'){
      if(r.item){ host.innerHTML=itemCard(r.item, r.status==='owned'?'✓ YOURS':'✦ YOU PULLED'); toast('CLAIMED_'); }
      else host.innerHTML='<div class="cnote">claimed — you already hold everything in the pool_</div>';
    } else if(r.status==='taken'){ host.innerHTML='<div class="taken">🔒 SEAT TAKEN</div>'; }
    else if(r.status==='need_login'){ render({status:'available'}, null); }
    else { if($("cmsg"))$("cmsg").textContent='✕ could not claim ('+(r.error||r.status)+')'; if(b)b.disabled=false; }
  }

  /* ---- boot sequence → reveal ---- */
  var msgs=["READING PASS…","VERIFYING SIGNATURE…","MATCHING FREQUENCY…","ACCESS GRANTED"];
  var i=0,bar=$("bootbar"),bl=$("bootl");
  (function step(){
    bl.textContent=msgs[Math.min(i,msgs.length-1)];
    bar.style.width=Math.min(100,(i+1)/msgs.length*100)+"%";
    i++;
    if(i<=msgs.length){ setTimeout(step, i===msgs.length?520:430); }
    else{
      $("boot").classList.add("gone");
      var st=$("stage"); st.style.visibility="visible";
      $("powerbar").style.width=Math.min(100, power/9999*100)+"%";
      mountClaim();
    }
  })();
})();
</script>
