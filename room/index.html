<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="apple-touch-icon" href="/assets/chess/bishop1.png">
<meta name="theme-color" content="#070707">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>MY PROFILE — ONLY IBEE</title>
<meta name="description" content="Your profile on the ONLY IBEE frequency — your annex. A personal slice of your room.">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<!--
  THE ANNEX (2026-07-15) — replaced the old iso furniture room.
  Every member's profile now shows a PERSONAL SLICE of the room they picked:
    transit   → PRIVATE CAR №  (your own car on the midnight line)
    terrarium → THE CONSERVATORY (your private glass alcove, your top plants)
    aqua      → THE COVE (your own water, your pet lives here)
  It is a live pixel canvas (same engine style as the env rooms), reads the
  radio groove, pulls the member's REAL progression (miles / sunlight / pet XP),
  is customizable (cfg saved in profiles.room via save_room — member/room.sql
  unchanged), and has a glowing door into the real room.
  Old v1 rooms ({tiles,shelf}) migrate automatically to v2 on first open.
-->
<style>
:root{
  --bg:#070707;--panel:#0e0e0e;--ink:#e8e8e8;--dim:#7a7a7a;
  --acid:#b6ff00;--red:#ff2b2b;--cyan:#26e0ff;--pink:#ff2bd6;--gold:#ffd60a;--border:#2a2a2a;
  --hue:88;                    /* the room kind's hue */
  --px:'Press Start 2P',monospace;--vt:'VT323',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--vt);font-size:20px;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.28) 0 1px,transparent 1px 3px)}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}
.bgglow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 20%,hsla(var(--hue),90%,45%,.14),transparent 60%)}
header{width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:2px solid var(--border);font-family:var(--px);font-size:10px;position:relative;z-index:50}
header a{color:var(--acid);text-decoration:none}header a .r{color:var(--red)}header span{color:var(--dim);font-size:8px}
main{flex:1;width:100%;max-width:680px;padding:18px 14px 90px;display:flex;flex-direction:column;
  align-items:center;gap:12px;position:relative;z-index:2}
.crtin{animation:crtin .35s ease-out}
@keyframes crtin{0%{transform:scaleY(.02);filter:brightness(3)}60%{transform:scaleY(1.03)}100%{transform:scaleY(1)}}

/* ---------- title bar ---------- */
.titlebar{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.titlebar .rn{font-family:var(--px);font-size:clamp(11px,3.4vw,15px);color:hsl(var(--hue),95%,70%);
  text-shadow:0 0 14px hsla(var(--hue),95%,55%,.5);letter-spacing:1px;line-height:1.5}
.titlebar .sub{color:var(--dim);font-size:15px;width:100%}
.tbtns{display:flex;gap:8px;flex-wrap:wrap}
.tb{font-family:var(--px);font-size:8px;padding:10px 12px;background:transparent;color:var(--acid);
  border:1px solid var(--acid);cursor:pointer;text-decoration:none;letter-spacing:1px}
.tb.solid{background:var(--acid);color:#000}
.tb:active{transform:translateY(2px)}
.tb:disabled{opacity:.4;cursor:default}

/* ---------- THE ANNEX stage: two canvases, exactly like the env rooms ---------- */
#stagewrap{width:100%;border:2px solid hsla(var(--hue),60%,45%,.55);background:#050507;
  position:relative;overflow:hidden;box-shadow:0 0 calc(14px + var(--mb,0)*26px) hsla(var(--mh,var(--hue)),90%,45%,.18)}
#stage{position:relative;width:100%}
#axbg,#axfx{display:block;width:100%;height:auto}
#axbg{image-rendering:pixelated;image-rendering:crisp-edges}
#axfx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#enterbtn{position:absolute;right:10px;bottom:10px;z-index:20;font-family:var(--px);font-size:8px;
  padding:11px 13px;background:var(--acid);color:#000;text-decoration:none;letter-spacing:1px;
  box-shadow:0 0 calc(6px + var(--mb,0)*14px) rgba(182,255,0,.55)}
#enterbtn:active{transform:translateY(2px)}

/* ---------- stat tiles: the summary of the whole room ---------- */
.statrow{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{border:1px solid var(--border);background:rgba(10,10,12,.9);padding:10px 8px;text-align:center}
.stat .v{font-family:var(--px);font-size:clamp(10px,3vw,13px);color:hsl(var(--hue),95%,70%);
  text-shadow:0 0 10px hsla(var(--hue),95%,55%,.45);line-height:1.4;word-break:break-word}
.stat .l{font-family:var(--px);font-size:6px;color:var(--dim);letter-spacing:1px;margin-top:6px;line-height:1.6}

/* ---------- customize panel (owner only) ---------- */
#custom{width:100%;border:2px solid var(--border);background:rgba(14,14,14,.92);padding:12px;display:none}
#custom.open{display:block}
#custom .h{font-family:var(--px);font-size:9px;color:var(--acid);letter-spacing:1px;margin-bottom:10px}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin;align-items:stretch}
.chip{flex:none;min-width:74px;border:1px solid var(--border);background:#0a0a0c;padding:9px 8px 7px;
  text-align:center;cursor:pointer}
.chip:hover{border-color:#3a3a3a}
.chip .ce{font-size:22px;line-height:1.25;min-height:26px}
.chip .sw{display:inline-block;width:22px;height:22px;border:1px solid #000;border-radius:3px}
.chip .cn{font-family:var(--px);font-size:5.5px;color:var(--dim);margin-top:6px;line-height:1.6;letter-spacing:.5px}
.chip.txt{cursor:default}
.chip.txt input{width:110px;background:#050505;border:1px solid var(--border);color:var(--acid);
  font-family:var(--px);font-size:8px;padding:7px 6px;text-align:center;letter-spacing:1px}
.chip.txt input:focus{outline:none;border-color:var(--acid)}
.drawhint{color:var(--dim);font-size:15px;margin-top:8px}

/* ---------- notifications: the small signal feed at the top of the profile ---------- */
#notifs{width:100%;border:1px solid var(--border);background:rgba(10,10,12,.92);padding:8px 10px 4px}
#notifs .nh{display:flex;justify-content:space-between;align-items:center;font-family:var(--px);
  font-size:7px;color:var(--acid);letter-spacing:1px;padding-bottom:7px}
#notifs .nh .clr{color:var(--dim);cursor:pointer}#notifs .nh .clr:hover{color:var(--red)}
.nrow{display:flex;gap:9px;align-items:center;padding:6px 2px;border-top:1px solid #161616}
.nrow.lnk{cursor:pointer}.nrow.lnk:hover{background:#101010}
.nrow .ni{font-size:16px;flex:none;width:22px;text-align:center;line-height:1}
.nrow .ni .bimg{width:17px;height:17px;object-fit:contain;vertical-align:middle}
.nrow .nb{flex:1;min-width:0}
.nrow .nt{display:block;font-family:var(--px);font-size:6.5px;color:var(--ink);letter-spacing:.5px;line-height:1.7}
.nrow .nt .nw{color:#555}
.nrow .nd{display:block;color:var(--dim);font-size:14px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nrow .nx{flex:none;color:#555;font-family:var(--px);font-size:8px;cursor:pointer;padding:5px}
.nrow .nx:hover{color:var(--red)}

/* ---------- badges: the trophy shelf ---------- */
#bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px}
.bslot{border:1px solid var(--border);background:#0a0a0c;padding:11px 8px 10px;text-align:center;opacity:.5}
.bslot.got{opacity:1;border-color:rgba(182,255,0,.5);box-shadow:0 0 10px rgba(182,255,0,.14)}
.bslot.got.gold{border-color:rgba(255,214,10,.65);box-shadow:0 0 12px rgba(255,214,10,.22)}
.bslot .bic{font-size:26px;line-height:1.25;filter:grayscale(1) brightness(.7)}
.bslot.got .bic{filter:none}
.bslot .bic .bimg{width:28px;height:28px;object-fit:contain;vertical-align:middle}
.bslot .bnm{font-family:var(--px);font-size:7px;color:var(--ink);margin-top:8px;line-height:1.7;letter-spacing:.5px}
.bslot.got.gold .bnm{color:var(--gold)}
.bslot .bds{color:var(--dim);font-size:13px;line-height:1.3;margin-top:4px;min-height:17px}
.bslot .bts{font-family:var(--px);font-size:6px;color:var(--acid);margin-top:7px;letter-spacing:.5px}

/* ---------- boxes ---------- */
.box{width:100%;border:2px solid var(--border);background:rgba(14,14,14,.9);padding:14px 16px;text-align:left}
.box .h{font-family:var(--px);font-size:9px;color:var(--acid);letter-spacing:1px;margin-bottom:10px}
.cnote{color:var(--dim);font-size:16px;line-height:1.45}
.sharebar{display:flex;gap:8px;align-items:stretch;flex-wrap:wrap}
.sharebar input{flex:1;min-width:150px;background:#050505;border:1px solid var(--border);color:var(--acid);
  font-family:var(--vt);font-size:16px;padding:10px}

/* ---------- onboarding: nickname + pick 1 of 3 starter rooms (unchanged) ---------- */
.ob{width:100%;text-align:center}
.ob .bigh{font-family:var(--px);font-size:clamp(11px,3.4vw,14px);color:var(--acid);letter-spacing:2px;line-height:1.7;margin:8px 0 4px}
.nick{display:flex;flex-direction:column;gap:9px;max-width:380px;margin:12px auto 0}
.nick input{background:#050505;border:1px solid var(--border);color:var(--acid);font-family:var(--px);
  font-size:13px;padding:13px;text-align:center;letter-spacing:2px;text-transform:lowercase}
.nick input:focus{outline:none;border-color:var(--acid)}
.nick .cbtn{font-family:var(--px);font-size:10px;padding:14px;background:var(--acid);color:#000;border:0;cursor:pointer}
.nick .cbtn:disabled{opacity:.5}
.picks{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px}
@media(min-width:560px){.picks{grid-template-columns:repeat(3,1fr)}}
.pick{border:2px solid var(--border);background:#0a0a0c;padding:14px 10px 12px;text-align:center;cursor:pointer;
  font-family:var(--vt);color:var(--ink);transition:.18s;display:flex;flex-direction:column;align-items:center}
.pick:hover{transform:translateY(-3px);outline:none}
.pick:disabled{opacity:.4;cursor:default;transform:none}
.pick .proom{perspective:520px;width:132px;height:92px;margin:2px auto 8px;position:relative}
.pick .proom::after{content:"";position:absolute;left:50%;bottom:-8px;transform:translateX(-50%);
  width:78px;height:12px;border-radius:50%;background:radial-gradient(ellipse,var(--pglow,rgba(182,255,0,.4)),transparent 70%);
  animation:pedpulse 3.2s ease-in-out infinite}
@keyframes pedpulse{0%,100%{transform:translateX(-50%) scaleX(1);opacity:.85}50%{transform:translateX(-50%) scaleX(.72);opacity:.4}}
.pick .part3{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  animation:spin3d var(--pdur,7s) linear infinite}
@keyframes spin3d{from{transform:rotateX(6deg) rotateY(0)}to{transform:rotateX(6deg) rotateY(360deg)}}
.pick .part3 .f,.pick .part3 .b{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.pick .part3 .b{transform:rotateY(180deg);filter:brightness(.5)}
.pick .part3 svg{width:100%;height:100%}
.pick .pn{font-family:var(--px);font-size:9px;line-height:1.6;margin-bottom:6px}
.pick .pd{color:#b0b0b0;font-size:14px;line-height:1.35;flex:1;margin-bottom:8px}
.pick .pt{font-family:var(--px);font-size:7px;color:var(--dim);letter-spacing:2px;border-top:1px solid var(--border);
  padding-top:8px;width:100%}
.pick:hover .pt{color:var(--acid)}
.msg{color:var(--dim);font-size:16px;margin-top:10px;min-height:20px}

/* ---------- IDENTITY BAND ---------- */
.idband{width:100%;display:flex;align-items:center;gap:14px;border:2px solid hsla(var(--hue),60%,45%,.55);
  background:linear-gradient(180deg,hsla(var(--hue),70%,30%,.14),rgba(10,10,12,.92));padding:14px 16px;
  box-shadow:0 0 calc(18px + var(--mb,0)*30px) hsla(var(--mh,var(--hue)),90%,45%,.22),inset 0 0 40px rgba(0,0,0,.5);position:relative}
.idband .av{width:64px;height:64px;flex:none;border-radius:50%;cursor:pointer;background:#fff;object-fit:cover;
  border:2px solid hsla(var(--hue),60%,50%,.75);
  box-shadow:0 0 calc(8px + var(--mb,0)*16px) hsla(var(--mh,var(--hue)),90%,50%,.5);
  transform:scale(calc(1 + var(--mb,0)*.05));transition:transform .1s linear}
.idband .av:hover{filter:brightness(1.08)}
.idband .who{flex:1;min-width:0}
.idband .rank{font-family:var(--px);font-size:clamp(11px,3.2vw,14px);color:hsl(var(--hue),95%,72%);
  text-shadow:0 0 14px hsla(var(--hue),95%,55%,.5);letter-spacing:1px;line-height:1.5}
.idband .em{color:var(--ink);font-size:16px;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.idband .since{color:var(--dim);font-size:13px;margin-top:3px}
.idband .logout{font-family:var(--px);font-size:7px;color:var(--dim);cursor:pointer;text-decoration:none;
  border:1px solid var(--border);padding:8px 9px;align-self:flex-start;white-space:nowrap}
.idband .logout:hover{color:var(--red);border-color:#3a1414}
.avpick{width:100%;border:1px solid var(--border);background:rgba(14,14,14,.92);padding:12px;
  display:none;flex-wrap:wrap;gap:9px;justify-content:center}
.avpick.open{display:flex}
.avpick img{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);cursor:pointer;background:#fff}
.avpick img.sel{border-color:var(--acid);box-shadow:0 0 10px rgba(182,255,0,.5)}
.avpick img:hover{border-color:var(--ink)}

/* ---------- LOGIN / JOIN box ---------- */
.login{width:100%;border:2px solid var(--border);background:rgba(14,14,14,.92);padding:18px 16px;text-align:center}
.login .h{font-family:var(--px);font-size:9px;color:var(--acid);margin-bottom:10px}
.login p{color:#bdbdbd;font-size:17px;line-height:1.5;margin-bottom:12px}
.login input{width:100%;background:#050505;border:1px solid var(--border);color:var(--acid);
  font-family:var(--vt);font-size:18px;padding:11px;margin-bottom:8px}
.login input:focus{outline:none;border-color:var(--acid)}
.login button{width:100%;font-family:var(--px);font-size:10px;padding:13px;background:var(--acid);color:#000;border:0;cursor:pointer}
.login button.ghost{background:transparent;color:var(--acid);border:1px solid var(--acid);margin-top:8px}
.login .or{color:#555;font-family:var(--px);font-size:7px;letter-spacing:2px;margin:12px 0 8px}
.login .msg{color:var(--dim);font-size:15px;margin-top:8px}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#000;border:1px solid var(--acid);
  color:var(--acid);font-family:var(--px);font-size:9px;padding:10px 16px;z-index:9500;opacity:0;transition:.2s;pointer-events:none}
.toast.on{opacity:1}
footer{padding:16px;font-family:var(--px);font-size:8px;color:var(--dim);text-align:center;position:relative;z-index:2}
</style>
</head>
<body>
<div class="bgglow"></div>
<header>
  <a href="../#menu">ONLY<span class="r">IBEE</span> OS</a>
  <span>PROFILE.SYS</span>
</header>

<main id="main">
  <!-- logged out: the login / join box -->
  <div id="loginbox" style="width:100%"></div>

  <!-- notifications: unread signals (badges earned + news), small, members only -->
  <div id="notifs" class="crtin" style="display:none"></div>

  <!-- IDENTITY BAND: avatar + name + rank + logout (own profile) -->
  <div class="idband crtin" id="idband" style="display:none">
    <img class="av" id="av" src="../assets/img/avatars/mimi-00.png" alt="your avatar" title="tap to change your avatar">
    <div class="who">
      <div class="rank" id="idrank">—</div>
      <div class="em" id="idem"></div>
      <div class="since" id="idsince"></div>
    </div>
    <a class="logout" id="logout" href="#">LOG OUT</a>
  </div>
  <div class="avpick crtin" id="avpick"></div>

  <div class="titlebar crtin" id="titlebar" style="display:none">
    <div class="rn" id="roomname">—</div>
    <div class="tbtns" id="tbtns"></div>
    <div class="sub" id="roomsub"></div>
  </div>

  <!-- THE ANNEX: your personal slice of your room -->
  <div id="stagewrap" class="crtin" style="display:none">
    <div id="stage">
      <canvas id="axbg" width="384" height="216"></canvas>
      <canvas id="axfx"></canvas>
      <a id="enterbtn" href="#">▶ ENTER</a>
    </div>
  </div>
  <div class="statrow crtin" id="statrow" style="display:none"></div>

  <div id="custom" class="crtin">
    <div class="h">// MAKE IT YOURS_</div>
    <div class="chips" id="chips"></div>
    <div class="drawhint" id="drawhint">tap a chip to re-style your annex — then SAVE. it follows you (and your visitors see it).</div>
  </div>

  <!-- badges: the trophy shelf (rendered from assets/badges.js, owner only) -->
  <div class="box crtin" id="badgebox" style="display:none">
    <div class="h" id="bhead">// BADGES_</div>
    <div id="bgrid"></div>
  </div>

  <div class="box crtin" id="sharebox" style="display:none">
    <div class="h">// SHARE MY ANNEX_</div>
    <div class="sharebar"><input id="sharelink" readonly value=""><button class="tb solid" id="sharecopy" style="border:0">COPY</button></div>
    <div class="cnote" style="margin-top:8px">anyone with this link can visit — only you can re-style it_</div>
  </div>

  <div class="ob crtin" id="ob" style="display:none"></div>
</main>

<footer>© ONLYIBEE — THE FREQUENCY</footer>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- the news feed + badge catalog + unread inbox (framed copy = catalog only; the shell tracks) -->
<script>document.write('<script src="../assets/news-data.js?cb='+Date.now()+'"><\/script>')</script>
<script src="../assets/badges.js?v=9"></script>
<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var SB_URL="https://hloxwicoeahczifshyoe.supabase.co";
  var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhsb3h3aWNvZWFoY3ppZnNoeW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MjM1MzMsImV4cCI6MjA5OTI5OTUzM30.IK7f4tU6Bb6O9oW5fwfO2Tv3dEZhh3IAj5y_91nier8";
  var sb=(window.supabase&&window.supabase.createClient)?window.supabase.createClient(SB_URL,SB_KEY):null;
  function e2(s){return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  function toast(m){var t=$("toast");t.textContent=m;t.classList.add("on");setTimeout(function(){t.classList.remove("on");},1900);}
  function param(n){var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search);return m?decodeURIComponent(m[1]):"";}
  function hash(s){var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0);}
  function hsl(h,s,l,a){return 'hsla('+h+','+s+'%,'+l+'%,'+(a==null?1:a)+')';}
  function ls(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}
  async function rpc(fn,args){ if(!sb)return{status:'error',error:'offline'}; var r=await sb.rpc(fn,args); return r.error?{status:'error',error:r.error.message}:r.data; }

  /* ================= THE THREE ROOMS (+ legacy kind → env mapping) ================= */
  var KINDS={
    aqua:{n:"AQUA BASS",env:"aqua",hue:195,d:"for fish-passionate music — who dropped a speaker in the ocean?"},
    terrarium:{n:"TERRARIUM",env:"terrarium",hue:130,d:"for gardeners — watch your plant evolve…"},
    transit:{n:"MIDNIGHT TRANSIT",env:"transit",hue:250,d:"a late-night train, destination to…"}
  };
  var LEGACY2ENV={garage:"transit",attic:"terrarium",vhs:"transit",moon:"transit",cellar:"transit",green:"terrarium"};
  var PICKS=["aqua","terrarium","transit"];
  function starterRoom(kind){ return {v:2,k:kind,env:KINDS[kind].env,cfg:{},stats:{}}; }
  /* v1 rooms (iso furniture) → v2 annex. legacy kinds get the closest env. */
  function migrate(room){
    if(room&&room.v===2&&KINDS[room.k])return room;
    var k=(room&&room.k)||"transit";
    if(!KINDS[k])k=LEGACY2ENV[k]||"transit";
    return {v:2,k:k,env:KINDS[k].env,cfg:{},stats:(room&&room.stats)||{}};
  }

  /* ================= state ================= */
  var visiting=(param("u")||"").toLowerCase().trim();
  var ME=null, MYPROF=null;

  function liveStats(env){
    var s={plays:playsTotal()};
    if(env==='transit'){ var t=ls("ibee_transit")||{}; s.miles=Math.round(t.miles||0); s.car=(t.name||"").slice(0,14); }
    if(env==='terrarium'){
      var g=(ls("ibee_garden")||{}).sun||{}, keys=Object.keys(g), tot=0, rad=0, top=[];
      keys.forEach(function(k){ var v=+g[k]||0; tot+=v; if(Math.floor(v/75)>=10)rad++; top.push([k,v]); });

      s.top=top.slice(0,3).map(function(x){return {slug:x[0],sun:Math.round(x[1])};});

  /* ================= SCENE: PRIVATE CAR (transit) ================= */
  function drawTransit(){

    actx.strokeStyle='#2c2c38';actx.strokeRect(70.5,5.5,243,15);

    /* the window band: your own stretch of the midnight city */
    var wx=16,wy=36,ww=308,wh=84;
    var sky=actx.createLinearGradient(0,wy,0,wy+wh);
    sky.addColorStop(0,hsl((hue+220)%360,50,7));sky.addColorStop(0.7,hsl(hue,45,12));sky.addColorStop(1,hsl(hue,55,16));
    actx.fillStyle=sky;actx.fillRect(wx,wy,ww,wh);

          if(rb()<0.25&&bx+wxx<wx+ww){actx.fillStyle=hsl(45,80,55,0.5+LVL*0.3);actx.fillRect(pxr(bx+wxx),pxr(wy+wh-bh+wyy),1,1);}

  /* ================= SCENE: THE CONSERVATORY (terrarium) ================= */
  function drawTerrarium(){
    var C=cfg(),S=statsFor('terrarium'),hue=ONAIR&&HUE!=null?HUE:130;
    var sky=actx.createLinearGradient(0,0,0,AH);
    sky.addColorStop(0,'#04030a');sky.addColorStop(0.55,hsl(hue,42,6));sky.addColorStop(1,hsl(hue,55,9));
    actx.fillStyle=sky;actx.fillRect(0,0,AW,AH);
    var amp=ONAIR?(0.35+LVL*0.7):0.12;
    for(var a=0;a<3;a++){
      actx.strokeStyle=hsl((hue+a*28)%360,80,55,0.05+amp*0.13);actx.lineWidth=8+a*6;
      actx.beginPath();
      var yy=30+a*22+Math.sin(T*0.6+a)*8;
      for(var xx=0;xx<=AW;xx+=8){var yb=yy+Math.sin(xx*0.03+T*(1.0+a*0.35))*(5+amp*20);
        xx===0?actx.moveTo(xx,yb):actx.lineTo(xx,yb);}

  var twitch=[0,0,0];
  var flies=[];for(var f0=0;f0<8;f0++)flies.push({x:Math.random()*AW,y:Math.random()*90,p:Math.random()*7});

  /* ================= SCENE: THE COVE (aqua) ================= */
  var PETX=AW/2,PETVX=8;
  function drawAqua(){
    var C=cfg(),S=statsFor('aqua'),hue=ONAIR&&HUE!=null?HUE:195;
    /* the dark room + hood lamp */
    actx.fillStyle='#050508';actx.fillRect(0,0,AW,AH);
    actx.fillStyle='#101018';actx.fillRect(0,0,AW,10);
    actx.fillStyle=hsl(hue,80,55,ONAIR?0.5+LVL*0.5:0.12);actx.fillRect(16,8,AW-32,3);

    actx.lineTo(AW,AH);actx.lineTo(0,AH);actx.closePath();

    actx.fillStyle=wg;actx.fill();
    actx.strokeStyle=hsl(hue,80,70,0.5+LVL*0.5);actx.lineWidth=1.5;
    actx.beginPath();actx.moveTo(0,SURF);

      grd.addColorStop(0,hsl(hue,80,65,0.08+LVL*0.08));grd.addColorStop(1,'transparent');
      actx.fillStyle=grd;

      actx.lineTo(rx+52,AH-18);actx.lineTo(rx+8,AH-18);actx.closePath();actx.fill();
    }

    var rk=seedFor('ckelp');

    actx.fillStyle='#0d0b12';actx.fillRect(0,AH-18,AW,18);
    var gvh=GRAVELS[C.gravel%GRAVELS.length],rg=seedFor('cgravel');
    for(var g2=0;g2<60;g2++){
      var gx=g2*6.5+rg()*3,gy=AH-17+rg()*12;
      var en=g2%3===0?BEAT:g2%3===1?LVL:0.2;
      actx.fillStyle=ONAIR&&en>0.15?hsl((gvh+g2%3*20)%360,70,25+en*45,0.9):hsl(gvh,20,14+rg()*8);
      actx.fillRect(pxr(gx),pxr(gy),3,2);
    }
    if(C.shells)for(var sh2=0;sh2<3;sh2++){var shx=60+sh2*120;
      actx.fillStyle=hsl((hue+180)%360,70,55,0.5+0.4*Math.abs(Math.sin(T*1.6+sh2*2)));
      actx.beginPath();actx.arc(shx,AH-20,3,3.14,0);actx.fill();
      actx.fillStyle=hsl((hue+180)%360,70,60,0.12);
      actx.beginPath();actx.arc(shx,AH-20,8,0,7);actx.fill();}
    /* YOUR PET — the same jelly, phase from your real XP */
    var ph=PET_PHASES[S.phase!=null?S.phase:petPhase((S.xp||0))][0];
    var idx=S.phase!=null?S.phase:petPhase(S.xp||0);
    PETX+=PETVX*0.016*(1+(ONAIR?LVL:0)); if(PETX>AW-70)PETVX=-Math.abs(PETVX); if(PETX<70)PETVX=Math.abs(PETVX);
    var py2=100+Math.sin(T*1.4)*8-(ONAIR?BEAT*5:0);
    if(idx===0){ /* still an egg on the gravel */
      actx.fillStyle=hsl(hue,40,80);actx.beginPath();actx.ellipse(PETX,AH-26,8,10,0,0,7);actx.fill();
      actx.fillStyle=hsl(hue,70,55);actx.fillRect(pxr(PETX-4),AH-29,2,2);actx.fillRect(pxr(PETX+2),AH-25,2,2);
    } else {
      var sc=[0,0.85,1.35,1.65,1.95,2.5,3.0][idx]||1;
      var pulse=Math.sin(T*(ONAIR?3.2:1.6))*0.5+0.5, squeeze=ONAIR?(0.12+LVL*0.4):0.1;
      var bw=11*sc*(1-squeeze*pulse), bh=9*sc*(1+squeeze*pulse*0.6);
      var glow=ONAIR?(0.4+LVL*0.6):0.25;
      actx.fillStyle=hsl(hue,85,60,0.10+glow*0.15);actx.beginPath();actx.arc(PETX,py2,bw+8,0,7);actx.fill();
      var TN=[0,4,6,8,10,12,14][idx]||4, tl=10+sc*6;
      for(var t2=0;t2<TN;t2++){
        var tx=((t2/(TN-1))-0.5)*bw*1.7, swb=Math.sin(T*2+t2*0.7)*(3+LVL*7)*(0.4+pulse*0.6);
        actx.strokeStyle=hsl((hue+(t2%2?15:-10)+360)%360,75,62,0.5+glow*0.35);
        actx.lineWidth=Math.max(1,1.1*sc);
        actx.beginPath();actx.moveTo(PETX+tx,py2+bh*0.5);
        actx.quadraticCurveTo(PETX+tx+swb,py2+bh*0.5+tl*0.55,PETX+tx+swb*1.6,py2+bh*0.5+tl*(0.9+pulse*0.3));
        actx.stroke();
      }
      actx.lineWidth=1;
      var bell=actx.createRadialGradient(PETX,py2-bh*0.3,1,PETX,py2,bw);
      bell.addColorStop(0,hsl(hue,80,74,0.55+glow*0.3));bell.addColorStop(0.7,hsl(hue,75,55,0.42));bell.addColorStop(1,hsl((hue+20)%360,70,45,0.22));
      actx.fillStyle=bell;
      actx.beginPath();actx.ellipse(PETX,py2,bw,bh,0,3.14,0);
      actx.quadraticCurveTo(PETX+bw*0.6,py2+bh*0.55,PETX,py2+bh*0.34);
      actx.quadraticCurveTo(PETX-bw*0.6,py2+bh*0.55,PETX-bw,py2);actx.fill();
      actx.strokeStyle=hsl(hue,90,82,0.5+glow*0.4);actx.beginPath();actx.ellipse(PETX,py2,bw,bh,0,3.14,0);actx.stroke();
      actx.fillStyle='#0a0a0a';
      actx.fillRect(pxr(PETX-3*sc),pxr(py2-3*sc),2,2.4);actx.fillRect(pxr(PETX+1.6*sc),pxr(py2-3*sc),2,2.4);
      if(idx>=5){ actx.fillStyle=hsl(50,90,62);
        actx.beginPath();actx.moveTo(PETX-5,py2-bh-2);actx.lineTo(PETX-5,py2-bh-7);actx.lineTo(PETX-2,py2-bh-3);
        actx.lineTo(PETX,py2-bh-8);actx.lineTo(PETX+2,py2-bh-3);actx.lineTo(PETX+5,py2-bh-7);actx.lineTo(PETX+5,py2-bh-2);actx.closePath();actx.fill(); }
    }
    /* ambient bubbles */
    if(ONAIR&&Math.random()<0.05)sparks.push({x:Math.random()*AW,y:AH-22,vx:0,vy:-14-Math.random()*10,life:0.9,h:hue,px:1});
    /* glass frame */
    actx.strokeStyle='rgba(180,220,235,.14)';actx.strokeRect(1.5,11.5,AW-3,AH-13);
  }

  /* ================= shared particles + fx text ================= */
  function drawParticles(dt){
    for(var i=sparks.length-1;i>=0;i--){var sp=sparks[i];
      sp.x+=(sp.vx||0)*dt;sp.y+=sp.vy*dt;sp.vy+=(sp.g||0)*dt;sp.life-=dt*1.2;
      if(sp.life<=0){sparks.splice(i,1);continue;}
      actx.fillStyle=hsl(sp.h,90,70,Math.min(1,sp.life*1.4));
      actx.fillRect(pxr(sp.x),pxr(sp.y),sp.px||2,sp.px||2);}
    for(var d2=drops.length-1;d2>=0;d2--){var dp=drops[d2];
      dp.y+=dp.vy*dt*10;dp.vy+=8*dt;dp.life-=dt*1.4;
      if(dp.life<=0){drops.splice(d2,1);continue;}
      actx.fillStyle=hsl(200,85,70,Math.min(1,dp.life*1.4));
      actx.fillRect(pxr(dp.x),pxr(dp.y),1,2);}
    for(var p2=pellets.length-1;p2>=0;p2--){var pl=pellets[p2];
      pl.y+=pl.vy*dt;pl.vy=Math.min(16,pl.vy+9*dt);
      if(pl.y>AH-20){pellets.splice(p2,1);continue;}
      /* the pet drifts toward food */
      if(Math.abs(pl.x-PETX)>6)PETVX=(pl.x>PETX?1:-1)*Math.abs(PETVX);
      if(Math.abs(pl.x-PETX)<14&&Math.abs(pl.y-100)<24){pellets.splice(p2,1);
        hearts.push({x:PETX,y:88,vy:-10,life:1});continue;}
      actx.fillStyle=hsl(35,70,55);actx.fillRect(pxr(pl.x),pxr(pl.y),2,2);}
  }

        for(var s3=0;s3<14;s3++)sparks.push({x:300,y:44,vx:(Math.random()-0.5)*60,vy:-15-Math.random()*50,g:60,life:1,h:(52+Math.random()*40)|0});

        return;

          toast(TRIMS[ROOM.cfg.trim]<0?'seats follow the song_':'seat trim re-upholstered_'); }

  /* ================= the annex loop ================= */
  function axLoop(now){
    if(!running)return;
    requestAnimationFrame(axLoop);
    var dt=Math.max(0,Math.min(0.05,(now-lastT)/1000));lastT=now;T+=dt;
    var g=grooveNow();
    ONAIR=g.on; SONG=g.nm||"";
    BEAT+=( (g.b||0)-BEAT)*0.3; LVL+=((g.l||0)-LVL)*0.25;
    if(g.hue!=null)HUE=g.hue;
    if(ROOM.env==='transit')drawTransit();
    else if(ROOM.env==='terrarium')drawTerrarium();
    else drawAqua();
    drawParticles(dt);
    if(ONAIR&&glyphs.length<6&&Math.random()<0.04)
      glyphs.push({x:20+Math.random()*(AW-40),y:AH*0.7,t:['♪','♫','✦'][(Math.random()*3)|0],life:1,h:HUE});
    drawFxText();
    /* mirror the groove onto the page chrome (idband glow) */
    document.documentElement.style.setProperty('--mb',BEAT.toFixed(3));
    if(ONAIR)document.documentElement.style.setProperty('--mh',HUE);
    else document.documentElement.style.removeProperty('--mh');
  }
  window.__ax=function(t){ axLoop(t); };       /* dev harness: pump frames when rAF sleeps */

  /* ================= notifications (top of the profile, members only) =================
     Unread signals from assets/badges.js's inbox: badges just earned + typed news.
     Tap a row → mark it seen (and follow its link if it has one); CLEAR ALL wipes it.
     The shell's red count dots read the same seen-ledger, so they update too. */
  function renderNotifs(){
    var B=window.IBEE_BADGES, box=$("notifs");
    if(!B||!box||!ISMINE){ if(box)box.style.display="none"; return; }
    var items=B.inbox().slice(0,8);
    if(!items.length){ box.style.display="none"; return; }
    var h='<div class="nh"><span>// SIGNALS_ ('+items.length+')</span><span class="clr" id="nclear">CLEAR ALL ✕</span></div>';
    items.forEach(function(it,ix){
      var when=it.ts?new Date(it.ts).toLocaleDateString(undefined,{month:'short',day:'numeric'}):"";
      h+='<div class="nrow'+(it.link?' lnk':'')+'" data-nix="'+ix+'">'
        +'<span class="ni">'+B.icoHTML(it)+'</span>'
        +'<span class="nb"><span class="nt">'+e2(it.n)+(when?' <span class="nw">· '+when+'</span>':'')+'</span>'
        +'<span class="nd">'+e2(it.d||'')+'</span></span>'
        +'<span class="nx" data-nx="'+ix+'" title="dismiss">✕</span></div>';
    });
    box.innerHTML=h; box.style.display="";
    $("nclear").onclick=function(){ B.markSeen(); renderNotifs(); };
    Array.prototype.forEach.call(box.querySelectorAll('.nx'),function(x){
      x.onclick=function(ev){ ev.stopPropagation();
        var it=items[+x.getAttribute('data-nx')]; if(it)B.markSeen(it.id); renderNotifs(); };
    });
    Array.prototype.forEach.call(box.querySelectorAll('.nrow.lnk'),function(r){
      r.onclick=function(){
        var it=items[+r.getAttribute('data-nix')]; if(!it)return;
        B.markSeen(it.id);
        var l=it.link||""; if(!l){ renderNotifs(); return; }
        location.href=/^(https?:)?\/\//i.test(l)||l.charAt(0)==='/'?l:'../'+l;   /* news links are site-root paths */
      };
    });
  }

  /* ================= badges: the trophy shelf (after MAKE IT YOURS) ================= */
  function renderBadges(){
    var B=window.IBEE_BADGES, box=$("badgebox");
    if(!B||!box||!ISMINE){ if(box)box.style.display="none"; return; }
    var st=B.state(), P=B.snapshot(), got=0, h='';
    B.defs.forEach(function(d){
      var own=!!st.earned[d.id]; if(own)got++;
      var secret=d.secret&&!own, prog='';
      if(!own&&!secret&&d.pr){ try{ prog=d.pr(P); }catch(e){} }
      h+='<div class="bslot'+(own?' got':'')+(d.gold?' gold':'')+'">'
        +'<div class="bic">'+(secret?'❓':B.icoHTML(d))+'</div>'
        +'<div class="bnm">'+(secret?'???':e2(d.n2||d.n))+'</div>'
        +'<div class="bds">'+(secret?'a secret badge — it finds you_':e2(own?d.d:(prog||d.d)))+'</div>'
        +(own?'<div class="bts">✓ '+new Date(st.earned[d.id]).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})+'</div>':'')
        +'</div>';
    });
    $("bhead").textContent='// BADGES_ '+got+' / '+B.defs.length;
    $("bgrid").innerHTML=h; box.style.display="";
  }

  /* ================= identity ================= */
  async function loadCollection(){
    OWNED=[];
    if(!sb||!ISMINE)return;
    try{ var r=await sb.rpc('my_inventory'); (r.data||[]).forEach(function(it){ OWNED.push(it.id); }); }catch(e){}
  }
  function renderIdentity(prof){
    var uid=(ME&&ME.user&&ME.user.id)||OWNERNAME;
    var codename=NAMES[hash(uid+"n")%NAMES.length]+" #"+(1000+(hash(uid+"x")%9000));
    var rankIdx = OWNED.length>=6?3 : OWNED.length>=3?2 : OWNED.length>=1?1 : 0;
    $("idrank").textContent=RANKS[rankIdx].n+" · "+OWNERNAME.toUpperCase();
    $("idem").textContent=(ME&&ME.user&&ME.user.email)||"";
    var since=prof.since?new Date(prof.since).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}):"";
    $("idsince").textContent="codename "+codename+(since?" · since "+since:"");
    $("idband").style.display=""; avPaint();
    $("logout").onclick=function(ev){ ev.preventDefault(); if(sb)sb.auth.signOut().then(function(){location.reload();}); };
  }

  /* ================= views ================= */
  var ANNEXMETA={
    transit:{t:"PRIVATE CAR",sub:"your own car on the midnight line — it logs your miles and rides your records",enter:"▶ BOARD THE LINE"},
    terrarium:{t:"THE CONSERVATORY",sub:"your private glass alcove — your most-grown records live on this shelf",enter:"▶ ENTER THE GREENHOUSE"},
    aqua:{t:"THE COVE",sub:"your own water — your pet lives here, fed by everything you listen to",enter:"▶ DIVE INTO THE TANK"}
  };
  function showRoom(prof,mine){
    OWNERNAME=prof.username; ISMINE=mine;
    ROOM=migrate(prof.room);
    if(mine&&prof.room&&prof.room.v!==2){ markDirty(); }        // v1 → v2: save once re-styled
    if(mine){ try{ if(ROOM.env)localStorage.setItem("ibee_room",ROOM.env); }catch(e){} }
    var K=KINDS[ROOM.k], AXM=ANNEXMETA[ROOM.env];
    document.documentElement.style.setProperty("--hue",K.hue);
    document.title=(mine?"MY PROFILE":OWNERNAME.toUpperCase()+"'S ANNEX")+" — ONLY IBEE";
    $("titlebar").style.display="";
    $("roomname").textContent=(mine?"MY ANNEX · ":"")+OWNERNAME.toUpperCase()+" — "+AXM.t;
    var since=prof.since?new Date(prof.since).toLocaleDateString(undefined,{year:'numeric',month:'short'}):"";
    $("roomsub").textContent=(mine?AXM.sub:"you are visiting "+OWNERNAME+"'s annex — look, play, don't re-style")+(since?" · est. "+since:"");
    var tb=$("tbtns"); tb.innerHTML="";
    if(mine){
      tb.innerHTML='<button class="tb solid" id="savebtn" disabled>✓ SAVED</button>'
        +'<a class="tb" href="?u='+encodeURIComponent(OWNERNAME)+'">👁 VIEW AS VISITOR</a>'
        +'<a class="tb" href="../member/inventory/">♟ COLLECTION</a>';
      $("savebtn").onclick=function(){saveRoom(false);};
      var link=location.origin+"/room/?u="+encodeURIComponent(OWNERNAME);
      $("sharebox").style.display=""; $("sharelink").value=link;
      $("sharecopy").onclick=function(){
        if(navigator.share){navigator.share({title:"my annex on ONLY IBEE",url:link}).catch(function(){});}
        try{navigator.clipboard.writeText(link);toast("LINK COPIED_");}catch(e){}
      };
      loadCollection().then(function(){ renderIdentity(prof); });
      renderChips();
      snapshotStats();
      renderNotifs();
      renderBadges();
      setInterval(function(){ renderBadges(); },8000);   /* badges earned while listening show up live */
    } else {
      tb.innerHTML='<a class="tb" href="./">'+(ME?"▶ MY PROFILE":"✦ GET YOUR OWN ANNEX")+'</a>';
    }
    $("stagewrap").style.display="";
    $("enterbtn").textContent=AXM.enter;
    $("enterbtn").href='../arcade/'+ROOM.env+'/';
    axFit(); renderStats();
    $("stage").onclick=stageTap;
    setInterval(renderStats,4000);              // stats stay live while you listen
    if(!running){ running=true; lastT=performance.now(); requestAnimationFrame(axLoop); }
  }

  /* ---------- onboarding: nickname + pick 1 of 3 starter rooms ---------- */

      +'<circle cx="30" cy="30" r="2" fill="#7fe0ff" opacity=".7"/><circle cx="90" cy="24" r="1.5" fill="#7fe0ff" opacity=".6"/><circle cx="86" cy="42" r="1" fill="#7fe0ff" opacity=".5"/>'
      +'<g fill="#2a6b52"><path d="M12 74 q3 -14 6 0"/><path d="M104 74 q3 -12 6 0"/></g></svg>',
    terrarium:'<svg viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg">'

      +'<g stroke="#5fd06a" stroke-width="1.6" fill="none"><path d="M60 44 q-12 -4 -18 -14"/><path d="M60 40 q12 -4 18 -14"/><path d="M60 36 q-9 -6 -12 -16"/><path d="M60 34 q9 -6 12 -16"/></g>'
      +'<g fill="#8fff9a"><circle cx="42" cy="30" r="1.6"/><circle cx="78" cy="30" r="1.6"/><circle cx="48" cy="20" r="1.4"/><circle cx="72" cy="20" r="1.4"/></g>'
      +'<circle cx="60" cy="32" r="3" fill="#ffd54a"/><circle cx="34" cy="40" r="1.4" fill="#b6ff00" opacity=".85"/></svg>',
    transit:'<svg viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg">'

  };
  function onboard(step,keep){
    var ob=$("ob"); ob.style.display="";
    if(step==='nick'){
      ob.innerHTML='<div class="bigh">CLAIM YOUR NAME_</div>'
        +'<div class="cnote">your unique id on the frequency — it names your annex:<br>onlyibee.com/room/<b style="color:var(--acid)">yourname</b> · 3–16 chars · a-z 0-9 _ · permanent</div>'
        +'<div class="nick"><input id="nick" maxlength="16" placeholder="pick_your_name" autocapitalize="off" autocomplete="off" spellcheck="false">'
        +'<button class="cbtn" id="nickgo">▶ CHECK &amp; CONTINUE</button></div><div class="msg" id="nmsg"></div>';
      var inp=$("nick"); if(keep)inp.value=keep;
      inp.addEventListener("input",function(){ this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,''); });
      inp.addEventListener("keydown",function(e){ if(e.key==="Enter")$("nickgo").click(); });
      $("nickgo").onclick=async function(){
        var nm=(inp.value||'').trim();
        if(!/^[a-z0-9_]{3,16}$/.test(nm)){$("nmsg").textContent='3–16 characters, a-z 0-9 _ only_';return;}
        $("nickgo").disabled=true; $("nmsg").textContent='checking…';
        var q=await sb.from('profiles').select('username').eq('username',nm).limit(1);
        if(q.error){$("nmsg").textContent='✕ backend not ready — run member/room.sql in Supabase_';$("nickgo").disabled=false;return;}
        if(q.data&&q.data.length){$("nmsg").textContent='✕ "'+nm+'" is taken — try another_';$("nickgo").disabled=false;return;}
        onboard('pick',nm);
      };
    }
    if(step==='pick'){
      var nm=keep;
      var offer=PICKS.slice();
      ob.innerHTML='<div class="bigh">PICK YOUR ROOM_</div>'
        +'<div class="cnote">hey <b style="color:var(--acid)">'+e2(nm)+'</b> — pick your room wisely. '
        +'your profile becomes a personal slice of it — your annex — and it grows with you_</div>'
        +'<div class="picks">'+offer.map(function(k,ki){var K=KINDS[k],art=PICKART[k];
          return '<button class="pick" data-k="'+k+'" style="border-color:hsla('+K.hue+',60%,45%,.6);'
            +'--pglow:hsla('+K.hue+',90%,55%,.45);--pdur:'+(6.2+ki*0.9)+'s">'
            +'<div class="proom"><div class="part3"><div class="f">'+art+'</div><div class="b">'+art+'</div></div></div>'
            +'<div class="pn" style="color:hsl('+K.hue+',95%,70%)">'+e2(K.n)+'</div>'
            +'<div class="pd">'+e2(K.d)+'</div>'
            +'<div class="pt">▶ MOVE IN</div></button>';}).join('')
        +'</div><div class="msg" id="pmsg"></div>'
        +'<div class="cnote"><a href="#" id="backnick" style="color:var(--dim)">← change my name</a></div>';
      $("backnick").onclick=function(e){e.preventDefault();onboard('nick',nm);};
      Array.prototype.forEach.call(ob.querySelectorAll('.pick'),function(b){
        b.onclick=async function(){
          Array.prototype.forEach.call(ob.querySelectorAll('.pick'),function(x){x.disabled=true;});
          $("pmsg").textContent='opening the door…';
          var kind=b.getAttribute('data-k');
          var r=await rpc('claim_profile',{name:nm,room0:starterRoom(kind)});
          if(r&&r.status==='ok'){ toast("WELCOME HOME_"); ob.style.display="none";
            showRoom({username:r.username,room:starterRoom(kind),since:new Date().toISOString()},true); }
          else if(r&&r.status==='taken'){ onboard('nick',nm); $("nmsg")&&($("nmsg").textContent='✕ that name just got taken_'); }
          else if(r&&r.status==='have'){ location.href='./'; }
          else { $("pmsg").textContent='✕ could not move in ('+((r&&(r.error||r.status))||'offline')+')';
            Array.prototype.forEach.call(ob.querySelectorAll('.pick'),function(x){x.disabled=false;}); }
        };
      });
    }
  }

  /* logged-out: login / 2-second join */
  function showJoin(){
    if(!sb){ $("loginbox").innerHTML='<div class="login"><div class="msg">✕ backend offline — refresh in a moment_</div></div>'; return; }
    $("loginbox").innerHTML='<div class="login crtin"><div class="h">// YOUR PROFILE + YOUR ANNEX_</div>'
      +'<p><b style="color:var(--ink)">Every member gets an annex</b> — a personal slice of the room they pick, alive on their profile. Joining takes 2 seconds — just an email and a password.</p>'
      +'<input id="lem" type="email" placeholder="your email" inputmode="email" autocomplete="email">'
      +'<input id="lpw" type="password" placeholder="pick a password (6+ characters)" autocomplete="current-password">'
      +'<button id="lreg">＋ CREATE MY ACCOUNT — FREE, 2 SEC</button>'
      +'<div class="or">— ALREADY JOINED? —</div>'
      +'<button id="llog" class="ghost">▶ LOG IN</button>'
      +'<div class="msg" id="lmsg"></div>'
      +'<div class="msg" style="margin-top:8px">Got a garment pass? <a href="../member/" style="color:var(--acid)">redeem it here</a>_</div></div>';
    $("lpw").addEventListener("keydown",function(e){ if(e.key==="Enter")$("llog").click(); });
    function valid(){ var em=($("lem").value||'').trim(), pw=$("lpw").value||'';
      if(!/.+@.+\..+/.test(em)){$("lmsg").textContent='enter your email_';return null;}
      if(pw.length<6){$("lmsg").textContent='password needs 6+ characters_';return null;} return {em:em,pw:pw}; }
    $("llog").onclick=async function(){ var v=valid(); if(!v)return;
      $("llog").disabled=true;$("lreg").disabled=true;$("lmsg").textContent='…';
      var si=await sb.auth.signInWithPassword({email:v.em,password:v.pw});
      if(si.error){$("lmsg").textContent='✕ wrong email or password — new? tap CREATE MY ACCOUNT_';$("llog").disabled=false;$("lreg").disabled=false;return;}
      $("loginbox").innerHTML=''; boot(); };
    $("lreg").onclick=async function(){ var v=valid(); if(!v)return;
      $("llog").disabled=true;$("lreg").disabled=true;$("lmsg").textContent='creating your account…';
      var su=await sb.auth.signUp({email:v.em,password:v.pw});
      if(su.error){ var m=String(su.error.message||'').toLowerCase();
        if(m.indexOf('already')>=0||m.indexOf('registered')>=0){
          var si=await sb.auth.signInWithPassword({email:v.em,password:v.pw});
          if(!si.error){ $("loginbox").innerHTML=''; boot(); return; }
          $("lmsg").textContent='✕ that email is already registered — check your password_';
        } else { $("lmsg").textContent='✕ '+(su.error.message||'could not create account')+'_'; }
        $("llog").disabled=false;$("lreg").disabled=false; return; }
      if(su.data&&su.data.session){ $("loginbox").innerHTML=''; boot(); return; }
      $("lmsg").textContent='✓ account made — check your email to confirm, then LOG IN_';
      $("llog").disabled=false;$("lreg").disabled=false; };
  }

  /* ================= boot ================= */
  async function boot(){
    /* ?demo=<env>[&edit=1] — preview any annex with no account (dev harness) */
    var demo=param("demo");
    if(demo==="pick"){ onboard('pick','demo'); return; }
    if(demo){ var dk=KINDS[demo]?demo:"transit";
      showRoom({username:"demo",room:starterRoom(dk),since:new Date().toISOString()},!!param("edit"));
      return; }
    if(!sb){ showJoin(); return; }
    ME=(await sb.auth.getSession()).data.session;
    if(visiting){
      var prof=await rpc('get_room',{name:visiting});
      if(prof&&prof.username){ showRoom(prof,false); return; }
      $("titlebar").style.display="";
      $("roomname").textContent="ANNEX NOT FOUND_";
      $("roomsub").textContent='nobody lives at "'+visiting+'" — the hallway is empty.';
      $("tbtns").innerHTML='<a class="tb" href="./">✦ GET YOUR OWN ANNEX</a>';
      return;
    }
    if(!ME){ showJoin(); return; }
    MYPROF=await rpc('my_profile');
    if(MYPROF&&MYPROF.username){ showRoom(MYPROF,true); }
    else onboard('nick');
  }
  boot();
  if(sb) sb.auth.onAuthStateChange(function(ev){ if(ev==='SIGNED_OUT') location.reload(); });

  window.addEventListener("beforeunload",function(e){ if(DIRTY){e.preventDefault();e.returnValue="";} });
})();
