<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="apple-touch-icon" href="/assets/chess/bishop1.png">
<meta name="theme-color" content="#070707">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>MY PROFILE — ONLY IBEE</title>
<meta name="description" content="Your profile on the ONLY IBEE frequency — your room. Arrange it and share it.">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070707;--panel:#0e0e0e;--ink:#e8e8e8;--dim:#7a7a7a;
  --acid:#b6ff00;--red:#ff2b2b;--cyan:#26e0ff;--pink:#ff2bd6;--gold:#ffd60a;--border:#2a2a2a;
  --hue:88;                    /* the room kind's hue */
  --px:'Press Start 2P',monospace;--vt:'VT323',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--vt);font-size:20px;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.28) 0 1px,transparent 1px 3px)}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}
.bgglow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 20%,hsla(var(--hue),90%,45%,.14),transparent 60%)}
header{width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:2px solid var(--border);font-family:var(--px);font-size:10px;position:relative;z-index:50}
header a{color:var(--acid);text-decoration:none}header a .r{color:var(--red)}header span{color:var(--dim);font-size:8px}
main{flex:1;width:100%;max-width:680px;padding:18px 14px 90px;display:flex;flex-direction:column;
  align-items:center;gap:12px;position:relative;z-index:2}
.crtin{animation:crtin .35s ease-out}
@keyframes crtin{0%{transform:scaleY(.02);filter:brightness(3)}60%{transform:scaleY(1.03)}100%{transform:scaleY(1)}}

/* ---------- room title bar ---------- */
.titlebar{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.titlebar .rn{font-family:var(--px);font-size:clamp(11px,3.4vw,15px);color:hsl(var(--hue),95%,70%);
  text-shadow:0 0 14px hsla(var(--hue),95%,55%,.5);letter-spacing:1px;line-height:1.5}
.titlebar .sub{color:var(--dim);font-size:15px;width:100%}
.tbtns{display:flex;gap:8px;flex-wrap:wrap}
.tb{font-family:var(--px);font-size:8px;padding:10px 12px;background:transparent;color:var(--acid);
  border:1px solid var(--acid);cursor:pointer;text-decoration:none;letter-spacing:1px}
.tb.solid{background:var(--acid);color:#000}
.tb.red{color:var(--red);border-color:#3a1414}
.tb:active{transform:translateY(2px)}
.tb:disabled{opacity:.4;cursor:default}

/* ---------- the room stage ---------- */
#stagewrap{width:100%;border:2px solid var(--border);background:
  radial-gradient(ellipse at 50% 0%,hsla(var(--hue),70%,30%,.2),transparent 60%),#0a0a0c;
  position:relative;overflow:hidden}
#stage{position:relative;margin:0 auto;transform-origin:top center}
#roomsvg{display:block}
#itemlayer{position:absolute;inset:0}
.itm{position:absolute;transform:translate(-50%,-92%);cursor:default;line-height:1;
  filter:drop-shadow(0 6px 5px rgba(0,0,0,.55));transition:transform .12s;user-select:none;-webkit-user-select:none}
.itm .g{display:block;font-size:34px;
  transform:scaleX(var(--fx,1)) translateY(calc(var(--mb,0)*-3.5px)) scale(calc(1 + var(--mb,0)*.03));
  transition:transform .1s linear}
.itm.f2 .g,.itm.f3 .g{filter:brightness(.85)}
.itm.sel{outline:2px dashed var(--acid);outline-offset:3px}
.edit .itm{cursor:pointer}
.tilehint{position:absolute;width:0;height:0;pointer-events:none}
/* shelf items: the member's collection, spinning in 3D on the plank */
.shitm{position:absolute;transform:translate(-50%,-100%);line-height:1;user-select:none;-webkit-user-select:none;
  filter:drop-shadow(0 3px 3px rgba(0,0,0,.6))}
.shitm .sp{perspective:220px;width:26px;height:26px;display:block;
  transform:translateY(calc(var(--mb,0)*-2px))}
.shitm .s3{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  animation:spin3d var(--sdur,6s) linear infinite;animation-delay:var(--sdel,0s)}
.shitm .s3 .f,.shitm .s3 .b{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;font-size:20px}
.shitm .s3 .b{transform:rotateY(180deg);filter:brightness(.55)}
@keyframes spin3d{from{transform:rotateX(6deg) rotateY(0)}to{transform:rotateX(6deg) rotateY(360deg)}}
/* floating hue glyphs while the radio plays */
.gly{position:absolute;font-size:15px;pointer-events:none;color:hsl(var(--mh,75),95%,68%);
  text-shadow:0 0 8px hsla(var(--mh,75),95%,55%,.7);animation:glyup 3.4s ease-out forwards;z-index:40}
@keyframes glyup{0%{opacity:0;transform:translateY(0) scale(.7)}12%{opacity:.95}
  100%{opacity:0;transform:translateY(-110px) scale(1.15) rotate(14deg)}}
/* the SVG wall gear: baseboards + eq bars + stat screen breathe with the beat */
#roomsvg line.bb{stroke-opacity:calc(.35 + var(--mb,0)*.65)}
#roomsvg rect.eqb{fill:hsl(var(--mh,75),95%,60%);transition:height .09s linear,y .09s linear}
#roomsvg .scrbox{filter:drop-shadow(0 0 calc(3px + var(--mb,0)*7px) hsla(var(--mh,75),95%,55%,.55))}
#roomsvg text{font-family:var(--px);letter-spacing:.5px}
#roomsvg text.scr-t{fill:hsl(var(--mh,75),95%,72%)}
#roomsvg text.scr-d{fill:#9a9a9a;font-family:var(--vt)}
/* now-playing plaque on the wall */
#npline{position:absolute;font-family:var(--px);font-size:7px;color:hsl(var(--mh,75),95%,70%);
  letter-spacing:1px;text-shadow:0 0 8px hsla(var(--mh,75),95%,55%,.6);white-space:nowrap;overflow:hidden;
  transform:translateX(-50%);text-align:center;max-width:200px;text-overflow:ellipsis}

/* ---------- selected-item popup ---------- */
#itmpop{position:absolute;z-index:60;display:none;gap:6px;background:#0b0b0d;border:1px solid var(--border);
  padding:6px;transform:translate(-50%,-130%)}
#itmpop button{font-family:var(--px);font-size:8px;padding:8px 9px;background:transparent;border:1px solid var(--acid);
  color:var(--acid);cursor:pointer}
#itmpop button.rm{color:var(--red);border-color:#3a1414}
#itmpop.open{display:flex}

/* ---------- item drawer (owner edit) ---------- */
#drawer{width:100%;border:2px solid var(--border);background:rgba(14,14,14,.92);padding:12px;display:none}
#drawer.open{display:block}
#drawer .h{font-family:var(--px);font-size:9px;color:var(--acid);letter-spacing:1px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center}
#drawer .h .cnt{color:var(--dim);font-size:8px}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin}
.chip{flex:none;width:64px;border:1px solid var(--border);background:#0a0a0c;padding:8px 4px 6px;text-align:center;cursor:pointer}
.chip:hover{border-color:#3a3a3a}
.chip.sel{border-color:var(--acid);box-shadow:0 0 12px rgba(182,255,0,.35)}
.chip .ce{font-size:24px;line-height:1.2}
.chip .cn{font-family:var(--px);font-size:5.5px;color:var(--dim);margin-top:5px;line-height:1.5;letter-spacing:.5px}
.chip.rare .cn{color:var(--gold)}
.chip.rare{border-color:#4a3a12}
.drawhint{color:var(--dim);font-size:15px;margin-top:8px}

/* ---------- boxes (guestbook / share / info) ---------- */
.box{width:100%;border:2px solid var(--border);background:rgba(14,14,14,.9);padding:14px 16px;text-align:left}
.box .h{font-family:var(--px);font-size:9px;color:var(--acid);letter-spacing:1px;margin-bottom:10px}
.cnote{color:var(--dim);font-size:16px;line-height:1.45}
.sharebar{display:flex;gap:8px;align-items:stretch;flex-wrap:wrap}
.sharebar input{flex:1;min-width:150px;background:#050505;border:1px solid var(--border);color:var(--acid);
  font-family:var(--vt);font-size:16px;padding:10px}

/* ---------- onboarding: nickname + pick 1 of 3 starter rooms ---------- */
.ob{width:100%;text-align:center}
.ob .bigh{font-family:var(--px);font-size:clamp(11px,3.4vw,14px);color:var(--acid);letter-spacing:2px;line-height:1.7;margin:8px 0 4px}
.nick{display:flex;flex-direction:column;gap:9px;max-width:380px;margin:12px auto 0}
.nick input{background:#050505;border:1px solid var(--border);color:var(--acid);font-family:var(--px);
  font-size:13px;padding:13px;text-align:center;letter-spacing:2px;text-transform:lowercase}
.nick input:focus{outline:none;border-color:var(--acid)}
.nick .cbtn{font-family:var(--px);font-size:10px;padding:14px;background:var(--acid);color:#000;border:0;cursor:pointer}
.nick .cbtn:disabled{opacity:.5}
.picks{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px}
@media(min-width:560px){.picks{grid-template-columns:repeat(3,1fr)}}
.pick{border:2px solid var(--border);background:#0a0a0c;padding:14px 10px 12px;text-align:center;cursor:pointer;
  font-family:var(--vt);color:var(--ink);transition:.18s;display:flex;flex-direction:column;align-items:center}
.pick:hover{transform:translateY(-3px);outline:none}
.pick:disabled{opacity:.4;cursor:default;transform:none}
/* the pick renders as a little rotating 3D room (same spin trick as everywhere on the site) */
.pick .proom{perspective:520px;width:132px;height:92px;margin:2px auto 8px;position:relative}
.pick .proom::after{content:"";position:absolute;left:50%;bottom:-8px;transform:translateX(-50%);
  width:78px;height:12px;border-radius:50%;background:radial-gradient(ellipse,var(--pglow,rgba(182,255,0,.4)),transparent 70%);
  animation:pedpulse 3.2s ease-in-out infinite}
@keyframes pedpulse{0%,100%{transform:translateX(-50%) scaleX(1);opacity:.85}50%{transform:translateX(-50%) scaleX(.72);opacity:.4}}
.pick .part3{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  animation:spin3d var(--pdur,7s) linear infinite}
.pick .part3 .f,.pick .part3 .b{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.pick .part3 .b{transform:rotateY(180deg);filter:brightness(.5)}
.pick .part3 svg{width:100%;height:100%}
.pick .pn{font-family:var(--px);font-size:9px;line-height:1.6;margin-bottom:6px}
.pick .pd{color:#b0b0b0;font-size:14px;line-height:1.35;flex:1;margin-bottom:8px}
.pick .pt{font-family:var(--px);font-size:7px;color:var(--dim);letter-spacing:2px;border-top:1px solid var(--border);
  padding-top:8px;width:100%}
.pick:hover .pt{color:var(--acid)}
.msg{color:var(--dim);font-size:16px;margin-top:10px;min-height:20px}

/* ---------- IDENTITY BAND: the nameplate — the profile flattened onto the room ---------- */
.idband{width:100%;display:flex;align-items:center;gap:14px;border:2px solid hsla(var(--hue),60%,45%,.55);
  background:linear-gradient(180deg,hsla(var(--hue),70%,30%,.14),rgba(10,10,12,.92));padding:14px 16px;
  box-shadow:0 0 calc(18px + var(--mb,0)*30px) hsla(var(--mh,var(--hue)),90%,45%,.22),inset 0 0 40px rgba(0,0,0,.5);position:relative}
.idband .av{width:64px;height:64px;flex:none;border-radius:50%;cursor:pointer;background:#fff;object-fit:cover;
  border:2px solid hsla(var(--hue),60%,50%,.75);
  box-shadow:0 0 calc(8px + var(--mb,0)*16px) hsla(var(--mh,var(--hue)),90%,50%,.5);
  transform:scale(calc(1 + var(--mb,0)*.05));transition:transform .1s linear}
.idband .av:hover{filter:brightness(1.08)}
.idband .who{flex:1;min-width:0}
.idband .rank{font-family:var(--px);font-size:clamp(11px,3.2vw,14px);color:hsl(var(--hue),95%,72%);
  text-shadow:0 0 14px hsla(var(--hue),95%,55%,.5);letter-spacing:1px;line-height:1.5}
.idband .em{color:var(--ink);font-size:16px;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.idband .since{color:var(--dim);font-size:13px;margin-top:3px}
.idband .logout{font-family:var(--px);font-size:7px;color:var(--dim);cursor:pointer;text-decoration:none;
  border:1px solid var(--border);padding:8px 9px;align-self:flex-start;white-space:nowrap}
.idband .logout:hover{color:var(--red);border-color:#3a1414}
/* avatar picker drops under the band */
.avpick{width:100%;border:1px solid var(--border);background:rgba(14,14,14,.92);padding:12px;
  display:none;flex-wrap:wrap;gap:9px;justify-content:center}
.avpick.open{display:flex}
.avpick img{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);cursor:pointer;background:#fff}
.avpick img.sel{border-color:var(--acid);box-shadow:0 0 10px rgba(182,255,0,.5)}
.avpick img:hover{border-color:var(--ink)}

/* ---------- LOGIN / JOIN box (logged out) ---------- */
.login{width:100%;border:2px solid var(--border);background:rgba(14,14,14,.92);padding:18px 16px;text-align:center}
.login .h{font-family:var(--px);font-size:9px;color:var(--acid);margin-bottom:10px}
.login p{color:#bdbdbd;font-size:17px;line-height:1.5;margin-bottom:12px}
.login input{width:100%;background:#050505;border:1px solid var(--border);color:var(--acid);
  font-family:var(--vt);font-size:18px;padding:11px;margin-bottom:8px}
.login input:focus{outline:none;border-color:var(--acid)}
.login button{width:100%;font-family:var(--px);font-size:10px;padding:13px;background:var(--acid);color:#000;border:0;cursor:pointer}
.login button.ghost{background:transparent;color:var(--acid);border:1px solid var(--acid);margin-top:8px}
.login .or{color:#555;font-family:var(--px);font-size:7px;letter-spacing:2px;margin:12px 0 8px}
.login .msg{color:var(--dim);font-size:15px;margin-top:8px}

/* drawer tabs (FURNITURE | COLLECTION) */
.dtabs{display:flex;gap:8px;margin-bottom:10px}
.dtab{font-family:var(--px);font-size:7px;padding:8px 10px;border:1px solid var(--border);background:transparent;
  color:var(--dim);cursor:pointer;letter-spacing:1px}
.dtab.on{color:#000;background:var(--acid);border-color:var(--acid)}
.chip.coll{border-color:hsla(var(--hue),60%,45%,.6)}
.chip.coll .cn{color:hsl(var(--hue),95%,70%)}
.chip .ce .mini3{display:inline-block;animation:spin3d 5s linear infinite;transform-style:preserve-3d}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#000;border:1px solid var(--acid);
  color:var(--acid);font-family:var(--px);font-size:9px;padding:10px 16px;z-index:9500;opacity:0;transition:.2s;pointer-events:none}
.toast.on{opacity:1}
footer{padding:16px;font-family:var(--px);font-size:8px;color:var(--dim);text-align:center;position:relative;z-index:2}
</style>
</head>
<body>
<div class="bgglow"></div>
<header>
  <a href="../#menu">ONLY<span class="r">IBEE</span> OS</a>
  <span>PROFILE.SYS</span>
</header>

<main id="main">
  <!-- logged out: the login / join box -->
  <div id="loginbox" style="width:100%"></div>

  <!-- IDENTITY BAND: avatar + name + rank + logout (own profile) -->
  <div class="idband crtin" id="idband" style="display:none">
    <img class="av" id="av" src="../assets/img/avatars/mimi-00.png" alt="your avatar" title="tap to change your avatar">
    <div class="who">
      <div class="rank" id="idrank">—</div>
      <div class="em" id="idem"></div>
      <div class="since" id="idsince"></div>
    </div>
    <a class="logout" id="logout" href="#">LOG OUT</a>
  </div>
  <div class="avpick crtin" id="avpick"></div>

  <div class="titlebar crtin" id="titlebar" style="display:none">
    <div class="rn" id="roomname">—</div>
    <div class="tbtns" id="tbtns"></div>
    <div class="sub" id="roomsub"></div>
  </div>

  <div id="stagewrap" class="crtin" style="display:none">
    <div id="stage">
      <div id="roomsvg"></div>
      <div id="itemlayer"></div>
      <div id="npline"></div>
      <div id="itmpop"><button id="poprot">↻ TURN</button><button id="poprm" class="rm">✕ REMOVE</button></div>
    </div>
  </div>

  <div id="drawer" class="crtin">
    <div class="h"><span>// ARRANGE_</span><span class="cnt" id="itmcnt"></span></div>
    <div class="dtabs">
      <button class="dtab on" id="tabFurn" data-tab="furn">FURNITURE</button>
      <button class="dtab" id="tabColl" data-tab="coll">MY COLLECTION</button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="drawhint" id="drawhint">tap an item, then tap a floor tile to place it. tap a placed item to turn or remove it.</div>
  </div>

  <div class="box crtin" id="sharebox" style="display:none">
    <div class="h">// SHARE MY ROOM_</div>
    <div class="sharebar"><input id="sharelink" readonly value=""><button class="tb solid" id="sharecopy" style="border:0">COPY</button></div>
    <div class="cnote" style="margin-top:8px">anyone with this link can visit — only you can move the furniture_</div>
  </div>

  <div class="ob crtin" id="ob" style="display:none"></div>
</main>

<footer>© ONLYIBEE — THE FREQUENCY</footer>
<div class="toast" id="toast"></div>

  /* the furniture catalog — everyone gets BASICS; your kind adds its exclusives + relic */

    "game-runner":{e:"🐝",n:"RUN BEEBEE"},"game-rush":{e:"🎸",n:"MIMI GUITAR RUSH"},

  function shelfMeta(id){
    if(id&&id.indexOf("inv:")===0) return INVMETA[id.slice(4)]||{e:"✦",n:id.slice(4).toUpperCase()};
    return ITEMS[id];
  }

  /* ================= iso projection ================= */
  var GX=8,GY=6,TW=64,TH=32,WH=88;                 // grid, tile size, wall height
  var W=(GX+GY)*TW/2, H=WH+(GX+GY)*TH/2+30, OX=W/2, OY=WH+6;
  function px(x,y){return OX+(x-y)*TW/2;}
  function py(x,y){return OY+(x+y)*TH/2;}
  function unproject(mx,my){
    var a=(mx-OX)/(TW/2), b=(my-OY-TH/2)/(TH/2);   // -TH/2: aim at tile centers
    return {x:Math.round((a+b)/2), y:Math.round((b-a)/2)};
  }

  /* the room shell drawn as one inline SVG: two walls, a window, the shelf, the floor grid */
  function drawRoom(kind){
    var K=KINDS[kind]||KINDS.attic;
    document.documentElement.style.setProperty("--hue",K.hue);
    var s='<svg id="rsvg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
    /* left wall (along the y axis edge) + right wall (along the x axis edge) */
    s+='<polygon points="'+px(0,0)+','+(py(0,0)-WH)+' '+px(0,GY)+','+(py(0,GY)-WH)+' '+px(0,GY)+','+py(0,GY)+' '+px(0,0)+','+py(0,0)+'" fill="'+K.wall+'" stroke="#000" stroke-width="1"/>';
    s+='<polygon points="'+px(0,0)+','+(py(0,0)-WH)+' '+px(GX,0)+','+(py(GX,0)-WH)+' '+px(GX,0)+','+py(GX,0)+' '+px(0,0)+','+py(0,0)+'" fill="'+K.wall2+'" stroke="#000" stroke-width="1"/>';
    /* baseboard glow lines where walls meet floor — class bb breathes with --mb */
    s+='<line class="bb" x1="'+px(0,0)+'" y1="'+py(0,0)+'" x2="'+px(0,GY)+'" y2="'+py(0,GY)+'" stroke="hsl('+K.hue+',95%,55%)" stroke-width="1.6"/>';
    s+='<line class="bb" x1="'+px(0,0)+'" y1="'+py(0,0)+'" x2="'+px(GX,0)+'" y2="'+py(GX,0)+'" stroke="hsl('+K.hue+',95%,55%)" stroke-width="1.6"/>';
    /* the window on the left wall — the sky lives in the song's hue (CSS var --mh) */
    var wx1=px(0,0.5),wy1=py(0,0.5)-WH+10,wx2=px(0,2.5),wy2=py(0,2.5)-WH+10;
    s+='<polygon points="'+wx1+','+wy1+' '+wx2+','+wy2+' '+wx2+','+(wy2+30)+' '+wx1+','+(wy1+30)+'" fill="hsl(var(--mh,'+K.hue+'),70%,22%)" stroke="hsl(var(--mh,'+K.hue+'),95%,60%)" stroke-width="1.5"><animate attributeName="opacity" values="1;.85;1" dur="4s" repeatCount="indefinite"/></polygon>';
    s+='<circle cx="'+((wx1+wx2)/2)+'" cy="'+((wy1+wy2)/2+11)+'" r="4" fill="hsl(var(--mh,'+K.hue+'),95%,75%)" opacity=".9"/>';
    /* the EQUALIZER on the left wall — 9 LED bars that dance to the groove (heights set in the music loop) */
    for(var q=0;q<9;q++){
      var yy=3.0+q*0.3, bx=px(0,yy), base=py(0,yy)-WH+62;
      s+='<rect class="eqb" data-base="'+base+'" x="'+(bx-3)+'" y="'+(base-4)+'" width="6" height="4" rx="1" opacity=".9"/>';
    }
    /* the STAT SCREEN on the right wall — skewed onto the wall plane, filled by the music loop */
    var scx=px(2.3,0), scy=py(2.3,0)-WH+2, scw=120, sch=27;
    s+='<g class="scrbox" transform="translate('+scx+','+scy+') skewY(26.565)">'
      +'<rect x="0" y="0" width="'+scw+'" height="'+sch+'" fill="#050505" stroke="hsl(var(--mh,'+K.hue+'),80%,55%)" stroke-width="1.2"/>'
      +'<circle id="scrLed" cx="'+(scw-7)+'" cy="6.5" r="2.2" fill="#3a3a3a"/>'
      +'<text id="scrOwner" x="5" y="8.5" font-size="4.5" class="scr-t">ROOM.SYS_</text>'
      +'<text id="scrSong" x="5" y="16.5" font-size="5" fill="#e8e8e8">RADIO OFF_</text>'
      +'<text id="scrMeta" x="5" y="24.5" font-size="6.5" class="scr-d">tap ► on the radio_</text>'
      +'</g>';
    /* the SHELF on the right wall — the collection lives here, spinning */
    var sx1=px(2.2,0),sy1=py(2.2,0)-WH+64,sx2=px(7.2,0),sy2=py(7.2,0)-WH+64;
    s+='<polygon points="'+sx1+','+sy1+' '+sx2+','+sy2+' '+(sx2)+','+(sy2+6)+' '+(sx1)+','+(sy1+6)+'" fill="#241c10" stroke="hsl('+K.hue+',60%,45%)" stroke-width="1"/>';
    /* floor tiles */
    for(var y=0;y<GY;y++)for(var x=0;x<GX;x++){
      var cx=px(x,y),cy=py(x,y),f=((x+y)%2===0)?K.fA:K.fB;
      s+='<polygon class="tile" data-x="'+x+'" data-y="'+y+'" points="'
        +cx+','+cy+' '+(cx+TW/2)+','+(cy+TH/2)+' '+cx+','+(cy+TH)+' '+(cx-TW/2)+','+(cy+TH/2)
        +'" fill="'+f+'" stroke="hsla('+K.hue+',80%,55%,calc(.12 + var(--mb,0)*.4))" stroke-width="1"/>';
    }
    s+='</svg>';
    $("roomsvg").innerHTML=s;
    /* now-playing plaque position: centered on the right wall, under the shelf */
    var np=$("npline"); np.style.left=((sx1+sx2)/2)+"px"; np.style.top=(((sy1+sy2)/2)+26)+"px";
    return {shelf:{x1:sx1,y1:sy1,x2:sx2,y2:sy2}};
  }

  /* ================= state ================= */
  var visiting=(param("u")||"").toLowerCase().trim();

  /* ---- profile identity (same codename/rank scheme as the old profile page) ---- */
  var NAMES=["RED NOMAD","NEON STRAY","VOID RUNNER","STATIC GHOST","ACID SAINT","MIDNIGHT FOX",
    "CHROME WOLF","PIXEL SHAMAN","ROGUE SIGNAL","VELVET RIOT","GLASS TIGER","ECHO BANDIT",

  function starterRoom(kind){
    var K=KINDS[kind];
    return {v:1,k:kind,env:K.env||null,tiles:JSON.parse(JSON.stringify(K.layout)),shelf:[K.relic,"press001"]};
  }
  var PICKS=["aqua","terrarium","transit"];   // the three rooms offered at sign-up (fixed, in order)
  function myItems(){                          // what the owner may place
    var K=KINDS[(ROOM&&ROOM.k)||"attic"];
    return BASICS.concat(K?K.items:[]);
  }

  /* ================= render the placed items ================= */
  function renderItems(){
    var lay=$("itemlayer"), html="";
    (ROOM.tiles||[]).forEach(function(t,idx){
      var isColl=(t.i&&t.i.indexOf("inv:")===0), d=shelfMeta(t.i); if(!d)return;
      var flip=(t.f%2===1)?-1:1;
      /* collection trophies spin in place (3D flip) so they read as prized display pieces */
      var glyph=isColl
        ? '<span class="g" style="perspective:120px"><span class="s3" style="display:inline-block;transform-style:preserve-3d;animation:spin3d 5s linear infinite">'+d.e+'</span></span>'
        : '<span class="g">'+d.e+'</span>';
      html+='<div class="itm f'+(t.f||0)+'" data-idx="'+idx+'" title="'+e2(d.n)+'" style="left:'+px(t.x,t.y)+'px;top:'+(py(t.x,t.y)+TH/2+10)+'px;z-index:'+(10+t.x+t.y)+';--fx:'+flip+'">'
        +glyph+'</div>';
    });
    /* shelf items along the plank — every one spins in 3D (relics + the collection) */
    var sh=(ROOM.shelf||[]).slice(0,8);
    if(geom&&sh.length){
      sh.forEach(function(id,i){
        var d=shelfMeta(id); if(!d)return;
        var f=(i+1)/(sh.length+1);
        var sx=geom.shelf.x1+(geom.shelf.x2-geom.shelf.x1)*f, sy=geom.shelf.y1+(geom.shelf.y2-geom.shelf.y1)*f;
        html+='<div class="shitm" title="'+e2(d.n)+'" style="left:'+sx+'px;top:'+sy+'px;z-index:5;--sdur:'+(5.2+(i%4)*0.9)+'s;--sdel:-'+(i*0.7)+'s">'
          +'<span class="sp"><span class="s3"><span class="f">'+d.e+'</span><span class="b">'+d.e+'</span></span></span></div>';
      });
    }
    lay.innerHTML=html;
    $("itmcnt").textContent=(ROOM.tiles||[]).length+" / "+MAXITEMS+" placed";
    if(ISMINE){
      Array.prototype.forEach.call(lay.querySelectorAll(".itm"),function(el){
        el.onclick=function(ev){ ev.stopPropagation(); selectItem(+el.getAttribute("data-idx"), el); };
      });
    }
  }

  /* read the member's real collection (same rpc as member/inventory/) into OWNED, auto-seed
     any NEW piece onto the shelf, refresh the drawer + stat screens. The collection is the
     profile's main attraction, so it drives the COLLECTION stat + the drawer's second shelf. */
  async function loadCollection(){
    if(!sb||!ISMINE)return;
    OWNED=[];
    try{ var r=await sb.rpc('my_inventory'); (r.data||[]).forEach(function(it){ if(INVMETA[it.id]) OWNED.push(it.id); }); }catch(e){}
    var isOwner=(((ME&&ME.user&&ME.user.email)||'').toLowerCase()===OWNER_EMAIL);
    if(isOwner){ Object.keys(INVMETA).forEach(function(id){ if(id!=='universe-engine'&&OWNED.indexOf(id)<0)OWNED.push(id); }); }
    /* auto-place newly-owned pieces on the shelf (up to 8) so the collection always shows */
    ROOM.shelf=ROOM.shelf||[]; var changed=false;
    collectionIds().forEach(function(id){ var s='inv:'+id;
      if(ROOM.shelf.indexOf(s)<0&&ROOM.shelf.length<8){ ROOM.shelf.push(s); changed=true; } });
    renderItems(); renderDrawer();
    if(changed){ markDirty(); toast("COLLECTION ON THE SHELF_"); }
  }

  /* fit the fixed-size stage into the panel width — scales UP on laptops, down on phones */
  function fitStage(){
    var wrap=$("stagewrap"), st=$("stage");
    var avail=wrap.clientWidth-8, sc=Math.min(1.55,avail/W);
    st.style.width=W+"px"; st.style.height=(H*sc)+"px"; st.style.margin="0";
    /* origin top-left + explicit translate: center the SCALED room, not the layout box
       (origin:center left the room clipped right on phones where sc<1) */
    st.style.transformOrigin="top left";
    st.style.transform="translateX("+Math.max(0,(avail-W*sc)/2+4)+"px) scale("+sc+")";
    st.dataset.sc=sc;
  }
  window.addEventListener("resize",fitStage);

  /* ================= owner editing ================= */
  function selectItem(idx,el){
    selTileItem=idx;
    Array.prototype.forEach.call(document.querySelectorAll(".itm"),function(x){x.classList.remove("sel");});
    el.classList.add("sel");
    var pop=$("itmpop"); pop.style.left=el.style.left; pop.style.top=el.style.top; pop.classList.add("open");
  }
  function unselect(){ selTileItem=null; $("itmpop").classList.remove("open");
    Array.prototype.forEach.call(document.querySelectorAll(".itm"),function(x){x.classList.remove("sel");}); }
  $("poprot").onclick=function(ev){ ev.stopPropagation();
    if(selTileItem==null)return; var t=ROOM.tiles[selTileItem]; t.f=((t.f||0)+1)%4;
    markDirty(); renderItems(); unselect(); };
  $("poprm").onclick=function(ev){ ev.stopPropagation();
    if(selTileItem==null)return; ROOM.tiles.splice(selTileItem,1);
    markDirty(); renderItems(); unselect(); };

  function stageClick(ev){
    if(!ISMINE)return;
    unselect();
    if(!selChip)return;
    var st=$("stage"), r=st.getBoundingClientRect(), sc=+st.dataset.sc||1;
    var mx=(ev.clientX-r.left)/sc, my=(ev.clientY-r.top)/sc;
    var t=unproject(mx,my);
    if(t.x<0||t.x>=GX||t.y<0||t.y>=GY)return;
    if((ROOM.tiles||[]).length>=MAXITEMS){toast("ROOM FULL_");return;}
    for(var i=0;i<ROOM.tiles.length;i++)if(ROOM.tiles[i].x===t.x&&ROOM.tiles[i].y===t.y){toast("TILE TAKEN_");return;}
    ROOM.tiles.push({i:selChip,x:t.x,y:t.y,f:0});
    markDirty(); renderItems();
  }
  function markDirty(){ DIRTY=true; var b=$("savebtn"); if(b){b.disabled=false;b.textContent="▣ SAVE ROOM";} }

  /* the drawer has two shelves: FURNITURE (basics + room-exclusives) and MY COLLECTION
     (the member's owned games/environments/engine, placeable as display trophies). */
  function renderDrawer(){
    var html="", K=KINDS[ROOM.k]||KINDS.attic;
    if(drawerTab==='furn'){
      $("drawhint").textContent="tap an item, then tap a floor tile to place it. tap a placed item to turn or remove it.";
      html=myItems().map(function(id){
        var d=ITEMS[id], ex=(K.items.indexOf(id)>=0);
        return '<div class="chip'+(ex?' rare':'')+'" data-id="'+id+'"><div class="ce">'+d.e+'</div><div class="cn">'+e2(d.n)+(ex?'<br>ROOM EXCL.':'')+'</div></div>';
      }).join('');
    } else {
      var coll=collectionIds();
      if(!coll.length){
        $("drawhint").textContent="unlock rooms & the engine and they show up here to display in your room.";
        html='<div class="drawhint" style="padding:6px 2px">no collectibles yet — <a href="../arcade/" style="color:var(--acid)">unlock a room</a> or play 10s of music to earn the engine_</div>';
      } else {
        $("drawhint").textContent="your collection — tap a piece, then a floor tile, to display it as a trophy in your room.";
        html=coll.map(function(id){ var d=INVMETA[id]||{e:"✦",n:id.toUpperCase()};
          return '<div class="chip coll" data-id="inv:'+id+'"><div class="ce">'+d.e+'</div><div class="cn">'+e2(d.n)+'</div></div>';
        }).join('');
      }
    }
    $("chips").innerHTML=html;
    Array.prototype.forEach.call($("chips").querySelectorAll(".chip"),function(c){
      c.onclick=function(){
        var id=c.getAttribute("data-id");
        if(selChip===id){selChip=null;c.classList.remove("sel");return;}
        selChip=id;
        Array.prototype.forEach.call($("chips").querySelectorAll(".chip"),function(x){x.classList.remove("sel");});
        c.classList.add("sel");
      };
    });
    $("drawer").classList.add("open");
  }
  /* collection ids the member owns (env/games from Supabase + the engine flag) */
  function collectionIds(){
    var ids=OWNED.filter(function(id){return INVMETA[id];});
    try{ if(localStorage.getItem('ibee_engine10')==='1'&&ids.indexOf('universe-engine')<0) ids.push('universe-engine'); }catch(e){}
    return ids;
  }
  (function(){  /* drawer tab switch */
    ['tabFurn','tabColl'].forEach(function(id){ var el=$(id); if(!el)return;
      el.onclick=function(){ drawerTab=el.getAttribute('data-tab'); selChip=null;
        $("tabFurn").classList.toggle('on',drawerTab==='furn');
        $("tabColl").classList.toggle('on',drawerTab==='coll');
        renderDrawer(); };
    });
  })();

  async function saveRoom(){
    var b=$("savebtn"); b.disabled=true; b.textContent="SAVING…";
    var r=await rpc('save_room',{r:ROOM});
    if(r&&r.status==='ok'){ DIRTY=false; b.textContent="✓ SAVED"; toast("ROOM SAVED_"); }
    else { b.disabled=false; b.textContent="▣ SAVE ROOM"; toast("✕ COULD NOT SAVE"); }
  }

  /* ================= the mimi avatar (device-local, shared key ibee_avatar) ================= */
  var AV_N=12;
  function avSrc(i){ return "../assets/img/avatars/mimi-"+(i<10?"0":"")+i+".png"; }
  function avGet(){ var n=parseInt(localStorage.getItem("ibee_avatar"),10); return (n>=0&&n<AV_N)?n:0; }
  function avPaint(){ $("av").src=avSrc(avGet());
    Array.prototype.forEach.call($("avpick").querySelectorAll("img"),function(im,i){ im.classList.toggle("sel",i===avGet()); }); }
  (function(){
    var h=''; for(var i=0;i<AV_N;i++) h+='<img src="'+avSrc(i)+'" alt="mimi '+i+'" data-i="'+i+'">';
    $("avpick").innerHTML=h;
    Array.prototype.forEach.call($("avpick").querySelectorAll("img"),function(im){
      im.onclick=function(){ try{localStorage.setItem("ibee_avatar",im.getAttribute("data-i"));}catch(e){}
        avPaint(); $("avpick").classList.remove("open"); toast("AVATAR SET_"); };});
    $("av").onclick=function(){ $("avpick").classList.toggle("open"); };
  })();

  /* ================= identity (own profile) ================= */
  function renderIdentity(prof){
    var uid=(ME&&ME.user&&ME.user.id)||OWNERNAME;
    var codename=NAMES[hash(uid+"n")%NAMES.length]+" #"+(1000+(hash(uid+"x")%9000));
    var rankIdx = OWNED.length>=6?3 : OWNED.length>=3?2 : OWNED.length>=1?1 : 0;
    $("idrank").textContent=RANKS[rankIdx].n+" · "+OWNERNAME.toUpperCase();
    $("idem").textContent=(ME&&ME.user&&ME.user.email)||"";
    var since=prof.since?new Date(prof.since).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}):"";
    $("idsince").textContent="codename "+codename+(since?" · since "+since:"");
    $("idband").style.display=""; avPaint();
    $("logout").onclick=function(ev){ ev.preventDefault(); if(sb)sb.auth.signOut().then(function(){location.reload();}); };
  }
  /* ================= views ================= */
  function showRoom(prof,mine){
    OWNERNAME=prof.username; ROOM=prof.room||{}; ISMINE=mine;
    if(!ROOM.k)ROOM={v:1,k:"attic",tiles:[],shelf:[]};
    /* stash the picked env so the room-gate (aqua/terrarium/transit) & arcade know it fast */
    if(mine){ try{ if(ROOM.env)localStorage.setItem("ibee_room",ROOM.env); }catch(e){} }
    var K=KINDS[ROOM.k]||KINDS.attic;
    document.title=(mine?"MY PROFILE":OWNERNAME.toUpperCase()+"'S ROOM")+" — ONLY IBEE";
    $("titlebar").style.display="";
    $("roomname").textContent=(mine?"MY ROOM · ":"")+OWNERNAME.toUpperCase()+" — "+K.n;
    var since=prof.since?new Date(prof.since).toLocaleDateString(undefined,{year:'numeric',month:'short'}):"";
    $("roomsub").textContent=(mine?"your profile — arrange it, show your collection, share it":"you are visiting — look, don't touch")+(since?" · est. "+since:"");
    var tb=$("tbtns"); tb.innerHTML="";
    if(mine){
      tb.innerHTML='<button class="tb solid" id="savebtn" disabled>✓ SAVED</button>'
        +'<a class="tb" href="?u='+encodeURIComponent(OWNERNAME)+'">👁 VIEW AS VISITOR</a>'
        +'<a class="tb" href="../member/inventory/">♟ COLLECTION</a>';
      $("savebtn").onclick=saveRoom;
      var link=location.origin+"/room/?u="+encodeURIComponent(OWNERNAME);
      $("sharebox").style.display=""; $("sharelink").value=link;
      $("sharecopy").onclick=function(){
        if(navigator.share){navigator.share({title:"my room on ONLY IBEE",url:link}).catch(function(){});}
        try{navigator.clipboard.writeText(link);toast("LINK COPIED_");}catch(e){}
      };
      renderIdentity(prof);
    } else {
      tb.innerHTML='<a class="tb" href="./">'+(ME?"▶ MY PROFILE":"✦ GET YOUR OWN ROOM")+'</a>';
    }
    $("stagewrap").style.display="";
    geom=drawRoom(ROOM.k);
    fitStage();
    renderItems();
    if(mine){ document.body.classList.add("edit"); renderDrawer(); loadCollection(); }
    $("stage").onclick=stageClick;
  }

  /* ---------- onboarding: nickname + pick 1 of 3 randomized starter rooms ---------- */
  function miniRoomSVG(K){
    var s='<svg viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg">';
    s+='<polygon points="60,6 12,30 12,54 60,30" fill="'+K.wall+'"/>';
    s+='<polygon points="60,6 108,30 108,54 60,30" fill="'+K.wall2+'"/>';
    for(var y=0;y<3;y++)for(var x=0;x<3;x++){
      var cx=60+(x-y)*16, cy=30+(x+y)*8;
      s+='<polygon points="'+cx+','+cy+' '+(cx+16)+','+(cy+8)+' '+cx+','+(cy+16)+' '+(cx-16)+','+(cy+8)+'" fill="'+(((x+y)%2===0)?K.fA:K.fB)+'" stroke="hsl('+K.hue+',80%,50%)" stroke-width=".6" stroke-opacity=".5"/>';
    }
    s+='<polygon points="30,18 44,25 44,34 30,27" fill="hsl('+K.hue+',70%,25%)" stroke="hsl('+K.hue+',95%,60%)" stroke-width="1"/>';
    return s+'</svg>';
  }

  function pickArt(env){ return PICKART[env] || miniRoomSVG(KINDS[env]||KINDS.attic); }
  function onboard(step,keep){
    var ob=$("ob"); ob.style.display="";
    if(step==='nick'){
      ob.innerHTML='<div class="bigh">CLAIM YOUR NAME_</div>'
        +'<div class="cnote">your unique id on the frequency — it names your room:<br>onlyibee.com/room/<b style="color:var(--acid)">yourname</b> · 3–16 chars · a-z 0-9 _ · permanent</div>'
        +'<div class="nick"><input id="nick" maxlength="16" placeholder="pick_your_name" autocapitalize="off" autocomplete="off" spellcheck="false">'
        +'<button class="cbtn" id="nickgo">▶ CHECK &amp; CONTINUE</button></div><div class="msg" id="nmsg"></div>';
      var inp=$("nick"); if(keep)inp.value=keep;
      inp.addEventListener("input",function(){ this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,''); });
      inp.addEventListener("keydown",function(e){ if(e.key==="Enter")$("nickgo").click(); });
      $("nickgo").onclick=async function(){
        var nm=(inp.value||'').trim();
        if(!/^[a-z0-9_]{3,16}$/.test(nm)){$("nmsg").textContent='3–16 characters, a-z 0-9 _ only_';return;}
        $("nickgo").disabled=true; $("nmsg").textContent='checking…';
        var q=await sb.from('profiles').select('username').eq('username',nm).limit(1);
        if(q.error){$("nmsg").textContent='✕ backend not ready — run member/room.sql in Supabase_';$("nickgo").disabled=false;return;}
        if(q.data&&q.data.length){$("nmsg").textContent='✕ "'+nm+'" is taken — try another_';$("nickgo").disabled=false;return;}
        onboard('pick',nm);
      };
    }
    if(step==='pick'){
      var nm=keep;
      /* the three rooms — AQUA BASS · TERRARIUM · MIDNIGHT TRANSIT (fixed choice, 2026-07-13) */
      var offer=PICKS.slice();
      ob.innerHTML='<div class="bigh">PICK YOUR ROOM_</div>'
        +'<div class="cnote">hey <b style="color:var(--acid)">'+e2(nm)+'</b> — pick your room wisely. '
        +'it will grow with you and the art. it lives on your profile — you\'ll come back to check on it_</div>'
        +'<div class="picks">'+offer.map(function(k,ki){var K=KINDS[k],art=pickArt(k);
          return '<button class="pick" data-k="'+k+'" style="border-color:hsla('+K.hue+',60%,45%,.6);'
            +'--pglow:hsla('+K.hue+',90%,55%,.45);--pdur:'+(6.2+ki*0.9)+'s">'
            +'<div class="proom"><div class="part3"><div class="f">'+art+'</div><div class="b">'+art+'</div></div></div>'
            +'<div class="pn" style="color:hsl('+K.hue+',95%,70%)">'+e2(K.n)+'</div>'
            +'<div class="pd">'+e2(K.d)+'</div>'
            +'<div class="pt">▶ MOVE IN</div></button>';}).join('')
        +'</div><div class="msg" id="pmsg"></div>'
        +'<div class="cnote"><a href="#" id="backnick" style="color:var(--dim)">← change my name</a></div>';
      $("backnick").onclick=function(e){e.preventDefault();onboard('nick',nm);};
      Array.prototype.forEach.call(ob.querySelectorAll('.pick'),function(b){
        b.onclick=async function(){
          Array.prototype.forEach.call(ob.querySelectorAll('.pick'),function(x){x.disabled=true;});
          $("pmsg").textContent='opening the door…';
          var kind=b.getAttribute('data-k');
          var r=await rpc('claim_profile',{name:nm,room0:starterRoom(kind)});
          if(r&&r.status==='ok'){ toast("WELCOME HOME_"); ob.style.display="none";
            showRoom({username:r.username,room:starterRoom(kind),since:new Date().toISOString()},true); }
          else if(r&&r.status==='taken'){ onboard('nick',nm); $("nmsg")&&($("nmsg").textContent='✕ that name just got taken_'); }
          else if(r&&r.status==='have'){ location.href='./'; }
          else { $("pmsg").textContent='✕ could not move in ('+((r&&(r.error||r.status))||'offline')+')';
            Array.prototype.forEach.call(ob.querySelectorAll('.pick'),function(x){x.disabled=false;}); }
        };
      });
    }
  }

  /* logged-out: a real login / 2-second join box (the profile IS the room, so this is
     the profile's login too). On success → boot() re-runs into onboarding or the room. */
  function showJoin(){
    if(!sb){ $("loginbox").innerHTML='<div class="login"><div class="msg">✕ backend offline — refresh in a moment_</div></div>'; return; }
    $("loginbox").innerHTML='<div class="login crtin"><div class="h">// YOUR PROFILE + YOUR ROOM_</div>'
      +'<p><b style="color:var(--ink)">Every member gets a room.</b> Pick a name, choose your door, place your collection, share it at onlyibee.com/room/<b style="color:var(--acid)">you</b>. Joining takes 2 seconds — just an email and a password.</p>'
      +'<input id="lem" type="email" placeholder="your email" inputmode="email" autocomplete="email">'
      +'<input id="lpw" type="password" placeholder="pick a password (6+ characters)" autocomplete="current-password">'
      +'<button id="lreg">＋ CREATE MY ACCOUNT — FREE, 2 SEC</button>'
      +'<div class="or">— ALREADY JOINED? —</div>'
      +'<button id="llog" class="ghost">▶ LOG IN</button>'
      +'<div class="msg" id="lmsg"></div>'
      +'<div class="msg" style="margin-top:8px">Got a garment pass? <a href="../member/" style="color:var(--acid)">redeem it here</a>_</div></div>';
    $("lpw").addEventListener("keydown",function(e){ if(e.key==="Enter")$("llog").click(); });
    function valid(){ var em=($("lem").value||'').trim(), pw=$("lpw").value||'';
      if(!/.+@.+\..+/.test(em)){$("lmsg").textContent='enter your email_';return null;}
      if(pw.length<6){$("lmsg").textContent='password needs 6+ characters_';return null;} return {em:em,pw:pw}; }
    $("llog").onclick=async function(){ var v=valid(); if(!v)return;
      $("llog").disabled=true;$("lreg").disabled=true;$("lmsg").textContent='…';
      var si=await sb.auth.signInWithPassword({email:v.em,password:v.pw});
      if(si.error){$("lmsg").textContent='✕ wrong email or password — new? tap CREATE MY ACCOUNT_';$("llog").disabled=false;$("lreg").disabled=false;return;}
      $("loginbox").innerHTML=''; boot(); };
    $("lreg").onclick=async function(){ var v=valid(); if(!v)return;
      $("llog").disabled=true;$("lreg").disabled=true;$("lmsg").textContent='creating your account…';
      var su=await sb.auth.signUp({email:v.em,password:v.pw});
      if(su.error){ var m=String(su.error.message||'').toLowerCase();
        if(m.indexOf('already')>=0||m.indexOf('registered')>=0){
          var si=await sb.auth.signInWithPassword({email:v.em,password:v.pw});
          if(!si.error){ $("loginbox").innerHTML=''; boot(); return; }
          $("lmsg").textContent='✕ that email is already registered — check your password_';
        } else { $("lmsg").textContent='✕ '+(su.error.message||'could not create account')+'_'; }
        $("llog").disabled=false;$("lreg").disabled=false; return; }
      if(su.data&&su.data.session){ $("loginbox").innerHTML=''; boot(); return; }
      $("lmsg").textContent='✓ account made — check your email to confirm, then LOG IN_';
      $("llog").disabled=false;$("lreg").disabled=false; };
  }

  /* ================= music: the room is a living display of the radio =================
     One 100ms loop reads the bridge (beat, level, song, slug) + the pressed groove
     (window.IBEE_BEAT — bpm) + the universe save (plays) and paints: CSS vars --mb/--mh
     (items bob, tiles glow, baseboards breathe), the wall EQ bars, the stat screen,
     the now-playing plaque, and floating hue glyphs over the floor. */
  function playsTotal(){ try{ var p=(JSON.parse(localStorage.getItem("ibee_sav")||"{}")||{}).plays||{},t=0;
    Object.keys(p).forEach(function(k){t+=(+p[k]||0);}); return t; }catch(e){ return 0; } }
  var GLYPHS=["♪","♫","✦","✧","◆"], glyN=0, tick0=Date.now();
  setInterval(function(){
    var b=0,lvl=0,h=null,r=window.IBEERADIO,nm="",slug="",on=false;
    try{ if(r&&r.playing()){ on=true; b=r.beat()||0; lvl=(r.level&&r.level())||0; h=75;
      slug=(r.slug&&r.slug())||""; var s=r.song&&r.song(); if(s){ if(s.hue!=null)h=s.hue; nm=s.n||""; } } }catch(e){}
    var st=$("stage"), root=document.documentElement;
    st.style.setProperty("--mb",b.toFixed(3));
    /* also drive the whole profile (idband, stat screens, badges) — the page follows the groove */
    root.style.setProperty("--mb",b.toFixed(3));
    /* radio silent → leave --mh unset so the walls fall back to the room kind's hue */
    if(h!=null){ st.style.setProperty("--mh",h); root.style.setProperty("--mh",h); }
    else { st.style.removeProperty("--mh"); root.style.removeProperty("--mh"); }
    $("npline").textContent=nm?("♪ "+nm):"";
    /* the wall EQ: 9 bars, per-bar phase over the beat so they dance, not jump in unison */
    var t=(Date.now()-tick0)/1000;
    Array.prototype.forEach.call(document.querySelectorAll("#roomsvg rect.eqb"),function(el,i){
      var base=+el.getAttribute("data-base");
      var v=on ? (0.18+0.82*Math.abs(Math.sin(t*2.3+i*1.65)))*(0.25+b*0.55+lvl*0.45) : 0.1;
      var hh=Math.max(3,Math.round(4+24*Math.min(1,v)));
      el.setAttribute("height",hh); el.setAttribute("y",base-hh);
    });
    /* the stat screen: who lives here + what's on air + the groove's numbers */
    var so=$("scrOwner"),ss=$("scrSong"),sm=$("scrMeta"),sl=$("scrLed");
    if(so){
      so.textContent=((OWNERNAME||"ROOM").toUpperCase()+".SYS_").slice(0,20);
      ss.textContent=on?("▶ "+(nm.length>18?nm.slice(0,17)+"…":nm).toUpperCase()):"RADIO OFF_";
      var bpm=null; try{ var bd=window.IBEE_BEAT&&window.IBEE_BEAT[slug]; if(bd&&bd.bpm)bpm=Math.round(bd.bpm); }catch(e){}
      sm.textContent=on ? ((bpm?("BPM "+bpm+" · "):"")+playsTotal().toLocaleString()+" plays_")
                        : "tap ► on the radio_";
      if(sl){ sl.setAttribute("fill",on?"hsl(var(--mh,75),95%,60%)":"#3a3a3a");
        sl.setAttribute("opacity",on?(0.35+b*0.65).toFixed(2):"1"); }
    }
    /* floating glyphs drift up from the floor while the record spins */
    if(on&&glyN<7&&Math.random()<0.13){
      var gx=Math.random()*GX, gy=Math.random()*GY;
      var d=document.createElement("div"); d.className="gly";
      d.textContent=GLYPHS[(Math.random()*GLYPHS.length)|0];
      d.style.left=px(gx,gy)+"px"; d.style.top=(py(gx,gy)+TH/2)+"px";
      $("itemlayer").appendChild(d); glyN++;
      setTimeout(function(){ d.remove(); glyN--; },3500);
    }
  },100);

  /* ================= boot ================= */
  async function boot(){
    /* ?demo=<kind>[&edit=1] — preview any starter room with no account (also the dev harness) */
    var demo=param("demo");
    if(demo==="pick"){ onboard('pick','demo'); return; }
    if(demo){ var dk=KINDS[demo]?demo:"vhs";
      showRoom({username:"demo",room:starterRoom(dk),since:new Date().toISOString()},!!param("edit"));
      return; }
    if(!sb){ showJoin(); return; }
    ME=(await sb.auth.getSession()).data.session;
    if(visiting){
      var prof=await rpc('get_room',{name:visiting});
      if(prof&&prof.username){
        /* visiting your own link → still read-only, with a MY ROOM button */
        var mineToo=false;
        if(ME){ MYPROF=await rpc('my_profile'); mineToo=!!(MYPROF&&MYPROF.username===prof.username); }
        showRoom(prof,false);
        return;
      }
      $("titlebar").style.display="";
      $("roomname").textContent="ROOM NOT FOUND_";
      $("roomsub").textContent='nobody lives at "'+visiting+'" — the hallway is empty.';
      $("tbtns").innerHTML='<a class="tb" href="./">✦ GET YOUR OWN ROOM</a>';
      return;
    }
    if(!ME){ showJoin(); return; }
    MYPROF=await rpc('my_profile');
    if(MYPROF&&MYPROF.username){ showRoom(MYPROF,true); }
    else onboard('nick');
  }
  boot();
  if(sb) sb.auth.onAuthStateChange(function(ev){ if(ev==='SIGNED_OUT') location.reload(); });

  /* warn before leaving with unsaved furniture */
  window.addEventListener("beforeunload",function(e){ if(DIRTY){e.preventDefault();e.returnValue="";} });
})();
</script>
