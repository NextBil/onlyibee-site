<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<title>MIMI GUITAR RUSH — ONLYIBEE ROOMS</title>
<style>
  :root{--cyan:#64f0ff;--mag:#ff2975;--pur:#8c1eff;--yel:#ffd319;--red:#ff2a3a;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:#07030f;color:#fff;font-family:'Courier New',ui-monospace,monospace;display:flex;align-items:center;justify-content:center;min-height:100%;overflow:hidden;touch-action:none;letter-spacing:1px;}
  #wrap{position:relative;width:900px;max-width:96vw;}
  /* keep the 900:560 aspect at every width so the canvas (and Mimi) never squish on phones */
  .stage{position:relative;width:900px;max-width:96vw;aspect-ratio:900/560;border-radius:8px;overflow:hidden;background:#07030f;box-shadow:0 0 0 3px #180b2e,0 0 0 6px var(--mag),0 0 34px var(--mag),0 0 70px rgba(140,30,255,.5),inset 0 0 60px rgba(0,0,0,.7);}
  canvas{display:block;width:100%;height:100%;}
  .stage::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:6;background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px,rgba(0,0,0,.16) 2px 4px);mix-blend-mode:multiply;}
  .stage::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:6;background:radial-gradient(130% 100% at 50% 44%,transparent 56%,rgba(0,0,0,.62) 100%);}
  .hud{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5;}
  .lbl{font-size:10px;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 6px var(--cyan);}
  .score{font-size:32px;font-weight:900;text-shadow:0 0 10px var(--yel),0 0 2px #fff;line-height:.95;}
  .rgt{text-align:right;}
  .combo{font-size:15px;font-weight:900;color:var(--mag);text-shadow:0 0 8px var(--mag);min-height:18px;}
  .lives{font-size:19px;margin-top:2px;}
  .lvl{font-size:11px;color:var(--yel);text-shadow:0 0 8px var(--yel);margin-top:2px;}
  .stopbtn{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:7;display:none;background:#120a24;color:var(--cyan);border:2px solid var(--cyan);border-radius:5px;padding:5px 14px;font-family:inherit;font-weight:900;letter-spacing:2px;font-size:11px;cursor:pointer;text-shadow:0 0 8px var(--cyan);box-shadow:0 0 12px rgba(100,240,255,.3);}
  .stopbtn:hover{background:var(--cyan);color:#04202a;text-shadow:none;}
  .ticker{position:absolute;left:0;right:0;bottom:10px;z-index:5;text-align:center;pointer-events:none;font-size:18px;font-weight:900;text-transform:uppercase;text-shadow:0 0 10px var(--cyan),0 0 4px #fff;min-height:22px;transition:.08s;}
  .ticker .prev{opacity:.4;font-size:13px;color:var(--cyan);}
  .toast{position:absolute;left:50%;top:32%;transform:translate(-50%,-50%);font-size:26px;font-weight:900;opacity:0;pointer-events:none;z-index:5;letter-spacing:2px;}
  /* full-screen, scrollable menu — not trapped inside the short game stage on phones */
  .ov{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:safe center;background:linear-gradient(180deg,rgba(7,3,15,.9),rgba(7,3,15,.97));gap:11px;padding:26px 16px;text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .ov.hidden{display:none;}
  .logo{font-size:44px;font-weight:900;letter-spacing:2px;line-height:.9;background:linear-gradient(180deg,var(--yel),#ff901f 45%,var(--mag) 78%,var(--pur));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 18px rgba(255,41,117,.6));}
  .sub{font-size:15px;letter-spacing:6px;color:var(--cyan);text-shadow:0 0 12px var(--cyan);margin-top:-4px;}
  .tag{font-size:12px;letter-spacing:2px;color:var(--mag);text-shadow:0 0 8px var(--mag);}
  .blink{animation:blink 1s steps(2) infinite;}@keyframes blink{50%{opacity:0}}
  .grid2{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;width:100%;max-width:640px;padding:2px;}
  @media(max-width:620px){.grid2{grid-template-columns:repeat(2,minmax(0,1fr));}}
  .song{display:flex;align-items:center;gap:8px;background:#120a24;border:2px solid #281747;border-radius:5px;padding:8px 10px;cursor:pointer;transition:.1s;text-align:left;min-width:0;}
  .song:hover{border-color:var(--cyan);box-shadow:0 0 12px rgba(100,240,255,.45);transform:translateY(-1px);}
  .song .num{font-size:10px;color:var(--yel);}
  .song .nm{font-weight:900;font-size:12px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .btn{background:#120a24;color:var(--cyan);border:2px solid var(--cyan);border-radius:5px;padding:10px 18px;font-family:inherit;font-weight:900;letter-spacing:2px;font-size:13px;cursor:pointer;text-transform:uppercase;text-shadow:0 0 8px var(--cyan);box-shadow:0 0 12px rgba(100,240,255,.3);transition:.1s;}
  .btn:hover{background:var(--cyan);color:#04202a;text-shadow:none;}
  .btn.m{color:var(--mag);border-color:var(--mag);text-shadow:0 0 8px var(--mag);box-shadow:0 0 12px rgba(255,41,117,.3);}
  .btn.m:hover{background:var(--mag);color:#2a0416;}
  .small{font-size:11px;color:#9b93bd;letter-spacing:1px;}
  .big{font-size:42px;font-weight:900;color:var(--yel);text-shadow:0 0 16px var(--yel);}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .keycap{display:inline-block;border:2px solid var(--yel);color:var(--yel);border-radius:5px;padding:2px 8px;font-weight:900;box-shadow:0 0 8px rgba(255,211,25,.4);}
  /* (menu overlays are position:fixed, so #wrap must stay transform-free) */
  /* menu fits one screen: only the first tracks show, MORE unfolds the full list */
  .grid2 .song.xtra{display:none;}
  .grid2.all .song.xtra{display:flex;}
  .morebtn{grid-column:1/-1;justify-content:center;color:var(--yel);border-color:#4a3a12;}
  @media (max-height:760px){
    .ov{gap:8px;padding:12px 12px;}
    .logo{font-size:30px;}
    .sub{font-size:12px;letter-spacing:4px;margin-top:-2px;}
    .tag{font-size:10px;}
    .small{font-size:10px;}
    .btn{padding:8px 12px;font-size:11px;}
  }
  /* portrait phones: the stage is a landscape letterbox — use the empty bands.
     Top = back to the arcade · bottom = the record rack (tap a track to run it). */
  #pTop,#pSongs{display:none;}
  @media (orientation:portrait) and (max-width:760px){
    .stopbtn{display:none !important;}   /* the top band replaces it */
    #pTop{display:flex;position:fixed;top:0;left:0;right:0;z-index:20;justify-content:space-between;align-items:center;
      padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:linear-gradient(180deg,rgba(7,3,15,.94),transparent);}
    #pTop a{color:var(--cyan);text-decoration:none;border:2px solid var(--cyan);border-radius:5px;padding:7px 12px;
      font-weight:900;font-size:11px;letter-spacing:2px;text-shadow:0 0 8px var(--cyan);box-shadow:0 0 12px rgba(100,240,255,.3);}
    #pTop span{font-size:10px;letter-spacing:3px;color:var(--mag);text-shadow:0 0 8px var(--mag);}
    #pSongs{display:block;position:fixed;left:0;right:0;bottom:0;z-index:20;
      padding:8px 0 calc(10px + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(7,3,15,.94),transparent);}
    #pSongs .pl{font-size:9px;letter-spacing:3px;color:var(--yel);text-shadow:0 0 8px var(--yel);margin:0 14px 6px;}
    #pchips{display:flex;gap:6px;overflow-x:auto;padding:0 14px;scrollbar-width:none;}
    #pchips::-webkit-scrollbar{display:none;}
    .pchip{flex:none;background:#120a24;border:2px solid #281747;border-radius:5px;padding:8px 10px;
      font-weight:900;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;white-space:nowrap;}
    .pchip.now{border-color:var(--yel);color:var(--yel);text-shadow:0 0 8px var(--yel);box-shadow:0 0 10px rgba(255,211,25,.35);}
  }
</style></head>
<body><div id="wrap"><div class="stage">
  <canvas id="c" width="900" height="560"></canvas>
  <div class="hud">
    <div><div class="lbl">SCORE</div><div class="score" id="scoreN">000000</div></div>
    <div class="rgt"><div class="combo" id="comboN"></div><div class="lives" id="livesN"></div><div class="lvl" id="lvlN"></div></div>
  </div>
  <button class="stopbtn" id="stopBtn">◀ ROOMS</button>
  
  <div class="ticker" id="ticker"></div>
  <div class="toast" id="toast"></div>
  <div class="ov" id="startScreen">
    <div class="logo">MIMI</div><div class="sub">GUITAR RUSH</div>
    <div class="tag blink">▶ PICK A TRACK &amp; RUN</div>
    <button class="btn m" id="liveBtn" style="width:100%;margin:2px 0 6px">▶ JUMP IN LIVE — RUN TO THE SONG ON AIR</button>
    <div class="small"><span class="keycap">◀ ▶</span>/A D/swipe = lane · <span class="keycap">SPACE</span>/tap = jump (double!) · ★ candy = 4s invincible · scenery morphs every 30s</div>
    <div class="grid2" id="songlist"></div>
    <div class="row"><button class="btn m" id="diffBtn">SPEED: NORMAL</button><button class="btn" id="vibeBtn">VIBE: AUTO</button></div>
  </div>
  <div class="ov hidden" id="overScreen">
    <div class="sub" style="color:var(--red);text-shadow:0 0 14px var(--red)">CRASH</div>
    <div class="big" id="finalScore">0</div><div class="small" id="overMsg"></div>
    <div class="row"><button class="btn" id="retryBtn">RETRY</button><button class="btn m" id="menuBtn">◀ SONGS</button></div>
  </div>
  <div class="ov hidden" id="loadScreen"><div class="sub blink">LOADING…</div><div class="small" id="loadMsg">CUEING THE BEAT</div></div>
</div></div>
<!-- portrait bands: fill the letterbox above/below the stage (see @media orientation:portrait) -->
<div id="pTop"><a href="../">◀ ROOMS</a><span>MIMI GUITAR RUSH_</span></div>
<div id="pSongs"><div class="pl">THE RECORD RACK — TAP A TRACK TO RUN IT_</div><div id="pchips"></div></div>

 {name:'TORONTO NIGHT',sky:['#05101f','#0b2036','#123a58'], grid:'#3fe0ff', edge:'#ffd36b', obs:['#3fe0ff','#ffd36b'], low:'#ff6b6b', bg:'city',   side:'tower',   rim:['#7fdcff','#ffd36b']},
 {name:'TOKYO NEON',   sky:['#12071f','#2a0a3a','#5a1256'], grid:'#ff5bd0', edge:'#00eaff', obs:['#ff5bd0','#00eaff'], low:'#ffd36b', bg:'tokyo',  side:'sign',    rim:['#ff5bd0','#00eaff']},
 {name:'PARIS DUSK',   sky:['#241033','#5a2440','#c8586a'], grid:'#ffcf6b', edge:'#ff9ec4', obs:['#ffcf6b','#ff9ec4'], low:'#ff6b6b', bg:'paris',  side:'lamp',    rim:['#ffd98a','#ff9ec4']},
 {name:'SAHARA GOLD',  sky:['#3a1a2e','#7a3a2a','#e0894a'], grid:'#ffd36b', edge:'#ff7b4a', obs:['#ffd36b','#ff7b4a'], low:'#ff5b5b', bg:'desert', side:'obelisk', rim:['#ffe0a0','#ff7b4a']},
 {name:'CORAL DEEP',   sky:['#03121f','#063a52','#0a6a7a'], grid:'#3ff0d0', edge:'#5bd0ff', obs:['#5bd0ff','#3ff0d0'], low:'#ffd36b', bg:'ocean',  side:'coral',   rim:['#5bd0ff','#3ff0d0']},
 {name:'DEEP SPACE',   sky:['#04030d','#0a0a26','#180a34'], grid:'#8c7bff', edge:'#00eaff', obs:['#8c7bff','#00eaff'], low:'#ff4dd2', bg:'space',  side:'rock',    rim:['#8c7bff','#00eaff']}];

function seedRnd(seed){return ()=>{seed=(seed*9301+49297)%233280;return seed/233280;};}
function buildBg(t){
 if(t.bg==='city'||t.bg==='tokyo'){const rr=seedRnd(t.bg==='tokyo'?21:7);const b=[];let x=-20;while(x<W+20){const w=30+rr()*46,hh=44+rr()*118;b.push({x,w,h:hh});x+=w+7+rr()*10;}
   const sy=t.bg==='tokyo'?12:13,sx=t.bg==='tokyo'?9:10,win=[];for(const bd of b){for(let wy=HOR-bd.h+6;wy<HOR-5;wy+=sy)for(let wx=bd.x+4;wx<bd.x+bd.w-4;wx+=sx){if(((wx*3+wy)|0)%5<2)win.push([wx,wy]);}}
   if(t.bg==='tokyo'){const signs=[];const cs=['#ff5bd0','#00eaff','#ffd36b'];for(let i=0;i<4;i++)signs.push({x:80+i*205+rr()*30,y:HOR-58-rr()*46,w:8+rr()*6,h:32+rr()*40,c:cs[i%3]});return{b,win,signs};}
   return{b,win};}
 if(t.bg==='paris'){const rr=seedRnd(13);const p=[];let x=0;while(x<=W){p.push([x,HOR-6-rr()*22]);x+=24+rr()*20;}return{p};}
 if(t.bg==='desert')return{pyr:[{x:W*0.26,w:150,h:92},{x:W*0.55,w:214,h:134},{x:W*0.8,w:120,h:70}]};
 if(t.bg==='ocean'){const bub=[];for(let i=0;i<12;i++)bub.push({x:Math.random()*W,y:Math.random()*HOR,r:2+Math.random()*4});return{bub};}
 return{};}
THEMES.forEach(t=>t._bg=buildBg(t));

// live (interpolated) palette
let A=THEMES[0],B=THEMES[1],blend=0,transitioning=false,themeTimer=0;
let SKY=['#000','#000','#000'],GRID='#64f0ff',EDGE='#ff2975',LOW='#ff901f',OBS=['#ff2975','#64f0ff'];
function hx(c){c=c.replace('#','');if(c.length===3)c=c.split('').map(x=>x+x).join('');return[parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];}
function lc(a,b,t){if(t<=0)return a;if(t>=1)return b;const X=hx(a),Y=hx(b);return'rgb('+Math.round(X[0]+(Y[0]-X[0])*t)+','+Math.round(X[1]+(Y[1]-X[1])*t)+','+Math.round(X[2]+(Y[2]-X[2])*t)+')';}
function computeLive(){const be=transitioning?ease(blend):0;
  SKY[0]=lc(A.sky[0],B.sky[0],be);SKY[1]=lc(A.sky[1],B.sky[1],be);SKY[2]=lc(A.sky[2],B.sky[2],be);
  GRID=lc(A.grid,B.grid,be);EDGE=lc(A.edge,B.edge,be);LOW=lc(A.low,B.low,be);OBS[0]=lc(A.obs[0],B.obs[0],be);OBS[1]=lc(A.obs[1],B.obs[1],be);}

// ---------- state ----------
let state='menu',curSong=null,wordIdx=0,vibeIx=-1,musicSeen=false;
let introT=0;const INTRO_DUR=1.15;
let score=0,combo=0,best=0,lives=3,level=1;
let gameTime=0,pspeed=0.32,basePspeed=0.32,diffMul=1;
let laneF=1,targetLane=1,jumpY=0,jvy=0,jumping=false,jumps=2,mimiGlow=0,runPhase=0,tilt=0,invuln=0;
let obs=[],orbs=[],candies=[],parts=[],stars=[],mtn=[],hitWords=[];
let scroll=0,propScroll=0,shake=0,flash=0,obCd=0,orbCd=0,candyCd=10,powerT=0,lastT=0,rafOn=false,lastLaneSpawn=-1;
const DIFF=[['CHILL',0.27,.9],['NORMAL',0.32,1],['HARD',0.4,1.2]];let dix=1;
for(let i=0;i<70;i++)stars.push({x:Math.random()*W,y:Math.random()*HOR,r:Math.random()*1.6+.3,tw:Math.random()*6.28});
function buildMtn(base,amp,step,col){const pts=[];let x=-40,y=base;while(x<W+120){pts.push([x,y]);x+=step;y=base-Math.random()*amp;}return{pts,col,off:0};}

const songlist=el('songlist');
/* the menu fits one phone screen: first tracks only, MORE unfolds the rest */
const SONG_LIMIT=6;
var builtN=0;
function buildSongList(){var r=RAD();if(!r||!r.count){setTimeout(buildSongList,200);return;}songlist.innerHTML='';builtN=r.count;
  for(var i=0;i<r.count;i++){(function(i){var s=r.song&&r.song(i);var d=document.createElement('div');d.className='song'+(i>=SONG_LIMIT?' xtra':'');d.innerHTML='<span class="num">'+pad(i+1,2)+'</span><span class="nm">'+(s?s.n:('SONG '+(i+1)))+'</span>';d.onclick=function(){startGame(i);};songlist.appendChild(d);})(i);}
  if(r.count>SONG_LIMIT){var m=document.createElement('div');m.className='song morebtn';m.textContent='▼ MORE — ALL '+r.count+' TRACKS';
    m.onclick=function(){var all=songlist.classList.toggle('all');m.textContent=all?'▲ LESS':'▼ MORE — ALL '+r.count+' TRACKS';};songlist.appendChild(m);}}
buildSongList();
/* portrait record rack under the stage — tap a track to run it */
function buildChips(){var r=RAD();if(!r||!r.count)return;var host=el('pchips');host.innerHTML='';
  for(var i=0;i<r.count;i++){(function(i){var s=r.song&&r.song(i);var d=document.createElement('div');d.className='pchip';d.textContent=(s?s.n:('SONG '+(i+1)));d.onclick=function(){startGame(i);};host.appendChild(d);})(i);}}
buildChips();
setInterval(function(){var r=RAD();if(!r||!r.count)return;
  if(r.count!==builtN)buildSongList();                         /* extra records landed */
  var ch=el('pchips').children;
  if(ch.length!==r.count){buildChips();ch=el('pchips').children;} /* radio was late or grew */
  var ci=(r.current&&r.current());
  for(var i=0;i<ch.length;i++)ch[i].classList.toggle('now',i===ci);
},900);
/* JUMP IN LIVE — start on the song already on air, at its current time (no restart) */
el('liveBtn').onclick=()=>startGame();
(function updLive(){var r=RAD();var s=r&&r.song&&r.song();var on=r&&r.playing&&r.playing();var b=el('liveBtn');
  if(b)b.textContent = s ? ((on?'▶ JUMP IN LIVE — ':'▶ START ON — ')+s.n) : '▶ JUMP IN LIVE — SONG ON AIR';
  setTimeout(updLive,700);})();
el('diffBtn').onclick=()=>{dix=(dix+1)%3;el('diffBtn').textContent='SPEED: '+DIFF[dix][0];};
el('vibeBtn').onclick=()=>{vibeIx=vibeIx>=THEMES.length-1?-1:vibeIx+1;el('vibeBtn').textContent='VIBE: '+(vibeIx<0?'AUTO':THEMES[vibeIx].name);};
el('stopBtn').onclick=stopToMenu;
function stopToMenu(){location.href='../';}
function refreshWords(){var r=RAD();var slug=(r&&r.slug&&r.slug())||null;if(slug!==wordSlug){wordSlug=slug;var LY=LYRALL();var lines=slug&&LY[slug];wordArr=(lines&&lines.length)?lines.join(' ').split(/\s+/).filter(Boolean).map(function(w){return w.toUpperCase();}):['MIMI','ONLY','IBEE','NA','NA','LA','LA','OOH','YEAH'];wordIdx=0;}}
/* per-word timeline from the tap-synced lyrics (website lyrics-timed) so game words track the song */
var _twc={s:null,a:null};
function timedWords(){var r=RAD();var slug=(r&&r.slug&&r.slug())||null;if(_twc.s===slug)return _twc.a;
  var T=window.IBEE_LYRICS_TIMED||(window.top&&window.top.IBEE_LYRICS_TIMED)||{};var td=slug&&T[slug];var a=null;
  if(td&&td.length){a=[];for(var i=0;i<td.length;i++){var t0=td[i].t,t1=(i+1<td.length?td[i+1].t:t0+3);var ws=String(td[i].w).split(/\s+/).filter(Boolean);for(var k=0;k<ws.length;k++)a.push({t:t0+(k/ws.length)*(t1-t0),w:ws[k].toUpperCase()});}}
  _twc={s:slug,a:a};return a;}
/* the word being sung ~look seconds ahead (so it lands on the hit line in sync) */
function pickWord(look){var r=RAD();var c=0,d=0;try{c=(r.audio.currentTime||0)+(look||0);d=r.audio.duration||0;}catch(e){}
  var a=timedWords();
  if(a&&a.length){var lo=0,hi=a.length-1,ans=0;while(lo<=hi){var m=(lo+hi)>>1;if(a[m].t<=c){ans=m;lo=m+1;}else hi=m-1;}return a[ans].w;}
  refreshWords();if(!wordArr.length)return 'MIMI';var idx=d>0?Math.floor((c/d)*wordArr.length):wordIdx++;return wordArr[Math.max(0,Math.min(wordArr.length-1,idx))]||'MIMI';}
function nextWord(){return pickWord(0.9);}
function proj(p,lw){const s=0.16+p*p*1.5;const y=HOR+(H+30-HOR)*(p*p);const x=W/2+lw*SPREAD*s;return{x,y,s};}

function startGame(ix){
  var r=RAD();if(r&&r.control&&r.control.play&&typeof ix==='number'){try{r.control.play(ix);}catch(e){}lastIx=ix;}
  else if(r&&r.control&&r.playing&&!r.playing()){try{r.control.play();}catch(e){}} /* no pick → run with the radio's current record */
  var si=(typeof ix==='number')?ix:lastIx;
  if(vibeIx>=0){A=THEMES[vibeIx];B=A;}else{A=THEMES[si%THEMES.length];B=THEMES[(si+1)%THEMES.length];}
  blend=0;transitioning=false;themeTimer=0;sinceBeat=0;prevBeat=0;musicSeen=false;
  el('startScreen').classList.add('hidden');el('overScreen').classList.add('hidden');
  resetGame();basePspeed=DIFF[dix][1];pspeed=basePspeed;diffMul=DIFF[dix][2];wordSlug=null;refreshWords();
  /* words start where the song is now (mid-song jump-ins stay in sync) */
  try{var rw=RAD();if(rw&&rw.audio&&rw.audio.duration&&wordArr.length)wordIdx=Math.floor((rw.audio.currentTime/rw.audio.duration)*wordArr.length)||0;}catch(e){}
  el('stopBtn').style.display='block';
  state='intro';introT=0;lastT=performance.now();mtn=[buildMtn(HOR+2,64,70,'rgba(140,30,255,.5)'),buildMtn(HOR+8,40,52,'rgba(255,41,117,.45)')];
  if(!rafOn){rafOn=true;requestAnimationFrame(loop);}
}
function resetGame(){score=0;combo=0;lives=3;level=1;gameTime=0;wordIdx=0;hitWords=[];laneF=1;targetLane=1;jumpY=0;jvy=0;jumping=false;jumps=2;
  obs=[];orbs=[];candies=[];parts=[];invuln=0;powerT=0;candyCd=9;obCd=.7;orbCd=.4;shake=0;flash=0;lastLaneSpawn=-1;scroll=0;propScroll=0;beatPulse=0;mimiGlow=0;el('ticker').innerHTML='';updateHUD();}

// ---------- input ----------
function dustBurst(dir){const x=mimiSX(),yy=proj(PM,0).y;const n=dir?8:11;const C=['#64f0ff','#ff2975','#ffd319','#ffffff'];
  for(let i=0;i<n;i++)parts.push({sx:x+rnd(-14,14),sy:yy+rnd(-10,10),vx:(dir?-dir*rnd(50,150):rnd(-80,80)),vy:rnd(40,150),life:rnd(.3,.55),c:C[(Math.random()*4)|0],s:(rnd(3,6)|0),g:120});}
function move(d){if(state!=='play')return;const nt=clamp(targetLane+d,0,2);if(nt!==targetLane){mimiGlow=1;dustBurst(d);}targetLane=nt;tilt=d*0.5;}
function jump(){if(state!=='play')return;if(jumps>0){jumps--;jvy=-560;mimiGlow=1;dustBurst(0);if(beatPulse>0.55){score+=25;combo++;showToast('RHYTHM!','#ffd319');ring();}}}
function ring(){const x=mimiSX();for(let i=0;i<14;i++){const a=i/14*6.28;parts.push({sx:x,sy:proj(PM,0).y-110,vx:Math.cos(a)*170,vy:Math.sin(a)*170,life:.5,c:'#ffd319',s:3,g:0});}}
function spawnCandy(){candies.push({p:1,lane:(Math.random()*3)|0,ph:Math.random()*6.28,got:false,ev:false});}
function mimiSX(){return proj(PM,laneF-1).x;}
addEventListener('keydown',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA'){e.preventDefault();move(-1);}else if(e.code==='ArrowRight'||e.code==='KeyD'){e.preventDefault();move(1);}else if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}});
let ptrX=0,ptrY=0;cv.addEventListener('pointerdown',e=>{ptrX=e.clientX;ptrY=e.clientY;});
cv.addEventListener('pointerup',e=>{const dx=e.clientX-ptrX,dy=e.clientY-ptrY;if(dy<-34&&Math.abs(dy)>Math.abs(dx))jump();else if(dx>34)move(1);else if(dx<-34)move(-1);else jump();});

function songIV(r){/* metronome interval from the song's pressed BPM (beat-data); fallback 0.46s */
  try{var B=window.IBEE_BEAT||(window.top&&window.top.IBEE_BEAT);var g=B&&r&&r.slug&&B[r.slug()];
    if(g&&g.bpm)return Math.max(0.32,Math.min(0.86,60/g.bpm));}catch(e){}return 0.46;}
var lastImpI=-1;
function impOn(r){/* rising hit from the pressed impulse layer (beat-data `imp`) — exact spawn timing */
  try{if(!r||!r.playing||!r.playing())return false;
    var B=window.IBEE_BEAT||(window.top&&window.top.IBEE_BEAT);var g=B&&B[r.slug()];
    if(!g||!g.imp)return false;
    var i=Math.max(0,Math.min(g.imp.length-1,Math.floor((r.audio.currentTime||0)*g.r)));
    if(i===lastImpI)return false;lastImpI=i;
    return parseInt(g.imp.charAt(i),36)/35>=0.55;
  }catch(e){return false;}}
function beat(dt){var r=RAD(),playing=r&&r.playing&&r.playing();var rb=playing?Math.min(1,r.beat?r.beat():0):0;
  var onR=impOn(r)||(rb>0.5&&prevBeat<=0.5);prevBeat=rb;sinceBeat+=dt;var iv=songIV(r)/diffMul;var onset=false;
  if(onR)onset=true;else if(sinceBeat>=iv)onset=true;
  if(onset){sinceBeat=0;beatPulse=1;}curEnergy=playing?rb:(onset?0.6:curEnergy*0.9);return onset;}
function spawnObstacle(){
  if(level>=2&&Math.random()<0.15){obs.push({p:1,lane:-1,bar:true,low:true,hue:LOW,ev:false});return;}
  let lane=(Math.random()*3)|0;if(lane===lastLaneSpawn&&Math.random()<0.6)lane=(lane+1)%3;lastLaneSpawn=lane;
  const low=Math.random()<0.5;obs.push({p:1,lane,low,bar:false,hue:low?LOW:OBS[(Math.random()*2)|0],ev:false});
  if(Math.random()<0.6)orbs.push({p:1.05,lane:(lane+1+((Math.random()*2)|0))%3,high:Math.random()<0.5,word:nextWord(),got:false,ev:false});}
function spawnOrb(){orbs.push({p:1,lane:(Math.random()*3)|0,high:Math.random()<0.45,word:nextWord(),got:false,ev:false});}

// ---------- loop ----------
function loop(now){const dt=Math.min(0.05,(now-lastT)/1000);lastT=now;
  computeLive();
  /* music gate: stop the radio, freeze the run */
  var _R=RAD(),_mOn=_R&&_R.playing&&_R.playing();
  if(state==='play'&&_mOn)musicSeen=true;
  var frozen=state==='play'&&musicSeen&&!_mOn;
  if(state==='intro'){ introT+=dt; if(introT>=INTRO_DUR){state='play';lastT=now;} }
  if(state==='play'&&!frozen){
    gameTime+=dt;warmup+=dt;diffMul=DIFF[dix][2]*Math.min(1.7,1+gameTime/95);pspeed=basePspeed*Math.min(1.55,1+gameTime/120);
    const nl=Math.floor(gameTime/26)+1;if(nl>level){level=nl;showToast('SPEED UP!','#ff2975');}
    // theme rotation (auto)
    if(vibeIx<0){if(!transitioning){themeTimer+=dt;if(themeTimer>=30){transitioning=true;blend=0;showToast('→ '+B.name,'#ffffff');}}
      else{blend+=dt/3;if(blend>=1){blend=0;transitioning=false;themeTimer=0;A=B;B=THEMES[(THEMES.indexOf(A)+1)%THEMES.length];}}}
    score+=pspeed*dt*40;if(powerT>0)powerT-=dt;const spd=powerT>0?pspeed*1.75:pspeed;
    candyCd-=dt;if(candyCd<=0){spawnCandy();candyCd=rnd(12,18);}
    if(powerT>0)parts.push({sx:mimiSX()+rnd(-16,16),sy:proj(PM,0).y+rnd(-6,10),vx:rnd(-30,30),vy:rnd(60,160),life:.4,c:'hsl('+((performance.now()/3)%360)+',100%,60%)',s:(rnd(3,6)|0),g:120});
    const isBeat=beat(dt);obCd-=dt;orbCd-=dt;
    if(isBeat){if(obCd<=0&&Math.random()<0.7){spawnObstacle();obCd=clamp(0.85-level*0.03,0.42,1);}else if(orbCd<=0){spawnOrb();orbCd=0.45;}}
    laneF+=(targetLane-laneF)*Math.min(1,dt*11);tilt+=(0-tilt)*Math.min(1,dt*6);
    if(jumpY<0||jvy!==0){jvy+=1500*dt;jumpY+=jvy*dt;if(jumpY>=0){jumpY=0;jvy=0;jumps=2;for(let i=0;i<7;i++)parts.push({sx:mimiSX(),sy:proj(PM,0).y-10,vx:rnd(-60,60),vy:rnd(-20,-90),life:.35,c:'#fff',s:(rnd(2,4)|0),g:260});}}
    jumping=jumpY<-3;if(invuln>0)invuln-=dt;
    scroll=(scroll-spd*dt+1)%1;propScroll=(propScroll+spd*dt)%1;
    for(const o of obs)o.p-=spd*dt;for(const o of orbs)o.p-=spd*dt;for(const o of candies)o.p-=spd*dt;
    for(const m of mtn)m.off=(m.off+spd*dt*90)%(W+240);
    const myLane=Math.round(laneF);
    for(const o of obs){if(!o.ev&&o.p<=PM){o.ev=true;
      if(powerT<=0&&(o.bar?!jumping:(o.lane===myLane&&!(o.low&&jumping)))){lives--;invuln=1.1;combo=0;shake=15;flash=1;showToast('CRASH!','#ff2a3a');
        const x=mimiSX();for(let i=0;i<22;i++){const a=Math.random()*6.28;parts.push({sx:x,sy:proj(PM,0).y-40,vx:Math.cos(a)*rnd(70,240),vy:Math.sin(a)*rnd(70,240),life:.6,c:'#ff2a3a',s:(rnd(2,4)|0),g:120});}updateHUD();if(lives<=0){gameOver();break;}}}}
    for(const o of orbs){if(!o.ev&&o.p<=PM){o.ev=true;if(o.lane===myLane&&(!o.high||jumping)){o.got=true;combo++;score+=100*(1+Math.floor(combo/8));best=Math.max(best,score|0);pushTicker(o.word);
      const pr=proj(PM,o.lane-1);for(let i=0;i<10;i++){const a=Math.random()*6.28;parts.push({sx:pr.x,sy:pr.y-40,vx:Math.cos(a)*rnd(40,150),vy:Math.sin(a)*rnd(40,150),life:.5,c:'#ffd319',s:(rnd(2,4)|0),g:0});}updateHUD();}}}
    for(const o of candies){if(!o.ev&&o.p<=PM){o.ev=true;if(o.lane===myLane){o.got=true;powerT=4;combo++;score+=200;best=Math.max(best,score|0);showToast('POWER UP!','#ffd319');
      const x=mimiSX(),yy=proj(PM,0).y-40;for(let i=0;i<20;i++){const a=Math.random()*6.28;parts.push({sx:x,sy:yy,vx:Math.cos(a)*rnd(80,230),vy:Math.sin(a)*rnd(80,230),life:.6,c:'hsl('+(i*18)+',100%,60%)',s:(rnd(3,6)|0),g:60});}updateHUD();}}}
    obs=obs.filter(o=>o.p>-0.1);orbs=orbs.filter(o=>o.p>-0.1&&!o.got);candies=candies.filter(o=>o.p>-0.1&&!o.got);
    for(const p of parts){p.vy+=(p.g||0)*dt;p.sx+=p.vx*dt;p.sy+=p.vy*dt;p.life-=dt;}parts=parts.filter(p=>p.life>0);
    if(!jumping)runPhase+=dt*(9+pspeed*22);
  }
  beatPulse=Math.max(0,beatPulse-dt*2.4);mimiGlow=Math.max(0,mimiGlow-dt*2.2);if(shake>0)shake=Math.max(0,shake-dt*42);if(flash>0)flash=Math.max(0,flash-dt*3);
  el('lvlN').textContent=state==='play'?('LVL '+level):'';
  draw();
  if(state==='intro')drawGuitarIntro(introT/INTRO_DUR);
  if(frozen){ctx.save();ctx.fillStyle='rgba(4,3,14,.62)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
    ctx.fillStyle='#64f0ff';ctx.font='900 30px "Courier New",monospace';ctx.shadowColor='#64f0ff';ctx.shadowBlur=12;ctx.fillText('❚❚ MUSIC STOPPED',W/2,H/2-4);
    ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='16px "Courier New",monospace';ctx.fillText('play the radio to keep running',W/2,H/2+26);ctx.restore();}
  requestAnimationFrame(loop);}

/* ---------- guitar zoom intro: a neon guitar rushes in and its fretboard becomes the road ---------- */
function drawGuitarIntro(p){
  p=Math.max(0,Math.min(1,p));
  var e=Math.min(1,p/0.72), ez=1-Math.pow(1-e,3);   // zoom-in easeOut
  var scale=0.16+ez*1.25;
  var alpha=p<0.72?1:Math.max(0,1-(p-0.72)/0.28);    // dissolve into the road at the end
  ctx.setTransform(1,0,0,1,0,0);
  // darken the scene behind the guitar (fades as it dissolves)
  ctx.fillStyle='rgba(5,2,14,'+(0.72*alpha).toFixed(3)+')';ctx.fillRect(0,0,W,H);
  var cx=W/2, cy=HOR+(H-HOR)*0.46;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(cx,cy);ctx.scale(scale,scale);
  ctx.shadowColor='#ff2975';ctx.shadowBlur=40;
  // ---- neck / fretboard (points up toward the horizon = the road) ----
  var nw=60,nlen=300;
  ctx.fillStyle='#160f06';ctx.fillRect(-nw/2,-nlen,nw,nlen);
  ctx.strokeStyle='#c9a24a';ctx.lineWidth=2.4;                 // frets
  for(var f=1;f<=9;f++){var fy=-nlen*(f/10);ctx.beginPath();ctx.moveTo(-nw/2,fy);ctx.lineTo(nw/2,fy);ctx.stroke();}
  ctx.strokeStyle='rgba(235,235,245,.85)';ctx.lineWidth=1.4;   // strings
  for(var st=0;st<6;st++){var sx=-nw/2+nw*((st+0.5)/6);ctx.beginPath();ctx.moveTo(sx,-nlen);ctx.lineTo(sx,64);ctx.stroke();}
  // headstock
  ctx.shadowBlur=0;ctx.fillStyle='#241608';
  ctx.beginPath();ctx.moveTo(-nw/2,-nlen);ctx.lineTo(nw/2,-nlen);ctx.lineTo(nw/2+10,-nlen-46);ctx.lineTo(-nw/2-10,-nlen-46);ctx.closePath();ctx.fill();
  ctx.fillStyle='#cfcfcf';for(var pg=0;pg<3;pg++){ctx.beginPath();ctx.arc(-nw/2-2,-nlen-12-pg*13,3.4,0,6.28);ctx.fill();ctx.beginPath();ctx.arc(nw/2+2,-nlen-12-pg*13,3.4,0,6.28);ctx.fill();}
  // ---- body ----
  ctx.shadowColor='#8c1eff';ctx.shadowBlur=36;
  ctx.fillStyle='#8c1eff';ctx.beginPath();ctx.ellipse(0,96,92,80,0,0,6.28);ctx.fill();
  ctx.fillStyle='#ff2975';ctx.beginPath();ctx.ellipse(0,40,64,54,0,0,6.28);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#120a24';ctx.beginPath();ctx.ellipse(0,74,34,44,0,0,6.28);ctx.fill();      // pickguard
  ctx.fillStyle='#ffd319';ctx.fillRect(-26,58,52,7);ctx.fillRect(-26,86,52,7);              // pickups
  ctx.fillStyle='#0a0512';ctx.fillRect(-30,108,60,10);                                       // bridge
  ctx.restore();
  // title flash
  ctx.globalAlpha=alpha;ctx.textAlign='center';ctx.fillStyle='#ffd319';
  ctx.font='900 '+(20+ez*8|0)+'px "Courier New",monospace';ctx.shadowColor='#ffd319';ctx.shadowBlur=14;
  ctx.fillText('MIMI GUITAR RUSH',W/2,44);ctx.shadowBlur=0;ctx.globalAlpha=1;
}

// ---------- draw ----------
function draw(){ctx.setTransform(1,0,0,1,0,0);ctx.fillStyle='#070311';ctx.fillRect(0,0,W,H);
  ctx.save();if(shake>0)ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
  const sg=ctx.createLinearGradient(0,0,0,HOR+60);sg.addColorStop(0,SKY[0]);sg.addColorStop(.5,SKY[1]);sg.addColorStop(1,SKY[2]);ctx.fillStyle=sg;ctx.fillRect(-20,-20,W+40,HOR+80);
  const gg=ctx.createLinearGradient(0,HOR,0,H);gg.addColorStop(0,'#160a26');gg.addColorStop(1,'#070311');ctx.fillStyle=gg;ctx.fillRect(-20,HOR-2,W+40,H-HOR+22);
  for(const s of stars){const t=0.4+0.6*Math.abs(Math.sin(performance.now()/700+s.tw));ctx.globalAlpha=t;ctx.fillStyle='#cfe9ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();}
  ctx.globalAlpha=1;
  if(!transitioning){drawBg(A,1);}else if(blend<0.5){drawBg(A,1-blend*2);}else{drawBg(B,(blend-0.5)*2);}
  drawSpectrum();
  for(const m of mtn){ctx.beginPath();ctx.moveTo(-40,HOR+40);for(const p of m.pts){let x=p[0]-m.off;if(x<-120)x+=W+240;ctx.lineTo(x,p[1]);}ctx.lineTo(W+40,HOR+40);ctx.closePath();ctx.fillStyle=m.col;ctx.fill();}
  drawRoad();
  // side props removed
  const all=[...obs.map(o=>({t:'o',o})),...orbs.map(o=>({t:'r',o})),...candies.map(o=>({t:'c',o}))].sort((a,b)=>a.o.p-b.o.p);
  const dd=it=>{it.t==='o'?drawObstacle(it.o):it.t==='r'?drawOrb(it.o):drawCandy(it.o);};
  for(const it of all){if(it.o.p<PM)dd(it);}drawMimi();for(const it of all){if(it.o.p>=PM)dd(it);}
  if(powerT>0){ctx.save();ctx.fillStyle='#ffd319';ctx.font='900 15px "Courier New",monospace';ctx.textAlign='center';ctx.shadowColor='#ff2975';ctx.shadowBlur=10;ctx.fillText('★ INVINCIBLE '+powerT.toFixed(1)+'s',W/2,70);ctx.restore();}
  for(const p of parts){ctx.globalAlpha=clamp(p.life*2.6,0,1);ctx.fillStyle=p.c;const s=(p.s|0)||3;ctx.fillRect((p.sx|0),(p.sy|0),s,s);}
  ctx.globalAlpha=1;ctx.restore();
  if(flash>0){ctx.fillStyle='rgba(255,42,58,'+(flash*0.4)+')';ctx.fillRect(0,0,W,H);}}

function drawBg(th,alpha){ctx.save();ctx.globalAlpha=alpha;
  if(th.bg==='sun')bgSun();else if(th.bg==='city')bgCity(th);else if(th.bg==='tokyo')bgTokyo(th);else if(th.bg==='paris')bgParis(th);else if(th.bg==='desert')bgDesert(th);else if(th.bg==='ocean')bgOcean(th);else bgSpace(th);
  ctx.restore();}
function bgSun(){const cx=W/2,cy=140,R=90+beatPulse*10;ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,6.28);ctx.clip();
  const g=ctx.createLinearGradient(0,cy-R,0,cy+R);g.addColorStop(0,'#ffe93a');g.addColorStop(.4,'#ff901f');g.addColorStop(.72,'#ff2975');g.addColorStop(1,'#8c1eff');ctx.fillStyle=g;ctx.fillRect(cx-R,cy-R,R*2,R*2);
  ctx.fillStyle='rgba(26,7,51,1)';for(let i=0;i<9;i++){const yy=cy+(i*i)*1.5;ctx.fillRect(cx-R,yy,R*2,Math.max(2,i*0.9));}ctx.restore();
  ctx.globalAlpha=(.5+beatPulse*.5)*ctx.globalAlpha;ctx.strokeStyle='#ff2975';ctx.lineWidth=2;ctx.shadowColor='#ff2975';ctx.shadowBlur=26;ctx.beginPath();ctx.arc(cx,cy,R,0,6.28);ctx.stroke();ctx.shadowBlur=0;}
function bgCity(th){ctx.fillStyle='rgba(232,244,255,0.85)';ctx.beginPath();ctx.arc(W*0.75,72,26,0,6.28);ctx.fill();
  ctx.fillStyle='#081222';for(const b of th._bg.b)ctx.fillRect(b.x,HOR-b.h,b.w,b.h);
  ctx.save();ctx.globalAlpha=(.34+beatPulse*.26)*ctx.globalAlpha;ctx.fillStyle=th.grid;for(const w of th._bg.win)ctx.fillRect(w[0],w[1],4,6);ctx.restore();
  const tx=W*0.46;ctx.fillStyle='#081222';ctx.fillRect(tx-4,HOR-150,8,150);ctx.fillStyle=th.edge;ctx.shadowColor=th.edge;ctx.shadowBlur=10;ctx.beginPath();ctx.ellipse(tx,HOR-116,13,6,0,0,6.28);ctx.fill();ctx.fillRect(tx-1.5,HOR-172,3,22);ctx.shadowBlur=0;}
function bgTokyo(th){ctx.fillStyle='#0a0518';for(const b of th._bg.b)ctx.fillRect(b.x,HOR-b.h,b.w,b.h);
  ctx.save();ctx.globalAlpha=(.34+beatPulse*.28)*ctx.globalAlpha;ctx.fillStyle=th.grid;for(const w of th._bg.win)ctx.fillRect(w[0],w[1],4,5);ctx.restore();
  for(const s of th._bg.signs){ctx.save();ctx.globalAlpha=(.85)*ctx.globalAlpha;ctx.fillStyle=s.c;ctx.shadowColor=s.c;ctx.shadowBlur=12;ctx.fillRect(s.x,s.y,s.w,s.h);ctx.restore();}}
function bgParis(th){const gg=ctx.createLinearGradient(0,HOR-120,0,HOR);gg.addColorStop(0,'rgba(255,180,120,0)');gg.addColorStop(1,'rgba(255,150,120,.22)');ctx.fillStyle=gg;ctx.fillRect(0,HOR-120,W,120);
  ctx.fillStyle='#20101c';ctx.beginPath();ctx.moveTo(0,HOR);for(const p of th._bg.p)ctx.lineTo(p[0],p[1]);ctx.lineTo(W,HOR);ctx.closePath();ctx.fill();
  const ex=W*0.5,eb=HOR,eh=140;ctx.strokeStyle=th.edge;ctx.lineWidth=2;ctx.shadowColor=th.edge;ctx.shadowBlur=8;ctx.beginPath();
  ctx.moveTo(ex-24,eb);ctx.lineTo(ex-6,eb-eh);ctx.lineTo(ex+6,eb-eh);ctx.lineTo(ex+24,eb);ctx.moveTo(ex-6,eb-eh);ctx.lineTo(ex,eb-eh-15);ctx.lineTo(ex+6,eb-eh);
  ctx.moveTo(ex-19,eb-eh*0.28);ctx.lineTo(ex+19,eb-eh*0.28);ctx.moveTo(ex-12,eb-eh*0.6);ctx.lineTo(ex+12,eb-eh*0.6);ctx.stroke();ctx.shadowBlur=0;}
function bgDesert(th){ctx.fillStyle='#ffdca0';ctx.save();ctx.globalAlpha=.9*ctx.globalAlpha;ctx.beginPath();ctx.arc(W*0.5,98,40,0,6.28);ctx.fill();ctx.restore();
  for(const p of th._bg.pyr){ctx.fillStyle='#3a2018';ctx.beginPath();ctx.moveTo(p.x,HOR);ctx.lineTo(p.x+p.w/2,HOR-p.h);ctx.lineTo(p.x+p.w,HOR);ctx.closePath();ctx.fill();
    ctx.save();ctx.globalAlpha=.6*ctx.globalAlpha;ctx.strokeStyle=th.edge;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(p.x+p.w/2,HOR-p.h);ctx.lineTo(p.x+p.w/2,HOR);ctx.stroke();ctx.restore();}}
function bgOcean(th){ctx.save();ctx.globalAlpha=.12*ctx.globalAlpha;ctx.fillStyle=th.grid;for(let i=0;i<4;i++){const x=100+i*220;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+36,0);ctx.lineTo(x+120,HOR);ctx.lineTo(x+64,HOR);ctx.closePath();ctx.fill();}ctx.restore();
  for(const cx of [W*0.2,W*0.5,W*0.78]){ctx.strokeStyle='#0a2a30';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(cx,HOR);ctx.lineTo(cx,HOR-30);ctx.moveTo(cx,HOR-16);ctx.lineTo(cx-13,HOR-34);ctx.moveTo(cx,HOR-20);ctx.lineTo(cx+13,HOR-40);ctx.stroke();}
  const t=performance.now();ctx.save();ctx.globalAlpha=.4*ctx.globalAlpha;ctx.strokeStyle=th.grid;ctx.lineWidth=1;for(const b of th._bg.bub){const yy=((b.y-(t*0.01*b.r))%HOR+HOR)%HOR;ctx.beginPath();ctx.arc(b.x,yy,b.r,0,6.28);ctx.stroke();}ctx.restore();}
function bgSpace(th){let n1=ctx.createRadialGradient(W*0.3,120,10,W*0.3,120,180);n1.addColorStop(0,'rgba(140,60,255,.22)');n1.addColorStop(1,'transparent');ctx.fillStyle=n1;ctx.fillRect(0,0,W,HOR+40);
  let n2=ctx.createRadialGradient(W*0.68,60,10,W*0.68,60,150);n2.addColorStop(0,'rgba(0,180,255,.18)');n2.addColorStop(1,'transparent');ctx.fillStyle=n2;ctx.fillRect(0,0,W,HOR+40);
  const px=W*0.77,py=86,R=48;let pg=ctx.createRadialGradient(px-14,py-14,6,px,py,R);pg.addColorStop(0,'#ff8ad0');pg.addColorStop(.6,'#8c1eff');pg.addColorStop(1,'#2a0748');ctx.fillStyle=pg;ctx.beginPath();ctx.arc(px,py,R,0,6.28);ctx.fill();
  ctx.strokeStyle='rgba(0,234,255,.6)';ctx.lineWidth=3;ctx.save();ctx.translate(px,py);ctx.rotate(-0.4);ctx.scale(1,0.3);ctx.beginPath();ctx.arc(0,0,R+16,0,6.28);ctx.stroke();ctx.restore();}

function drawSpectrum(){const n=54,bw=W/n;let v=[];
  if(analyserWorks&&freqData){analyser.getByteFrequencyData(freqData);for(let i=0;i<n;i++)v.push(freqData[Math.floor(i/n*freqData.length*0.7)]/255);}
  else{for(let i=0;i<n;i++)v.push(Math.abs(Math.sin(i*0.5+performance.now()/240))*0.5*(0.4+beatPulse));}
  const g=ctx.createLinearGradient(0,HOR-100,0,HOR+30);g.addColorStop(0,GRID);g.addColorStop(1,'rgba(140,30,255,0)');
  ctx.save();ctx.globalAlpha=.42;ctx.fillStyle=g;for(let i=0;i<n;i++){const hh=v[i]*100;ctx.fillRect(i*bw+1,HOR-hh,bw-2,hh);}ctx.restore();}

function drawRoad(){const tl=proj(0.02,-1.5),tr=proj(0.02,1.5),bl=proj(1,-1.5),br=proj(1,1.5);
  ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();ctx.fillStyle='#0a0418';ctx.fill();
  ctx.strokeStyle=GRID;ctx.globalAlpha=0.5+beatPulse*0.4;ctx.lineWidth=2;ctx.shadowColor=GRID;ctx.shadowBlur=6+beatPulse*10;
  for(const wx of [-1.5,-0.5,0.5,1.5]){const a=proj(0.02,wx),b=proj(1,wx);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  const N=14;for(let k=0;k<N;k++){let p=((k+scroll)/N);const a=proj(p,-1.5),b=proj(p,1.5);ctx.globalAlpha=clamp(p*1.4,0,1)*(0.5+beatPulse*0.3);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.strokeStyle=EDGE;ctx.lineWidth=2;ctx.shadowColor=EDGE;ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(0,HOR);ctx.lineTo(W,HOR);ctx.stroke();ctx.shadowBlur=0;}

function drawProps(theme,alpha){const list=[],N=5;
  for(const side of [-1,1]){const off=side>0?0.5/N:0;for(let k=0;k<N;k++){let p=((k/N+off-propScroll)%1+1)%1;if(p<0.02)continue;list.push({p,side,k});}}
  list.sort((a,b)=>a.p-b.p);
  for(const it of list){const pr=proj(it.p,it.side*1.9);const sc=pr.s*1.05;if(sc<0.1)continue;
    const fade=clamp((1-it.p)/0.12,0,1)*clamp((it.p-0.36)/0.16,0,1);const a=alpha*fade;if(a<=0.02)continue;
    ctx.globalAlpha=a;const rim=it.side<0?theme.rim[0]:theme.rim[1];drawProp(theme.side,pr.x,pr.y,sc,it.side>0,rim,it.k);}
  ctx.globalAlpha=1;}
function drawProp(t,x,y,sc,flip,rim,k){if(t==='palm')palm(x,y,sc,flip,rim);else if(t==='tower')tower(x,y,sc,rim,k);else if(t==='sign')sign(x,y,sc,rim,k);else if(t==='lamp')lamp(x,y,sc,rim);else if(t==='obelisk')obelisk(x,y,sc,rim);else if(t==='coral')coral(x,y,sc,rim);else rock(x,y,sc,rim,k);}
function palm(x,y,sc,flip,rim){ctx.save();ctx.translate(x,y);ctx.scale(flip?-sc:sc,sc);ctx.lineCap='round';
  ctx.strokeStyle='#0d0620';ctx.lineWidth=11;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(7,-52,-6,-100);ctx.stroke();
  ctx.strokeStyle=rim;ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(7,-52,-6,-100);ctx.stroke();
  const tx=-6,ty=-100;for(let a=0;a<6;a++){const ang=(-Math.PI*0.95)+a*(Math.PI*0.95/5);ctx.strokeStyle=rim;ctx.lineWidth=3.2;ctx.beginPath();ctx.moveTo(tx,ty);ctx.quadraticCurveTo(tx+Math.cos(ang)*30,ty+Math.sin(ang)*8,tx+Math.cos(ang)*52,ty+Math.sin(ang)*30);ctx.stroke();}ctx.restore();}
function tower(x,y,sc,rim,k){ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);const w=36,h=150+(k%3)*26;
  ctx.fillStyle='#08111f';ctx.fillRect(-w/2,-h,w,h);ctx.strokeStyle=rim;ctx.lineWidth=1.4;ctx.strokeRect(-w/2,-h,w,h);
  ctx.fillStyle=rim;ctx.globalAlpha=ctx.globalAlpha*.6;for(let yy=-h+9;yy<-9;yy+=13)for(let xx=-w/2+5;xx<w/2-5;xx+=10){if(((xx+yy+k)|0)%3===0)ctx.fillRect(xx,yy,5,7);}ctx.restore();}
function sign(x,y,sc,rim,k){ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);ctx.strokeStyle='#0a0518';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-124);ctx.stroke();
  const cs=[rim,'#ffd36b','#00eaff'];for(let i=0;i<3;i++){const c=cs[(i+k)%3];ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=10;ctx.fillRect(-14,-114+i*32,28,22);}ctx.shadowBlur=0;ctx.restore();}
function lamp(x,y,sc,rim){ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);ctx.lineCap='round';
  ctx.strokeStyle='#0d0620';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-96);ctx.stroke();ctx.strokeStyle=rim;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-96);ctx.stroke();
  ctx.strokeStyle=rim;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-84);ctx.quadraticCurveTo(15,-92,21,-84);ctx.moveTo(0,-84);ctx.quadraticCurveTo(-15,-92,-21,-84);ctx.stroke();
  ctx.fillStyle=rim;ctx.shadowColor=rim;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(21,-84,3.4,0,6.28);ctx.arc(-21,-84,3.4,0,6.28);ctx.arc(0,-104,6,0,6.28);ctx.fill();ctx.shadowBlur=0;ctx.restore();}
function obelisk(x,y,sc,rim){ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);ctx.fillStyle='#2a1a12';ctx.strokeStyle=rim;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(-8,-96);ctx.lineTo(8,-96);ctx.lineTo(14,0);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(-8,-96);ctx.lineTo(0,-114);ctx.lineTo(8,-96);ctx.closePath();ctx.fillStyle=rim;ctx.globalAlpha=ctx.globalAlpha*.55;ctx.fill();ctx.restore();}
function coral(x,y,sc,rim){ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);ctx.strokeStyle=rim;ctx.lineWidth=4;ctx.lineCap='round';ctx.shadowColor=rim;ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-62);ctx.moveTo(0,-30);ctx.quadraticCurveTo(-18,-44,-22,-72);ctx.moveTo(0,-42);ctx.quadraticCurveTo(18,-54,24,-82);ctx.moveTo(0,-18);ctx.quadraticCurveTo(-12,-28,-16,-48);ctx.stroke();ctx.shadowBlur=0;ctx.restore();}
function rock(x,y,sc,rim,k){ctx.save();ctx.translate(x,y-34*sc);ctx.scale(sc,sc);ctx.rotate(k*1.3);ctx.fillStyle='#141026';ctx.strokeStyle=rim;ctx.lineWidth=2;ctx.shadowColor=rim;ctx.shadowBlur=8;
  ctx.beginPath();for(let i=0;i<8;i++){const a=i/8*6.28;const rr=34*(0.7+((i*7+k)%5)/10);ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}ctx.closePath();ctx.fill();ctx.stroke();ctx.shadowBlur=0;ctx.restore();}

function drawObstacle(o){if(o.bar){const pr=proj(o.p,0);const s=pr.s;const w=SPREAD*3*s;const h=40*s;
    ctx.save();ctx.shadowColor=o.hue;ctx.shadowBlur=9;const g0=ctx.createLinearGradient(0,pr.y-h,0,pr.y);g0.addColorStop(0,o.hue);g0.addColorStop(1,'#12071f');ctx.fillStyle=g0;
    ctx.fillRect(pr.x-w/2,pr.y-h,w,h);ctx.strokeStyle=o.hue;ctx.lineWidth=2;ctx.strokeRect(pr.x-w/2,pr.y-h,w,h);
    if(s>0.5){ctx.fillStyle='#fff';ctx.font='900 '+(13*clamp(s,.4,1.3))+'px "Courier New",monospace';ctx.textAlign='center';ctx.shadowColor=o.hue;ctx.fillText('JUMP!',pr.x,pr.y-h-6);}ctx.restore();return;}
  const pr=proj(o.p,o.lane-1);const s=pr.s;const w=64*s;const h=(o.low?42:96)*s;
  ctx.save();ctx.shadowColor=o.hue;ctx.shadowBlur=8;const g=ctx.createLinearGradient(0,pr.y-h,0,pr.y);g.addColorStop(0,o.hue);g.addColorStop(1,'#12071f');ctx.fillStyle=g;
  if(o.low){ctx.fillRect(pr.x-w/2,pr.y-h,w,h);ctx.strokeStyle=o.hue;ctx.lineWidth=2;ctx.strokeRect(pr.x-w/2,pr.y-h,w,h);}
  else{ctx.beginPath();ctx.moveTo(pr.x,pr.y-h);ctx.lineTo(pr.x+w/2,pr.y);ctx.lineTo(pr.x-w/2,pr.y);ctx.closePath();ctx.fill();ctx.strokeStyle=o.hue;ctx.lineWidth=2;ctx.stroke();}ctx.restore();}
function drawOrb(o){const pr=proj(o.p,o.lane-1);const s=pr.s;const yy=pr.y-(o.high?90:34)*s+Math.sin(performance.now()/300)*4;const r=16*s;
  ctx.save();ctx.shadowColor='#ffd319';ctx.shadowBlur=10;const g=ctx.createRadialGradient(pr.x,yy,2,pr.x,yy,r);g.addColorStop(0,'#fff7cf');g.addColorStop(.5,'#ffd319');g.addColorStop(1,'rgba(255,144,31,.2)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(pr.x,yy,r,0,6.28);ctx.fill();ctx.shadowBlur=0;
  if(s>0.5){ctx.font='900 '+(13*clamp(s,.5,1.4))+'px "Courier New",monospace';ctx.textAlign='center';ctx.fillStyle='#fff';ctx.shadowColor='#ff2975';ctx.shadowBlur=6;ctx.fillText(o.word,pr.x,yy-r-5);}ctx.restore();}
function drawCandy(o){const pr=proj(o.p,o.lane-1);const s=pr.s;const yy=pr.y-42*s+Math.sin(performance.now()/250)*4;const R=19*s;
  ctx.save();ctx.translate(pr.x,yy);ctx.rotate(performance.now()/300+o.ph);ctx.shadowColor='#ffd319';ctx.shadowBlur=16;
  ctx.beginPath();for(let i=0;i<10;i++){const ang=i*Math.PI/5;const rr=(i%2?R*0.44:R);ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);}ctx.closePath();
  const g=ctx.createLinearGradient(0,-R,0,R);g.addColorStop(0,'#ffd319');g.addColorStop(1,'#ff2a3a');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  if(s>0.5){ctx.save();ctx.font='900 '+(11*clamp(s,.5,1.3))+'px "Courier New",monospace';ctx.textAlign='center';ctx.fillStyle='#fff';ctx.shadowColor='#ff2975';ctx.shadowBlur=6;ctx.fillText('POWER',pr.x,yy-R-6);ctx.restore();}}
function drawMimi(){const pr=proj(PM,laneF-1);const baseY=proj(PM,0).y;const x=pr.x,y=baseY+jumpY;
  ctx.save();ctx.globalAlpha=0.32;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(pr.x,baseY+8,52,12,0,0,6.28);ctx.fill();ctx.restore();
  let key=state==='over'?'lose':(jumping?'jump':RUN[Math.floor(runPhase)%RUN.length]);const im=IM[key];
  if(im&&im.complete){const h=128,w=im.width*(h/im.height);ctx.save();ctx.translate(x,y-h/2);ctx.rotate(tilt*0.18);
    if(powerT>0){ctx.globalAlpha=0.4+0.22*Math.sin(performance.now()/55);ctx.shadowColor='hsl('+((performance.now()/4)%360)+',100%,60%)';ctx.shadowBlur=28;}
    else{if(invuln>0&&Math.floor(performance.now()/80)%2)ctx.globalAlpha=0.4;ctx.shadowColor=mimiGlow>0.05?'#ffd319':'#ff2975';ctx.shadowBlur=4+mimiGlow*30;}
    ctx.drawImage(im,-w/2,-h/2,w,h);ctx.restore();}}

function pushTicker(w){hitWords.push(w);if(hitWords.length>5)hitWords.shift();const t=el('ticker');const prev=hitWords.slice(0,-1).slice(-3).join(' ');t.innerHTML=(prev?'<span class="prev">'+prev+'</span> ':'')+w;t.style.transform='translateY(-4px) scale(1.14)';requestAnimationFrame(()=>{t.style.transform='none';});}
let toastT;function showToast(txt,c){const t=el('toast');t.textContent=txt;t.style.color=c;t.style.textShadow='0 0 12px '+c;t.style.transition='none';t.style.opacity='1';t.style.transform='translate(-50%,-50%) scale(1.2)';clearTimeout(toastT);requestAnimationFrame(()=>{t.style.transition='opacity .6s,transform .6s';t.style.opacity='0';t.style.transform='translate(-50%,-64%) scale(1)';});}
function updateHUD(){el('scoreN').textContent=pad(score|0,6);el('comboN').textContent=combo>1?('COMBO x'+combo):'';el('livesN').innerHTML='<span style="color:var(--red);text-shadow:0 0 8px var(--red)">'+'♥'.repeat(Math.max(0,lives))+'</span><span style="opacity:.2">'+'♥'.repeat(Math.max(0,3-lives))+'</span>';}
function gameOver(){state='over';try{localStorage.setItem("ibee_badge_evt",JSON.stringify({k:"game",g:"rush",v:score|0,t:Date.now()}));}catch(e){}el('stopBtn').style.display='none';el('finalScore').textContent=pad(score|0,6);el('overMsg').textContent=((score|0)>=best&&score>0)?'NEW HI-SCORE! ★':('HI-SCORE '+pad(best,6));setTimeout(()=>el('overScreen').classList.remove('hidden'),700);}
el('retryBtn').onclick=()=>startGame();  // no index → keep the song playing where it is
el('menuBtn').onclick=()=>{el('overScreen').classList.add('hidden');el('startScreen').classList.remove('hidden');state='menu';};
resetGame();if(!rafOn){rafOn=true;requestAnimationFrame(loop);}
/* close the shell's radio list when the game is tapped (tap is inside the frame) */
window.addEventListener("pointerdown",function(){try{if(window.top!==window.self)window.top.postMessage("ibee-frame-tap","*");}catch(e){}},true);
