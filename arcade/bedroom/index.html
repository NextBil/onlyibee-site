<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070707">
<title>THE ICS LOFI BEDROOM — ONLYIBEE ROOMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070707; --panel:#0e0e0e; --border:#2a2a2a;
    --acid:#b6ff00; --red:#ff2b2b; --dim:#7a7a7a; --ink:#e8e8e8;
    --px:'Press Start 2P',monospace; --vt:'VT323',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--vt);overflow:hidden;
    -webkit-tap-highlight-color:transparent;user-select:none}
  ::selection{background:var(--acid);color:#000}
  /* CRT illusion — same bands as every ONLYIBEE page (non-interactive, 9000+) */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.26) 0 1px,transparent 1px 3px)}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
    background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.55) 100%)}

  /* full-bleed stage — the camera crops the world, so portrait phones get a
     draggable slice of the room instead of a letterboxed postage stamp */
  #wrap{position:fixed;inset:0;background:#050505}
  #stage{position:absolute;inset:0;touch-action:none}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #bg{image-rendering:pixelated;image-rendering:crisp-edges}
  #fx{pointer-events:none}

  /* top chrome */
  .back{position:fixed;top:12px;left:12px;z-index:800;font-family:var(--px);font-size:9px;
    color:var(--dim);text-decoration:none;border:1px solid var(--border);background:rgba(0,0,0,.7);
    padding:8px 10px}
  .back:hover{color:var(--acid);border-color:var(--acid)}
  #np{position:fixed;top:12px;right:12px;z-index:800;font-family:var(--px);font-size:8px;
    color:var(--ink);border:1px solid var(--border);background:rgba(0,0,0,.7);padding:8px 10px;
    display:flex;gap:8px;align-items:center;max-width:52vw;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  #np .dot{width:7px;height:7px;flex:none;background:var(--acid)}
  #hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:800;
    color:var(--dim);font-size:17px;text-align:center;background:rgba(0,0,0,.55);
    padding:2px 12px;border:1px solid #161616;pointer-events:none;transition:opacity .8s;max-width:92vw}
  #hint.off{opacity:0}

  /* camera + scene controls */
  #ctrls{position:fixed;left:12px;bottom:14px;z-index:820;display:flex;flex-direction:column;gap:6px}
  #ctrls button{font-family:var(--px);font-size:10px;color:var(--dim);cursor:pointer;
    border:1px solid var(--border);background:rgba(0,0,0,.72);padding:9px 11px;min-width:38px}
  #ctrls button:hover{color:var(--acid);border-color:var(--acid)}
  #ctrls #scGo{font-size:7px;color:var(--acid);border-color:#334400}

  /* retro lore dialog */
  #dlg{position:fixed;left:50%;bottom:56px;transform:translateX(-50%);z-index:850;
    width:min(540px,92vw);background:rgba(5,8,2,.96);border:2px solid var(--acid);
    box-shadow:0 0 24px rgba(182,255,0,.25),inset 0 0 40px rgba(182,255,0,.05);
    padding:14px 16px 12px;display:none}
  #dlg.on{display:block}
  #dlg h3{font-family:var(--px);font-size:9px;color:var(--acid);margin-bottom:9px;letter-spacing:1px}
  #dlg .body{font-size:21px;line-height:1.25;color:#d9ffd0;min-height:44px;white-space:pre-wrap}
  #dlg .foot{margin-top:8px;font-family:var(--px);font-size:7px;color:var(--dim);text-align:right;animation:blink 1.1s steps(2) infinite}
  @keyframes blink{50%{opacity:.15}}
</style>
</head>
<body>
<div id="wrap"><div id="stage"><canvas id="bg"></canvas><canvas id="fx"></canvas></div></div>
<a class="back" href="../">◀ ROOMS</a>
<div id="np"><span class="dot" id="npdot"></span><span id="npname">RADIO OFF — TAP THE VINYL DECK</span></div>
<div id="hint">drag to look around · pinch or scroll to zoom · click things — everything keeps a secret_</div>
<div id="ctrls">
  <button id="zin" title="zoom in">+</button>
  <button id="zout" title="zoom out">-</button>
  <button id="scGo">STEP OUT ▶</button>
</div>
<div id="dlg"><h3 id="dlgT">—</h3><div class="body" id="dlgB"></div><div class="foot">CLICK TO CLOSE ▸</div></div>

<script src="../../assets/gate.js?v=3"></script>

<script>document.write('<script src="../../assets/lyrics-timed.js?cb='+Date.now()+'"><\/script>')</script>

<script>
"use strict";
/* ============================================================
   THE ICS LOFI BEDROOM — a point-and-click diorama pressed onto
   the groove. Two scenes now: the ROOM and the HALLWAY outside
   (doors, an elevator that only goes down, a studio with a red
   light). A camera pans/zooms the 320×180 world — portrait
   phones get a draggable slice, clicks zoom onto the furniture.
   When NOUVEAUX PUNK spins the room turns dark-crimson punk:
   graffiti, candles, blood moon, electric guitar + amp, mohawk.
   When 20 MIN ZA SESSION spins the room slowly fills with smoke
   and Beebee lights one up. Everything reads the site radio
   (window.IBEERADIO) — no second audio, ever.
   ============================================================ */

/* ---------- bridges (work standalone AND inside the shell frame) ---------- */
function RAD(){try{return window.IBEERADIO||(window.top&&window.top.IBEERADIO)||null}catch(e){return window.IBEERADIO||null}}
function DB(n){try{return window[n]||(window.top&&window.top[n])||null}catch(e){return window[n]||null}}

/* let the shell close its track list when we're tapped inside the frame */
document.addEventListener('pointerdown',function(){try{if(window.top!==window.self)window.top.postMessage('ibee-frame-tap','*')}catch(e){}});

/* ---------- groove reader: the needle on the pressed record ---------- */
var _impI=-1;
function groove(){
  var r=RAD(); if(!r||!r.playing||!r.playing()) return null;
  var B=DB('IBEE_BEAT'), g=B&&B[r.slug()]; var t=(r.audio&&r.audio.currentTime)||0;
  if(!g){ return {t:t,bpm:100,low:r.beat?r.beat():0,lvl:r.level?r.level():0,imp:0,i:-1,synth:true}; }
  var i=Math.max(0,Math.min(g.low.length-1,Math.floor(t*g.r)));
  return {t:t,bpm:g.bpm||100,
    low:parseInt(g.low.charAt(i),36)/35,
    lvl:parseInt(g.lvl.charAt(i),36)/35,
    imp:g.imp?parseInt(g.imp.charAt(Math.min(i,g.imp.length-1)),36)/35:0, i:i};
}
function impEdge(gv){ if(!gv||gv.i<0) return false; if(gv.i===_impI) return false; _impI=gv.i; return gv.imp>=0.55; }

/* smooth envelopes so the room breathes instead of twitching */
var LOW=0,LVL=0,BOB=0,PULSE=0,fanA=0,T=0;
/* album moods ease in/out — PUNK re-dresses the room, SMOKE fills it slowly */
var PUNK=0,SMOKE=0,TH='off';

/* seeded random per song — the poster & little details re-dress per record */
function seedFor(s){var h=2166136261;s=s||'';for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return function(){h^=h<<13;h^=h>>>17;h^=h<<5;return ((h>>>0)%1000)/1000;};}
function clamp(v,a,b){return v<a?a:v>b?b:v}

/* ---------- stage: 320×180 world drawn offscreen, blitted through a camera ---------- */
var W=320,H=180;
var world=document.createElement('canvas');world.width=W;world.height=H;
var bctx=world.getContext('2d');
var bg=document.getElementById('bg'),vctx=bg.getContext('2d');
var fx=document.getElementById('fx'),fctx=fx.getContext('2d');
var stage=document.getElementById('stage'),FW=0,FH=0,KS=3;
function fit(){
  var dpr=Math.min(2,devicePixelRatio||1);
  FW=Math.max(2,Math.floor(innerWidth*dpr));FH=Math.max(2,Math.floor(innerHeight*dpr));
  bg.width=FW;bg.height=FH;fx.width=FW;fx.height=FH;
  KS=Math.max(FW/W,FH/H);           // base screen-px per world-px (cover fit)
  clampT();
}
addEventListener('resize',fit);
function px(n){return Math.round(n)}

/* camera: {x,y} world center, z zoom (1 = whole cover view) */
var cam={x:W/2,y:H/2,z:1},camT={x:W/2,y:H/2,z:1};
function baseView(){var A=FW/FH,aw=W/H,cw,ch;
  if(A>aw){cw=W;ch=W/A;}else{ch=H;cw=H*A;} return {cw:cw,ch:ch};}
function camRect(c){
  var bv=baseView(),rw=bv.cw/c.z,rh=bv.ch/c.z;
  var x=clamp(c.x,rw/2,W-rw/2),y=clamp(c.y,rh/2,H-rh/2);
  return {l:x-rw/2,t:y-rh/2,w:rw,h:rh};
}
function clampT(){
  camT.z=clamp(camT.z,1,5);
  var bv=baseView(),rw=bv.cw/camT.z,rh=bv.ch/camT.z;
  camT.x=clamp(camT.x,rw/2,W-rw/2);camT.y=clamp(camT.y,rh/2,H-rh/2);
}
function focusOn(x,y,z){camT.x=x;camT.y=y;camT.z=z||2.6;clampT();}
function unfocus(){camT.x=W/2;camT.y=H/2;camT.z=1;clampT();}
fit();

/* ---------- input: click / drag-pan / pinch / wheel ---------- */
var pts={},pcount=0,panLast=null,pinch=null,moved=0,hover=null;
function toLow(e){
  var rct=stage.getBoundingClientRect(),CR=camRect(cam);
  return {x:CR.l+(e.clientX-rct.left)/rct.width*CR.w,
          y:CR.t+(e.clientY-rct.top)/rct.height*CR.h};
}
function hotList(){return SCENE==='room'?HOT_ROOM:HOT_HALL}
function hotAt(p){
  var L=hotList();
  for(var i=L.length-1;i>=0;i--){var h=L[i];
    if(h.when&&!h.when())continue;
    if(p.x>=h.x&&p.x<=h.x+h.w&&p.y>=h.y&&p.y<=h.y+h.h)return h;}
  return null;
}
stage.addEventListener('pointerdown',function(e){
  pts[e.pointerId]={x:e.clientX,y:e.clientY};pcount++;
  if(pcount===1){panLast={x:e.clientX,y:e.clientY};moved=0;}
  else if(pcount===2){var k=Object.keys(pts);
    pinch={d:Math.hypot(pts[k[0]].x-pts[k[1]].x,pts[k[0]].y-pts[k[1]].y)||1,z:camT.z};panLast=null;}
});
stage.addEventListener('pointermove',function(e){
  if(pts[e.pointerId]){pts[e.pointerId].x=e.clientX;pts[e.pointerId].y=e.clientY;}
  if(pcount>=2&&pinch){var k=Object.keys(pts);
    if(k.length>=2){var d=Math.hypot(pts[k[0]].x-pts[k[1]].x,pts[k[0]].y-pts[k[1]].y)||1;
      camT.z=clamp(pinch.z*d/pinch.d,1,5);clampT();moved=99;}
    return;}
  if(panLast&&pts[e.pointerId]){
    var dx=e.clientX-panLast.x,dy=e.clientY-panLast.y;
    moved+=Math.abs(dx)+Math.abs(dy);panLast={x:e.clientX,y:e.clientY};
    if(moved>7){var rct=stage.getBoundingClientRect(),CR=camRect(cam);
      camT.x-=dx/rct.width*CR.w;camT.y-=dy/rct.height*CR.h;clampT();
      cam.x=camT.x;cam.y=camT.y;}
    return;}
  var p=toLow(e);hover=hotAt(p);
  stage.style.cursor=hover?'pointer':'default';
});
function endPtr(e){
  if(!pts[e.pointerId])return;
  delete pts[e.pointerId];pcount=Math.max(0,pcount-1);
  if(pcount<2)pinch=null;
  if(pcount===0){
    if(moved<=7){var p=toLow(e),h=hotAt(p);
      if(h)doClick(h.id);
      else if(camT.z>1.05)unfocus();          // click empty space = zoom back out
    }
    panLast=null;
  }
}
stage.addEventListener('pointerup',endPtr);
stage.addEventListener('pointercancel',endPtr);
stage.addEventListener('wheel',function(e){
  e.preventDefault();
  var p=toLow(e),nz=clamp(camT.z*(e.deltaY<0?1.16:0.86),1,5);
  camT.z=nz;
  if(nz<=1.02){camT.x=W/2;camT.y=H/2;}
  else{camT.x+=(p.x-camT.x)*0.45;camT.y+=(p.y-camT.y)*0.45;}
  clampT();
},{passive:false});
document.getElementById('zin').addEventListener('click',function(){camT.z=clamp(camT.z*1.4,1,5);clampT();});
document.getElementById('zout').addEventListener('click',function(){camT.z=clamp(camT.z/1.4,1,5);if(camT.z<=1.02)unfocus();clampT();});
var scBtn=document.getElementById('scGo');
scBtn.addEventListener('click',function(){goScene(SCENE==='room'?'hall':'room');});

/* ---------- lore dialog ---------- */
var dlg=document.getElementById('dlg'),dlgT=document.getElementById('dlgT'),dlgB=document.getElementById('dlgB');
var typeTimer=null;
function openDlg(title,text){
  dlgT.textContent=title; dlgB.textContent=''; dlg.classList.add('on');
  clearInterval(typeTimer); var i=0;
  typeTimer=setInterval(function(){ i+=2; dlgB.textContent=text.slice(0,i); if(i>=text.length)clearInterval(typeTimer); },16);
}
dlg.addEventListener('pointerdown',function(e){e.stopPropagation();dlg.classList.remove('on');clearInterval(typeTimer);unfocus();});

/* ---------- scenes + transition ---------- */
var SCENE='room',pending=null,fade=0,fadeTo=0;
function goScene(s){
  if(s===SCENE||pending)return;
  pending=s;fadeTo=1;
  dlg.classList.remove('on');
}

/* ---------- state / toys ---------- */
var deepNight=false, rain=true, karaokeBig=false, hallDark=false;
var hearts=[], zparts=[], motes=[], notes=[], smoke=[], shooting=null;
for(var i=0;i<14;i++)motes.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*0.14+0.04,p:Math.random()*6.28});
var meowT=0, hallMeowT=0, bubbleTxt='', bubbleT=0;
var plantStage=clamp(parseInt(localStorage.getItem('ibee_bed_plant')||'1',10)||1,0,4);
var pizzaOpen=false, pizzaSlices=3;
var skateX=246, skateV=0;
var mirrorT=0, strumT=0, phoneT=0;
var cigNext=4, exhale=0;                 // smoking rhythm (20MZS)
var elevT=-1, knockT=-1, knockTold=false;
var hallCatHere=Math.random()<0.65;

/* ---------- hotspots (world coords; later entries sit on top) ---------- */
var HOT_ROOM=[
 {id:'door',   x:2,y:44,w:18,h:72, label:'THE DOOR — STEP OUT'},
 {id:'window', x:194,y:14,w:74,h:52, label:'WINDOW — RAIN ON/OFF'},
 {id:'crt',    x:22,y:56,w:52,h:38, label:'CRT — BIG WORDS MODE'},
 {id:'chara',  x:238,y:86,w:44,h:54, label:'BEEBEE — SAY HI'},
 {id:'poster', x:20,y:20,w:32,h:40, label:'POSTER — NEXT RECORD'},
 {id:'mirror', x:58,y:18,w:26,h:28, label:'MIRROR — LOOK CLOSER'},
 {id:'clock',  x:100,y:16,w:22,h:22, label:'THE CLOCK — TIME IT TOOK'},
 {id:'lava',   x:144,y:20,w:18,h:28, label:'LAVA LAMP — DEEP NIGHT'},
 {id:'plant',  x:129,y:24,w:15,h:24, label:'PLANT — WATER IT'},
 {id:'fan',    x:76,y:62,w:22,h:32, label:'DESK FAN — SPINS AT THE BPM'},
 {id:'cat',    x:102,y:112,w:28,h:18, label:'??? — SHE BITES (SOFTLY)'},
 {id:'pizza',  x:124,y:126,w:24,h:16, label:'PIZZA BOX — COLD SLICE'},
 {id:'book',   x:144,y:148,w:24,h:14, label:'NOTEBOOK — THE SONG\'S SOUL'},
 {id:'skate',  x:0,y:152,w:0,h:12,  label:'SKATEBOARD — PUSH IT'},   // x/w follow skateX
 {id:'guitar', x:167,y:52,w:24,h:50, label:'GUITAR — MAKE NOISE'},
 {id:'amp',    x:166,y:130,w:18,h:22, label:'THE AMP — LOUDER', when:function(){return PUNK>0.4}},
 {id:'ashtray',x:214,y:142,w:14,h:10, label:'ASHTRAY — SESSION RELIC', when:function(){return SMOKE>0.3}},
 {id:'phone',  x:271,y:99,w:14,h:10, label:'PHONE — 4 UNREAD'},
 {id:'deck',   x:184,y:94,w:28,h:22, label:'VINYL DECK — PLAY / PAUSE'}
];
var HOT_HALL=[
 {id:'elev',      x:12,y:30,w:48,h:88, label:'ELEVATOR — ONLY GOES DOWN'},
 {id:'doorBed',   x:72,y:42,w:38,h:76, label:'YOUR DOOR — GO BACK IN'},
 {id:'hposter',   x:118,y:48,w:24,h:36, label:'FLYER — TONIGHT ONLY'},
 {id:'doorStudio',x:152,y:42,w:36,h:76, label:'THE STUDIO — RED LIGHT'},
 {id:'doorMyst',  x:198,y:42,w:36,h:76, label:'??? — KNOCK'},
 {id:'hwindow',   x:244,y:26,w:58,h:40, label:'WINDOW — RAIN ON/OFF'},
 {id:'exit',      x:284,y:14,w:28,h:14, label:'EXIT — DON\'T'},
 {id:'hlamp',     x:146,y:0,w:28,h:18,  label:'HALL LIGHT — FLICKER'},
 {id:'hcat',      x:52,y:102,w:22,h:16, label:'SHE FOLLOWED YOU OUT', when:function(){return hallCatHere}}
];

function slugNow(){var r=RAD();return r&&r.slug&&r.slug()||null}
function metaNow(){var m=DB('IBEE_META');var s=slugNow();return (m&&s&&m[s])||null}
function hueNow(){var r=RAD();try{var s=r&&r.song&&r.song();return s&&s.hue!=null?s.hue:75}catch(e){return 75}}
function nameNow(){var r=RAD();try{var s=r&&r.song&&r.song();return s?s.n:null}catch(e){return null}}
/* which album is on the needle? np = NOUVEAUX PUNK, mzs = 20 MIN ZA SESSION */
function themeNow(playing){
  if(!playing)return 'off';
  var r=RAD(),s=null;try{s=r&&r.song&&r.song()}catch(e){}
  var al=(s&&(s.al||s.g))||'',f=(s&&s.f)||'';
  if(al==='np')return 'np';
  if(al==='mzs'||f.slice(0,5)==='20mzs')return 'mzs';
  return 'chill';
}

var PLANT_LORE=[
 'a seed, still thinking about it_',
 'first leaf — it heard the bass and woke up.',
 'growing toward the string lights_\nit leans a little on every chorus.',
 'almost as tall as the lava lamp now.\nthey are rivals. the plant is winning.',
 'fully grown_\nit has heard every record in this room.\nwater it anyway. rituals matter.'
];

function doClick(id){
  var r=RAD(), m=metaNow(), playing=r&&r.playing&&r.playing();
  /* ---- room ---- */
  if(id==='door'){ goScene('hall'); return; }
  if(id==='deck'){ if(!r)return; if(playing)r.control.pause(); else r.control.play(); return; }
  if(!playing&&(id==='crt'||id==='chara')){ if(r)r.control.play(); return; }
  if(id==='poster'){ if(r){r.control.next(); posterSeed=null;} return; }
  if(id==='window'||id==='hwindow'){ rain=!rain; return; }
  if(id==='lava'){ deepNight=!deepNight; return; }
  if(id==='crt'){ karaokeBig=!karaokeBig; return; }
  if(id==='fan'){ var g=groove(); focusOn(87,74,2.6);
    openDlg('DESK FAN',(g&&!g.synth)?('spinning at exactly '+g.bpm+' BPM.\nthe song\'s pressed tempo — the fan never lies.'):'no groove on the needle right now.\nthe fan spins from memory.'); return; }
  if(id==='cat'){ meowT=1; hearts.push({x:117,y:112,vy:-14,life:1,ch:'♪'}); return; }
  if(id==='chara'){
    BOB=1; for(var k=0;k<3;k++)hearts.push({x:258+(Math.random()*16-8),y:92,vy:-10-Math.random()*8,life:1,ch:'♥'});
    if(TH==='mzs')bubbleTxt='...twenty minutes_ no rush.';
    else if(TH==='np')bubbleTxt='NOUVEAUX PUNK. turn it UP_';
    else bubbleTxt=(m&&m.vibe)?m.vibe:'...vibin_';
    bubbleT=3; return;
  }
  if(id==='book'){
    var nm=nameNow()||'this record'; focusOn(156,152,2.8);
    if(m&&(m.meaning||m.context)) openDlg('NOTEBOOK — '+nm,(m.meaning||'')+(m.context?'\n\n'+m.context:''));
    else openDlg('NOTEBOOK — '+nm,'the pages are blank_\nthis one hasn\'t told its story yet.');
    return;
  }
  if(id==='clock'){
    var nm2=nameNow()||'this record'; focusOn(111,27,2.8);
    openDlg('THE CLOCK — '+nm2,(m&&m.took)?('time to create: '+m.took):'session unlogged_\nsome songs refuse to be timed.');
    return;
  }
  if(id==='mirror'){ mirrorT=1.6; focusOn(71,32,2.8);
    openDlg('THE MIRROR','you look like someone who clicks everything_\nthe mirror approves. the mirror never lies.\n(the reflection lagged by one frame. don\'t think about it.)'); return; }
  if(id==='plant'){
    if(plantStage<4){plantStage++;try{localStorage.setItem('ibee_bed_plant',plantStage)}catch(e){}}
    for(var s2=0;s2<4;s2++)hearts.push({x:136+(Math.random()*10-5),y:36,vy:-8-Math.random()*6,life:1,ch:'✧',c:'#9fe870'});
    focusOn(136,34,2.9); openDlg('THE PLANT',PLANT_LORE[plantStage]); return;
  }
  if(id==='pizza'){
    pizzaOpen=true;
    if(pizzaSlices>0){pizzaSlices--;hearts.push({x:136,y:124,vy:-12,life:1,ch:'♥'});meowT=1;}
    focusOn(136,133,2.9);

/* ---------- words for the CRT ---------- */
function crtLines(){
  var r=RAD(); if(!r||!r.playing||!r.playing())return null;
  var s=r.slug(), t=r.audio.currentTime||0, dur=r.audio.duration||0;
  var TL=DB('IBEE_LYRICS_TIMED'); var tl=TL&&TL[s];
  if(tl&&tl.length){
    var cur=-1; for(var i=0;i<tl.length;i++){if(tl[i].t<=t)cur=i;else break;}
    if(cur<0)return{prev:'',line:'',prog:0,wait:true};
    return{prev:cur>0?tl[cur-1].w:'',line:tl[cur].w,prog:Math.min(1,(t-tl[cur].t)*14/Math.max(1,tl[cur].w.length))};
  }
  var L=DB('IBEE_LYRICS'); var pl=L&&L[s];
  if(pl&&pl.length&&dur){
    var idx=Math.min(pl.length-1,Math.floor(t/dur*pl.length));
    var st=idx/pl.length*dur;
    return{prev:idx>0?pl[idx-1]:'',line:pl[idx],prog:Math.min(1,(t-st)*10/Math.max(1,pl[idx].length))};
  }
  return{prev:'',line:'~ instrumental transmission ~',prog:1};
}

/* a night window: sky, stars, moon, skyline, rain — used by both scenes */
function windowCity(now,X,Y,Wd,Hd,hue,kick,fancy){
  rect(X,Y,Wd,Hd,'#050508');
  var ix=X+3,iy=Y+3,iw=Wd-6,ih=Hd-6;

  skyG.addColorStop(0,hsl((hue+200)%360,45,8));skyG.addColorStop(1,hsl(hue,40,14));
  bctx.fillStyle=skyG;bctx.fillRect(px(ix),px(iy),px(iw),px(ih));
  var rr=seedFor('stars'+X);
  for(var st=0;st<22;st++){var sx=ix+rr()*iw,sy=iy+rr()*ih*0.62;
    bctx.fillStyle='rgba(255,255,255,'+(0.25+0.75*Math.abs(Math.sin(now*1.5+st)))+')';
    bctx.fillRect(px(sx),px(sy),1,1);}
  /* moon — blood-red when the punk record spins */
  var mh=PUNK>0.5?358:hue, mx=ix+iw*0.75, my=iy+ih*0.22, mr=Math.max(3,Hd*0.09);
  bctx.fillStyle=hsl(mh,70,mix(72,52,PUNK),0.95);bctx.beginPath();bctx.arc(mx,my,mr,0,7);bctx.fill();
  bctx.fillStyle=hsl(mh,70,60,0.10+LVL*0.15);bctx.beginPath();bctx.arc(mx,my,mr+4+LVL*3,0,7);bctx.fill();
  if(fancy){
    if(shooting){shooting.x-=2.4;shooting.y+=0.7;shooting.life-=0.03;
      bctx.strokeStyle='rgba(255,255,255,'+Math.max(0,shooting.life)+')';bctx.beginPath();
      bctx.moveTo(shooting.x,shooting.y);bctx.lineTo(shooting.x+8,shooting.y-3);bctx.stroke();
      if(shooting.life<=0||shooting.x<ix)shooting=null;}
    else if(Math.random()<0.0012)shooting={x:ix+iw-6,y:iy+4,life:1};
  }
  /* skyline — windows flicker on the hits */
  var rb=seedFor('bld'+X), base=iy+ih, bcount=Math.floor(iw/8);
  for(var bd=0;bd<bcount;bd++){var bx=ix+bd*8,bw=7,bh=8+rb()*(ih*0.32);
    bctx.fillStyle='#0a0a12';bctx.fillRect(px(bx),px(base-bh),bw,px(bh));
    for(var wy=0;wy<bh-2;wy+=3)for(var wx=1;wx<bw-1;wx+=3){
      var lit=rb()<0.4, flick=kick>0.4&&rb()<0.3;
      if(lit||flick){bctx.fillStyle=flick?hsl(hue,90,60):hsl(45,80,55,0.75);
        bctx.fillRect(px(bx+wx),px(base-bh+wy+1),1,1);}}}
  /* rain — heavier when punk */
  if(rain){var drops=Math.floor(16*(1+PUNK*0.8));
    bctx.strokeStyle='rgba(160,200,255,'+(0.32+PUNK*0.12)+')';bctx.lineWidth=1;
    for(var rn=0;rn<drops;rn++){var rx=ix+((rn*37+now*(90+PUNK*60))%iw),ry=(rn*23+now*160)%(ih*0.94);
      bctx.beginPath();bctx.moveTo(rx,iy+ry);bctx.lineTo(rx-1,iy+ry+4);bctx.stroke();}}
  bctx.strokeStyle='#241f2e';bctx.lineWidth=3;bctx.strokeRect(px(X)+1.5,px(Y)+1.5,px(Wd)-3,px(Hd)-3);
  bctx.fillStyle='#241f2e';bctx.fillRect(px(X+Wd/2)-1,px(Y),3,px(Hd));bctx.fillRect(px(X),px(Y+Hd/2)-1,px(Wd),3);
}

  rect(164,32,12,5,'#101016');
  bctx.fillStyle=hsl(358,95,52,0.3+rec*0.7);bctx.fillRect(166,33,8,3);
  bctx.fillStyle=hsl(358,95,52,rec*0.15);bctx.fillRect(158,28,24,14);
  fLabel('STUDIO',170,40,4,'#ff2b2b',0.85);
  bctx.fillStyle='#c8c8d2';bctx.fillRect(182,80,2,4);

  /* ---- the other door (it knocks back) ---- */
  var kx=0;
  if(knockT>=0&&knockT<0.45)kx=Math.sin(knockT*55)*1.5;
  if(knockT>1.35&&knockT<1.9)kx=Math.sin((knockT-1.35)*55)*1.2;  // ...it answers
  bctx.save();bctx.translate(kx,0);
  rect(198,42,36,76,'#15151b');
  bctx.strokeStyle='#0b0b10';bctx.lineWidth=2;bctx.strokeRect(198.5,42.5,35,75);bctx.lineWidth=1;
  var scr2=seedFor('scratch');
  bctx.strokeStyle='rgba(255,255,255,.07)';
  for(var sc2=0;sc2<5;sc2++){bctx.beginPath();
    var sx3=202+scr2()*26,sy3=50+scr2()*56;
    bctx.moveTo(sx3,sy3);bctx.lineTo(sx3+4+scr2()*5,sy3+5+scr2()*6);bctx.stroke();}
  fLabel('?',216,84,12,'#5a5a66',0.8+0.2*Math.sin(now*1.3));
  bctx.fillStyle='#3a3a44';bctx.fillRect(228,80,2,4);
  bctx.restore();
  if(knockT>=0&&knockT<1.3)fLabel('knock knock_',216,36,7,'#e8e8e8',1);
  if(knockT>1.35&&knockT<2.6)fLabel('...knock. knock.',216,36,7,'#ff2b2b',1);

  /* ---- window + EXIT ---- */
  windowCity(now,244,26,58,40,hue,kick,false);
  rect(286,14,26,11,'#0a1408');
  bctx.strokeStyle=hsl(140,70,40,0.9);bctx.strokeRect(286.5,14.5,25,10);
  var exf=Math.random()<0.01?0.3:1;
  fLabel('EXIT',299,22,6,hsl(140,85,55),(0.6+glow*0.4)*exf);
  bctx.fillStyle=hsl(140,85,55,0.08*exf);bctx.fillRect(280,12,38,18);

  /* ---- she followed you out ---- */
  if(hallCatHere){
    drawCat(now,54,104,kick);
    if(hallMeowT>0){hallMeowT-=0.016;fLabel('mrrp_',64,94,10);}
  }

  /* notes drifting from your door */
  for(var n2=notes.length-1;n2>=0;n2--){var np2=notes[n2];
    np2.y+=np2.vy*0.016;np2.vy*=0.98;np2.x+=Math.sin(now*2+np2.y)*0.15;np2.life-=0.008;
    if(np2.life<=0){notes.splice(n2,1);continue;}
    fLabel(np2.ch,np2.x,np2.y,8,hsl(hue,85,60),np2.life);}

  /* impulse flash bleeds through the walls */
  if(PULSE>0.02){bctx.fillStyle=hsl(hue,90,60,PULSE*0.04);bctx.fillRect(-2,0,W+4,H);}
  bctx.restore();

  /* dust */
  bctx.fillStyle='rgba(255,255,255,.08)';
  motes.forEach(function(mo){mo.y-=mo.s;mo.x+=Math.sin(now+mo.p)*0.08;
    if(mo.y<0){mo.y=H;mo.x=Math.random()*W;}
    bctx.fillRect(px(mo.x),px(mo.y),1,1);});
}

/* ---------- fx layer: crisp text mapped through the camera ---------- */
function drawFx(now,playing,hue,CR){
  fctx.clearRect(0,0,FW,FH);
  var ZS=FW/CR.w;
  function wx(x){return (x-CR.l)*ZS}
  function wy(y){return (y-CR.t)*ZS}

  /* CRT words — the monitor types the real karaoke lines (room only) */
  var cl=playing?crtLines():null;
  fctx.textBaseline='top';
  if(SCENE==='room'){
    if(cl){
      var sx=wx(25),sy=wy(59),sw=46*ZS,sh=28*ZS;
      fctx.save();fctx.beginPath();fctx.rect(sx,sy,sw,sh);fctx.clip();
      fctx.font=(5.4*ZS)+'px VT323';
      fctx.fillStyle='rgba(182,255,0,.35)';
      wrapText(cl.prev,sx+2*ZS,sy+1.5*ZS,sw-4*ZS,5.5*ZS,1);
      fctx.fillStyle='#b6ff00';fctx.shadowColor='#b6ff00';fctx.shadowBlur=4*ZS/3;
      var shown=cl.wait?'▮':cl.line.slice(0,Math.ceil(cl.line.length*cl.prog))+(cl.prog<1?'▮':'');
      wrapText(shown,sx+2*ZS,sy+9*ZS,sw-4*ZS,5.5*ZS,3);
      fctx.shadowBlur=0;fctx.restore();
    }else{
      var sx2=wx(25),sy2=wy(59);
      fctx.font=(5*ZS)+'px "Press Start 2P"';
      var bx=sx2+((Math.sin(now*0.8)*0.5+0.5)*(46*ZS-30*ZS));
      var by=sy2+((Math.sin(now*1.1)*0.5+0.5)*(28*ZS-8*ZS));
      fctx.fillStyle='rgba(182,255,0,.5)';fctx.fillText('IBEE',bx,by);
    }
  }

  /* big karaoke line (fixed to the screen, not the camera) */
  if(karaokeBig&&cl&&cl.line){
    fctx.font=(9*KS)+'px VT323';fctx.textAlign='center';
    fctx.fillStyle='rgba(0,0,0,.55)';
    var tw=fctx.measureText(cl.line).width;
    fctx.fillRect(FW/2-tw/2-8,FH-24*KS,tw+16,12*KS);
    fctx.fillStyle='#b6ff00';fctx.shadowColor='#b6ff00';fctx.shadowBlur=6;
    fctx.fillText(cl.line.slice(0,Math.ceil(cl.line.length*cl.prog)),FW/2,FH-22*KS);
    fctx.shadowBlur=0;fctx.textAlign='left';
  }

  /* speech bubble (room) */
  if(bubbleT>0&&SCENE==='room'){bubbleT-=0.016;
    fctx.font=(6*ZS)+'px VT323';fctx.textAlign='center';
    var bw=fctx.measureText(bubbleTxt).width+10;
    fctx.fillStyle='rgba(10,14,4,.92)';fctx.fillRect(wx(258)-bw/2,wy(72),bw,9*ZS);
    fctx.strokeStyle='#b6ff00';fctx.strokeRect(wx(258)-bw/2,wy(72),bw,9*ZS);
    fctx.fillStyle='#d9ffd0';fctx.fillText(bubbleTxt,wx(258),wy(74));
    fctx.textAlign='left';}

  /* hearts / sparks / bolts */
  for(var h=hearts.length-1;h>=0;h--){var hp=hearts[h];
    hp.y+=hp.vy*0.016;hp.vy*=0.97;hp.life-=0.012;
    if(hp.life<=0){hearts.splice(h,1);continue;}
    fctx.font=(6*ZS)+'px VT323';
    fctx.fillStyle=hp.c||'rgba(255,80,110,1)';fctx.globalAlpha=hp.life;
    fctx.fillText(hp.ch,wx(hp.x),wy(hp.y));fctx.globalAlpha=1;}

  /* queued world labels */
  labels.forEach(function(l){
    fctx.font=(l.s*0.65*ZS)+'px VT323';fctx.textAlign='center';
    fctx.fillStyle=l.c;fctx.globalAlpha=l.a;
    fctx.fillText(l.t,wx(l.x),wy(l.y));
    fctx.globalAlpha=1;fctx.textAlign='left';});
  labels.length=0;

  /* hover chip */
  if(hover&&(!hover.when||hover.when())){
    fctx.strokeStyle='rgba(182,255,0,.85)';fctx.lineWidth=Math.max(1,KS*0.4);
    var pad=1.5,hx=wx(hover.x-pad),hy2=wy(hover.y-pad),hw=(hover.w+pad*2)*ZS,hh=(hover.h+pad*2)*ZS,cl2=4*ZS;
    [[hx,hy2,1,1],[hx+hw,hy2,-1,1],[hx,hy2+hh,1,-1],[hx+hw,hy2+hh,-1,-1]].forEach(function(c){
      fctx.beginPath();fctx.moveTo(c[0]+c[2]*cl2,c[1]);fctx.lineTo(c[0],c[1]);fctx.lineTo(c[0],c[1]+c[3]*cl2);fctx.stroke();});
    fctx.font=(5.5*KS)+'px "Press Start 2P"';
    var lw=fctx.measureText(hover.label).width+10;
    var lx=Math.min(FW-lw-4,Math.max(4,hx));var ly=hy2>14*KS?hy2-9*KS:hy2+hh+2*KS;
    fctx.fillStyle='rgba(0,0,0,.85)';fctx.fillRect(lx,ly,lw,8*KS);
    fctx.fillStyle='#b6ff00';fctx.fillText(hover.label,lx+5,ly+2*KS);
  }

  /* scene-transition blackout */
  if(fade>0.01){fctx.fillStyle='rgba(0,0,0,'+Math.min(1,fade)+')';fctx.fillRect(0,0,FW,FH);}
}
function wrapText(txt,x,y,maxW,lh,maxLines){
  if(!txt)return;var words=txt.split(' '),line='',ln=0;
  for(var i=0;i<words.length;i++){
    var test=line?line+' '+words[i]:words[i];
    if(fctx.measureText(test).width>maxW&&line){
      fctx.fillText(line,x,y+ln*lh);ln++;line=words[i];
      if(ln>=maxLines)return;
    }else line=test;}
  if(ln<maxLines)fctx.fillText(line,x,y+ln*lh);
}

/* ---------- now-playing chip ---------- */
var npName=document.getElementById('npname'),npDot=document.getElementById('npdot');
setInterval(function(){
  var r=RAD(),nm=nameNow();
  if(r&&r.playing&&r.playing()&&nm){
    npName.textContent=(SCENE==='hall'?'THRU THE DOOR — ':'ON AIR — ')+nm;
    npDot.style.background=hsl(hueNow(),85,55);
  }
  else if(nm){npName.textContent='PAUSED — '+nm;npDot.style.background='#444';}
  else{npName.textContent='RADIO OFF — TAP THE VINYL DECK';npDot.style.background='#444';}
  scBtn.textContent=SCENE==='room'?'STEP OUT ▶':'◀ GO BACK IN';
},700);

/* ---------- main loop ---------- */
var last=performance.now(),cigClock=0;
function frame(nowMs){
  var dt=Math.min(0.05,(nowMs-last)/1000);last=nowMs;T+=dt;
  var g=groove(),r=RAD(),playing=r&&r.playing&&r.playing();
  var hue=hueNow();
  TH=themeNow(playing);
  /* album moods */
  PUNK+=((TH==='np'?1:0)-PUNK)*Math.min(1,dt*2.2);
  var sT=TH==='mzs'?1:0;
  SMOKE+=(sT-SMOKE)*Math.min(1,dt*(sT>SMOKE?0.10:0.45));   // fills slow, clears quick
  /* groove envelopes */
  if(g){LOW+=((g.low||0)-LOW)*0.25; LVL+=((g.lvl||0)-LVL)*0.2;
    if(impEdge(g)){PULSE=1;BOB=Math.max(BOB,0.9);
      if(TH==='mzs'&&SCENE==='room'&&Math.random()<0.5)
        smoke.push({x:270,y:86,r:2,vx:0.1,vy:-0.25,a:0.35,ring:true});   // smoke ring on the hit
    }}
  else{LOW*=0.94;LVL*=0.94;}
  PULSE*=0.88;BOB*=0.9;
  /* smoking exhales on a lazy clock */
  if(TH==='mzs'&&playing){cigClock+=dt;
    if(cigClock>cigNext){cigClock=0;cigNext=4+Math.random()*4;
      for(var e2=0;e2<6;e2++)smoke.push({x:268+Math.random()*6,y:84+Math.random()*4,
        r:1+Math.random(),vx:0.25+Math.random()*0.2,vy:-0.2-Math.random()*0.15,a:0.14,ring:false});}}
  /* timers */
  if(mirrorT>0)mirrorT-=dt;
  if(strumT>0)strumT=Math.max(0,strumT-dt*1.6);
  if(knockT>=0){knockT+=dt;
    if(knockT>1.35&&!knockTold){knockTold=true;
      openDlg('THE OTHER DOOR','you knocked_\nsomething knocked back. twice. politely.\nthe scratches on the wood spell a tracklist.');}
    if(knockT>3)knockT=-1;}
  if(elevT>=0){elevT+=dt;if(elevT>4.6)elevT=-1;}
  /* camera ease */
  cam.x+=(camT.x-cam.x)*Math.min(1,dt*7);
  cam.y+=(camT.y-cam.y)*Math.min(1,dt*7);
  cam.z+=(camT.z-cam.z)*Math.min(1,dt*7);
  /* scene fade */
  fade+=(fadeTo-fade)*Math.min(1,dt*7);
  if(fadeTo===1&&fade>0.92&&pending){
    SCENE=pending;pending=null;fadeTo=0;
    hearts.length=0;notes.length=0;zparts.length=0;hover=null;
    unfocus();cam.x=camT.x;cam.y=camT.y;cam.z=camT.z;
    if(SCENE==='hall')hallCatHere=Math.random()<0.65;
  }
  /* paint world → blit through camera → crisp fx on top */
  if(SCENE==='room')drawRoom(T,g,playing,hue);else drawHall(T,g,playing,hue);
  var CR=camRect(cam);
  vctx.imageSmoothingEnabled=false;
  vctx.clearRect(0,0,FW,FH);
  vctx.drawImage(world,CR.l,CR.t,CR.w,CR.h,0,0,FW,FH);
  drawFx(T,playing,hue,CR);
}
function raf(t){requestAnimationFrame(raf);frame(t);}
requestAnimationFrame(raf);
/* manual pump for hidden-pane testing + tiny debug handle */
window.loop=function(){frame(performance.now())};
window.BEDROOM={click:doClick,go:goScene,cam:camT,focus:focusOn,unfocus:unfocus};
</script>
