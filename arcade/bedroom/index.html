<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070707">
<title>THE ICS LOFI BEDROOM — ONLYIBEE ARCADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070707; --panel:#0e0e0e; --border:#2a2a2a;
    --acid:#b6ff00; --red:#ff2b2b; --dim:#7a7a7a; --ink:#e8e8e8;
    --px:'Press Start 2P',monospace; --vt:'VT323',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--vt);overflow:hidden;
    -webkit-tap-highlight-color:transparent;user-select:none}
  ::selection{background:var(--acid);color:#000}
  /* CRT illusion — same bands as every ONLYIBEE page (non-interactive, 9000+) */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.26) 0 1px,transparent 1px 3px)}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
    background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.55) 100%)}

  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050505}
  #stage{position:relative;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #bg{image-rendering:pixelated;image-rendering:crisp-edges}
  #fx{pointer-events:none}

  /* top chrome */
  .back{position:fixed;top:12px;left:12px;z-index:800;font-family:var(--px);font-size:9px;
    color:var(--dim);text-decoration:none;border:1px solid var(--border);background:rgba(0,0,0,.7);
    padding:8px 10px}
  .back:hover{color:var(--acid);border-color:var(--acid)}
  #np{position:fixed;top:12px;right:12px;z-index:800;font-family:var(--px);font-size:8px;
    color:var(--ink);border:1px solid var(--border);background:rgba(0,0,0,.7);padding:8px 10px;
    display:flex;gap:8px;align-items:center;max-width:52vw;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  #np .dot{width:7px;height:7px;flex:none;background:var(--acid)}
  #hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:800;
    color:var(--dim);font-size:17px;text-align:center;background:rgba(0,0,0,.55);
    padding:2px 12px;border:1px solid #161616;pointer-events:none;transition:opacity .8s}
  #hint.off{opacity:0}

  /* retro lore dialog */
  #dlg{position:fixed;left:50%;bottom:56px;transform:translateX(-50%);z-index:850;
    width:min(540px,92vw);background:rgba(5,8,2,.96);border:2px solid var(--acid);
    box-shadow:0 0 24px rgba(182,255,0,.25),inset 0 0 40px rgba(182,255,0,.05);
    padding:14px 16px 12px;display:none}
  #dlg.on{display:block}
  #dlg h3{font-family:var(--px);font-size:9px;color:var(--acid);margin-bottom:9px;letter-spacing:1px}
  #dlg .body{font-size:21px;line-height:1.25;color:#d9ffd0;min-height:44px;white-space:pre-wrap}
  #dlg .foot{margin-top:8px;font-family:var(--px);font-size:7px;color:var(--dim);text-align:right;animation:blink 1.1s steps(2) infinite}
  @keyframes blink{50%{opacity:.15}}
</style>
</head>
<body>
<div id="wrap"><div id="stage"><canvas id="bg"></canvas><canvas id="fx"></canvas></div></div>
<a class="back" href="../">◀ ARCADE</a>
<div id="np"><span class="dot" id="npdot"></span><span id="npname">RADIO OFF — TAP THE VINYL DECK</span></div>
<div id="hint">a room that breathes with the record_ — click things, everything keeps a secret</div>
<div id="dlg"><h3 id="dlgT">—</h3><div class="body" id="dlgB"></div><div class="foot">CLICK TO CLOSE ▸</div></div>

<script src="../../assets/player.js?v=13"></script>
<script src="../../assets/gate.js?v=1"></script>
<script>document.write('<script src="../../assets/lyrics-data.js?cb='+Date.now()+'"><\/script>')</script>
<script>document.write('<script src="../../assets/lyrics-timed.js?cb='+Date.now()+'"><\/script>')</script>
<script>document.write('<script src="../../assets/song-meta.js?cb='+Date.now()+'"><\/script>')</script>
<script>
"use strict";
/* ============================================================
   THE ICS LOFI BEDROOM — a diorama pressed onto the groove.
   The lava lamp drinks the bass (`low`), the fan spins at the
   song's true `bpm`, the character bobs on real hits (`imp`),
   the CRT types the tap-synced words, and the notebook + clock
   open the record's soul (song-meta). Everything reads the
   site radio (window.IBEERADIO) — no second audio, ever.
   ============================================================ */

/* ---------- bridges (work standalone AND inside the shell frame) ---------- */
function RAD(){try{return window.IBEERADIO||(window.top&&window.top.IBEERADIO)||null}catch(e){return window.IBEERADIO||null}}
function DB(n){try{return window[n]||(window.top&&window.top[n])||null}catch(e){return window[n]||null}}

/* let the shell close its track list when we're tapped inside the frame */
document.addEventListener('pointerdown',function(){try{if(window.top!==window.self)window.top.postMessage('ibee-frame-tap','*')}catch(e){}});

/* ---------- groove reader: the needle on the pressed record ---------- */
var _impI=-1;
function groove(){
  var r=RAD(); if(!r||!r.playing||!r.playing()) return null;
  var B=DB('IBEE_BEAT'), g=B&&B[r.slug()]; var t=(r.audio&&r.audio.currentTime)||0;
  if(!g){ return {t:t,bpm:100,low:r.beat?r.beat():0,lvl:r.level?r.level():0,imp:0,i:-1,synth:true}; }
  var i=Math.max(0,Math.min(g.low.length-1,Math.floor(t*g.r)));
  return {t:t,bpm:g.bpm||100,
    low:parseInt(g.low.charAt(i),36)/35,
    lvl:parseInt(g.lvl.charAt(i),36)/35,
    imp:g.imp?parseInt(g.imp.charAt(Math.min(i,g.imp.length-1)),36)/35:0, i:i};
}
function impEdge(gv){ if(!gv||gv.i<0) return false; if(gv.i===_impI) return false; _impI=gv.i; return gv.imp>=0.55; }

/* smooth envelopes so the room breathes instead of twitching */
var LOW=0,LVL=0,BOB=0,PULSE=0,fanA=0,T=0;

/* seeded random per song — the poster & little details re-dress per record */
function seedFor(s){var h=2166136261;s=s||'';for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return function(){h^=h<<13;h^=h>>>17;h^=h<<5;return ((h>>>0)%1000)/1000;};}

/* ---------- stage ---------- */
var W=320,H=180;
var bg=document.getElementById('bg'),bctx=bg.getContext('2d');
var fx=document.getElementById('fx'),fctx=fx.getContext('2d');
bg.width=W;bg.height=H;
var stage=document.getElementById('stage'),S=3,FW=0,FH=0;
function fit(){
  var vw=innerWidth,vh=innerHeight,sc=Math.min(vw/W,vh/H);
  var cw=Math.floor(W*sc),ch=Math.floor(H*sc);
  stage.style.width=cw+'px';stage.style.height=ch+'px';
  var dpr=Math.min(2,devicePixelRatio||1);
  fx.width=FW=Math.floor(cw*dpr);fx.height=FH=Math.floor(ch*dpr);
  S=FW/W;
}
addEventListener('resize',fit);fit();
function px(n){return Math.round(n)}

/* ---------- lore dialog ---------- */
var dlg=document.getElementById('dlg'),dlgT=document.getElementById('dlgT'),dlgB=document.getElementById('dlgB');
var typeTimer=null;
function openDlg(title,text){
  dlgT.textContent=title; dlgB.textContent=''; dlg.classList.add('on');
  clearInterval(typeTimer); var i=0;
  typeTimer=setInterval(function(){ i+=2; dlgB.textContent=text.slice(0,i); if(i>=text.length)clearInterval(typeTimer); },16);
}
dlg.addEventListener('pointerdown',function(e){e.stopPropagation();dlg.classList.remove('on');clearInterval(typeTimer);});

/* ---------- state / toys ---------- */
var deepNight=false, rain=true, karaokeBig=false;
var hearts=[], zparts=[], motes=[], shooting=null;
for(var i=0;i<14;i++)motes.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*0.14+0.04,p:Math.random()*6.28});
var meowT=0, bubbleTxt='', bubbleT=0;

/* ---------- hotspots (lowres coords) ---------- */
var HOT=[
 {id:'poster', x:22,y:22,w:28,h:36, label:'POSTER — NEXT RECORD'},
 {id:'clock',  x:100,y:16,w:22,h:22, label:'THE CLOCK — TIME IT TOOK'},
 {id:'window', x:196,y:16,w:70,h:48, label:'WINDOW — RAIN ON/OFF'},
 {id:'lava',   x:144,y:22,w:18,h:26, label:'LAVA LAMP — DEEP NIGHT'},
 {id:'crt',    x:22,y:56,w:52,h:38, label:'CRT — BIG WORDS MODE'},
 {id:'fan',    x:76,y:62,w:22,h:32, label:'DESK FAN — SPINS AT THE BPM'},
 {id:'cat',    x:104,y:116,w:26,h:16, label:'??? — SHE BITES (SOFTLY)'},
 {id:'book',   x:144,y:148,w:24,h:14, label:'NOTEBOOK — THE SONG\'S SOUL'},
 {id:'deck',   x:184,y:96,w:28,h:20, label:'VINYL DECK — PLAY / PAUSE'},
 {id:'chara',  x:238,y:88,w:44,h:52, label:'BEEBEE — SAY HI'}
];
var hover=null;

function slugNow(){var r=RAD();return r&&r.slug&&r.slug()||null}
function metaNow(){var m=DB('IBEE_META');var s=slugNow();return (m&&s&&m[s])||null}
function hueNow(){var r=RAD();try{var s=r&&r.song&&r.song();return s&&s.hue!=null?s.hue:75}catch(e){return 75}}
function nameNow(){var r=RAD();try{var s=r&&r.song&&r.song();return s?s.n:null}catch(e){return null}}

function doClick(id){
  var r=RAD(), m=metaNow(), playing=r&&r.playing&&r.playing();
  if(id==='deck'){ if(!r)return; if(playing)r.control.pause(); else r.control.play(); return; }
  if(!playing&&(id==='crt'||id==='chara')){ if(r)r.control.play(); return; }
  if(id==='poster'){ if(r){r.control.next(); posterSeed=null;} return; }
  if(id==='window'){ rain=!rain; return; }
  if(id==='lava'){ deepNight=!deepNight; return; }
  if(id==='crt'){ karaokeBig=!karaokeBig; return; }
  if(id==='fan'){ var g=groove(); openDlg('DESK FAN',(g&&!g.synth)?('spinning at exactly '+g.bpm+' BPM.\nthe song\'s pressed tempo — the fan never lies.'):'no groove on the needle right now.\nthe fan spins from memory.'); return; }
  if(id==='cat'){ meowT=1; hearts.push({x:117,y:112,vy:-14,life:1,ch:'♪'}); return; }
  if(id==='chara'){
    BOB=1; for(var k=0;k<3;k++)hearts.push({x:258+(Math.random()*16-8),y:92,vy:-10-Math.random()*8,life:1,ch:'♥'});
    bubbleTxt=(m&&m.vibe)?m.vibe:'...vibin_'; bubbleT=3; return;
  }
  if(id==='book'){
    var nm=nameNow()||'this record';
    if(m&&(m.meaning||m.context)){
      openDlg('NOTEBOOK — '+nm, (m.meaning||'')+(m.context?'\n\n'+m.context:''));
    } else openDlg('NOTEBOOK — '+nm,'the pages are blank_\nthis one hasn\'t told its story yet.');
    return;
  }
  if(id==='clock'){
    var nm2=nameNow()||'this record';
    openDlg('THE CLOCK — '+nm2, (m&&m.took)?('time to create: '+m.took):'session unlogged_\nsome songs refuse to be timed.');
    return;
  }
}

/* pointer mapping */
function toLow(e){var rct=stage.getBoundingClientRect();return{x:(e.clientX-rct.left)/rct.width*W,y:(e.clientY-rct.top)/rct.height*H};}
stage.addEventListener('pointermove',function(e){
  var p=toLow(e);hover=null;
  for(var i=HOT.length-1;i>=0;i--){var h=HOT[i];
    if(p.x>=h.x&&p.x<=h.x+h.w&&p.y>=h.y&&p.y<=h.y+h.h){hover=h;break;}}
  stage.style.cursor=hover?'pointer':'default';
});
stage.addEventListener('pointerdown',function(e){
  var p=toLow(e);
  for(var i=HOT.length-1;i>=0;i--){var h=HOT[i];
    if(p.x>=h.x&&p.x<=h.x+h.w&&p.y>=h.y&&p.y<=h.y+h.h){doClick(h.id);return;}}
});
setTimeout(function(){document.getElementById('hint').classList.add('off')},9000);

/* ---------- words for the CRT ---------- */
function crtLines(){
  var r=RAD(); if(!r||!r.playing||!r.playing())return null;
  var s=r.slug(), t=r.audio.currentTime||0, dur=r.audio.duration||0;
  var TL=DB('IBEE_LYRICS_TIMED'); var tl=TL&&TL[s];
  if(tl&&tl.length){
    var cur=-1; for(var i=0;i<tl.length;i++){if(tl[i].t<=t)cur=i;else break;}
    if(cur<0)return{prev:'',line:'',prog:0,wait:true};
    var nxt=cur+1<tl.length?tl[cur+1].t:(dur||tl[cur].t+4);
    return{prev:cur>0?tl[cur-1].w:'',line:tl[cur].w,prog:Math.min(1,(t-tl[cur].t)*14/Math.max(1,tl[cur].w.length))};
  }
  var L=DB('IBEE_LYRICS'); var pl=L&&L[s];
  if(pl&&pl.length&&dur){
    var idx=Math.min(pl.length-1,Math.floor(t/dur*pl.length));
    var st=idx/pl.length*dur;
    return{prev:idx>0?pl[idx-1]:'',line:pl[idx],prog:Math.min(1,(t-st)*10/Math.max(1,pl[idx].length))};
  }
  return{prev:'',line:'~ instrumental transmission ~',prog:1};
}

/* ============================================================
   DRAWING — 320×180 pixel room
   ============================================================ */
var posterSeed=null;
/* the real Beebee — vinyl-figure render used for the sleeping pose */
var beeImg=new Image();beeImg.__ok=false;
beeImg.onload=function(){beeImg.__ok=true};
beeImg.src='beebee-sleeping.png';
function hsl(h,s,l,a){return 'hsla('+h+','+s+'%,'+l+'%,'+(a==null?1:a)+')'}
function rect(x,y,w,h,c){bctx.fillStyle=c;bctx.fillRect(px(x),px(y),px(w),px(h))}

function drawRoom(now,g,playing,hue){
  var amb=deepNight?0.45:1;                    // deep-night dims the paint
  var glow=0.35+LVL*0.65;                      // song loudness feeds every light
  var kick=PULSE;                              // impulse flash

  /* walls & floor */
  var wl=deepNight?7:11;
  bctx.fillStyle=hsl(hue,14,wl+kick*3);bctx.fillRect(0,0,W,118);
  bctx.fillStyle=hsl(hue,10,wl-3);bctx.fillRect(0,0,8,118);            // corner shade
  bctx.fillStyle=hsl(28,22,deepNight?8:12);bctx.fillRect(0,118,W,H-118); // wood floor
  for(var fy=118;fy<H;fy+=8){bctx.fillStyle='rgba(0,0,0,.25)';bctx.fillRect(0,fy,W,1);}
  for(var fxx=10;fxx<W;fxx+=34){bctx.fillStyle='rgba(0,0,0,.18)';bctx.fillRect(fxx,118,1,H-118);}
  bctx.fillStyle='rgba(0,0,0,.4)';bctx.fillRect(0,116,W,2);            // skirting

  /* rug */
  bctx.fillStyle=hsl(hue,30,deepNight?12:16);
  bctx.beginPath();bctx.ellipse(160,158,48,14,0,0,7);bctx.fill();
  bctx.strokeStyle=hsl(hue,50,26,0.7);bctx.lineWidth=1;
  bctx.beginPath();bctx.ellipse(160,158,40,10,0,0,7);bctx.stroke();

  /* string lights — blink with loudness */
  for(var b=0;b<15;b++){
    var lx=20+b*20, ly=8+Math.sin(b*1.1)*3;
    var on=(Math.sin(now*2+b*1.7)*0.5+0.5)*glow;
    bctx.fillStyle=hsl((hue+b*24)%360,90,55,0.25+on*0.75);
    bctx.fillRect(lx,ly,2,2);
    if(on>0.5){bctx.fillStyle=hsl((hue+b*24)%360,90,60,0.12*on);bctx.fillRect(lx-2,ly-2,6,6);}
  }

  /* ---- window (night city + rain) ---- */
  rect(194,14,74,52,'#050508');
  var skyG=bctx.createLinearGradient(0,16,0,64);
  skyG.addColorStop(0,hsl((hue+200)%360,45,8));skyG.addColorStop(1,hsl(hue,40,14));
  bctx.fillStyle=skyG;bctx.fillRect(197,17,68,46);
  var rr=seedFor('stars');
  for(var st=0;st<26;st++){var sx=198+rr()*66,sy=18+rr()*30;
    bctx.fillStyle='rgba(255,255,255,'+(0.25+0.75*Math.abs(Math.sin(now*1.5+st)))+')';
    bctx.fillRect(px(sx),px(sy),1,1);}
  /* moon in the song's hue */
  bctx.fillStyle=hsl(hue,70,72,0.95);bctx.beginPath();bctx.arc(248,26,5,0,7);bctx.fill();
  bctx.fillStyle=hsl(hue,70,60,0.10+LVL*0.15);bctx.beginPath();bctx.arc(248,26,9+LVL*3,0,7);bctx.fill();
  if(shooting){shooting.x-=2.4;shooting.y+=0.7;shooting.life-=0.03;
    bctx.strokeStyle='rgba(255,255,255,'+shooting.life+')';bctx.beginPath();
    bctx.moveTo(shooting.x,shooting.y);bctx.lineTo(shooting.x+8,shooting.y-3);bctx.stroke();
    if(shooting.life<=0||shooting.x<198)shooting=null;}
  else if(Math.random()<0.0012)shooting={x:260,y:20,life:1};
  /* skyline — windows flicker on the hits */
  var rb=seedFor('bld');
  for(var bd=0;bd<9;bd++){var bx=197+bd*8,bw=7,bh=8+rb()*14;
    bctx.fillStyle='#0a0a12';bctx.fillRect(bx,63-bh,bw,bh);
    for(var wy=0;wy<bh-2;wy+=3)for(var wx=1;wx<bw-1;wx+=3){
      var lit=rb()<0.4, flick=kick>0.4&&rb()<0.3;
      if(lit||flick){bctx.fillStyle=flick?hsl(hue,90,60):hsl(45,80,55,0.75);
        bctx.fillRect(bx+wx,63-bh+wy+1,1,1);}}}
  /* rain */
  if(rain){bctx.strokeStyle='rgba(160,200,255,.32)';bctx.lineWidth=1;
    for(var rn=0;rn<18;rn++){var rx=198+((rn*37+now*90)%66),ry=(rn*23+now*160)%44;
      bctx.beginPath();bctx.moveTo(rx,17+ry);bctx.lineTo(rx-1,17+ry+4);bctx.stroke();}}
  /* frame */
  bctx.strokeStyle='#241f2e';bctx.lineWidth=3;bctx.strokeRect(195.5,15.5,71,49);
  bctx.fillStyle='#241f2e';bctx.fillRect(229,16,3,48);bctx.fillRect(196,38,70,3);

  /* ---- poster (re-dressed per record) ---- */
  if(!posterSeed)posterSeed=seedFor((slugNow()||'x')+'poster');
  var pr=seedFor((slugNow()||'x')+'p2');
  rect(20,20,32,40,'#101018');
  for(var ps=0;ps<5;ps++){rect(22,22+ps*7.4,28,4,hsl((hue+pr()*80)%360,60,14+pr()*18));}
  bctx.fillStyle=hsl(hue,85,55,0.8+kick*0.2);bctx.beginPath();bctx.arc(36,38,8,0,7);bctx.fill();
  bctx.fillStyle='#0a0a10';bctx.beginPath();bctx.arc(36,38,2.5,0,7);bctx.fill();
  bctx.strokeStyle=hsl(hue,80,60,glow*0.5);bctx.strokeRect(20.5,20.5,31,39);

  /* ---- wall clock (real time; click = `took`) ---- */
  bctx.fillStyle='#15151d';bctx.beginPath();bctx.arc(111,27,9,0,7);bctx.fill();
  bctx.strokeStyle='#3a3a46';bctx.stroke();
  var dt=new Date(),hh=(dt.getHours()%12+dt.getMinutes()/60)/12*6.283-1.57,mm=dt.getMinutes()/60*6.283-1.57;
  bctx.strokeStyle='#cfd0da';bctx.beginPath();bctx.moveTo(111,27);bctx.lineTo(111+Math.cos(hh)*4,27+Math.sin(hh)*4);bctx.stroke();
  bctx.strokeStyle=hsl(hue,80,60);bctx.beginPath();bctx.moveTo(111,27);bctx.lineTo(111+Math.cos(mm)*6.5,27+Math.sin(mm)*6.5);bctx.stroke();

  /* ---- shelf: books + LAVA LAMP (drinks the bass) ---- */
  rect(132,48,58,3,'#3a2b22');
  var rbk=seedFor('books');
  for(var bk=0;bk<4;bk++){rect(166+bk*5,38,4,10,hsl((hue+40+bk*70)%360,45,22+rbk()*10));}
  rect(134,42,8,6,'#1d2b18');rect(136,38,4,4,hsl(120,50,30));  // lil plant
  /* lamp */
  rect(147,44,12,3,'#2b2b33');
  var lampGlow=0.25+LOW*0.9;
  bctx.fillStyle=hsl((hue+300)%360,80,16,0.9);bctx.fillRect(148,24,10,20);
  bctx.fillStyle=hsl((hue+300)%360,90,55,0.12+LOW*0.25);bctx.fillRect(144,20,18,28); // halo
  for(var bl=0;bl<4;bl++){
    var ph=now*(0.5+LOW*1.8)+bl*1.9;
    var byy=42-((Math.sin(ph)*0.5+0.5)*(6+LOW*10))-bl*2.2;
    var brr=1.2+LOW*2.2+Math.sin(ph*1.3+bl)*0.6;
    bctx.fillStyle=hsl((hue+320)%360,95,55+LOW*15,0.85);
    bctx.beginPath();bctx.arc(150+((bl*2.7)%7),Math.max(26,byy),Math.max(0.8,brr),0,7);bctx.fill();}
  rect(147,22,12,2,'#2b2b33');

  /* ---- desk + CRT + fan ---- */
  rect(10,92,92,7,'#3a2b22');rect(12,99,6,28,'#2b2019');rect(94,99,6,28,'#2b2019');
  /* CRT case */
  rect(22,56,52,38,'#242430');rect(24,58,48,30,'#0a0f06');
  rect(40,94,16,3,'#1c1c26'); // neck sits on desk
  /* screen painted low-res; words drawn crisp on fx layer */
  var scr=bctx.createLinearGradient(0,58,0,88);
  scr.addColorStop(0,'#0c1505');scr.addColorStop(1,'#050a02');
  bctx.fillStyle=scr;bctx.fillRect(25,59,46,28);
  bctx.fillStyle='rgba(182,255,0,'+(0.05+glow*0.06)+')';bctx.fillRect(25,59+((now*22)%28),46,1);
  bctx.fillStyle=hsl(75,100,50,playing?0.9:0.25);bctx.fillRect(68,90,2,2); // power led
  /* fan — blades at the pressed BPM, head oscillates */
  var bpm=(g&&g.bpm)||100; fanA+=(playing?bpm/60*6.283*(1/60)*0.5:0.01);
  var fox=87+Math.sin(now*0.7)*2;
  rect(85,84,4,8,'#33333d');rect(82,91,10,2,'#33333d');
  bctx.fillStyle='#22222c';bctx.beginPath();bctx.arc(fox,74,9,0,7);bctx.fill();
  bctx.strokeStyle='#4a4a58';bctx.beginPath();bctx.arc(fox,74,9,0,7);bctx.stroke();
  for(var fb=0;fb<3;fb++){var fa=fanA+fb*2.094;
    bctx.strokeStyle='#8a8a9a';bctx.lineWidth=2;
    bctx.beginPath();bctx.moveTo(fox,74);bctx.lineTo(fox+Math.cos(fa)*6,74+Math.sin(fa)*6);bctx.stroke();}
  bctx.lineWidth=1;bctx.fillStyle='#c0c0cc';bctx.fillRect(px(fox)-1,73,2,2);

  /* ---- cat (by the desk, tail flicks on hits) ---- */
  var catB=Math.sin(now*1.4)*0.6;
  bctx.fillStyle='#1c1c22';
  bctx.beginPath();bctx.ellipse(116,126+catB*0.4,10,5,0,0,7);bctx.fill();
  bctx.beginPath();bctx.arc(107,122+catB*0.5,4.4,0,7);bctx.fill();
  bctx.beginPath();bctx.moveTo(104,119);bctx.lineTo(105,115);bctx.lineTo(107,118);bctx.fill();
  bctx.beginPath();bctx.moveTo(108,118);bctx.lineTo(110,114);bctx.lineTo(111,118);bctx.fill();
  var tw=kick*6+Math.sin(now*2)*2;
  bctx.strokeStyle='#1c1c22';bctx.lineWidth=2;
  bctx.beginPath();bctx.moveTo(125,125);bctx.quadraticCurveTo(131,120-tw,129,114-tw);bctx.stroke();bctx.lineWidth=1;
  if(meowT>0){meowT-=0.016;fLabel('meow_',116,108,10);}

  /* ---- notebook on the rug ---- */
  rect(146,150,20,10,'#e8e2cf');rect(155,150,2,10,'#b9b2a0');
  bctx.fillStyle='#8a8478';
  for(var nl=0;nl<3;nl++){bctx.fillRect(148,152+nl*3,6,1);bctx.fillRect(158,152+nl*3,6,1);}
  bctx.fillStyle=hsl(hue,80,55,0.5+kick*0.5);bctx.fillRect(163,149,3,3); // bookmark blinks

  /* ---- nightstand + vinyl deck ---- */
  rect(184,112,26,28,'#2e2219');rect(186,116,22,2,'#1f160f');
  rect(186,104,24,8,'#191922');
  var spin=playing?now*3:0;
  bctx.fillStyle='#0c0c12';bctx.beginPath();bctx.arc(198,104,8,0,7);bctx.fill();
  bctx.strokeStyle=hsl(hue,80,55,0.8);bctx.beginPath();bctx.arc(198,104,8,0,7);bctx.stroke();
  bctx.strokeStyle='rgba(255,255,255,.25)';
  bctx.beginPath();bctx.arc(198,104,5,spin,spin+1.2);bctx.stroke();
  bctx.fillStyle=hsl(hue,90,55);bctx.beginPath();bctx.arc(198,104,2,0,7);bctx.fill();
  if(playing){bctx.fillStyle=hsl(hue,90,60,0.12+kick*0.25);bctx.beginPath();bctx.arc(198,104,12+kick*4,0,7);bctx.fill();}
  else{ /* invite */ fLabel('▶',198,92,12,'#b6ff00',0.6+0.4*Math.sin(now*3)); }

  /* ---- bed + BEEBEE ---- */
  rect(306,88,10,64,'#3a2b22');                       // headboard
  rect(210,116,100,30,'#241a26');                     // frame
  rect(212,108,96,12,hsl((hue+180)%360,25,22));       // mattress top
  rect(212,104,96,6,hsl((hue+180)%360,30,28));        // blanket edge
  rect(284,100,22,8,'#d8d4c8');                       // pillow
  rect(210,146,4,12,'#191216');rect(304,146,4,12,'#191216');
  /* character */
  var asleep=!playing;
  var bob=BOB*4+(playing?Math.max(0,Math.sin(now*(bpm/60)*3.1416))*LVL*1.6:0);
  if(asleep){
    if(beeImg.__ok){
      /* the real Beebee figure asleep on the bed, breathing gently —
         rotated so the lying pose follows the mattress line */
      var br=Math.sin(now*1.1)*1.2;
      bctx.save();
      bctx.translate(261,93+br);
      bctx.rotate(0.40);
      bctx.drawImage(beeImg,-46,-46,92,92);
      bctx.restore();
      if(Math.random()<0.02)zparts.push({x:294,y:66,life:1});
    }else{
      /* fallback blob while the figure loads */
      bctx.fillStyle='#7fca2a';bctx.beginPath();bctx.ellipse(252,104,16,7,0,0,7);bctx.fill();
      bctx.fillStyle='#8fdc33';bctx.beginPath();bctx.arc(272,102,8,0,7);bctx.fill();
      bctx.fillStyle='#0a0a0a';bctx.fillRect(270,101,4,1);bctx.fillRect(276,101,3,1);
      if(Math.random()<0.02)zparts.push({x:280,y:94,life:1});
    }
  }else{
    /* sitting on the edge, bobbing on the hits, foot tapping */
    var hy=92-bob;
    bctx.fillStyle='#79c528';bctx.fillRect(246,106,24,22);                    // body
    bctx.fillStyle='#8fdc33';bctx.beginPath();bctx.arc(258,hy+8,11,0,7);bctx.fill(); // head
    bctx.fillStyle='#0a0a0a';                                                 // eyes
    bctx.fillRect(253,px(hy+6),3,4);bctx.fillRect(261,px(hy+6),3,4);
    bctx.fillStyle='#fff';bctx.fillRect(254,px(hy+7),1,1);bctx.fillRect(262,px(hy+7),1,1);
    bctx.fillStyle='#0a0a0a';bctx.fillRect(256,px(hy+13),5,1.5);              // lil smile
    /* headphones in the song hue */
    bctx.strokeStyle=hsl(hue,85,55);bctx.lineWidth=2;
    bctx.beginPath();bctx.arc(258,hy+7,12,3.4,6.02);bctx.stroke();bctx.lineWidth=1;
    bctx.fillStyle=hsl(hue,85,45);bctx.fillRect(245,px(hy+6),4,7);bctx.fillRect(267,px(hy+6),4,7);
    /* legs — one taps the metronome */
    var tap=Math.max(0,Math.sin(now*(bpm/60)*3.1416))*3;
    bctx.fillStyle='#5d9a1e';
    bctx.fillRect(248,128,6,14);bctx.fillRect(262,128,6,Math.max(8,14-tap));
    bctx.fillStyle='#2b2b33';bctx.fillRect(247,141,8,4);bctx.fillRect(261,px(141-tap),8,4);
  }

  /* zzz + hearts (lowres side) */
  for(var z=zparts.length-1;z>=0;z--){var zp=zparts[z];zp.y-=0.2;zp.x+=0.1;zp.life-=0.008;
    if(zp.life<=0){zparts.splice(z,1);continue;}
    fLabel('z',zp.x,zp.y,9,'#9fb3c8',zp.life);}

  /* deep-night: darkness + lamp cone */
  if(deepNight){
    bctx.fillStyle='rgba(2,2,8,.45)';bctx.fillRect(0,0,W,H);
    var cone=bctx.createRadialGradient(153,34,2,153,34,60);
    cone.addColorStop(0,hsl((hue+320)%360,90,55,0.16+LOW*0.2));cone.addColorStop(1,'transparent');
    bctx.fillStyle=cone;bctx.fillRect(93,0,120,110);
    var cone2=bctx.createRadialGradient(48,73,4,48,73,52);
    cone2.addColorStop(0,'rgba(182,255,0,.10)');cone2.addColorStop(1,'transparent');
    bctx.fillStyle=cone2;bctx.fillRect(0,30,110,90);
  }

  /* impulse flash — the whole room blinks on a real hit */
  if(kick>0.02){bctx.fillStyle=hsl(hue,90,60,kick*0.05);bctx.fillRect(0,0,W,H);}

  /* dust motes in the air */
  bctx.fillStyle='rgba(255,255,255,.10)';
  motes.forEach(function(mo){mo.y-=mo.s;mo.x+=Math.sin(now+mo.p)*0.08;
    if(mo.y<0){mo.y=H;mo.x=Math.random()*W;}
    bctx.fillRect(px(mo.x),px(mo.y),1,1);});
}

/* crisp labels queued onto the fx canvas (screen-res) */
var labels=[];
function fLabel(txt,x,y,size,color,alpha){labels.push({t:txt,x:x,y:y,s:size||10,c:color||'#e8e8e8',a:alpha==null?1:alpha});}

function drawFx(now,playing,hue){
  fctx.clearRect(0,0,FW,FH);

  /* CRT words — the monitor types the real karaoke lines */
  var cl=playing?crtLines():null;
  fctx.textBaseline='top';
  if(cl){
    var sx=25*S,sy=59*S,sw=46*S,sh=28*S;
    fctx.save();fctx.beginPath();fctx.rect(sx,sy,sw,sh);fctx.clip();
    fctx.font=(5.4*S)+'px VT323';
    fctx.fillStyle='rgba(182,255,0,.35)';
    wrapText(cl.prev,sx+2*S,sy+1.5*S,sw-4*S,5.5*S,1);
    fctx.fillStyle='#b6ff00';fctx.shadowColor='#b6ff00';fctx.shadowBlur=4*S/3;
    var shown=cl.wait?'▮':cl.line.slice(0,Math.ceil(cl.line.length*cl.prog))+(cl.prog<1?'▮':'');
    wrapText(shown,sx+2*S,sy+9*S,sw-4*S,5.5*S,3);
    fctx.shadowBlur=0;fctx.restore();
  }else{
    /* screensaver */
    var sx2=25*S,sy2=59*S;
    fctx.font=(5*S)+'px "Press Start 2P"';
    var bx=sx2+( (Math.sin(now*0.8)*0.5+0.5)*(46*S-30*S) );
    var by=sy2+( (Math.sin(now*1.1)*0.5+0.5)*(28*S-8*S) );
    fctx.fillStyle='rgba(182,255,0,.5)';fctx.fillText('IBEE',bx,by);
  }

  /* big karaoke line (monitor toggled) */
  if(karaokeBig&&cl&&cl.line){
    fctx.font=(9*S)+'px VT323';fctx.textAlign='center';
    fctx.fillStyle='rgba(0,0,0,.55)';
    var tw=fctx.measureText(cl.line).width;
    fctx.fillRect(FW/2-tw/2-8,FH-24*S,tw+16,12*S);
    fctx.fillStyle='#b6ff00';fctx.shadowColor='#b6ff00';fctx.shadowBlur=6;
    fctx.fillText(cl.line.slice(0,Math.ceil(cl.line.length*cl.prog)),FW/2,FH-22*S);
    fctx.shadowBlur=0;fctx.textAlign='left';
  }

  /* speech bubble */
  if(bubbleT>0){bubbleT-=0.016;
    fctx.font=(6*S)+'px VT323';fctx.textAlign='center';
    var bw=fctx.measureText(bubbleTxt).width+10;
    fctx.fillStyle='rgba(10,14,4,.92)';fctx.fillRect(258*S-bw/2,72*S,bw,9*S);
    fctx.strokeStyle='#b6ff00';fctx.strokeRect(258*S-bw/2,72*S,bw,9*S);
    fctx.fillStyle='#d9ffd0';fctx.fillText(bubbleTxt,258*S,74*S);
    fctx.textAlign='left';}

  /* hearts */
  for(var h=hearts.length-1;h>=0;h--){var hp=hearts[h];
    hp.y+=hp.vy*0.016;hp.vy*=0.97;hp.life-=0.012;
    if(hp.life<=0){hearts.splice(h,1);continue;}
    fctx.font=(6*S)+'px VT323';
    fctx.fillStyle='rgba(255,80,110,'+hp.life+')';
    fctx.fillText(hp.ch,hp.x*S,hp.y*S);}

  /* queued lowres labels */
  labels.forEach(function(l){
    fctx.font=(l.s*0.65*S)+'px VT323';fctx.textAlign='center';
    fctx.fillStyle=l.c;fctx.globalAlpha=l.a;
    fctx.fillText(l.t,l.x*S,l.y*S);
    fctx.globalAlpha=1;fctx.textAlign='left';});
  labels.length=0;

  /* hover chip */
  if(hover){
    fctx.strokeStyle='rgba(182,255,0,.85)';fctx.lineWidth=Math.max(1,S*0.4);
    var pad=1.5,hx=(hover.x-pad)*S,hy=(hover.y-pad)*S,hw=(hover.w+pad*2)*S,hh=(hover.h+pad*2)*S,cl2=4*S;
    [[hx,hy,1,1],[hx+hw,hy,-1,1],[hx,hy+hh,1,-1],[hx+hw,hy+hh,-1,-1]].forEach(function(c){
      fctx.beginPath();fctx.moveTo(c[0]+c[2]*cl2,c[1]);fctx.lineTo(c[0],c[1]);fctx.lineTo(c[0],c[1]+c[3]*cl2);fctx.stroke();});
    fctx.font=(5.5*S)+'px "Press Start 2P"';
    var lw=fctx.measureText(hover.label).width+10;
    var lx=Math.min(FW-lw-4,Math.max(4,hx));var ly=hy>14*S?hy-9*S:hy+hh+2*S;
    fctx.fillStyle='rgba(0,0,0,.85)';fctx.fillRect(lx,ly,lw,8*S);
    fctx.fillStyle='#b6ff00';fctx.fillText(hover.label,lx+5,ly+2*S);
  }
}
function wrapText(txt,x,y,maxW,lh,maxLines){
  if(!txt)return;var words=txt.split(' '),line='',ln=0;
  for(var i=0;i<words.length;i++){
    var test=line?line+' '+words[i]:words[i];
    if(fctx.measureText(test).width>maxW&&line){
      fctx.fillText(line,x,y+ln*lh);ln++;line=words[i];
      if(ln>=maxLines)return;
    }else line=test;}
  if(ln<maxLines)fctx.fillText(line,x,y+ln*lh);
}

/* ---------- now-playing chip ---------- */
var npName=document.getElementById('npname'),npDot=document.getElementById('npdot');
setInterval(function(){
  var r=RAD(),nm=nameNow();
  if(r&&r.playing&&r.playing()&&nm){npName.textContent='ON AIR — '+nm;npDot.style.background=hsl(hueNow(),85,55);}
  else if(nm){npName.textContent='PAUSED — '+nm;npDot.style.background='#444';}
  else{npName.textContent='RADIO OFF — TAP THE VINYL DECK';npDot.style.background='#444';}
},700);

/* ---------- main loop ---------- */
var last=performance.now();
function loop(nowMs){
  requestAnimationFrame(loop);
  var dt=Math.min(0.05,(nowMs-last)/1000);last=nowMs;T+=dt;
  var g=groove(),r=RAD(),playing=r&&r.playing&&r.playing();
  var hue=hueNow();
  if(g){LOW+=( (g.low||0)-LOW)*0.25; LVL+=((g.lvl||0)-LVL)*0.2;
    if(impEdge(g)){PULSE=1;BOB=Math.max(BOB,0.9);}}
  else{LOW*=0.94;LVL*=0.94;}
  PULSE*=0.88;BOB*=0.9;
  drawRoom(T,g,playing,hue);
  drawFx(T,playing,hue);
}
requestAnimationFrame(loop);
</script>
