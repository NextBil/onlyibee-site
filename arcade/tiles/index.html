<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<title>MIMI MUSIC TILES — ONLYIBEE ARCADE</title>
<style>
  :root{
    --red:#ff2a3a; --yellow:#ffd42a; --cyan:#00eaff; --magenta:#ff2bd6;
    --ink:#05040a; --panel:#0c0a16;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      linear-gradient(180deg,#0a0620 0%, #120826 42%, #05040a 100%);
    color:#fff;
    font-family:'Courier New',ui-monospace,monospace;
    display:flex;align-items:center;justify-content:center;min-height:100%;
    overflow:hidden;touch-action:manipulation;letter-spacing:1px;
  }
  /* neon synthwave grid floor */
  body::before{
    content:"";position:fixed;left:-20%;right:-20%;bottom:-10%;height:55%;
    background-image:
      linear-gradient(transparent 0, transparent calc(100% - 2px), rgba(255,43,214,.5) 100%),
      repeating-linear-gradient(90deg, rgba(0,234,255,.35) 0 2px, transparent 2px 68px);
    background-size:100% 34px, 100% 100%;
    transform:perspective(340px) rotateX(64deg);
    transform-origin:bottom;opacity:.35;pointer-events:none;z-index:0;
    animation:grid 1.2s linear infinite;
  }
  @keyframes grid{from{background-position-y:0,0}to{background-position-y:34px,0}}
  #app{position:relative;z-index:2;display:flex;gap:26px;align-items:center;padding:18px;}

  .stage{position:relative;width:400px;height:672px;border-radius:6px;overflow:hidden;
    background:#07060e;
    box-shadow:0 0 0 3px #1a1330, 0 0 0 6px var(--cyan), 0 0 28px var(--cyan),
      0 0 60px rgba(255,43,214,.35), inset 0 0 60px rgba(0,0,0,.8);}
  canvas{display:block;width:100%;height:100%;}
  /* CRT scanlines + flicker */
  .stage::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:8;
    background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.22) 2px 4px);
    mix-blend-mode:multiply;animation:flick 5s steps(60) infinite;}
  @keyframes flick{0%,97%{opacity:1}98%{opacity:.78}100%{opacity:1}}
  .stage::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:8;
    background:radial-gradient(120% 100% at 50% 40%, transparent 60%, rgba(0,0,0,.55) 100%);}

  .hud{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:6;}
  .lbl{font-size:10px;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 6px var(--cyan);}
  .score{font-size:34px;font-weight:900;color:#fff;line-height:.95;text-shadow:0 0 8px var(--yellow),0 0 2px #fff;}
  .rgt{text-align:right;}
  .combo{font-size:15px;font-weight:900;color:var(--magenta);text-shadow:0 0 8px var(--magenta);min-height:18px;}
  .lives{font-size:18px;margin-top:2px;letter-spacing:2px;}

  /* karaoke ticker */
  .ticker{position:absolute;left:0;right:0;top:58px;z-index:6;text-align:center;pointer-events:none;
    font-size:20px;font-weight:900;text-transform:uppercase;color:#fff;
    text-shadow:0 0 10px var(--cyan),0 0 4px #fff;min-height:26px;transition:.1s;}
  .ticker .prev{opacity:.4;font-size:14px;color:var(--cyan);}

  .toast{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);font-size:30px;font-weight:900;
    opacity:0;pointer-events:none;z-index:7;letter-spacing:2px;}

  .overlay{position:absolute;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:safe center;
    background:linear-gradient(180deg,rgba(5,4,10,.9),rgba(5,4,10,.97));gap:14px;padding:22px 16px;text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .overlay.hidden{display:none;}
  .logo{font-size:30px;font-weight:900;line-height:1;letter-spacing:2px;
    text-shadow:0 0 14px var(--magenta),0 0 30px var(--magenta);}
  .logo b:nth-child(odd){color:var(--red);} .logo b:nth-child(even){color:var(--yellow);}
  .logo2{font-size:24px;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 12px var(--cyan);}
  .tag{color:var(--magenta);font-size:12px;letter-spacing:2px;text-shadow:0 0 8px var(--magenta);}
  .blink{animation:blink 1s steps(2) infinite;} @keyframes blink{50%{opacity:0}}
  .checker{width:100%;height:12px;
    background:repeating-conic-gradient(var(--yellow) 0 25%, #0000 0 50%) 0 0/14px 14px, var(--red);opacity:.85;}
  .songlist{width:100%;display:flex;flex-direction:column;gap:7px;padding-right:4px;}
  .songlist::-webkit-scrollbar{width:8px;}.songlist::-webkit-scrollbar-thumb{background:var(--magenta);border-radius:8px;}
  .song{display:flex;align-items:center;gap:10px;background:#0f0b1e;border:2px solid #241a44;border-radius:4px;padding:10px 12px;cursor:pointer;transition:.1s;text-align:left;}
  .song:hover{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,234,255,.5);transform:translateX(3px);}
  .song .num{font-size:11px;color:var(--yellow);width:20px;}
  .song .nm{font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:1px;}
  .btn{background:#0f0b1e;color:var(--cyan);border:2px solid var(--cyan);border-radius:4px;padding:12px 22px;font-size:14px;font-weight:900;
    cursor:pointer;letter-spacing:2px;font-family:inherit;text-shadow:0 0 8px var(--cyan);box-shadow:0 0 12px rgba(0,234,255,.3);transition:.1s;text-transform:uppercase;}
  .btn:hover{background:var(--cyan);color:#04202a;text-shadow:none;}
  .btn.m{color:var(--magenta);border-color:var(--magenta);text-shadow:0 0 8px var(--magenta);box-shadow:0 0 12px rgba(255,43,214,.3);}
  .btn.m:hover{background:var(--magenta);color:#2a0426;}
  .small{font-size:11px;color:#8a86a8;letter-spacing:1px;}
  .big{font-size:46px;font-weight:900;color:var(--yellow);text-shadow:0 0 16px var(--yellow);}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

  .side{width:250px;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .cab{background:#0c0a16;border:2px solid #241a44;border-radius:8px;padding:14px;width:100%;
    box-shadow:0 0 20px rgba(0,234,255,.12), inset 0 0 30px rgba(0,0,0,.6);}
  .mimi-wrap{width:100%;height:300px;position:relative;display:flex;align-items:flex-end;justify-content:center;
    filter:drop-shadow(0 0 18px rgba(255,43,214,.4));}
  #mimi{height:290px;transition:transform .09s;}
  .cab h3{margin:0 0 6px;font-size:10px;letter-spacing:3px;color:var(--magenta);text-shadow:0 0 8px var(--magenta);}
  .keys{display:flex;gap:6px;justify-content:center;margin-top:8px;}
  .key{width:38px;height:38px;border-radius:4px;background:#07060e;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--yellow);border:2px solid var(--yellow);box-shadow:0 0 8px rgba(255,212,42,.35);font-family:inherit;}
  .stat{display:flex;justify-content:space-between;font-size:12px;color:#8a86a8;margin:3px 0;letter-spacing:1px;}
  .stat b{color:var(--cyan);text-shadow:0 0 6px var(--cyan);}
  .aura{position:absolute;left:50%;bottom:6px;width:210px;height:210px;transform:translate(-50%,0) scale(.6);
    border-radius:50%;background:radial-gradient(circle,rgba(255,43,214,.85),rgba(0,234,255,.3) 45%,transparent 70%);
    filter:blur(16px);opacity:.4;pointer-events:none;z-index:0;}
  #mimi{position:relative;z-index:1;}
  .lvl{font-size:11px;color:var(--yellow);text-shadow:0 0 8px var(--yellow);margin-top:3px;letter-spacing:1px;}
  @media (max-width:900px){#app{flex-direction:column-reverse;gap:8px;transform:scale(.8);}}
</style>
</head>
<body>
<div id="app">
  <div class="side">
    <div class="mimi-wrap"><div class="aura" id="aura"></div><img id="mimi" alt="Mimi"></div>
    <div class="cab">
      <h3>▶ CONTROLS</h3>
      <div class="small">TAP THE LYRIC TILE ON THE NEON LINE. HIT EVERY WORD, KEEP THE COMBO!</div>
      <div class="keys"><div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div></div>
    </div>
    <div class="cab">
      <div class="stat"><span>HI-SCORE</span><b id="best">000000</b></div>
      <div class="stat"><span>TRACK</span><b id="nowplaying">—</b></div>
    </div>
  </div>

  <div class="stage">
    <canvas id="c" width="400" height="672"></canvas>
    <div class="hud">
      <div><div class="lbl">1UP · SCORE</div><div class="score" id="scoreN">000000</div></div>
      <div class="rgt"><div class="combo" id="comboN"></div><div class="lives" id="livesN"></div><div class="lvl" id="lvlN"></div></div>
    </div>
    <div class="ticker" id="ticker"></div>
    <div class="toast" id="toast"></div>

    <div class="overlay" id="startScreen">
      <div class="logo"><b>M</b><b>I</b><b>M</b><b>I</b></div>
      <div class="logo2">MUSIC TILES</div>
      <div class="tag blink">▶ INSERT SONG TO PLAY</div>
      <button class="btn m" id="liveBtn" style="width:100%;margin:2px 0 6px">▶ JUMP IN LIVE — TILES TO THE SONG ON AIR</button>
      <div class="checker"></div>
      <div class="small">SELECT TRACK:</div>
      <div class="songlist" id="songlist"></div>
      <div class="row"><button class="btn m" id="diffBtn">SPEED: NORMAL</button></div>
    </div>

    <div class="overlay hidden" id="overScreen">
      <div class="logo2" style="color:var(--red);text-shadow:0 0 14px var(--red)">GAME OVER</div>
      <div class="big" id="finalScore">0</div>
      <div class="small" id="overMsg"></div>
      <div class="row"><button class="btn" id="retryBtn">RETRY</button><button class="btn m" id="menuBtn">◀ SONGS</button></div>
    </div>

    <div class="overlay hidden" id="loadScreen">
      <div class="logo2 blink">LOADING…</div><div class="small">CUEING THE BEAT</div>
    </div>
  </div>
</div>

function refreshWords(){var r=RAD();var slug=(r&&r.slug&&r.slug())||null;if(slug!==wordSlug){wordSlug=slug;var LY=LYRALL();var lines=slug&&LY[slug];wordArr=(lines&&lines.length)?lines.join(' ').split(/\s+/).filter(Boolean).map(function(w){return w.toUpperCase();}):['MIMI','ONLY','IBEE','NA','NA','LA','LA','OOH','YEAH'];wordIdx=0;}}
/* per-word timeline from the tap-synced lyrics (website lyrics-timed) so tiles track the song */
var _twc={s:null,a:null};
function timedWords(){var r=RAD();var slug=(r&&r.slug&&r.slug())||null;if(_twc.s===slug)return _twc.a;
  var T=window.IBEE_LYRICS_TIMED||(window.top&&window.top.IBEE_LYRICS_TIMED)||{};var td=slug&&T[slug];var a=null;
  if(td&&td.length){a=[];for(var i=0;i<td.length;i++){var t0=td[i].t,t1=(i+1<td.length?td[i+1].t:t0+3);var ws=String(td[i].w).split(/\s+/).filter(Boolean);for(var k=0;k<ws.length;k++)a.push({t:t0+(k/ws.length)*(t1-t0),w:ws[k].toUpperCase()});}}
  _twc={s:slug,a:a};return a;}
function pickWord(look){var r=RAD();var c=0,d=0;try{c=(r.audio.currentTime||0)+(look||0);d=r.audio.duration||0;}catch(e){}

function drawBoard(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<LANES;i++){
    ctx.fillStyle=i%2?'rgba(255,255,255,0.015)':'rgba(255,255,255,0.03)';
    ctx.fillRect(i*LW,0,LW,H);
    ctx.strokeStyle='rgba(0,234,255,0.10)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(i*LW,0);ctx.lineTo(i*LW,H);ctx.stroke();
  }
  const pulse=Math.min(1,0.4+0.3*Math.sin(performance.now()/160)+glowNow*0.5);
  ctx.fillStyle='rgba(0,234,255,'+(0.06+0.05*Math.sin(performance.now()/160)+glowNow*0.14)+')';
  ctx.fillRect(0,HIT_Y,W,HIT_H);
  ctx.setLineDash([12,8]);ctx.lineWidth=3;
  ctx.shadowColor='#00eaff';ctx.shadowBlur=10+glowNow*26;
  ctx.strokeStyle='rgba(0,234,255,'+pulse+')';
  ctx.beginPath();ctx.moveTo(0,HIT_Y);ctx.lineTo(W,HIT_Y);ctx.stroke();
  ctx.shadowColor='#ff2bd6';
  ctx.strokeStyle='rgba(255,43,214,'+pulse+')';
  ctx.beginPath();ctx.moveTo(0,HIT_Y+HIT_H);ctx.lineTo(W,HIT_Y+HIT_H);ctx.stroke();
  ctx.setLineDash([]);ctx.shadowBlur=0;
}

function fitFont(word,maxw){
  let fs=26;
  ctx.font='900 '+fs+'px "Courier New",monospace';
  while(ctx.measureText(word).width>maxw && fs>9){fs--;ctx.font='900 '+fs+'px "Courier New",monospace';}
  return fs;
}

function drawTile(t){
  const x=t.lane*LW+6,w=LW-12,y=t.y,h=t.h,r=5;
  const neon=laneNeon[t.lane];
  ctx.save();
  if(t.hit)ctx.globalAlpha=Math.max(0,t.alpha??1);
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'#141026');g.addColorStop(1,'#0a0716');
  ctx.fillStyle=t.hit?'#0c2a20':g;ctx.fill();

  ctx.save();ctx.clip();

  for(let sy=y;sy<y+h;sy+=4)ctx.fillRect(x,sy,w,2);
  ctx.restore();
  ctx.lineWidth=t.hit?3:2;ctx.strokeStyle=t.hit?'#39ff8b':neon;
  ctx.shadowColor=t.hit?'#39ff8b':neon;ctx.shadowBlur=12+glowNow*10;
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.stroke();

}

function resetGame(){tiles=[];score=0;combo=0;lives=3;metroAcc=0;energyHist=[];warmup=0;analyserWorks=false;wordIdx=0;hitWords=[];gameTime=0;diffMul=1;level=1;beatPulse=0;el('ticker').innerHTML='';el('lvlN').textContent='';updateHUD();}

function songIV(r){/* metronome interval from the song's pressed BPM (beat-data); fallback 0.48s */
  try{var B=window.IBEE_BEAT||(window.top&&window.top.IBEE_BEAT);var g=B&&r&&r.slug&&B[r.slug()];
    if(g&&g.bpm)return Math.max(0.32,Math.min(0.86,60/g.bpm));}catch(e){}return 0.48;}

    if(!g||!g.imp)return false;

function press(lane){
  if(state!=='play')return;
  let target=null,bestY=-1;

    if(t.lane===lane&&!t.hit&&!t.judged){
      const cy=t.y+t.h/2;
      if(cy>HIT_Y-70&&cy<HIT_Y+HIT_H+30&&t.y>bestY){bestY=t.y;target=t;}
    }
  }
  if(target){
    target.hit=true;target.judged=true;target.alpha=1;
    const center=HIT_Y+HIT_H/2,cy=target.y+target.h/2,off=Math.abs(cy-center);

function popMimi(){mimiPop=0.16;mimiImg.src=SPR.jump;setTimeout(()=>{if(mimiState==='run')mimiImg.src=frames[runFrame];},150);}

let toastT=null;
function showToast(txt,color){const t=el('toast');t.textContent=txt;t.style.color=color;
  t.style.textShadow='0 0 12px '+color;t.style.transition='none';t.style.opacity='1';
  t.style.transform='translate(-50%,-50%) scale(1.2)';clearTimeout(toastT);
  requestAnimationFrame(()=>{t.style.transition='opacity .5s,transform .5s';t.style.opacity='0';t.style.transform='translate(-50%,-62%) scale(1)';});}

function updateHUD(){
  el('scoreN').textContent=pad(score,6);
  el('comboN').textContent=combo>1?('COMBO x'+combo):'';
  el('livesN').innerHTML='<span style="color:var(--red);text-shadow:0 0 8px var(--red)">'+'♥'.repeat(Math.max(0,lives))+'</span><span style="opacity:.2">'+'♥'.repeat(Math.max(0,3-lives))+'</span>';
  el('best').textContent=pad(best,6);
}

function gameOver(){state='over';running=false;
  mimiState='lose';mimiImg.src=SPR.lose;mimiImg.style.transform='none';mimiImg.style.filter='drop-shadow(0 0 20px rgba(255,42,58,.7))';
  el('finalScore').textContent=pad(score,6);
  el('overMsg').textContent=(score>=best&&score>0)?'NEW HI-SCORE! ★':('HI-SCORE '+pad(best,6));
  el('overScreen').classList.remove('hidden');}

window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k in KEYMAP){e.preventDefault();press(KEYMAP[k]);}});
cv.addEventListener('pointerdown',e=>{const r=cv.getBoundingClientRect();const x=(e.clientX-r.left)*(W/r.width);press(Math.max(0,Math.min(LANES-1,Math.floor(x/LW))));});
el('retryBtn').onclick=()=>startGame(lastIx);
el('menuBtn').onclick=()=>{el('overScreen').classList.add('hidden');el('startScreen').classList.remove('hidden');mimiState='run';state='menu';idleKick();};

function idleKick(){requestAnimationFrame(function idle(){if(state==='menu'){drawBoard();animateMimi(0.016);requestAnimationFrame(idle);}});}
drawBoard();updateHUD();idleKick();
</script>
