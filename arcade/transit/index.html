<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070707">
<title>MIDNIGHT TRANSIT — ONLYIBEE ROOMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070707; --panel:#0e0e0e; --border:#2a2a2a;
    --acid:#b6ff00; --red:#ff2b2b; --dim:#7a7a7a; --ink:#e8e8e8;
    --px:'Press Start 2P',monospace; --vt:'VT323',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--vt);overflow:hidden;
    -webkit-tap-highlight-color:transparent;user-select:none}
  ::selection{background:var(--acid);color:#000}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.26) 0 1px,transparent 1px 3px)}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
    background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.55) 100%)}

  /* night wrap so the close-up car sits in atmosphere (not black bars) on portrait phones */
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;
    background:radial-gradient(ellipse at 50% 32%,#0d0d1c,#040408 72%)}
  /* DESKTOP: reserve a top band + top-anchor the car so the LED destination sign is
     never clipped by the window edge and the MIDNIGHT LINE strip sits above it, not
     on it. (JS fit() switches to CONTAIN here; TOPBAND must match padding-top.) */
  @media (min-width:900px) and (pointer:fine){
    #wrap{align-items:flex-start;padding-top:54px}
  }
  #stage{position:relative}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #bg{image-rendering:pixelated;image-rendering:crisp-edges}
  #fx{pointer-events:none}

  .ui{transition:opacity .6s}
  body.zen .ui{opacity:0;pointer-events:none}
  .back{position:fixed;top:calc(12px + env(safe-area-inset-top));left:calc(12px + env(safe-area-inset-left));
    z-index:800;font-family:var(--px);font-size:9px;
    color:var(--dim);text-decoration:none;border:1px solid var(--border);background:rgba(0,0,0,.7);padding:8px 10px}
  .back:hover{color:var(--acid);border-color:var(--acid)}
  #hint{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:800;
    color:var(--dim);font-size:17px;text-align:center;background:rgba(0,0,0,.55);
    padding:2px 12px;border:1px solid #161616;pointer-events:none;transition:opacity .8s;max-width:92vw}
  #hint.off{opacity:0}

  /* THE LINE — the whole radio playlist as a subway map */
  #line{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:800;
    display:flex;align-items:center;gap:0;background:rgba(0,0,0,.72);
    border:1px solid var(--border);padding:9px 14px;overflow-x:auto;scrollbar-width:none;
    max-width:calc(100vw - 210px)}   /* stay clear of ◀ ROOMS (left) and ✧ ZEN (right) */
  #line::-webkit-scrollbar{display:none}
  #line .lbl{font-family:var(--px);font-size:7px;color:var(--dim);margin-right:10px;white-space:nowrap}
  #line .seg{width:14px;height:2px;background:#333;flex:none}
  #line .stop{width:9px;height:9px;border-radius:50%;background:#0e0e0e;border:2px solid #555;
    flex:none;cursor:pointer;position:relative}
  #line .stop:hover{border-color:var(--acid)}
  #line .stop.now{border-color:var(--acid);box-shadow:0 0 8px var(--acid);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{50%{transform:scale(1.45)}}
  #zenchip{position:fixed;top:calc(12px + env(safe-area-inset-top));right:calc(12px + env(safe-area-inset-right));
    z-index:801;font-family:var(--px);font-size:8px;
    color:var(--dim);border:1px solid var(--border);background:rgba(0,0,0,.7);padding:8px 10px;cursor:pointer}
  #zenchip:hover{color:var(--acid);border-color:var(--acid)}
  body.zen #zenchip{opacity:.25}
  body.zen #zenchip:hover{opacity:1}
  #fstog{position:fixed;top:calc(50px + env(safe-area-inset-top));right:calc(12px + env(safe-area-inset-right));
    z-index:801;font-size:14px;line-height:1;
    color:var(--dim);border:1px solid var(--border);background:rgba(0,0,0,.7);padding:6px 8px;cursor:pointer}
  #fstog:hover,#fstog.on{color:var(--acid);border-color:var(--acid)}
  body.zen #fstog{opacity:.25}body.zen #fstog:hover{opacity:1}
  /* VIEW toggle: close-up interior ⇄ whole-train overview — parked at the BOTTOM */
  #viewtog{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:801;font-family:var(--px);font-size:8px;
    color:#000;background:var(--acid);border:1px solid var(--acid);padding:10px 14px;cursor:pointer}
  #viewtog:hover{filter:brightness(1.12)}
  body.zen #viewtog{opacity:.25}
  #over{position:fixed;inset:0;z-index:400;display:none;image-rendering:pixelated}
  body.trainview #over{display:block}
  body.trainview #stage{opacity:0}
  body.trainview #line{display:none}   /* the MIDNIGHT LINE strip belongs to the close-up; hide it on the whole-train view */
  #milechip{position:fixed;bottom:12px;left:12px;z-index:801;font-family:var(--px);font-size:7px;
    color:var(--dim);border:1px solid var(--border);background:rgba(0,0,0,.7);padding:7px 9px;cursor:pointer}
  #milechip:hover{color:var(--acid);border-color:var(--acid)}
  /* ===== PHONES — nothing may superpose, nothing hides under the browser =====
     Fires for narrow PORTRAIT phones (max-width) AND short LANDSCAPE phones
     (max-height) — in landscape the viewport is wider than 640px, so the old
     width-only rule never triggered and the MIDNIGHT LINE stayed pinned to the
     top, overlapping the corner chips and slipping under the URL bar / notch.
     Everything drops to the bottom, offset by the safe-area insets.
     row 1 (very bottom): the MIDNIGHT LINE strip, full width
     row 2 (above it):    CAR chip (left) + WHOLE TRAIN (right)
     row 3:               the hint */
  @media(max-width:640px),(max-height:560px){
    #line{top:auto;bottom:calc(10px + env(safe-area-inset-bottom));
      max-width:calc(100vw - 24px - env(safe-area-inset-left) - env(safe-area-inset-right))}
    #viewtog{left:auto;right:calc(12px + env(safe-area-inset-right));
      bottom:calc(56px + env(safe-area-inset-bottom));transform:none}
    #milechip{left:calc(12px + env(safe-area-inset-left));bottom:calc(56px + env(safe-area-inset-bottom))}
    #hint{bottom:calc(100px + env(safe-area-inset-bottom))}
  }
</style>
</head>
<body>
<div id="wrap"><div id="stage"><canvas id="bg"></canvas><canvas id="fx"></canvas></div></div>
<canvas id="over"></canvas>
<a class="back ui" href="../">◀ ROOMS</a>
<div id="line" class="ui"><span class="lbl">MIDNIGHT LINE</span></div>
<div id="viewtog">▦ WHOLE TRAIN</div>
<div id="zenchip">✧ ZEN</div>
<div id="fstog" title="fullscreen">⛶</div>
<div id="milechip" class="ui" title="tap to name your car">YOUR LINE · 0 mi</div>
<div id="hint" class="ui">ride the midnight line_ — tap a window to zone out · tap the seats to re-trim · tap the charm for a little magic · name your car below-left</div>

<script src="../../assets/player.js?v=22"></script>
<!-- gate.js removed 2026-07-13: this room is FREE (a pickable home room, no ownership gate) -->
<script src="../../assets/roomgate.js?v=2"></script>
<script>document.write('<script src="../../assets/lyrics-data.js?cb='+Date.now()+'"><\/script>')</script>
<script>document.write('<script src="../../assets/lyrics-timed.js?cb='+Date.now()+'"><\/script>')</script>
<script>document.write('<script src="../../assets/song-meta.js?cb='+Date.now()+'"><\/script>')</script>
<!-- optional city themes per album/song — safe to be missing. Schema: tools/TRANSIT-THEME-GUIDE.md -->
<script>document.write('<script src="../../assets/transit-themes.js?cb='+Date.now()+'"><\/script>')</script>
<script>
"use strict";
/* ============================================================
   MIDNIGHT TRANSIT — a lofi subway that runs on the record.
   The rattle of the car is the song's loudness (`lvl`), the
   streetlights whip past strictly on real hits (`imp`), the
   neon city outside is painted in the song's `hue`, and the
   passengers who board depend on the album (galaxy) on air.
   The playlist is the subway line — every stop is a song.
   ============================================================ */

function RAD(){try{return window.IBEERADIO||(window.top&&window.top.IBEERADIO)||null}catch(e){return window.IBEERADIO||null}}
function DB(n){try{return window[n]||(window.top&&window.top[n])||null}catch(e){return window[n]||null}}
document.addEventListener('pointerdown',function(){try{if(window.top!==window.self)window.top.postMessage('ibee-frame-tap','*')}catch(e){}});

var _impI=-1;
function groove(){
  var r=RAD(); if(!r||!r.playing||!r.playing()) return null;
  var B=DB('IBEE_BEAT'), g=B&&B[r.slug()]; var t=(r.audio&&r.audio.currentTime)||0;
  if(!g){ return {t:t,bpm:100,low:r.beat?r.beat():0,lvl:r.level?r.level():0,imp:0,i:-1,synth:true}; }
  var i=Math.max(0,Math.min(g.low.length-1,Math.floor(t*g.r)));
  return {t:t,bpm:g.bpm||100,
    low:parseInt(g.low.charAt(i),36)/35,
    lvl:parseInt(g.lvl.charAt(i),36)/35,
    imp:g.imp?parseInt(g.imp.charAt(Math.min(i,g.imp.length-1)),36)/35:0, i:i};
}
function impEdge(gv){ if(!gv||gv.i<0) return false; if(gv.i===_impI) return false; _impI=gv.i; return gv.imp>=0.55; }
function seedFor(s){var h=2166136261;s=s||'';for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return function(){h^=h<<13;h^=h>>>17;h^=h<<5;return ((h>>>0)%1000)/1000;};}

function slugNow(){var r=RAD();return r&&r.slug&&r.slug()||null}
function songNow(){var r=RAD();try{return r&&r.song&&r.song()||null}catch(e){return null}}
function hueNow(){var s=songNow();return s&&s.hue!=null?s.hue:75}
function galNow(){var s=songNow();return (s&&s.g)||'rss'}
var GALNAME={rss:'RARE SOUL SESSIONS',mzs:'20 MIN ZA SESSION',np:'NOUVEAUX PUNK',pp:'PPFDB 2',mv:'MINI VIBE',ddlf:'DEBUT DE LA FIN',bip:'BIPOLAIRE',vault:'THE VAULT'};

/* ---------- stage ---------- */
var W=384,H=216;
var bg=document.getElementById('bg'),bctx=bg.getContext('2d');
var fx=document.getElementById('fx'),fctx=fx.getContext('2d');
bg.width=W;bg.height=H;
var stage=document.getElementById('stage'),S=3,FW=0,FH=0;
/* keep in sync with the #wrap top band in the desktop @media rule below */
var TOPBAND=54;
function isDesktop(){ try{ return matchMedia('(min-width:900px) and (pointer:fine)').matches; }catch(e){ return false; } }
function fit(){
  /* PHONES → COVER the viewport so the car fills the screen (no black letterbox);
     portrait crops the car's far sides to the middle seats, the WHOLE-TRAIN toggle
     shows every car. DESKTOP → CONTAIN inside a top-banded area so the LED
     destination sign at the very top of the scene is never cropped off by the
     window edge, and the MIDNIGHT LINE strip sits in the band ABOVE the car
     instead of on top of the sign. The #wrap night gradient fills the surround. */
  var desk=isDesktop(), pad=desk?TOPBAND:0;
  var availH=Math.max(1,innerHeight-pad);
  var sc=desk ? Math.min(innerWidth/W, availH/H)      // contain: whole car (+ its top sign) always visible
              : Math.max(innerWidth/W, innerHeight/H); // cover: fills phones, unchanged
  var cw=Math.ceil(W*sc),ch=Math.ceil(H*sc);
  stage.style.width=cw+'px';stage.style.height=ch+'px';
  var dpr=Math.min(2,devicePixelRatio||1);
  fx.width=FW=Math.floor(cw*dpr);fx.height=FH=Math.floor(ch*dpr);S=FW/W;
}
addEventListener('resize',fit);
try{ matchMedia('(min-width:900px) and (pointer:fine)').addEventListener('change',fit); }catch(e){}
fit();
function px(n){return Math.round(n)}
function hsl(h,s,l,a){return 'hsla('+h+','+s+'%,'+l+'%,'+(a==null?1:a)+')'}
function rect(x,y,w,h,c){bctx.fillStyle=c;bctx.fillRect(px(x),px(y),px(w),px(h))}

/* ---------- train state machine ---------- */
/* station → doorsClose → cruise ⇄ (brake → doorsOpen → station) */
var mode='station', speed=0, doorT=1;      // doorT 1 = fully open
var curSlug=null, curGal=null, pendingBoard=true;
var tunnelT=0, stationName='MIDNIGHT ST.';
var LOW=0,LVL=0,PULSE=0,T=0;
var sc1=0,sc2=0,sc3=0,platX=0;             // parallax scrolls
var posts=[], sparks=[], bubbles=[], toasts=[];
var strapA=[],strapV=[];for(var i=0;i<7;i++){strapA.push(0);strapV.push(0);}
var catX=-40,catOn=false;
var lastSung=null,singT=0;           // passengers sing the current line on their own

/* ============ THEME ENGINE — skins the city per album / per song ============
   Themes load from assets/transit-themes.js (OPTIONAL — the room runs fine without it):
     window.IBEE_TRANSIT_THEMES = { "album:<galaxyId>": {...}, "song:<file.mp3>": {...} }
   Every field is validated with a fallback below, so a broken/half-written theme
   can NEVER crash the room — bad values just snap back to defaults.
   Full schema + an AI prompt template: tools/TRANSIT-THEME-GUIDE.md */
function hex2rgb(v,d){
  if(typeof v!=='string')return d;
  var m=v.trim().match(/^#([0-9a-f]{6})$/i);if(!m)return d;
  var n=parseInt(m[1],16);return (n>>16&255)+','+(n>>8&255)+','+(n&255);
}
function safeTheme(t){
  if(!t||typeof t!=='object')return null;
  function num(v,d,lo,hi){v=+v;return isFinite(v)?Math.min(hi,Math.max(lo,v)):d;}
  function pick(v,list,d){return list.indexOf(v)>=0?v:d;}
  function str(v,d,n){return typeof v==='string'?v.slice(0,n||80):d;}
  return {
    name:      str(t.name,'CUSTOM LINE',26).toUpperCase(),
    skyTop:    hex2rgb(t.skyTop,'12,4,22'),      // rgb triplets, ready for rgba()
    skyMid:    hex2rgb(t.skyMid,'34,8,30'),
    skyLow:    hex2rgb(t.skyLow,'66,20,8'),
    skyAlpha:  num(t.skyAlpha,0.8,0,0.95),
    moonHue:   num(t.moonHue,26,0,360),
    moonFace:  pick(t.moonFace,['none','pumpkin','skull','crescent'],'none'),
    windowHue: num(t.windowHue,45,0,360),
    flyers:    pick(t.flyers,['none','bats','ghosts','birds','hearts'],'none'),
    lightning: !!t.lightning,
    fogAlpha:  num(t.fogAlpha,0,0,0.12),
    fogHue:    num(t.fogHue,270,0,360),
    roofSign:  pick(t.roofSign,['bars','guitar'],'bars'),
    prop:      pick(t.prop,['none','pumpkin','lantern'],'none'),
    led:       str(t.led,'',70),
    moteHue:   num(t.moteHue,-1,-1,360),         // -1 = motes follow the song's hue
    bgText:    str(t.bgText,'',26)               // faint message written across the sky
  };
}
/* built-in: NOUVEAUX PUNK = halloween punk night (a theme file can override it) */
var BUILTIN_THEMES={'album:np':{name:'☠ PUNK NIGHT LINE',skyTop:'#0c0416',skyMid:'#22081e',skyLow:'#42140a',
  skyAlpha:0.85,moonHue:26,moonFace:'pumpkin',windowHue:20,flyers:'bats',lightning:true,
  fogAlpha:0.05,fogHue:270,roofSign:'guitar',prop:'pumpkin',
  led:'☠ NOUVEAUX PUNK NIGHT SERVICE  ⟶  NOW SHREDDING: ',moteHue:24}};
var TH=null,_thKey=null;
function themeTick(){
  var key=null,raw=null,slug=slugNow(),gal=galNow();
  try{
    var U=DB('IBEE_TRANSIT_THEMES');U=(U&&typeof U==='object')?U:{};
    if(slug&&U['song:'+slug]){key='song:'+slug;raw=U[key];}
    else if(U['album:'+gal]){key='album:'+gal;raw=U[key];}
    else if(BUILTIN_THEMES['album:'+gal]){key='builtin:'+gal;raw=BUILTIN_THEMES['album:'+gal];}
  }catch(e){key=null;raw=null;}
  if(key!==_thKey){_thKey=key;try{TH=raw?safeTheme(raw):null;}catch(e){TH=null;}}
}
/* theme layer state (HALLO = theme intensity, fades 0..1) + magic bits */
var HALLO=0, LTN=0, BOLT=null, bats=[];
var chA=0,chV=0, SPK=[];             // the hanging charm + its sparkles
var CHARMS=['LUCKY STAR','LIL MOON','THUNDER BOLT','PUNK SKULL'];
var MOTES=[];for(var mi=0;mi<14;mi++)MOTES.push({x:60+Math.random()*264,y:36+Math.random()*112,p:Math.random()*6.28});
function makeBolt(){var pts=[],bx=40+Math.random()*(W-80),by=26;pts.push([bx,by]);
  while(by<95){bx+=(Math.random()-0.5)*22;by+=8+Math.random()*10;pts.push([bx,by]);}return pts;}

/* passengers */
var PASS=[];
var SEATS=[74,116,158,200,242,284,318];
function crewFor(gal,slug){
  var rr=seedFor((slug||'x')+gal), hue=hueNow(), out=[];
  var n=2+Math.floor(rr()*4);                       // 2–5 riders
  var used={};
  for(var i=0;i<n;i++){
    var si;do{si=Math.floor(rr()*SEATS.length);}while(used[si]);used[si]=1;
    var p={x:SEATS[si],seed:rr,type:gal,skin:['#e8c39e','#c68e5e','#8a5a38','#5e3a22'][Math.floor(rr()*4)],
      hue:(hue+rr()*90-45+360)%360, h2:(hue+180+rr()*60)%360,
      hair:Math.floor(rr()*4), acc:Math.floor(rr()*4), bob:0, tall:rr()*4};
    out.push(p);
  }
  return out;
}

/* ---------- interactions ---------- */
function toLow(e){var r=stage.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};}
function toast(t){toasts.push({t:t,life:3});}
stage.addEventListener('pointerdown',function(e){
  var p=toLow(e), r=RAD();
  /* passengers first */
  for(var i=0;i<PASS.length;i++){var q=PASS[i];
    if(Math.abs(p.x-q.x)<12&&p.y>96&&p.y<152){
      q.bob=1;
      var line=lyricNow();
      bubbles.push({x:q.x,y:96,t:line||'♪ hmm hm hmmm ♪',life:3.2});
      return;
    }}
  /* the hanging charm → a little magic (sparkles + swap the charm) */
  if(Math.abs(p.x-312)<11&&p.y>26&&p.y<60){
    chV+=4;
    var chh=[52,200,96,350][TRANSIT.charm%4];
    for(var sk=0;sk<16;sk++)SPK.push({x:312,y:46,vx:(Math.random()-0.5)*70,vy:-15-Math.random()*55,
      life:0.5+Math.random()*0.6,h:(chh+Math.random()*40-20+360)%360});
    TRANSIT.charm=(TRANSIT.charm+1)%CHARMS.length;saveTransit();
    toast('✦ '+CHARMS[TRANSIT.charm]+' equipped_');return;
  }
  /* straps */
  if(p.y>26&&p.y<52){var idx=Math.round((p.x-48)/48);
    if(idx>=0&&idx<strapA.length&&Math.abs(p.x-(48+idx*48))<10){strapV[idx]+=3;return;}}
  /* LED sign strip → next record */
  if(p.y<24&&p.y>4&&p.x>90&&p.x<294){if(r)r.control.next();return;}
  /* doors */
  if((p.x>=8&&p.x<=52||p.x>=332&&p.x<=376)&&p.y>26&&p.y<160){
    if(mode==='station'&&r){r.control.play();toast('boarding_ mind the groove');}
    else toast('doors sealed while moving_');
    return;
  }
  /* bench seats → cycle YOUR trim colour (persists) */
  if(p.y>=124&&p.y<=157&&p.x>56&&p.x<328){
    var ti=TRIMS.indexOf(TRANSIT.trim);TRANSIT.trim=TRIMS[(ti+1)%TRIMS.length];saveTransit();
    toast(TRANSIT.trim<0?'seats follow the song_':'seat trim re-upholstered_');return;
  }
  /* windows → zen */
  if(p.y>28&&p.y<114&&p.x>56&&p.x<328){document.body.classList.toggle('zen');return;}
});
var TRIMS=[-1,300,190,120,28,0,260];   // -1 = follow the song's hue
document.getElementById('zenchip').onclick=function(){document.body.classList.toggle('zen')};
setTimeout(function(){document.getElementById('hint').classList.add('off')},9000);

/* current karaoke line (for singing passengers) */
function lyricNow(){
  var r=RAD();if(!r||!r.playing||!r.playing())return null;
  var s=r.slug(),t=r.audio.currentTime||0,dur=r.audio.duration||0;
  var TL=DB('IBEE_LYRICS_TIMED');var tl=TL&&TL[s];
  if(tl&&tl.length){var cur=null;for(var i=0;i<tl.length;i++){if(tl[i].t<=t)cur=tl[i];else break;}return cur&&cur.w;}
  var L=DB('IBEE_LYRICS');var pl=L&&L[s];
  if(pl&&pl.length&&dur)return pl[Math.min(pl.length-1,Math.floor(t/dur*pl.length))];
  return null;
}

/* ---------- THE LINE (playlist as subway map) ---------- */
var lineEl=document.getElementById('line'),lineBuilt=0;
function buildLine(){
  var r=RAD();if(!r||!r.count||r.count===lineBuilt)return;
  lineEl.querySelectorAll('.stop,.seg').forEach(function(n){n.remove()});
  for(var i=0;i<r.count;i++){
    if(i>0){var sg=document.createElement('span');sg.className='seg';lineEl.appendChild(sg);}
    var d=document.createElement('span');d.className='stop';d.dataset.i=i;
    var s=r.song(i);d.title=s?s.n:('#'+(i+1));
    (function(ii){d.onclick=function(){var rr=RAD();if(rr)rr.control.play(ii);};})(i);
    lineEl.appendChild(d);
  }
  lineBuilt=r.count;
}
setInterval(function(){
  buildLine();
  var r=RAD();if(!r)return;
  var cur=r.current?r.current():-1;
  lineEl.querySelectorAll('.stop').forEach(function(d){
    var on=+d.dataset.i===cur;
    d.classList.toggle('now',on);
    if(on){d.style.borderColor='';d.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});}
    else d.style.borderColor='#555';
  });
},900);

/* ============================================================
   DRAWING
   ============================================================ */
function drawCity(now,hue){
  /* sky */
  var sky=bctx.createLinearGradient(0,26,0,118);
  sky.addColorStop(0,hsl((hue+220)%360,50,7));
  sky.addColorStop(0.7,hsl(hue,45,12));
  sky.addColorStop(1,hsl(hue,55,16));
  bctx.fillStyle=sky;bctx.fillRect(0,26,W,92);
  /* stars + moon */
  var rr=seedFor('sky');
  for(var st=0;st<40;st++){var sx=(rr()*W*2-sc1*0.2)%(W*2);if(sx<0)sx+=W*2;
    bctx.fillStyle='rgba(255,255,255,'+(0.15+0.5*rr())+')';
    bctx.fillRect(px(sx%W),px(28+rr()*40),1,1);}
  var mx=(320-sc1*0.05)%(W+80);if(mx<-40)mx+=W+80;
  bctx.fillStyle=hsl(hue,60,80,0.9);bctx.beginPath();bctx.arc(mx,44,7,0,7);bctx.fill();
  bctx.fillStyle=hsl(hue,70,60,0.08+LVL*0.1);bctx.beginPath();bctx.arc(mx,44,14,0,7);bctx.fill();

  /* ---- THEMED NIGHT (driven by the active theme — np ships halloween punk built-in) ---- */
  if(HALLO>0.02&&TH){
    var hg=bctx.createLinearGradient(0,26,0,118);
    hg.addColorStop(0,'rgba('+TH.skyTop+','+(TH.skyAlpha*HALLO)+')');
    hg.addColorStop(0.65,'rgba('+TH.skyMid+','+(TH.skyAlpha*0.94*HALLO)+')');
    hg.addColorStop(1,'rgba('+TH.skyLow+','+(TH.skyAlpha*0.82*HALLO)+')');
    bctx.fillStyle=hg;bctx.fillRect(0,26,W,92);
    /* the theme's moon */
    bctx.fillStyle=hsl(TH.moonHue,95,52,HALLO);bctx.beginPath();bctx.arc(mx,44,9,0,7);bctx.fill();
    bctx.fillStyle=hsl(TH.moonHue,95,60,HALLO*(0.12+LVL*0.15));bctx.beginPath();bctx.arc(mx,44,17,0,7);bctx.fill();
    if(TH.moonFace==='pumpkin'){
      bctx.fillStyle='rgba(30,74,18,'+HALLO+')';bctx.fillRect(px(mx-1),33,3,4);   // stem
      bctx.fillStyle='rgba(16,4,0,'+HALLO+')';
      bctx.beginPath();bctx.moveTo(mx-6,43);bctx.lineTo(mx-2,43);bctx.lineTo(mx-4,39);bctx.closePath();bctx.fill();
      bctx.beginPath();bctx.moveTo(mx+2,43);bctx.lineTo(mx+6,43);bctx.lineTo(mx+4,39);bctx.closePath();bctx.fill();
      bctx.beginPath();bctx.moveTo(mx-5,47);bctx.lineTo(mx+5,47);bctx.lineTo(mx+3,49);bctx.lineTo(mx+1,47.5);
      bctx.lineTo(mx-1,49);bctx.lineTo(mx-3,47.5);bctx.closePath();bctx.fill();
    }else if(TH.moonFace==='skull'){
      bctx.fillStyle='rgba(16,4,0,'+HALLO+')';
      bctx.fillRect(px(mx-5),40,3,3);bctx.fillRect(px(mx+2),40,3,3);
      bctx.fillRect(px(mx-1),44,2,2);bctx.fillRect(px(mx-4),48,8,1);
      bctx.fillRect(px(mx-3),48,1,2);bctx.fillRect(px(mx),48,1,2);bctx.fillRect(px(mx+3),48,1,2);
    }else if(TH.moonFace==='crescent'){
      bctx.fillStyle='rgba('+TH.skyTop+','+(0.92*HALLO)+')';
      bctx.beginPath();bctx.arc(mx+4,42,8,0,7);bctx.fill();
    }
    /* flyers crossing the sky */
    bats.forEach(function(b){var wf=Math.sin(T*11+b.ph)*3*b.s;
      if(TH.flyers==='ghosts'){
        bctx.fillStyle='rgba(230,230,245,'+(0.4*HALLO)+')';
        bctx.beginPath();bctx.arc(b.x,b.y,3*b.s,3.14,0);
        bctx.lineTo(b.x+3*b.s,b.y+4);bctx.lineTo(b.x+1.5*b.s,b.y+3+wf*0.3);bctx.lineTo(b.x,b.y+4);
        bctx.lineTo(b.x-1.5*b.s,b.y+3-wf*0.3);bctx.lineTo(b.x-3*b.s,b.y+4);bctx.closePath();bctx.fill();
        bctx.fillStyle='rgba(10,10,20,'+(0.6*HALLO)+')';
        bctx.fillRect(px(b.x-1.5),px(b.y-1),1,1);bctx.fillRect(px(b.x+0.5),px(b.y-1),1,1);
      }else if(TH.flyers==='birds'){
        bctx.strokeStyle='rgba(10,8,14,'+Math.min(1,HALLO*1.2)+')';
        bctx.beginPath();bctx.moveTo(b.x-5*b.s,b.y-wf*0.6);bctx.quadraticCurveTo(b.x-2,b.y+1,b.x,b.y);
        bctx.quadraticCurveTo(b.x+2,b.y+1,b.x+5*b.s,b.y-wf*0.6);bctx.stroke();
      }else if(TH.flyers==='hearts'){
        var hhs=b.s*2.2,hhy=b.y+Math.sin(T*3+b.ph)*1.5;
        bctx.fillStyle=hsl(335,90,66,(0.5+0.3*Math.sin(T*4+b.ph))*HALLO);
        bctx.beginPath();
        bctx.arc(b.x-hhs*0.5,hhy,hhs*0.58,0,7);bctx.arc(b.x+hhs*0.5,hhy,hhs*0.58,0,7);bctx.fill();
        bctx.beginPath();bctx.moveTo(b.x-hhs*1.05,hhy+0.3);bctx.lineTo(b.x+hhs*1.05,hhy+0.3);
        bctx.lineTo(b.x,hhy+hhs*1.55);bctx.closePath();bctx.fill();
      }else{ /* bats */
        bctx.fillStyle='rgba(10,4,16,'+Math.min(1,HALLO*1.2)+')';
        bctx.fillRect(px(b.x-1),px(b.y-1),3,2);
        bctx.beginPath();bctx.moveTo(b.x-1,b.y);bctx.lineTo(b.x-6*b.s,b.y-wf);bctx.lineTo(b.x-2,b.y+1);bctx.closePath();bctx.fill();
        bctx.beginPath();bctx.moveTo(b.x+2,b.y);bctx.lineTo(b.x+7*b.s,b.y-wf);bctx.lineTo(b.x+3,b.y+1);bctx.closePath();bctx.fill();
      }
    });
    /* thunder */
    if(TH.lightning&&LTN>0.02){
      bctx.fillStyle='rgba(210,190,255,'+(LTN*0.16*HALLO)+')';bctx.fillRect(0,26,W,92);
      if(BOLT){bctx.strokeStyle='rgba(225,205,255,'+(LTN*HALLO)+')';bctx.lineWidth=1.5;
        bctx.beginPath();BOLT.forEach(function(pt,pi){pi?bctx.lineTo(pt[0],pt[1]):bctx.moveTo(pt[0],pt[1]);});bctx.stroke();
        bctx.lineWidth=1;}
    }
  }
  var wh=TH?45+(TH.windowHue-45)*HALLO:45;   // city window colour drifts with the theme

  /* far skyline */
  var rb=seedFor('far');var bwSum=0;
  for(var b=0;b<26;b++){
    var bw=14+rb()*22,bh=18+rb()*38;
    var bx=(bwSum-sc1)%(W+340);if(bx<-40)bx+=W+340;bwSum+=bw+2;
    bctx.fillStyle=hsl((hue+230)%360,25,7);bctx.fillRect(px(bx),px(118-bh),px(bw),px(bh));
    for(var wy=4;wy<bh-3;wy+=5)for(var wx=2;wx<bw-2;wx+=4){
      if(rb()<0.28){bctx.fillStyle=hsl(wh,70+20*HALLO,50,0.5);bctx.fillRect(px(bx+wx),px(118-bh+wy),1,1);}}
  }
  /* mid buildings + neon */
  var rm=seedFor('mid');var mSum=0;
  for(var m=0;m<16;m++){
    var mw=26+rm()*36,mh=34+rm()*52;
    var mx2=(mSum-sc2)%(W+420);if(mx2<-70)mx2+=W+420;mSum+=mw+8;
    bctx.fillStyle=hsl((hue+250)%360,28,10);bctx.fillRect(px(mx2),px(118-mh),px(mw),px(mh));
    bctx.fillStyle='rgba(0,0,0,.3)';bctx.fillRect(px(mx2+mw-4),px(118-mh),4,px(mh));
    for(var my=4;my<mh-4;my+=6)for(var mw2=3;mw2<mw-3;mw2+=5){
      if(rm()<0.34){bctx.fillStyle=rm()<0.12?hsl(hue,90,60,0.85):hsl(wh,75,55,0.6);
        bctx.fillRect(px(mx2+mw2),px(118-mh+my),2,3);}}
    /* neon sign — flickers with the loudness */
    if(rm()<0.6){
      var nh=(rm()<0.5?hue:(hue+180)%360), flick=0.55+LVL*0.45*(rm()<0.2?Math.random():1);
      bctx.fillStyle=hsl(nh,95,58,flick);
      var sy2=118-mh+6+rm()*12;
      if(rm()<0.5){bctx.fillRect(px(mx2+3),px(sy2),px(mw-6),4);}
      else{bctx.fillRect(px(mx2+mw/2-2),px(sy2),4,px(Math.min(16,mh-14)));}
      bctx.fillStyle=hsl(nh,95,70,flick*0.25);
      bctx.fillRect(px(mx2+1),px(sy2-2),px(mw-2),8);
    }
    /* themed rooftops can grow a neon GUITAR sign */
    var gsel=rm();
    if(HALLO>0.35&&TH&&TH.roofSign==='guitar'&&gsel<0.5&&mh>44)
      drawGuitarNeon(mx2+mw/2,118-mh+12,HALLO*(0.55+LVL*0.45));
  }
  /* rolling fog when the theme calls for it */
  if(HALLO>0.1&&TH&&TH.fogAlpha>0){
    for(var f=0;f<4;f++){var fgx=((T*5+f*110)%(W+180))-90;
      bctx.fillStyle=hsl(TH.fogHue,20,62,TH.fogAlpha*HALLO);
      bctx.beginPath();bctx.ellipse(fgx,112,58,7,0,0,7);bctx.fill();}
  }
  /* near lamp posts — spawned ONLY by real hits (imp) */
  for(var pI=posts.length-1;pI>=0;pI--){
    var po=posts[pI];po.x-=po.v;
    if(po.x<-30){posts.splice(pI,1);continue;}
    bctx.fillStyle='#05050a';bctx.fillRect(px(po.x),30,4,88);
    bctx.fillStyle=hsl(hue,95,65,0.95);bctx.fillRect(px(po.x-3),34,10,4);
    var lg=bctx.createRadialGradient(po.x+2,36,2,po.x+2,36,30);
    lg.addColorStop(0,hsl(hue,95,65,0.5));lg.addColorStop(1,'transparent');
    bctx.fillStyle=lg;bctx.fillRect(px(po.x-28),26,60,60);
  }
  /* tunnel wash */
  if(tunnelT>0){
    bctx.fillStyle='rgba(4,4,8,'+Math.min(1,tunnelT*1.4)+')';bctx.fillRect(0,26,W,92);
    var tl=(T*560)%90;
    for(var tt=0;tt<6;tt++){var tx=W-((tl+tt*90)%(W+90));
      bctx.fillStyle=hsl(hue,80,60,0.8*Math.min(1,tunnelT));bctx.fillRect(px(tx),40,3,10);
      bctx.fillStyle=hsl(hue,80,60,0.15*Math.min(1,tunnelT));bctx.fillRect(px(tx-6),34,16,24);}
  }
  /* station platform (visible when slow) */
  if(speed<0.35&&mode!=='cruise'){
    var pa=1-speed/0.35;
    bctx.globalAlpha=pa;
    bctx.fillStyle='#101018';bctx.fillRect(px(-platX),96,W+40,22);
    bctx.fillStyle='#b6ff00';bctx.fillRect(px(-platX),96,W+40,2);
    for(var pp2=0;pp2<9;pp2++){var ppx=(pp2*52-platX)%(W+52);
      bctx.fillStyle='#1c1c26';bctx.fillRect(px(ppx),30,6,66);}
    /* station sign */
    bctx.fillStyle='#0a0a12';bctx.fillRect(120,44,144,18);
    bctx.strokeStyle=hsl(hueNow(),80,55);bctx.strokeRect(120.5,44.5,143,17);
    /* themed props glowing on the platform */
    if(HALLO>0.3&&TH&&TH.prop!=='none'){[96,286].forEach(function(jx){
      if(TH.prop==='pumpkin'){
        bctx.fillStyle=hsl(26,90,50,pa*HALLO);bctx.beginPath();bctx.arc(jx,92,4,0,7);bctx.fill();
        bctx.fillStyle='rgba(30,74,18,'+(pa*HALLO)+')';bctx.fillRect(px(jx-1),86,2,3);
        bctx.fillStyle='rgba(12,3,0,'+(pa*HALLO)+')';
        bctx.fillRect(px(jx-3),90,2,2);bctx.fillRect(px(jx+1),90,2,2);bctx.fillRect(px(jx-2),93,4,1);
        bctx.fillStyle=hsl(26,95,60,pa*HALLO*(0.12+PULSE*0.2));bctx.beginPath();bctx.arc(jx,92,9,0,7);bctx.fill();
      }else{ /* paper lantern */
        bctx.strokeStyle='rgba(60,60,70,'+(pa*HALLO)+')';
        bctx.beginPath();bctx.moveTo(jx,84);bctx.lineTo(jx,88);bctx.stroke();
        bctx.fillStyle=hsl(TH.windowHue,90,55,pa*HALLO);bctx.fillRect(px(jx-3),88,6,7);
        bctx.fillStyle=hsl(TH.windowHue,95,65,pa*HALLO*(0.14+PULSE*0.2));
        bctx.beginPath();bctx.arc(jx,91,8,0,7);bctx.fill();
      }
    });}
    bctx.globalAlpha=1;
  }
}

/* a rooftop neon guitar — punk's own signage */
function drawGuitarNeon(x,y,a){
  if(a<=0.02)return;
  bctx.fillStyle=hsl(350,95,60,a*0.16);bctx.fillRect(px(x-13),px(y-8),28,30);   // glow wash
  bctx.strokeStyle=hsl(96,95,60,a);bctx.lineWidth=2;
  bctx.beginPath();bctx.moveTo(x-5,y+13);bctx.lineTo(x+7,y-2);bctx.stroke();    // neck
  bctx.fillStyle=hsl(96,95,60,a*0.9);bctx.fillRect(px(x+6),px(y-6),5,5);        // headstock
  bctx.fillStyle=hsl(350,95,55,a);                                              // body
  bctx.beginPath();bctx.arc(x-6,y+14,5,0,7);bctx.fill();
  bctx.beginPath();bctx.arc(x-2,y+10,4,0,7);bctx.fill();
  bctx.fillStyle='rgba(0,0,0,'+(a*0.8)+')';bctx.fillRect(px(x-7),px(y+12),3,3); // pickup
  bctx.strokeStyle='rgba(255,255,255,'+(a*0.7)+')';bctx.lineWidth=1;
  bctx.beginPath();bctx.moveTo(x-6,y+12);bctx.lineTo(x+7,y-3);bctx.stroke();    // string
}

function drawStrap(x,a){
  bctx.save();bctx.translate(x,28);bctx.rotate(a);
  bctx.strokeStyle='#3d3d49';bctx.beginPath();bctx.moveTo(0,0);bctx.lineTo(0,14);bctx.stroke();
  bctx.strokeStyle='#8a8a98';bctx.beginPath();bctx.arc(0,18,4,0,7);bctx.stroke();
  bctx.restore();
}

/* YOUR charm, hanging off the handrail — swings with the ride, sparkles when tapped */
function drawCharm(x,hue){
  bctx.save();bctx.translate(x,28);bctx.rotate(chA);
  bctx.strokeStyle='#6a6a78';bctx.beginPath();bctx.moveTo(0,0);bctx.lineTo(0,13);bctx.stroke();
  var ch=TRANSIT.charm%4;
  /* soft magic halo, breathing with the beat */
  bctx.fillStyle=hsl((HALLO>0.5&&TH&&TH.moteHue>=0)?TH.moteHue:hue,90,60,0.10+PULSE*0.22);
  bctx.beginPath();bctx.arc(0,17,8,0,7);bctx.fill();
  if(ch===0){        // lucky star
    bctx.fillStyle=hsl(52,95,64,0.95);
    bctx.save();bctx.translate(0,17);bctx.rotate(0.79);bctx.fillRect(-3,-3,6,6);bctx.restore();
    bctx.fillRect(-1,13,2,8);bctx.fillRect(-4,16,8,2);
  }else if(ch===1){  // lil moon
    bctx.strokeStyle=hsl(200,80,82,0.95);bctx.lineWidth=2.4;
    bctx.beginPath();bctx.arc(0,17,4,0.7,4.3);bctx.stroke();bctx.lineWidth=1;
  }else if(ch===2){  // thunder bolt
    bctx.fillStyle=hsl(96,95,60,0.95);
    bctx.beginPath();bctx.moveTo(1,12);bctx.lineTo(-3,18);bctx.lineTo(0,18);bctx.lineTo(-1,23);bctx.lineTo(3,17);bctx.lineTo(0,17);bctx.closePath();bctx.fill();
  }else{             // punk skull
    bctx.fillStyle='#e8e8f2';bctx.fillRect(-3,13,7,6);bctx.fillRect(-2,19,5,2);
    bctx.fillStyle='#0a0a0a';bctx.fillRect(-2,15,2,2);bctx.fillRect(1,15,2,2);
  }
  bctx.restore();
}

function drawPassenger(p,now,hue){
  var bob=p.bob*3+(LVL*1.5*Math.max(0,Math.sin(now*2.6+p.x)));
  var y=112-p.tall, hx=p.x;
  /* legs */
  bctx.fillStyle='#15151d';bctx.fillRect(px(hx-7),140,5,14);bctx.fillRect(px(hx+2),140,5,14);
  bctx.fillStyle='#0c0c12';bctx.fillRect(px(hx-8),152,7,4);bctx.fillRect(px(hx+1),152,7,4);
  /* torso */
  var tor=p.type==='np'?'#1a1a1f':hsl(p.hue,45,26);
  bctx.fillStyle=tor;bctx.fillRect(px(hx-8),px(y+22),17,20);
  if(p.type==='np'){bctx.fillStyle='#cfcfd8';                       // studs
    bctx.fillRect(px(hx-6),px(y+25),1,1);bctx.fillRect(px(hx+5),px(y+25),1,1);
    bctx.fillRect(px(hx-6),px(y+31),1,1);bctx.fillRect(px(hx+5),px(y+31),1,1);}
  if(p.acc===1){bctx.fillStyle=hsl(p.h2,70,45);bctx.fillRect(px(hx-8),px(y+22),17,4);} // collar
  /* head */
  bctx.fillStyle=p.skin;bctx.fillRect(px(hx-6),px(y+8-bob),13,14);
  bctx.fillStyle='#0a0a0a';bctx.fillRect(px(hx-3),px(y+13-bob),2,2);bctx.fillRect(px(hx+3),px(y+13-bob),2,2);
  /* hair / crown by crew */
  if(p.type==='np'){                                                 // mohawk
    bctx.fillStyle=hsl(p.h2,90,50);
    for(var mh=0;mh<4;mh++)bctx.fillRect(px(hx-3+mh*3),px(y+1-bob-(mh%2)*2),2,8);
  }else if(p.type==='bip'){                                          // glow visor
    bctx.fillStyle='#15151d';bctx.fillRect(px(hx-6),px(y+6-bob),13,4);
    bctx.fillStyle=hsl(p.h2,95,60,0.7+LVL*0.3);bctx.fillRect(px(hx-6),px(y+12-bob),13,3);
  }else if(p.type==='mv'){                                           // afro
    bctx.fillStyle='#14100c';bctx.beginPath();bctx.arc(hx,y+7-bob,9,0,7);bctx.fill();
  }else if(p.type==='ddlf'){                                         // hood up, head down
    bctx.fillStyle=hsl(p.hue,30,18);bctx.fillRect(px(hx-8),px(y+5-bob),17,12);
    bctx.fillStyle='#05050a';bctx.fillRect(px(hx-4),px(y+11-bob),9,6);
  }else{                                                             // soul crew — hair + headphones
    var hairC=['#14100c','#2b1a10','#3a2b1a','#101018'][p.hair];
    bctx.fillStyle=hairC;bctx.fillRect(px(hx-6),px(y+4-bob),13,6);
    if(p.hair===2)bctx.fillRect(px(hx-8),px(y+6-bob),3,10);
    bctx.strokeStyle=hsl(p.hue,85,55);bctx.lineWidth=2;
    bctx.beginPath();bctx.arc(hx,y+13-bob,9,3.3,6.1);bctx.stroke();bctx.lineWidth=1;
    bctx.fillStyle=hsl(p.hue,85,45);bctx.fillRect(px(hx-9),px(y+11-bob),3,6);bctx.fillRect(px(hx+7),px(y+11-bob),3,6);
  }
  /* accessory on lap */
  if(p.acc===2){bctx.fillStyle='#1d1d28';bctx.fillRect(px(hx-7),136,15,5); // boombox / case
    bctx.fillStyle=hsl(p.hue,90,55,0.6+PULSE*0.4);bctx.fillRect(px(hx-4),137,3,3);bctx.fillRect(px(hx+2),137,3,3);}
  if(p.acc===3&&p.type!=='ddlf'){bctx.fillStyle='#e8e2cf';bctx.fillRect(px(hx-5),134,11,7);} // book
  p.bob*=0.9;
}

function drawInterior(now,hue,jit){
  bctx.save();bctx.translate(0,jit);
  /* ceiling + LED destination strip */
  rect(0,0,W,26,'#181820');
  rect(0,24,W,2,'#101016');
  rect(88,6,208,14,'#050508');
  bctx.strokeStyle='#2c2c38';bctx.strokeRect(88.5,6.5,207,13);
  /* hand rail + straps */
  rect(40,26,W-80,2,'#3d3d49');
  for(var st=0;st<strapA.length;st++)drawStrap(48+st*48,strapA[st]);
  drawCharm(312,hue);
  /* pillars between windows & doors */
  var pil=[0,52,142,232,322,376];
  bctx.fillStyle='#1c1c26';
  pil.forEach(function(pxx){bctx.fillRect(px(pxx),26,8,134)});
  rect(0,114,W,10,'#20202c');                     // sill band
  rect(0,124,W,36,'#181822');                     // wall under windows
  bctx.fillStyle=hsl(hue,40,22,0.5+PULSE*0.5);bctx.fillRect(0,122,W,2); // hue trim
  /* window frames (city already painted behind) */
  [[60,80],[150,80],[240,80]].forEach(function(w){

function drawFx(now,hue){

  var led = playing&&s ? (((HALLO>0.5&&TH&&TH.led)?TH.led:'◈  MIDNIGHT LINE  ⟶  NOW ARRIVING: ')
                          +s.n+'   ·   ALBUM: '+(GALNAME[galNow()]||galNow().toUpperCase())

                       : '◈  MIDNIGHT LINE  ⟶  SERVICE SUSPENDED — PRESS ▶ TO DEPART   ';
  fctx.save();fctx.beginPath();fctx.rect(90*S,7*S,204*S,12*S);fctx.clip();
  fctx.font=(8*S)+'px VT323';
  fctx.fillStyle=hsl(hue,95,60);fctx.shadowColor=hsl(hue,95,55);fctx.shadowBlur=3;
  var lw=fctx.measureText(led).width;
  var off=(now*36*S)%lw;
  fctx.fillText(led,90*S-off,8.6*S);fctx.fillText(led,90*S-off+lw,8.6*S);
  fctx.shadowBlur=0;fctx.restore();
  /* station sign text */
  if(speed<0.35&&mode!=='cruise'){
    fctx.font=(6*S)+'px "Press Start 2P"';fctx.textAlign='center';
    fctx.fillStyle='#b6ff00';
    fctx.fillText(stationName,192*S,50*S);
    fctx.font=(6*S)+'px VT323';fctx.fillStyle='#7a7a7a';
    fctx.fillText(playing?'departing_':'press ▶ to depart',192*S,57*S);
    fctx.textAlign='left';
  }
  /* speech bubbles — passengers sing the real line */
  for(var b=bubbles.length-1;b>=0;b--){var bb=bubbles[b];bb.life-=0.016;bb.y-=0.06;
    if(bb.life<=0){bubbles.splice(b,1);continue;}
    fctx.font=(6.5*S)+'px VT323';fctx.textAlign='center';
    var t=bb.t.length>34?bb.t.slice(0,33)+'…':bb.t;
    var tw=fctx.measureText(t).width+10;
    var bx=Math.max(tw/2+2,Math.min(FW-tw/2-2,bb.x*S));
    fctx.globalAlpha=Math.min(1,bb.life);
    fctx.fillStyle='rgba(6,10,2,.92)';fctx.fillRect(bx-tw/2,(bb.y-10)*S,tw,9*S);
    fctx.strokeStyle='#b6ff00';fctx.strokeRect(bx-tw/2,(bb.y-10)*S,tw,9*S);
    fctx.fillStyle='#d9ffd0';fctx.fillText(t,bx,(bb.y-8)*S);
    fctx.globalAlpha=1;fctx.textAlign='left';}
  /* charm sparkles — the little magic */
  for(var sk=SPK.length-1;sk>=0;sk--){var k=SPK[sk];
    k.life-=0.016;k.x+=k.vx*0.016;k.y+=k.vy*0.016;k.vy+=55*0.016;
    if(k.life<=0){SPK.splice(sk,1);continue;}
    fctx.fillStyle=hsl(k.h,95,72,Math.min(1,k.life*1.6));
    fctx.fillRect(k.x*S,k.y*S,2,2);

      fctx.fillRect(k.x*S-2,k.y*S,6,1);fctx.fillRect(k.x*S,k.y*S-2,1,6);}
  }
  /* toasts */
  for(var to=toasts.length-1;to>=0;to--){var tt=toasts[to];tt.life-=0.016;
    if(tt.life<=0){toasts.splice(to,1);continue;}

    fctx.globalAlpha=1;fctx.textAlign='left';}
}

  var n=r&&r.count?r.count:0,cur=r&&r.current?Math.max(0,r.current()):0;
  carRects=[];engRect=null;
  if(!n){octx.fillStyle='#7a7a7a';octx.font='14px "Press Start 2P"';octx.textAlign='center';
    octx.fillText('RADIO OFF',W2/2,H2/2);octx.textAlign='left';return;}

  /* --- the driving train (heads LEFT — the city streams past it) --- */
  var carW=Math.min(150,W2*0.42),carH=carW*0.52,gap=14,cy=railY-carH+6;
  var baseX=W2/2-carW/2-cur*(carW+gap);
  /* engine up front (left of car 0) */
  var engW=carW*0.72,ex=baseX-gap-engW,ebob=Math.sin(now*5)*speed*2;
  if(ex<W2+engW&&ex>-engW-260){
    var ey=cy-ebob;
    /* headlight beam */
    var hb=octx.createLinearGradient(ex,0,ex-240,0);
    hb.addColorStop(0,hsl(52,95,70,0.28+HORN*0.4+LVL*0.12));hb.addColorStop(1,'transparent');
    octx.fillStyle=hb;
    octx.beginPath();octx.moveTo(ex+4,ey+carH*0.42);octx.lineTo(ex-240,ey+carH*0.1);
    octx.lineTo(ex-240,ey+carH*0.95);octx.closePath();octx.fill();
    /* body: sloped nose */
    octx.fillStyle=hsl(hue,40,20);
    octx.beginPath();octx.moveTo(ex+engW,ey);octx.lineTo(ex+14,ey);octx.lineTo(ex,ey+carH*0.45);
    octx.lineTo(ex,ey+carH);octx.lineTo(ex+engW,ey+carH);octx.closePath();octx.fill();
    octx.strokeStyle=hsl(hue,80,55,0.8);octx.stroke();
    octx.fillStyle=hsl(hue,80,46,0.5+LVL*0.5);octx.fillRect(ex+16,ey+7,engW*0.4,carH*0.3); /* windshield */
    octx.fillStyle=hsl(52,95,70,0.7+HORN*0.3);octx.beginPath();octx.arc(ex+5,ey+carH*0.46,4,0,7);octx.fill();
    octx.fillStyle=hsl(hue,90,60,0.5+PULSE*0.5);octx.fillRect(ex,ey+carH-7,engW,4);        /* skirt stripe */
    oWheel(ex+engW*0.28,railY+7,9,wheelA);oWheel(ex+engW*0.75,railY+7,9,wheelA+1.3);
    engRect={x:ex,y:ey,w:engW,h:carH};
  }
  /* cars — one per record; tap one to ride it */
  for(var i=0;i<n;i++){
    var cx=baseX+i*(carW+gap); if(cx>W2+carW||cx<-carW)continue;
    var s2=r.song(i),on=(i===cur),chue=(s2&&s2.hue!=null)?s2.hue:hue;
    var bob=Math.sin(now*5+i*1.3)*speed*2+(on&&playing?LVL*4:0),cyy=cy-bob;
    /* coupler */
    octx.strokeStyle='#2a2a34';octx.beginPath();octx.moveTo(cx-gap,cyy+carH*0.6);octx.lineTo(cx,cyy+carH*0.6);octx.stroke();
    /* body */
    octx.fillStyle=hsl(chue,on?55:28,on?24:15);octx.fillRect(cx,cyy,carW,carH);
    octx.fillStyle='rgba(0,0,0,.25)';octx.fillRect(cx,cyy,carW,5);                    /* roof line */
    octx.strokeStyle=on?hsl(hue,90,62):'#2a2a34';octx.lineWidth=on?2:1;octx.strokeRect(cx,cyy,carW,carH);octx.lineWidth=1;
    /* windows + riders */
    var wn=4,ww=(carW-16)/wn;
    for(var w=0;w<wn;w++){var wx=cx+8+w*ww;
      octx.fillStyle=on&&playing?hsl(hue,80,46,0.5+LVL*0.5):'#0c0c14';
      octx.fillRect(wx,cyy+9,ww-5,carH*0.4);
      if((i*7+w)%3!==0){octx.fillStyle=on?hsl(hue,30,72):'#3a3a46';
        octx.beginPath();octx.arc(wx+(ww-5)/2,cyy+9+carH*0.28,ww*0.13,0,7);octx.fill();}
    }
    /* mid door + hue skirt */
    octx.fillStyle='rgba(0,0,0,.3)';octx.fillRect(cx+carW/2-6,cyy+9,12,carH-16);
    octx.fillStyle=hsl(chue,90,55,(on?0.6:0.25)+PULSE*0.3);octx.fillRect(cx,cyy+carH-6,carW,3);
    oWheel(cx+carW*0.22,railY+7,8,wheelA+i);oWheel(cx+carW*0.78,railY+7,8,wheelA+i+1.6);
    /* label */
    octx.textAlign='center';
    if(on){octx.fillStyle=hsl(hue,90,72);octx.font='9px "Press Start 2P"';
      var nm=(s2&&s2.n||'').toUpperCase();octx.fillText(nm.length>16?nm.slice(0,15)+'…':nm,cx+carW/2,cyy+carH+26);}
    else{octx.fillStyle='#55555f';octx.font='7px "Press Start 2P"';octx.fillText('#'+(i+1),cx+carW/2,cyy+carH+24);}
    octx.textAlign='left';
    carRects.push({i:i,x:cx,y:cyy-10,w:carW,h:carH+34});
  }
  /* HUD */
  octx.textAlign='center';
  octx.fillStyle=hsl(hue,90,74);octx.font='10px "Press Start 2P"';
  octx.fillText(((HALLO>0.5&&TH)?TH.name+' — ':'MIDNIGHT LINE — ')+carName().toUpperCase(),W2/2,H2*0.06);
  octx.fillStyle='#9a9a9a';octx.font='7px "Press Start 2P"';
  octx.fillText(grade(TRANSIT.miles)+' · '+Math.floor(TRANSIT.miles).toLocaleString()+' MI · '+n+' STOPS · TAP A CAR TO RIDE IT',W2/2,H2*0.06+16);
  octx.textAlign='left';
  /* toasts live here too (the interior fx layer is hidden in this view) */
  for(var to=toasts.length-1;to>=0;to--){var tt=toasts[to];tt.life-=0.016;
    if(tt.life<=0){toasts.splice(to,1);continue;}
    octx.globalAlpha=Math.min(1,tt.life);octx.textAlign='center';
    octx.fillStyle='#0a0a0a';octx.fillRect(W2/2-130,H2-96,260,22);
    octx.fillStyle='#b6ff00';octx.font='16px VT323';octx.fillText(tt.t,W2/2,H2-80);
    octx.globalAlpha=1;octx.textAlign='left';}
}
/* tap a car → ride that record · tap the engine → honk */
over.addEventListener('pointerdown',function(e){
  if(viewMode!=='train')return;
  var x=e.clientX,y=e.clientY,r=RAD();if(!r)return;
  for(var i=0;i<carRects.length;i++){var c=carRects[i];
    if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h){
      HORN=1;
      if(c.i===(r.current?r.current():-1)){
        if(r.playing&&r.playing()){r.control.pause();toast('holding at the platform_');}
        else{r.control.play();toast('rolling again_');}
      }else{r.control.play(c.i);toast('switching to car #'+(c.i+1)+'_');}
      return;
    }}
  if(engRect&&x>=engRect.x&&x<=engRect.x+engRect.w&&y>=engRect.y&&y<=engRect.y+engRect.h){
    HORN=1;toast('HOOOONK — the driver nods_');return;}
});

/* ---------- main loop ---------- */
var last=performance.now();
function loop(nowMs){
  requestAnimationFrame(loop);
  var dt=Math.min(0.05,(nowMs-last)/1000);last=nowMs;T+=dt;
  var r=RAD(),playing=r&&r.playing&&r.playing();
  var g=groove(),hue=hueNow();
  if(g){LOW+=(g.low-LOW)*0.25;LVL+=(g.lvl-LVL)*0.2;
    if(impEdge(g)){PULSE=1;
      posts.push({x:W+20,v:5.5+speed*4});
      if(g.imp>0.8&&Math.random()<0.5)sparks.push({life:0.3});
      if(HALLO>0.4&&TH&&TH.lightning&&Math.random()<0.45){LTN=1;BOLT=makeBolt();}   // thunder on the hits
    }}
  else{LOW*=0.94;LVL*=0.94;}
  PULSE*=0.88;LTN*=0.86;HORN*=0.9;
  tunnelT=Math.max(0,tunnelT-dt*0.5);

  /* the themed city fades in while a themed record is on air (np = built-in halloween punk) */
  themeTick();
  HALLO+=(((TH&&playing)?1:0)-HALLO)*Math.min(1,dt*1.2);
  if(HALLO>0.2&&TH&&TH.flyers!=='none'){
    var hrt=TH.flyers==='hearts';                 // hearts everywhere: more of them, they rise
    if(bats.length<(hrt?12:6)&&Math.random()<(hrt?0.07:0.02))
      bats.push({x:W+14,y:30+Math.random()*(hrt?62:44),v:(hrt?8:14)+Math.random()*(hrt?14:24),ph:Math.random()*6,s:0.7+Math.random()*0.8});
  }
  for(var bi=bats.length-1;bi>=0;bi--){bats[bi].x-=bats[bi].v*dt;
    if(TH&&TH.flyers==='hearts')bats[bi].y-=dt*4;
    if(bats[bi].x<-16||bats[bi].y<26)bats.splice(bi,1);}
  if(HALLO<=0.05)bats.length=0;

  /* charm swing (same spring as the straps) + the driving train's wheels/scenery */
  chV+=(-chA*5-chV*1.1)*dt+(Math.random()-0.5)*LVL*speed*dt*30+PULSE*speed*dt*4;
  chA+=chV*dt*3;
  wheelA+=speed*dt*14;trainSc+=speed*dt*260;

  /* --- song / galaxy transitions --- */
  var sl=slugNow(),gal=galNow();
  if(sl!==curSlug&&playing){
    if(curSlug===null||gal!==curGal){pendingBoard=true;stationName=(GALNAME[gal]||gal.toUpperCase())+' ST.';
      if(mode==='cruise')mode='brake';}
    else tunnelT=1.6;                       // same album: blast through a tunnel
    curSlug=sl;curGal=gal;
  }
  if(pendingBoard&&(mode==='station'||curSlug===null)){PASS=crewFor(gal,sl);pendingBoard=false;}

  /* --- passengers SING on their own (no tap): each new lyric line, someone picks it up;
     between lines they hum. Bubbles are capped so the car never floods. --- */
  singT-=dt;
  if(playing&&PASS.length&&bubbles.length<3){
    var line=lyricNow();
    if(line&&line!==lastSung){
      lastSung=line;
      var q=PASS[Math.floor(Math.random()*PASS.length)];
      q.bob=1;bubbles.push({x:q.x,y:96,t:line,life:2.8});
      if(PASS.length>1&&Math.random()<0.4){var q2=PASS[Math.floor(Math.random()*PASS.length)];
        if(q2!==q){q2.bob=1;bubbles.push({x:q2.x,y:96,t:line,life:2.8});}}
    } else if(singT<=0&&Math.random()<0.5){
      singT=2.4+Math.random()*2.5;
      var qh=PASS[Math.floor(Math.random()*PASS.length)];qh.bob=1;
      bubbles.push({x:qh.x,y:96,t:['♪ hmm hm hmmm ♪','~ la la la ~','♫ ooh ♫','♪ mm-mm ♪'][Math.floor(Math.random()*4)],life:2.2});
    }
  }

  /* --- train state machine --- */
  if(mode==='cruise'){
    if(!playing)mode='brake';
    var target=0.55+LVL*0.45+((g&&g.bpm)||100)/400;
    speed+=(Math.min(1.2,target)-speed)*dt*1.5;
  }else if(mode==='brake'){
    speed=Math.max(0,speed-dt*0.45);
    if(speed<=0.01){speed=0;mode='doorsOpen';}
  }else if(mode==='doorsOpen'){
    doorT=Math.min(1,doorT+dt*1.6);
    if(doorT>=1){mode='station';
      if(pendingBoard){PASS=crewFor(gal,sl);pendingBoard=false;}}
  }else if(mode==='station'){
    speed=0;doorT=1;
    if(playing)mode='doorsClose';
  }else if(mode==='doorsClose'){
    doorT=Math.max(0,doorT-dt*1.6);
    if(doorT<=0)mode='cruise';
  }
  if(!playing&&mode==='cruise')mode='brake';

  /* parallax + rattle */
  sc1+=speed*22*dt*10;sc2+=speed*60*dt*10;sc3+=speed*140*dt*10;platX+=speed*140*dt*10;
  if(mode==='station')platX=0;
  var jit=(Math.random()-0.5)*2*(LVL*1.4*speed)+PULSE*speed*1.2;
  /* straps physics */
  for(var st=0;st<strapA.length;st++){
    strapV[st]+=(-strapA[st]*6-strapV[st]*1.2)*dt + (Math.random()-0.5)*LVL*speed*dt*30 + PULSE*speed*dt*4;
    strapA[st]+=strapV[st]*dt*3;
  }

  /* the line keeps rolling up your mileage while the train moves */
  if(playing)TRANSIT.miles+=speed*dt*9;

  /* WHOLE-TRAIN overview replaces the interior when toggled */
  if(viewMode==='train'){ drawWholeTrain(T); return; }

  /* paint */
  bctx.fillStyle='#04040a';bctx.fillRect(0,0,W,H);
  drawCity(T,hue);
  drawInterior(T,hue,jit);
  bctx.save();bctx.translate(0,jit);
  /* magic motes drifting through the car — glow to the beat (embers on punk nights) */
  for(var mo=0;mo<MOTES.length;mo++){var m=MOTES[mo];
    m.x+=Math.sin(T*0.6+m.p)*0.07;m.y+=Math.cos(T*0.5+m.p*1.3)*0.05-LVL*0.03;
    if(m.y<32)m.y=150;if(m.y>152)m.y=34;if(m.x<58)m.x=326;if(m.x>326)m.x=58;
    var ma=(0.10+0.30*(0.5+0.5*Math.sin(T*2+m.p)))*(0.5+PULSE*0.8);
    var mhh=(HALLO>0.5&&TH&&TH.moteHue>=0)?TH.moteHue:hue;
    bctx.fillStyle=hsl(mhh,95,HALLO>0.5?60:72,ma);
    bctx.fillRect(px(m.x),px(m.y),1,1);
    if(PULSE>0.5){bctx.fillStyle=hsl(mhh,95,82,ma*0.5);
      bctx.fillRect(px(m.x)-1,px(m.y)-1,3,3);}
  }
  PASS.forEach(function(p){drawPassenger(p,T,hue)});
  /* cat crossing */
  if(!catOn&&Math.random()<0.0007)catOn=true,catX=-30;
  if(catOn){catX+=14*dt;var cb=Math.sin(T*8)*0.8;
    bctx.fillStyle='#1c1c22';
    bctx.beginPath();bctx.ellipse(catX,196+cb,9,4,0,0,7);bctx.fill();
    bctx.beginPath();bctx.arc(catX+8,193+cb,3.6,0,7);bctx.fill();
    bctx.beginPath();bctx.moveTo(catX+6,190);bctx.lineTo(catX+7,187);bctx.lineTo(catX+9,190);bctx.fill();
    bctx.beginPath();bctx.moveTo(catX+9,190);bctx.lineTo(catX+11,187);bctx.lineTo(catX+12,190);bctx.fill();
    bctx.strokeStyle='#1c1c22';bctx.lineWidth=2;
    bctx.beginPath();bctx.moveTo(catX-8,195);bctx.quadraticCurveTo(catX-13,190-PULSE*5,catX-11,186);bctx.stroke();bctx.lineWidth=1;
    if(catX>W+30)catOn=false;}
  bctx.restore();
  /* wheel sparks on heavy hits */
  for(var sp=sparks.length-1;sp>=0;sp--){var k=sparks[sp];k.life-=dt;
    if(k.life<=0){sparks.splice(sp,1);continue;}
    bctx.fillStyle=hsl(hue,95,70,k.life*2.5);
    bctx.fillRect(0,208,W,8);bctx.fillStyle='rgba(255,255,255,'+k.life+')';
    bctx.fillRect(Math.random()*W,210,3,2);}
  /* interior light sweep on a hit */
  if(PULSE>0.05&&speed>0.2){
    var swx=(1-PULSE)*W;
    var sw=bctx.createLinearGradient(swx-50,0,swx+50,0);
    sw.addColorStop(0,'transparent');sw.addColorStop(0.5,hsl(hue,90,60,PULSE*0.13));sw.addColorStop(1,'transparent');
    bctx.fillStyle=sw;bctx.fillRect(0,0,W,H);
  }
  drawFx(T,hue);
}
requestAnimationFrame(loop);
</script>
<script>
/* fullscreen chip — hides itself where the API is missing (iPhone Safari) */
(function(){
  var b=document.getElementById('fstog'),d=document.documentElement;
  var req=d.requestFullscreen||d.webkitRequestFullscreen;
  if(!b)return; if(!req){b.style.display='none';return}
  function on(){return !!(document.fullscreenElement||document.webkitFullscreenElement)}
  function upd(){b.classList.toggle('on',on());b.title=on()?'exit fullscreen':'fullscreen'}
  b.addEventListener('click',function(){
    if(on()){(document.exitFullscreen||document.webkitExitFullscreen).call(document)}
    else{try{req.call(d)}catch(e){}}
  });
  document.addEventListener('fullscreenchange',upd);
  document.addEventListener('webkitfullscreenchange',upd);
  /* leaving the room while fullscreen would keep the shell's iframe fullscreen,
     hiding the nav + player — exit fullscreen first, then follow the link */
  document.addEventListener('click',function(ev){
    var a=ev.target&&ev.target.closest&&ev.target.closest('a[href]');
    if(!a||!on())return;
    ev.preventDefault();
    var href=a.href, done=false;
    function go(){ if(!done){done=true;location.href=href;} }
    try{
      var p=(document.exitFullscreen||document.webkitExitFullscreen).call(document);
      if(p&&p.then){ p.then(go,go); }
    }catch(e){}
    setTimeout(go,250);
  },true);
})();
</script>
