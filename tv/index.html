<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IBEE TV — ONLYIBEE</title>
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="apple-touch-icon" href="/assets/chess/bishop1.png">
<meta name="theme-color" content="#070707">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<!--
  IBEE TV — a retro set that plays the ONLYIBEE YouTube catalog.
  CHANNELS below is the whole programming grid: {id: youtube video id, t: title}.
  To add a channel: drop one line in. CH ▲/▼ zaps with static; the dial at the
  bottom jumps straight to a channel. Selecting a channel pauses the site radio
  (one soundtrack at a time). Nothing autoplays on load — the set boots to static.
-->
<style>
  :root{--bg:#070707;--panel:#0e0e0e;--ink:#e8e8e8;--dim:#7a7a7a;--acid:#b6ff00;--red:#ff2b2b;--cyan:#26e0ff;
    --border:#2a2a2a;--px:'Press Start 2P',monospace;--vt:'VT323',monospace}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--vt)}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px)}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
    background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.5))}
  header{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;
    border-bottom:2px solid var(--border);font-family:var(--px);font-size:10px;position:relative;z-index:50}
  header a{color:var(--acid);text-decoration:none}
  header a .r{color:var(--red)}
  header .back{color:var(--dim);font-size:9px}
  header .back:hover{color:var(--acid)}
  main{max-width:940px;margin:0 auto;padding:22px 14px 60px;position:relative;z-index:2}

  /* ===== the set ===== */
  #set{background:linear-gradient(180deg,#15120d,#0c0a07);border:3px solid #241f16;border-radius:14px;
    padding:16px 16px 12px;box-shadow:0 18px 50px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05)}
  #screenwrap{position:relative;background:#000;border:3px solid #000;border-radius:8px;overflow:hidden;
    box-shadow:inset 0 0 40px rgba(0,0,0,.9),0 0 26px rgba(182,255,0,.07)}
  #screen{position:relative;width:100%;aspect-ratio:16/9;background:#000}
  #yt{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
  #static{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:3}
  #static.off{display:none}
  /* CRT face over the tube */
  #screenwrap::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0 1px,transparent 1px 3px)}
  #screenwrap::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:6;
    background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.55))}
  #osd{position:absolute;top:10px;right:14px;z-index:7;font-family:var(--px);font-size:13px;color:var(--acid);
    text-shadow:0 0 10px rgba(182,255,0,.8);opacity:0;transition:opacity .25s;pointer-events:none}
  #osd.on{opacity:1}
  #hint{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;
    font-family:var(--px);color:var(--acid);font-size:clamp(10px,2.6vw,14px);text-align:center;pointer-events:none;
    text-shadow:0 0 12px rgba(182,255,0,.6)}
  #hint .blink{animation:bk 1.1s steps(1) infinite}
  @keyframes bk{50%{opacity:0}}

  /* control deck under the tube */
  #deck{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 4px 4px}
  #brandplate{font-family:var(--px);font-size:9px;color:#6b5f43;letter-spacing:2px}
  #brandplate b{color:#8f8058;font-weight:normal}
  .knobs{display:flex;gap:8px}
  .knobs button{font-family:var(--px);font-size:10px;padding:12px 14px;background:#171310;color:var(--ink);
    border:1px solid #33291c;border-radius:6px;cursor:pointer}
  .knobs button:hover{border-color:var(--acid);color:var(--acid)}
  #chnow{font-family:var(--px);font-size:9px;color:var(--dim);min-width:90px;text-align:center}
  #chnow b{color:var(--acid);font-weight:normal}

  /* ===== programming dial (the other choices) ===== */
  #dial{margin-top:20px}
  #dial .dh{font-family:var(--px);font-size:9px;color:var(--acid);margin-bottom:10px}
  #chans{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;max-height:290px;overflow-y:auto;
    border:1px solid var(--border);padding:10px;background:rgba(10,10,10,.6)}
  .ch{display:flex;gap:9px;align-items:center;background:var(--panel);border:1px solid var(--border);
    padding:9px 10px;cursor:pointer;color:var(--dim);font-size:17px;text-align:left}
  .ch:hover{border-color:var(--acid);color:var(--ink)}
  .ch.now{border-color:var(--acid);color:var(--acid);background:#0d1400}
  .ch .no{font-family:var(--px);font-size:8px;color:#555;flex:none;width:26px}
  .ch.now .no{color:var(--acid)}
  .ch .tt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .note{color:var(--dim);text-align:center;margin-top:14px;font-size:16px}
  .note a{color:var(--cyan)}
</style>
</head>
<body>
<header>
  <a href="../#menu">ONLY<span class="r">IBEE</span>&nbsp;TV</a>
  <a class="back" href="../#menu">◀ CONSOLE</a>
</header>
<main>
  <div id="set">
    <div id="screenwrap">
      <div id="screen">
        <iframe id="yt" title="IBEE TV" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        <canvas id="static"></canvas>
        <div id="hint"><span>◉ NO SIGNAL</span><span class="blink">PRESS CH ▲ TO TUNE IN</span></div>
        <span id="osd">CH 01</span>
      </div>
    </div>
    <div id="deck">
      <span id="brandplate">IBEE<b>TRON</b> 2000</span>
      <span id="chnow">CH <b id="chN">--</b></span>
      <div class="knobs">
        <button id="chup">CH ▲</button>
        <button id="chdn">CH ▼</button>
      </div>
    </div>
  </div>

  <div id="dial">
    <div class="dh">PROGRAMMING_ pick a channel</div>
    <div id="chans"></div>
    <div class="note">broadcasting the <a href="https://www.youtube.com/@ONLYIBEE" target="_blank" rel="noopener">@ONLYIBEE</a> archive — new transmissions land here first_</div>
  </div>
</main>

<script src="../assets/player.js?v=13"></script>
<script>
(function(){
"use strict";
/* ===== THE PROGRAMMING GRID — add a line per new video ===== */
var CHANNELS=[
  {id:"-M646sfdyiw", t:"ALL I SEE"},
  {id:"rA6zb4bp-sE", t:"PIQUÉ"},
  {id:"FW8eWeDuHBk", t:"DEUSPI"},
  {id:"XqtNamsfJdA", t:"UN MILI"},
  {id:"VPWyQjn_CTk", t:"BIZAR"},
  {id:"MXjQCg9cCwk", t:"NO BE SMALL TALK FAM (x G SALTE)"},
  {id:"jh14yYWViLw", t:"NICE DAY — FREESTYLE"},
  {id:"YA93_x4JarY", t:"YUUUR ft. G SALTE"},
  {id:"IF-13ZZ7PpQ", t:"UN RENOI — FREESTYLE"},
  {id:"OObk2aBgIjQ", t:"ALL IM SAYIN"},
  {id:"f8bar-0NK10", t:"OUTTA POCKET ft. KARMA SUTRA"},
  {id:"MaCk7vngdrA", t:"20 MIN ZA SESSION"},
  {id:"7F42hEzB44M", t:"TOUJOURS / JE NE REGRETTE RIEN"},
  {id:"T1e6cesSEpg", t:"DANS LA STREET"},
  {id:"NJRAlaiTqcg", t:"PLUS D'ESPOIR (NOUVEAUX PUNK)"},
  {id:"w8I25_5eQHk", t:"VIE DE MERDE ft. ARMETTA"},
  {id:"Y4rhdAhFaKg", t:"DIS OUI ft. ARMETTA"},
  {id:"HfbTAdv4JDw", t:"NE ME LAISSE PAS ft. MOONINMAY"},
  {id:"d5fheBaj4oE", t:"TROP TARD (NOUVEAUX PUNK)"},
  {id:"eZ7aY9dFafU", t:"LIFESTYLE ft. LUKAZAM"},
  {id:"C-1kEwM4920", t:"JUSQU'À QUAND"},
  {id:"AcK_lWCdAp4", t:"ANXIOLYTIQUES (INTRO)"},
  {id:"VilwObILGko", t:"DRIPIDIDRIP"},
  {id:"MiRCIAVC6v4", t:"NIGHT CITY (x MOONINMAY)"},
  {id:"O0TGs-Iu5Do", t:"HIGH TOUT LE TEMPS ft. MOON"},
  {id:"vBC-S3_sYDo", t:"VIE EN ROSE"},
  {id:"IeD8NpBepfc", t:"KHABAT AVEC TOI"},
  {id:"AI1JQch5STM", t:"BILLET DE BANQUE"},
  {id:"_bNujIEzlcw", t:"PRÉPARE TOI — FREESTYLE"},
  {id:"uWKWTJ25zNQ", t:"PROFESSEUR"}
];

var yt=document.getElementById("yt"), st=document.getElementById("static"),
    osd=document.getElementById("osd"), hint=document.getElementById("hint"),
    chN=document.getElementById("chN"), chans=document.getElementById("chans");
var cur=-1, staticT=null, noiseOn=true;

/* ---- static noise (the tube between channels) ---- */
var sctx=st.getContext("2d");
function sizeStatic(){ st.width=st.clientWidth/2; st.height=st.clientHeight/2; }
sizeStatic(); addEventListener("resize",sizeStatic);
(function noise(){
  requestAnimationFrame(noise);
  if(!noiseOn)return;
  var w=st.width,h=st.height;if(!w||!h)return;
  var img=sctx.createImageData(w,h),d=img.data;
  for(var i=0;i<d.length;i+=4){var v=(Math.random()*255)|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
  sctx.putImageData(img,0,0);
  /* rolling bar */
  sctx.fillStyle="rgba(0,0,0,.35)";
  sctx.fillRect(0,(performance.now()/12)%h,w,h*0.08);
})();

/* ---- channel list ---- */
CHANNELS.forEach(function(c,i){
  var d=document.createElement("div");d.className="ch";
  d.innerHTML='<span class="no">'+String(i+1).padStart(2,"0")+'</span><span class="tt">'+c.t+'</span>';
  d.onclick=function(){tune(i);};
  chans.appendChild(d);
});
function markList(){
  var rows=chans.children;
  for(var i=0;i<rows.length;i++)rows[i].classList.toggle("now",i===cur);
}

/* ---- tune: static burst → swap the feed ---- */
function tune(i){
  cur=((i%CHANNELS.length)+CHANNELS.length)%CHANNELS.length;
  var c=CHANNELS[cur];
  /* one soundtrack at a time: the TV takes over from the radio */
  try{var r=window.IBEERADIO||(window.top&&window.top.IBEERADIO);
    if(r&&r.playing&&r.playing())r.control.pause();}catch(e){}
  hint.style.display="none";
  noiseOn=true; st.classList.remove("off");
  osd.textContent="CH "+String(cur+1).padStart(2,"0"); osd.classList.add("on");
  chN.textContent=String(cur+1).padStart(2,"0");
  markList();
  clearTimeout(staticT);
  yt.src="https://www.youtube-nocookie.com/embed/"+c.id+"?autoplay=1&rel=0&color=white";
  staticT=setTimeout(function(){
    noiseOn=false; st.classList.add("off");
    setTimeout(function(){osd.classList.remove("on");},1400);
  },650);
}
document.getElementById("chup").onclick=function(){tune(cur+1);};
document.getElementById("chdn").onclick=function(){tune(cur<0?CHANNELS.length-1:cur-1);};
addEventListener("keydown",function(e){
  if(e.key==="ArrowUp"||e.key==="PageUp"){e.preventDefault();tune(cur+1);}
  if(e.key==="ArrowDown"||e.key==="PageDown"){e.preventDefault();tune(cur<0?CHANNELS.length-1:cur-1);}
});
})();
</script>
</body>
</html>
