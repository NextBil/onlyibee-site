<!DOCTYPE html>
<html lang="en">
<head>
<!-- ===== favicon (bishop 1) ===== -->
<link rel="icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="shortcut icon" type="image/png" href="/assets/chess/bishop1.png">
<link rel="apple-touch-icon" href="/assets/chess/bishop1.png">
<meta name="theme-color" content="#070707">
<meta property="og:image" content="https://onlyibee.com/assets/chess/bishop1.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="https://onlyibee.com/assets/chess/bishop1.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCESS TERMINAL — ONLYIBEE</title>
<meta name="description" content="ONLYIBEE secure access terminal. Scan your garment's NFC tag to authenticate.">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070707;--panel:#0e0e0e;--ink:#e8e8e8;--dim:#7a7a7a;
    --acid:#b6ff00;--red:#ff2b2b;--pink:#ff9ec4;--gold:#d9b36c;--border:#2a2a2a;
    --px:'Press Start 2P',monospace;--vt:'VT323',monospace;
    --hue:88; /* accent hue, overridden per rarity */
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--vt);font-size:20px;
    min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column}
  ::selection{background:var(--acid);color:#000}

  /* CRT overlay */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9000;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.28) 0 1px,transparent 1px 3px)}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9001;
    background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}

  header{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:2px solid var(--border);
    font-family:var(--px);font-size:10px;position:relative;z-index:50}
  header a{color:var(--acid);text-decoration:none}
  header a .r{color:var(--red)}
  header span{color:var(--dim);font-size:8px}

  main{flex:1;width:100%;max-width:560px;margin:0 auto;padding:0 20px 90px;
    display:flex;flex-direction:column;align-items:center;text-align:center}
  /* the lock + animation sit centered in the first screen; the dashboard flows below it */
  .scanstage{width:100%;min-height:calc(100dvh - 168px);
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  #stage.granted .scanstage{min-height:auto;padding:7vh 0 4px}

  /* ---------- lock (colors via CSS currentColor so --hue actually applies) ---------- */
  .lockwrap{width:140px;height:160px;margin:0 auto 22px;position:relative;
    display:flex;align-items:center;justify-content:center}
  #lock{width:100%;height:100%;overflow:visible;color:hsl(var(--hue),90%,60%);
    filter:drop-shadow(0 0 16px hsla(var(--hue),95%,55%,.4));transition:color .4s,filter .4s}
  #lock .body{fill:#0e0e0e;stroke:currentColor;stroke-width:2.5}
  #lock .kh{fill:currentColor}
  #shackle{fill:none;stroke:currentColor;stroke-width:5;stroke-linecap:round;
    transform-box:fill-box;transform-origin:50% 100%;
    transition:transform .6s cubic-bezier(.34,1.5,.6,1)}
  .granted #shackle{transform:translateY(-52%) rotate(-14deg)}
  .granted #lock{color:var(--acid);filter:drop-shadow(0 0 22px rgba(182,255,0,.55))}
  .denied #lock{color:var(--red)}
  .denied .lockwrap{animation:shake .42s 2}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
  .ring{position:absolute;width:118px;height:118px;border:2px solid var(--acid);border-radius:50%;
    opacity:0;pointer-events:none}
  .granted .ring{animation:ping .85s ease-out}
  @keyframes ping{0%{opacity:.9;transform:scale(.5)}100%{opacity:0;transform:scale(1.8)}}

  /* ---------- status text ---------- */
  #status{font-family:var(--px);font-size:12px;letter-spacing:1px;min-height:18px;
    color:hsl(var(--hue),95%,68%);text-shadow:0 0 12px hsla(var(--hue),95%,55%,.5)}
  #substatus{color:var(--dim);font-size:19px;margin-top:10px;min-height:22px}
  .denied #status{color:var(--red);text-shadow:0 0 12px rgba(255,43,43,.5)}

  /* progress bar */
  #barwrap{width:min(320px,80%);height:14px;border:2px solid var(--border);padding:2px;margin:22px auto 0}
  #bar{height:100%;width:0%;background:hsl(var(--hue),95%,55%);transition:width .2s linear}
  .denied #bar{background:var(--red)}
  #log{font-family:var(--px);font-size:8px;color:var(--dim);margin-top:12px;min-height:12px;line-height:1.8}

  .blink{animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* ---------- granted card ---------- */
  #card{display:none;width:100%;margin-top:8px;animation:rise .5s ease-out}
  #card.on{display:block}
  @keyframes rise{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
  .welcome{font-family:var(--px);font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:6px}
  .uname{font-family:var(--px);font-size:clamp(18px,6vw,30px);color:hsl(var(--hue),95%,68%);
    text-shadow:0 0 20px hsla(var(--hue),95%,55%,.5);word-break:break-word}
  .rtag{display:inline-block;font-family:var(--px);font-size:8px;padding:5px 8px;margin-top:12px;
    border:1px solid hsla(var(--hue),80%,55%,.6);color:hsl(var(--hue),95%,70%)}

  .reward{border:2px solid hsla(var(--hue),80%,55%,.5);background:linear-gradient(180deg,hsla(var(--hue),60%,10%,.6),#070707);
    margin-top:22px;padding:16px;box-shadow:0 0 22px hsla(var(--hue),95%,55%,.12)}
  .reward .h{font-family:var(--px);font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:12px}
  .reward .code{font-family:var(--px);font-size:clamp(14px,5vw,20px);color:hsl(var(--hue),95%,72%);
    border:1px dashed hsla(var(--hue),80%,55%,.6);padding:12px;letter-spacing:2px;cursor:pointer;user-select:all}
  .reward .desc{color:#c9c9c9;font-size:19px;margin-top:12px;line-height:1.5}
  .reward .copy{font-family:var(--px);font-size:8px;color:var(--dim);margin-top:8px}

  .meta{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;
    font-size:16px;color:var(--dim);text-align:left;border-top:1px solid #1a1a1a;padding-top:14px}
  .meta b{color:var(--ink);font-weight:normal}

  .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px}
  .btn{font-family:var(--px);font-size:10px;text-decoration:none;padding:13px 16px;cursor:pointer;
    background:hsl(var(--hue),95%,55%);color:#000;border:2px solid hsl(var(--hue),95%,55%)}
  .btn.ghost{background:transparent;color:hsl(var(--hue),95%,68%)}

  /* ---------- section heads (collection / directory) ---------- */
  .sect-h{font-family:var(--px);font-size:9px;color:var(--dim);letter-spacing:1px;margin:28px 0 12px;
    text-align:left;border-top:1px solid #1a1a1a;padding-top:16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .sect-h .cnt{color:hsl(var(--hue),95%,68%);white-space:nowrap}

  /* ---------- 3D spinning collectibles ---------- */
  .collection{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:12px}
  .col{position:relative;display:block;text-decoration:none;color:var(--ink);
    border:2px solid var(--border);background:var(--panel);padding:12px 8px 10px;text-align:center;
    transition:transform .12s,border-color .12s,box-shadow .12s}
  .col:hover{transform:translateY(-3px)}
  .col.r-sr{border-color:#5c3350}.col.r-sr:hover{border-color:#e879c9;box-shadow:0 0 14px rgba(232,121,201,.3)}
  .col.r-sdr{border-color:#5c4b2c}.col.r-sdr:hover{border-color:#d9b36c;box-shadow:0 0 14px rgba(217,179,108,.35)}
  .col.r-leg{border-color:#4d6600}.col.r-leg:hover{border-color:var(--acid);box-shadow:0 0 16px rgba(182,255,0,.4)}
  .col .disc3d{width:72px;height:86px;margin:0 auto 8px;perspective:420px}
  .col .stk{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:tspin 6s linear infinite}
  @keyframes tspin{from{transform:rotateY(0deg) rotateX(4deg)}to{transform:rotateY(360deg) rotateX(4deg)}}
  .col .stk img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;backface-visibility:visible}
  .col.locked .stk{animation:none;filter:grayscale(1) brightness(.32)}
  .col.locked::after{content:"?";position:absolute;top:40px;left:0;right:0;font-family:var(--px);font-size:22px;color:var(--dim)}
  .col .cn{font-family:var(--px);font-size:8px;color:var(--ink);line-height:1.7}
  .col.locked .cn{color:var(--dim)}
  .col .cr{font-size:14px;color:var(--dim);margin-top:3px}
  .col .own{position:absolute;top:6px;right:6px;font-family:var(--px);font-size:6px;color:hsl(var(--hue),95%,70%)}

  /* ---------- site directory table ---------- */
  .directory{width:100%;border-collapse:collapse;font-size:17px;text-align:left}
  .directory tr{border-bottom:1px solid #161616}
  .directory tr.head td{font-family:var(--px);font-size:8px;color:var(--dim);letter-spacing:1px}
  .directory td{padding:11px 8px;vertical-align:top}
  .directory .nm{font-family:var(--px);font-size:9px;color:hsl(var(--hue),95%,70%);white-space:nowrap}
  .directory .st{font-family:var(--px);font-size:7px;text-align:right;white-space:nowrap}
  .directory .st.live{color:var(--acid)}.directory .st.hidden{color:var(--red)}
  .directory tr.link{cursor:pointer}
  .directory tr.link:hover td{background:#0d0d0d}

  footer{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;
    align-items:center;padding:10px 18px;background:#000;border-top:2px solid var(--border);
    font-family:var(--px);font-size:9px;color:var(--dim)}
  footer .a{color:var(--acid)}
</style>
</head>
<body>
  <header>
    <a href="../#menu">ONLY<span class="r">IBEE</span> OS</a>
    <span>ACCESS TERMINAL // NFC</span>
  </header>

  <main id="stage">
   <div class="scanstage">
    <div class="lockwrap">
      <div class="ring"></div>
      <svg id="lock" viewBox="0 0 48 54" xmlns="http://www.w3.org/2000/svg">
        <path id="shackle" d="M14 24 V16 a10 10 0 0 1 20 0 V24"/>
        <rect class="body" x="9" y="24" width="30" height="24" rx="4"/>
        <circle class="kh" cx="24" cy="34" r="3.4"/>
        <rect class="kh" x="22.6" y="35" width="2.8" height="7"/>
      </svg>
    </div>

    <div id="status">INITIALIZING SECURE LINK</div>
    <div id="substatus">establishing handshake_</div>

    <div id="barwrap"><div id="bar"></div></div>
    <div id="log"></div>
   </div><!-- /.scanstage -->

    <!-- ===== GRANTED card (revealed after auth) ===== -->
    <div id="card">
      <div class="welcome">✓ AUTHENTICATED — ACCESS GRANTED</div>
      <div class="uname" id="uname">—</div>
      <div class="rtag" id="rtag">MEMBER</div>

      <div class="reward" id="rewardbox">
        <div class="h">// YOUR REWARD_</div>
        <div class="code" id="code" title="tap to copy">————</div>
        <div class="desc" id="rewarddesc">—</div>
        <div class="copy" id="copyhint">tap the code to copy_</div>
      </div>

      <div class="meta" id="meta"></div>

      <!-- ===== 3D spinning character collection ===== -->
      <div class="sect-h">// YOUR COLLECTION_ <span class="cnt" id="colcount"></span></div>
      <div class="collection" id="collection"></div>

      <!-- ===== public site directory — all apps ===== -->
      <div class="sect-h">// SITE DIRECTORY — ALL APPS_</div>
      <table class="directory"><tbody id="directory"></tbody></table>

      <div class="btns">
        <a class="btn" id="enterbtn" href="../?tag=AUTH">▶ ENTER THE CONSOLE</a>
        <a class="btn ghost" href="../#shop">◀ SHOP</a>
      </div>
    </div>
  </main>

  <footer>
    <span class="a">♪ ONLYIBEE OS</span>
    <span id="foot">SECURE NODE // v0.1</span>
  </footer>

<script>
(function(){
  var $=function(id){return document.getElementById(id);};

  /* =========================================================================
     TAG REGISTRY  —  the "keys". One entry per physical NFC tag.
     Add a tag: give it a unique id (burn onlyibee.com/auth/?tag=THAT-ID onto the
     chip), then fill in the owner + reward. rarity drives the accent color.
     rarity: c=common(green) · sr=pink · sdr=gold · leg=acid/legendary
     ========================================================================= */
  var TAGS = {
    "UTOPIE-0001": { user:"IBEE",   garment:"UTOPIE GREY PINK HOODIE", rarity:"leg",
                     reward:"VAULT ACCESS", code:"UTP-VAULT-01",
                     desc:"Founder tag. Unlocks the hidden Vault in the console.",
                     since:"2025", vault:true,
                     owns:["mimi","swordy","goli","sworda","beebee","ablah","nannan"] },
    "SWORDY-0007": { user:"NOMAD",  garment:"VDF RED HOODIE — SWORDY",  rarity:"c",
                     reward:"15% OFF NEXT DROP", code:"SWD-15-7F2A",
                     desc:"Owner reward — one-time code, redeem at checkout.",
                     since:"2025", owns:["swordy"] },
    "GOLI-0003":   { user:"STONER", garment:"STONER GREY PINK HOODIE — GOLI", rarity:"sr",
                     reward:"SECRET TRACK", code:"GOLI-UNLOCK",
                     desc:"Unlocks an unreleased signal in the Vault.",
                     since:"2025", vault:true, owns:["goli","mimi"] },
    "DEMO":        { user:"GUEST",  garment:"DEMO TAG",               rarity:"c",
                     reward:"WELCOME", code:"HELLO-IBEE",
                     desc:"Demo tag so you can preview the flow.",
                     since:"2026", owns:[] }
    /* + add more tags here … (owns: which character collectibles this tag has) */
  };

  /* ===== CHARACTERS — the 3D spinning collectibles (chess-piece art) ===== */
  var CHARS = [
    {k:"nannan", name:"NANNAN", role:"THE KING",   piece:"king.png",    rarity:"sdr", page:"../nannan/"},
    {k:"ablah",  name:"ABLA",   role:"THE QUEEN",  piece:"queen.png",   rarity:"sdr", page:"../ablah/"},
    {k:"beebee", name:"BEEBEE", role:"THE BISHOP", piece:"bishop1.png", rarity:"sr",  page:"../beebee/"},
    {k:"sworda", name:"SWORDA", role:"THE KNIGHT", piece:"knight2.png", rarity:"sr",  page:"../sworda/"},
    {k:"swordy", name:"SWORDY", role:"THE KNIGHT", piece:"knight1.png", rarity:"c",   page:"../swordy/"},
    {k:"mimi",   name:"MIMI",   role:"THE TOWER",  piece:"rook1.png",   rarity:"c",   page:"../mimi/"},
    {k:"goli",   name:"GOLI",   role:"THE PON",    piece:"pon.png",     rarity:"c",   page:"../goli/"}
  ];

  /* ===== SITE DIRECTORY — every app / section ===== */
  var APPS = [
    {n:"MUSIC ENGINE",  d:"The universe — galaxies of releases, planets you can play.", u:"../#music",         s:"LIVE"},
    {n:"UTOPIE™",  d:"Clothing project 01 — NFC-tagged garments.",                 u:"../utopie/",        s:"LIVE"},
    {n:"LA ZONE",       d:"Art hub — Paris to Toronto.",                                u:"../#lazone",        s:"LIVE"},
    {n:"ICS",           d:"The characters — Ibee's Chess Set.",                         u:"../#ics",           s:"LIVE"},
    {n:"ICS CHESS",     d:"Playable chess with the characters as pieces.",              u:"../chess/",         s:"LIVE"},
    {n:"LYRICS ENGINE", d:"Synced lyrics + the story behind each song.",                u:"../lyrics/",        s:"LIVE"},
    {n:"SHOP",          d:"One-off garments, made once.",                               u:"../#shop",          s:"LIVE"},
    {n:"NOUVEAUX PUNK", d:"Album world — encrypted tracks & sealed drops.",             u:"../nouveauxpunk/",  s:"LIVE"},
    {n:"ACCESS TERMINAL", d:"NFC authentication — you are here.",                       u:"./",                s:"LIVE"},
    {n:"THE VAULT",     d:"Encrypted sector — unlocks via authenticated tags.",         u:"../?tag=VAULT",     s:"HIDDEN"}
  ];

  var RNAME={c:"MEMBER",sr:"RARE MEMBER",sdr:"ELITE MEMBER",leg:"FOUNDER"};
  var RHUE ={c:88, sr:325, sdr:40, leg:75}; /* accent hue per rarity */

  var LS_KEY="ibee_auth"; /* remembers who's logged in on this device */

  /* ---------- read the tag from the URL (?tag=  or  ?key= ) ---------- */
  function param(n){var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search);return m?decodeURIComponent(m[1]):null;}
  var tagId = (param("tag")||param("key")||"").toUpperCase().trim();

  /* ---------- persistence ---------- */
  function loadSave(){try{return JSON.parse(localStorage.getItem(LS_KEY)||"null");}catch(e){return null;}}
  function store(rec){try{localStorage.setItem(LS_KEY,JSON.stringify(rec));}catch(e){}}
  /* also flip the console's Vault flag when a tag grants it (shares ibee_sav) */
  function unlockVault(){try{
    var s=JSON.parse(localStorage.getItem("ibee_sav")||"{}"); s.vault=true;
    localStorage.setItem("ibee_sav",JSON.stringify(s));
  }catch(e){}}

  var saved = loadSave();
  var isReturning = false;
  var rec = tagId && TAGS[tagId] ? TAGS[tagId] : null;

  /* no tag in URL but we've seen this device before → "welcome back" */
  if(!rec && saved && TAGS[saved.tag]){ rec = TAGS[saved.tag]; tagId = saved.tag; isReturning = true; }
  /* no tag at all → fall back to the DEMO tag so the page is never blank */
  var isDemo = false;
  if(!rec && !tagId){ rec = TAGS.DEMO; tagId="DEMO"; isDemo=true; }

  /* ---------- the authentication sequence ---------- */
  var stage=$("stage"),statusEl=$("status"),subEl=$("substatus"),bar=$("bar"),logEl=$("log");
  function setHue(h){document.documentElement.style.setProperty("--hue",h);}

  var GRANT_STEPS=[
    {t:0,   p:8,  s:"READING NFC SIGNATURE",  sub:"chip detected_",        log:"› uid "+shortHash(tagId)},
    {t:650, p:38, s:"VERIFYING SIGNATURE",     sub:"matching against ledger_", log:"› checking registry…"},
    {t:1300,p:72, s:"DECRYPTING CREDENTIALS",  sub:"unwrapping token_",     log:"› token ok"},
    {t:1950,p:100,s:"ACCESS GRANTED",          sub:"unlocking_",            log:"› welcome back"}
  ];

  function shortHash(s){var h=0;for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return ("0000"+h.toString(16)).slice(-8).toUpperCase();}

  function run(){
    if(rec){
      setHue(RHUE[rec.rarity]||88);
      GRANT_STEPS.forEach(function(st){
        setTimeout(function(){
          statusEl.textContent=st.s; subEl.textContent=st.sub;
          bar.style.width=st.p+"%"; logEl.textContent=st.log;
        },st.t);
      });
      setTimeout(grant, 2450);
    } else {
      /* tag present but unknown → deny */
      setHue(88);
      statusEl.textContent="READING NFC SIGNATURE"; subEl.textContent="chip detected_";
      setTimeout(function(){bar.style.width="55%";statusEl.textContent="VERIFYING SIGNATURE";subEl.textContent="matching against ledger_";},700);
      setTimeout(deny, 1600);
    }
  }

  function grant(){
    stage.classList.add("granted");
    /* fill the card */
    $("uname").textContent = "WELCOME BACK, "+rec.user;
    $("rtag").textContent = RNAME[rec.rarity]||"MEMBER";
    $("code").textContent = rec.code||"————";
    $("rewarddesc").textContent = rec.desc||"";
    $("rewardbox").querySelector(".h").textContent = "// "+(rec.reward||"REWARD")+"_";
    $("meta").innerHTML =
        "<span>TAG: <b>"+tagId+"</b></span>"
      + "<span>ID: <b>"+shortHash(tagId)+"</b></span>"
      + "<span>GARMENT: <b>"+(rec.garment||"—")+"</b></span>"
      + "<span>MEMBER SINCE: <b>"+(rec.since||"—")+"</b></span>";
    $("enterbtn").setAttribute("href","../?tag="+encodeURIComponent(tagId));
    $("foot").textContent = "AUTHENTICATED // "+rec.user;
    renderCollection();
    renderDirectory();
    $("card").classList.add("on");
    /* persist login + unlock vault if this tag grants it */
    store({tag:tagId, user:rec.user, at:Date.now()});
    if(rec.vault) unlockVault();
  }

  function deny(){
    stage.classList.add("denied");
    statusEl.textContent="✗ SIGNATURE NOT RECOGNIZED";
    subEl.textContent="this tag is not on the ledger_";
    bar.style.width="100%";
    logEl.innerHTML="› access denied — <span class='blink'>retry scan</span>";
    $("foot").textContent="ACCESS DENIED";
  }

  /* ---------- render the 3D spinning collection ---------- */
  function renderCollection(){
    var owns=(rec&&rec.owns)||[], A="../assets/chess/", html="";
    CHARS.forEach(function(c,idx){
      var owned=owns.indexOf(c.k)>=0, stk="";
      for(var i=0;i<5;i++){ var z=(i-2)*3, b=(i===4?1:0.4+0.14*i);
        stk+='<img src="'+A+c.piece+'" alt="" style="transform:translateZ('+z+'px);filter:brightness('+b.toFixed(2)+')">'; }
      html+='<a href="'+c.page+'" class="col r-'+c.rarity+(owned?'':' locked')+'">'
          +(owned?'<span class="own">✓ OWNED</span>':'')
          +'<div class="disc3d"><div class="stk" style="animation-duration:'+(5+idx*0.4)+'s">'+stk+'</div></div>'
          +'<div class="cn">'+c.name+'</div><div class="cr">'+c.role+' · '+c.rarity.toUpperCase()+'</div></a>';
    });
    $("collection").innerHTML=html;
    $("colcount").textContent=owns.length+" / "+CHARS.length+" COLLECTED";
  }

  /* ---------- render the site directory table ---------- */
  function renderDirectory(){
    var html='<tr class="head"><td>SECTION</td><td>WHAT IT IS</td><td class="st">STATUS</td></tr>';
    APPS.forEach(function(a){
      html+='<tr class="link" data-u="'+a.u+'"><td class="nm">'+a.n+'</td><td>'+a.d+'</td>'
          +'<td class="st '+(a.s==="LIVE"?"live":"hidden")+'">'+a.s+'</td></tr>';
    });
    $("directory").innerHTML=html;
    Array.prototype.forEach.call(document.querySelectorAll(".directory tr.link"),function(tr){
      tr.addEventListener("click",function(){location.href=tr.getAttribute("data-u");});
    });
  }

  /* copy the reward code on tap */
  $("code").addEventListener("click",function(){
    var t=$("code").textContent;
    if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){$("copyhint").textContent="copied ✓";});}
  });

  /* if this is a return visit, skip the long scan */
  if(isReturning){ GRANT_STEPS.forEach(function(s){s.t=Math.floor(s.t*0.4);}); }

  run();
})();
</script>
